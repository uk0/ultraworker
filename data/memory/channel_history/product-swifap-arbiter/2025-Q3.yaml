summary: |
  2025년 3분기는 SWIFAP(당시 SWFAP/SWAP) 프로젝트의 태동기로, 워크플로우 자동화를 위한 DSL 또는 Python 라이브러리 방식의 언어 설계 논의가 활발히 진행되었다.
  Rust로 파서를 구현한 DSL 방식과 Python 코드가 JSON으로 변환되는 Amaranth 스타일 방식 중 후자를 선택하여 PoC를 빠르게 제작하였으며,
  GitHub sionic-ai/swfap 저장소를 오픈하고 기본 Workflow 클래스를 구현해 동작을 확인하였다.
