summary: |
  2024년 1분기에 회사 굿즈 채널이 활발히 운영되었다. 정세민(Sem)님이 주도하여 회사 단체티 시안 디자인,
  맨투맨 제작(모모티 업체), 랭콘용 텀블러(스텐 이중 텀블러 500ml, 레이저 인쇄, 150개/742,500원) 제작을 진행하였다.
  텀블러는 투표를 통해 "NEW 로리 304 이중 스텐텀블러 500ml"로 결정되었다. 사무실 현판 투표(아크릴, 스카시, 고무,
  스텐 입체형, 박스형/에폭시 조명, 후광 현판 중 선택)도 진행되었다. 브로셔 봉투 디자인 투표(32개 답글)와
  하클 스티커 레퍼런스도 공유되었다. 채널 설명은 "kubectl get pods -n sionic"으로 설정되었다.
