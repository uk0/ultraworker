summary: |
  2024년 11월 말(11/26~11/29) 강원도 양양에서 진행된 팀 워케이션 채널. 약 17명의 팀원이 참여하여 데스커(DESKER) 리조트 가든에 숙박하며 업무와 레저 활동을 병행함.
  주요 활동으로 주문진 회 구매, 자전거 라이딩, 수영장, 클라이밍, 불꽃놀이, 요가 세션 등이 진행됨. 숙소 방 배정, 법인카드 관리, 식당 예약(고향집맛집, 양양 막국수 등), 차량 이동 조율 등 로지스틱스 논의가 활발했음.
  타회사 참여자(정효주)도 포함된 교류형 워케이션으로, 보드게임(달무티) 등 친목 활동도 이루어짐. 마지막 날 퇴실 및 서울 복귀 조율로 마무리됨.
