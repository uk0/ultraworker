summary: |
  2025-Q2에는 가입 알림 시스템이 업그레이드되어 기존 "Admin 가입 완료 알림"에 더해 "Admin 가입 요청 완료, 이메일 발송" 단계가 추가되었다. 가입 프로세스가 요청-이메일발송-완료의 2단계로 분리되면서 알림 메시지가 대폭 증가하였다(151건). Noah와 최병현이 유입 증가를 지속 관찰하며, 특히 5월 22-23일에 집중적인 가입 러시가 발생하였다. 최병현이 templar-archives 대시보드에서 근 2일간 chat_completion 사용량 증가를 보고하였다. 메일 주소에 + 기호를 사용한 가입 사례가 처음 관찰되었다.
