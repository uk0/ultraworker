summary: |
  2025-Q1에 신규 가입 유입이 본격적으로 증가하기 시작한 분기이다. Noah가 가입 추세 분석 데이터를 공유하며 유입 상승을 확인하였고, 김혜원은 "묘하게 인플로우가 점점 늘어나는 느낌"이라고 관찰하였다. 최병현(Hyune-c)이 팀명/회사명 어뷰징 가능성 문제를 제기하고 사업자번호 인증, 승인제 운영, 기업 이메일 인증 등 해결 방안을 논의하였다. 또한 팀명을 입력하지 않는 사용자 존재 문제, 오가닉 유입 고객 관리 방침(테스트 유저로 간주하고 관찰만), 리마인드 봇(28일 후 알림) 설정 등이 주요 논의사항이었다. Noah가 중소기업 대표 단톡방에서 광고하여 유입 증가에 기여하였다.
topics:
  - 신규 가입 유입 추세 분석
