summary: |
  2024년 3분기 deploy-common 채널은 하루 평균 40건의 배포 메시지가 발생하는 가장 활발한 분기로, qspm과 stargate-wrtn-live 서비스를 중심으로 EKS 클러스터 운영이 집중되었다. EKS 노드 수를 5개에서 8개로 증설하는 인프라 확장 논의가 이루어졌으며, 라이브 배포 정책 수립과 운영 가이드라인 확정이 주요 과제였다. 16명의 팀원이 참여하며 서비스 안정성 확보와 스케일링 대응을 위한 배포 프로세스 개선이 적극적으로 진행되었다.
