summary: |
  2025년 4분기 deploy-common 채널은 /sionic-deploy 봇을 통한 자동화 배포가 폭발적으로 증가하여 하루 평균 26.4건의 배포 이벤트가 기록되었다. carrier, carrier-storm-parse, asmr-v2, bgeserver, langgraph, drone, overmind 등 핵심 서비스들이 onprem, oci, eks 클러스터에 지속적으로 배포되었으며, IBK 고객사 전용 주간 빌드(ibk.25.XXw)가 정기적으로 릴리즈되었다. OCI 인프라로의 전환 작업이 가속화되면서 다중 클러스터 배포 관리가 주요 운영 과제로 부상하였고, 24명의 팀원이 실시간으로 배포 상태를 모니터링하였다.
