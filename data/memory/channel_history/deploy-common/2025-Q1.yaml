summary: |
  2025년 1분기 deploy-common 채널은 storm-parse-api 크래시 버그 조사와 함께 carrier, asmr, supply 서비스의 파이프라인 마이그레이션이 핵심 과제로 다루어졌다. ta-event-collector-api의 이벤트 수집 관련 배포 이슈가 지속적으로 논의되었으며, bgeserver 배포 과정에서 설정 오류로 인한 문제가 발생하여 팀 전체가 공동 대응하였다. 15명의 팀원이 참여하여 하루 평균 8.3건의 배포가 이루어졌으며, CI/CD 파이프라인 안정화에 집중하였다.
