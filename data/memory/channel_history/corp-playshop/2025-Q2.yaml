summary: |
  2025년 2분기 corp-playshop 채널에서 제주도 워크샵(플레이샵) 기획이 본격적으로
  시작되었다. 김혜원이 권혜선, 송명하, 정세민을 "워크샵 위원회"로 임명했으며(6/16),
  숙소 리서치(세화마을, 맹그로브, 마음스테이, 오피스, 공간7 등 15곳 조사), 항공권
  예매 방식(법인카드 일괄 결제), 워케이션 바우처 신청, 인원 파악(26인 이상), 렌트/
  관광버스 교통 계획, 활동 계획(해커톤, 모델톤, MTEB 1등 찍기 등) 논의가 이루어졌다.
  권혜선이 숙소 견적 수집 및 연락을 주도했으며, 세화마을과 마음스테이가 주요 후보로
  부상했다. 정세민이 항공권 예매 관련 고민과 비행기 관련 공지를 담당했다. 오승희가
  디캠프 입주사 제주 워케이션 비용 지원 정보를 공유했다. 공식일정 전 선발대 구성과
  숙소 배정도 논의되었다.
