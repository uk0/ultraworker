summary: |
  2025년 3분기 corp-playshop 채널은 제주도 워크샵의 실행 단계로, 79건의 메시지와
  매우 활발한 스레드 활동이 있었다. 주요 활동: (1) 한라산 등산팟 운영(강성우 주도,
  성판악 코스 8/24 새벽 6시 출발, 36개 답글), (2) 레크레이션/세미나/해커톤 내용
  기획(정세민-김혜원 논의, 92개 답글), (3) 숙소 방배정(오승희 2인실/1인실 혼동
  이슈, 30개 답글), (4) 타운홀 준비(고석현 담당, 김혜원 월요일 타겟 요청, 27개 답글),
  (5) 교통안내(안진혁 담당, 김포공항 집합), (6) 맛집/스노클링/활동 공유.
  고석현(Noah)은 선발대로 먼저 제주에 도착하여 독채를 개인으로 빌려 술파티 공간을
  마련하기도 했다. 비용 정산(안진혁 담당), 비행기 수하물 규정 확인, 홍성아 막차
  합류 등 실무적 논의도 활발했다. 조하담의 안경집 분실 에피소드(20개 답글)도 있었다.
