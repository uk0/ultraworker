summary: |
  2024년 3분기 announcement 채널은 팀 확장과 기술 공유 활동이 활발했던 시기였다.
  신규 멤버로 백상원(AI/ML Developer, 멀티모달 연구), 최병현(Backend Developer, 코틀린/JVM) 등이
  합류했으며, 태은님 굿바이 파티도 진행되었다.

  테크 세미나가 꾸준히 운영되어 CUDA 강의(박진형/정세민), Model Merging(백상원), Multi-modal
  model overview(도균), LLM 기초(도균), KoGrammary(태은), Storm Fooding(세민),
  Prompt Recovery 등 다양한 AI/ML 주제가 발표되었다. 블로그도 한국어/일본어에 이어 영어 블로그가
  추가 운영되기 시작했다.

  운영 측면에서는 중소기업 취업자 소득세 감면 신청, 추석 선물(직접 선택형), 직무발명 심의위원 선출(김덕현
  당선), 기업부설연구소 사진 촬영 등이 진행되었다. 사무실 인프라로는 통신실 전기설비 확장 공사,
  에어컨 공사, 코로나 검사키트 비치 등이 있었다.

  비즈니스 관련으로는 기업은행 B2B 딜 문서 작성, 기능/기술 요소 명세 작성, 법무검토 채널 일원화 등이
  이루어졌다. SaaS 비용 절감(어도비 해지, 피그마 미사용 시트 정리), 슬랙 프로필 직함 기재,
  신규 입사자 자동 채널 초대 봇 등 운영 효율화도 진행되었다. 파이콘 한국(10/26-27) 참여사 참가
  신청도 이 시기에 시작되었다.
