summary: |
  2024년 1분기 announcement 채널은 사무실 이전(미드타운 역삼 3층)과 관련된 공지가 핵심 주제였다.
  2월 29일 패스트파이브에서 미드타운 역삼으로 이사를 진행했으며, 출입카드 발급, 사무실 이용정보 공유,
  회의실 예약 방식 변경 등 새 사무실 정착을 위한 안내가 다수 이루어졌다.
  매주 목요일 오후 2시 테크 세미나가 정기적으로 운영되었고, Medprompt, ComfyUI, 랭콘 Preview 등
  다양한 주제가 발표되었다. Langcon 2024에 회사 후원사로 참여하여 고석현, 박우명, 허석원, 박진형이
  발표했다. 1월 26일 첫 워크샵 겸 신년회가 판교레이크골프클럽에서 진행되었다.
  신규 멤버로 조하담(백엔드), 정세민, 백은주, 재무 인턴이 합류했으며, 연말정산 안내, 급여 시스템 개편,
  캘린더 통합 관리, 구매요청봇 도입 등 운영 관련 공지도 활발했다. 컬쳐 논의와 온보딩 가이드 정비 등
  조직문화 개선 노력도 이루어졌다. 메티스엑스와 생성형 AI 기술 개발 MOU 체결 뉴스도 공유되었다.
