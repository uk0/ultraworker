summary: |
  2025년 1분기 announcement 채널은 주로 조직 운영, 신규 입사자 온보딩, 연말정산, 테크세미나 일정 공유 등 전사 공지 중심으로 운영되었다.
  신규 입사자 3명(김수진 PM, 양호진 ML Backend, 강성우 ML Backend)이 합류하였고, 연말정산은 세무기장업체 '리채'를 통해 2월 초~중순에 진행되었다.
  테크세미나는 매주 목요일 14시에 정기 운영되며, 주제는 자기소개/Research Engineering Tutorial/Late Chunking/Manus·MCP 소개 등 다양하게 진행되었다.
  사이오닉 배포 시스템 소개, 전략·액션아이템 발표(중기 마일스톤) 등 조직 전략 관련 논의도 활발했다.
  Claude 팀 플랜 구독 시작, LilysAI 서비스 도입, 1Password 비즈니스 플랜 마이그레이션, 피그마 Seat 정리 등 사내 IT 도구 관련 변경이 다수 있었다.
  연봉 협상(2024/10 이전 입사자 대상, 3월 소급 적용), 조직건강성 측정 설문, Grafana 개인 계정 배부 등 HR·인프라 이슈도 포함되었다.
  파일론(Pylon)과 서플라이(Supply) 설명자료가 비전문가용으로 공유되었고, 글로벌(일본) 진출 전략에 대한 전사 논의가 시작되었다.
