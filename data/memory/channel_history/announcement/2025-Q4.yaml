summary: |
  2025년 4분기 announcement 채널은 시리즈 A 투자 유치, 일본 첫 계약 체결, 대규모 인력 충원, Graph RAG 스터디, 종무식 등 회사의 급성장기를 반영하는 주요 공지가 집중되었다.
  시리즈 A 투자 라운드가 공식 완료되어 신규 250억 투자 유치, 누적 300억 돌파가 달성되었다. 투자사는 네이버, 삼성, KT, 기업은행(SI) 및 에이티넘, IMM, 한국투자파트너스, LB(FI) 등 국내 주요 투자사가 참여하였다.
  일본에서의 첫 계약(Zeevaa 파트너십)이 공식 체결되었으며, 12월 도쿄 엑스포 참가와 Sionic X Oracle Cloud 핸즈온 세션이 진행되었다.
  신규 입사자가 대폭 증가하여 8명(유대곤 AI/ML, 김승규 Kotlin+Spring, 김혁준 Kotlin+Spring, 이주원 Frontend 인턴, 서소영 Japan BD 인턴, 이지혜 AI Research, 김여준 BD, 카타오카상욱 Product Designer)이 합류하였다.
  Graph RAG(온톨로지) 스터디가 리서치팀 중심으로 매주 목요일 16:30에 정기 운영되기 시작하였다.
  인스트럭트한국 12월 밋업에서 사이오닉 후원 해커톤(12/20)이 개최되었으며, STORM Parse/Solution 활용 AI Agent 빌딩이 주제였다.
  김수원님의 역할이 ML Backend Engineering Lead에서 TPO(Technical Product Owner)로 변경되어 데이터플랫폼 제품 중심으로 전환되었다.
  사무실 자리 부족 이슈로 자유석(HOT DESK) 전환이 본격화되었고, 쿠팡 공용 장바구니 운영 정책, 법인카드 기록 관리 등 오피스 운영 정책이 정비되었다.
  11월 전사 회식(호보식당), 12월 연말 타운홀(디캠프 선릉 6층), 종무식 겸 2025 마지막 위클리, 제품팀 연말 회고세션 등이 진행되었다.
  겨울방학 기간(12/25~1/4)이 공지되었고, 슬랙 프로필에 이름 발음(카타카나/닉네임) 추가가 안내되었다.
  CloudFlare/AWS 글로벌 장애 알림, Grafana VPN 접근 변경, STORM live 계정 복구 등 인프라 이슈 공지도 있었다.
  '내업공(내 업무 공유하기)' 세션이 매주 월요일 엔지니어링 위클리 후반부에 신설되었다.
