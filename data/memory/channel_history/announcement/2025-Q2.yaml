summary: |
  2025년 2분기 announcement 채널은 신규 입사자 온보딩, 테크세미나 운영, 기술 홍보 기준 수립, 제주도 워크샵 기획, 법정의무교육 등 전사 운영 공지가 중심이었다.
  신규 입사자 4명(서반석 백엔드, 임주희 세무/파이낸스, 정기연 R&D Manager, 김부교 Product Planner 인턴)이 합류하였다.
  기술 홍보에 대한 기준이 새로 정립되었는데, 깊이 있는 콘텐츠만 작성하고 오픈카톡방 등에 무분별하게 공유하지 않으며 진형님 중심으로 geeknews 등 주요 채널만 활용하는 방침이 수립되었다.
  테크세미나 주제는 Ops팀 소개, LIGHT RAG·hiRAG 소개, Pylon 청킹 전략, 사이오닉 일본 진출 브리핑, 악사파서 대안 소개 등 다양하게 진행되었다.
  EDS(이디에스) 고객사 대상 STORM 설명회가 진행되었고, 일본(+글로벌) 사업 관련 사용자 그룹(@Japan)이 생성되었다.
  OCI LoadBalancer 교체 인프라 작업(STORM SaaS 탭 6개 제한 이슈 해결)이 야간에 진행되었다.
  제주도 워크샵(플레이샵) 8/25~27 일정이 확정되었고, 비행기/숙소 예약이 시작되었다.
  법정의무교육(성희롱예방, 개인정보보호) 6/30 마감 안내, 2025 건강검진 대상자 공지, 명함 취합 등 HR·총무 공지도 다수 진행되었다.
  슬랙 상태 이모티콘(근무중/재택/자리비움) 활용 제안과 신규 버그 제보 채널(#product-bug-report) 개설이 있었다.
  GenAI/SUM 2025 Impact Pitch 예선 합격 소식과 투표 요청이 공유되었다.
