summary: |
  2024년 4분기 announcement 채널은 워케이션, 연말 회고, 팀 빌딩 등 조직 활동이 집중된 시기였다.

  11월 24일~29일 양양 데스커 워케이션 센터에서 전사 워케이션이 진행되었으며, 업무 50% + 휴식 50%
  또는 스핀오프 프로젝트를 목표로 했다. 122개 답글이 달릴 정도로 높은 관심과 참여가 있었다.
  11월 21일에는 조직문화 세미나(팀 빌딩 세션)가 외부 회의실(워크토크 역삼점)에서 진행되었고,
  기질/일하는스타일 측정 설문이 사전에 실시되었다.

  10월 29일 워크샵이 카페&와인바 십앤칠에서 열렸으며, 사이오닉 방향성과 마일스톤 공유가 이루어졌다.
  파이콘 한국(10/26-27, 수원컨벤션센터)에 후원사 부스를 운영했고 다수 멤버가 참여했다.
  12월 24일 전사 회고 미팅이 식사를 곁들여 진행되었고, 피그마 보드를 활용한 좋았던 것/배운 것/놀랐던 것/
  부족했던 것 회고가 이루어졌다.

  신규 멤버로 홍성아(재무/운영), 이재준(DevOps), 임예원(AI/ML 인턴), 송현우(FE 실습생),
  이강욱(DevOps), 최다솔(AI/ML 인턴) 등 6명이 합류하여 팀이 크게 확장되었다.

  연말 코드 프리즈(12/25~1/1) 겨울 방학이 공지되었고, 인프런 강의 지원 교육 제도가 홍보되었다.
  영문 홍보영상 short 버전이 완성되었으며, IBK 프로젝트 진행을 위한 외부 인력(대훈님) 상주가 시작되었다.
  블로그 글 작성 독려, 오더시트 세션, 캐리어 프로젝트 설명 등 기술/제품 관련 공유도 활발했다.
  슬랙 프로필 정책 정리, 1password/linear 계정 한글명 통일 등 운영 표준화도 이루어졌다.
