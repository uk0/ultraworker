summary: |
  2024년 2분기 announcement 채널은 팀 성장과 조직 운영 체계화가 핵심 주제였다.
  신규 멤버가 다수 합류했으며, 학생인턴(김도균), ML Researcher(이성우), Backend Developer(장경훈 CEO Staff,
  이수원), 김도균(학생인턴) 등이 팀에 합류했다. 한편 인턴 퇴사(김도균 학교 복귀)도 있었다.

  조직 운영 측면에서 Flex 근태관리 시스템 도입, 공용법인카드 운용 시작, 창립기념일(5/30) 제정 및
  창립기념 휴가(6/7) 부여, 재택용 장비 신청 제도, ChatGPT 팀 플랜 구독 시작 등이 이루어졌다.
  내일채움공제 회사 청약이 완료되어 개인 연동이 진행되었다.

  비즈니스 측면에서 매일경제신문과 선 크레딧 구매(10만건) 본 계약 체결이 이루어졌고, GPU 1억원어치 구매,
  채용 드라이브 시작(채용 페이지 오픈), KPI 설정 미팅 등이 있었다. 사용하지 않는 에이전트 정리,
  대시보드 지표 개선 논의 등 제품 관리도 진행되었다.

  5월 10일 플레이샵(파티룸 요리대회), 4월 15일 타운홀 미팅(BBQ) 등 팀 행사가 있었고,
  MetisX와의 기술 세미나 공동 개최, 산업안전보건법 게시 등 법적 의무 사항도 이행되었다.
  테크 세미나에서는 SQL 첫걸음, 특허 작성, 배포 가이드, Pylon 실행하기 등이 발표되었다.
