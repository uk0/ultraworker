summary: |
  2025년 3분기 announcement 채널은 제주도 플레이샵 실행, 신규 입사자 온보딩, 채용 솔루션 이관, 사무실 운영 개선, 홈페이지 개편 등이 주요 주제였다.
  신규 입사자 5명(안진혁 CEO Staff, 정석현 AI Research 인턴, 백승현 Business Manager 인턴, 유대곤 AI/ML Developer)이 합류하였다. NIA 프로젝트 관련 단기 계약 데이터 검수 인원 5명도 투입되었다.
  제주도 플레이샵(8/25~27)이 성공적으로 진행되었으며, CEO 타운홀, 팀별 액티비티(스노클링, 카페투어, 낚시 등), 회고 세션이 포함되었다.
  일본 시장에서의 밋업 'AI and ME'(8/12, JETRO 사무소)가 개최되어 exposure 확대를 도모하였다.
  채용 솔루션이 Flex에서 Greeting으로 이관되었고, 채용페이지 도메인 연동 및 파이프라인 재설계가 완료되었다.
  사무실(미타) 자리배치도 변경, 호텔링 좌석 셋업, 세면대 청결도 개선, IT 액세서리 관리 등 오피스 운영 관련 정비가 활발했다.
  IT 운영채널(#it-support) 신설, 슬랙 일본어 번역봇 추가, Claude Max 구독 관리 등 도구/인프라 정비도 이루어졌다.
  홈페이지 4개 주요 페이지(메인/Product/Storm Parse/Storm Retrieval) 개편이 진행되어 Figma 프로토타입 리뷰 후 배포되었다.
  취업규칙 제정 및 전직원 서명, 법정의무교육(직장 내 괴롭힘) 추가 이수, 추석 선물 안내, 출장비 가이드 재공지 등 HR/총무 업무도 다수 진행되었다.
  테크세미나 주제는 비개발자 위한 Claude Code Session, 서플라이 작업공유, 워크플로 디버깅/자동화, DSL 워크플로우 소개 등으로 진행되었다.
  진형님(Sigrid Jin) 조모상 부고가 공유되었다.
