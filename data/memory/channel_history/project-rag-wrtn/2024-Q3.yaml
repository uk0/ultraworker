    participants: ["송명하", "jinu", "Cheonseong Kang", "Sigrid Jin", "김덕현(Dekay)"]
    summary: "QSPM 아키텍처 Figma 설계, Sequence diagram 작성, Guest Session 등록-문서학습-RAG-삭제 시나리오 테스트 완료."
  - title: "Qdrant 인메모리 부하 테스트"
