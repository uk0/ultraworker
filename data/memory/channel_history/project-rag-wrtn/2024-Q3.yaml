summary: |
  2024-Q3에 project-rag-wrtn 채널이 개설되어 뤼튼(Wrtn) 프로젝트가 본격 착수되었다. 뤼튼은 RAG 기반 문서 검색 서비스를 Sionic AI
  인프라 위에 구축하는 B2B 프로젝트였다. 핵심 개발 내용으로는 QSPM(Queue-based Session Pool Manager) 설계 및 구현, Pylon+Qdrant
  기반 세션 관리, Stargate 뤼튼 전용 API 개발이 있었다. Sigrid Jin과 송명하가 테크 스펙을 작성하고, jinu가 Stargate API를 개발,
  Cheonseong Kang이 QSPM을 구현했다. 부하 테스트, SSL/pytz 최적화, dev/live 환경 배포가 진행되었다. 뤼튼 측 라이브 배포 일정이
  8월 초로 예상되었으나 지연되었다. 약 3000 DAU가 예상되었고, 동접 약 1만 세션 수용 가능한 것으로 확인되었다. S3 버킷
  분리(storm-answer-wrtn), 문서 학습 후 원본 삭제 기능, cronjob 기반 세션 정리 로직 등이 구현되었다.
topics:
  - 뤼튼 RAG 프로젝트 착수
  - QSPM 설계 및 구현
  - Pylon+Qdrant 세션 관리
  - Stargate 뤼튼 전용 API
  - 부하 테스트 및 최적화
