summary: |
  Maywell(Jeonghwan Park)과 Sionic AI 간 지재권(특허) 협업 채널. 2024년 4월에 Noah(고석현 대표)가
  Jeonghwan Park과의 특허 작업을 위해 채널을 개설함. 주요 활동:
  (1) 모델 컨텍스트 확장 특허화 작업(40개 답변 대형 스레드) - 박우명과 고석현이 기존 특허 공유,
  Jeonghwan Park이 related works 조사, 실험/평가 요소 정의(Code-Mixing 빈도 측정, 도메인 성능
  향상 검증 등),
  (2) 한국어 토큰 확률 변경 기술 관련 논의,
  (3) KMMLU, PubMed 등 벤치마크 데이터셋 선정,
  (4) 특허 비용 및 변리사는 Sionic AI에서 지원,
  (5) 박우명이 특허 이해도 향상을 위한 참고 문서 공유,
  (6) dkyoon이 채널에 추가 참여.
