  2025년 4분기 qna-ai 채널은 10월 12일 Slack QA 웹훅 봇(@U09L23QRA8J)이 런칭되면서 STORM 플랫폼, 프로젝트, 사람, 인프라 등에 대한 자연어 질의응답 서비스가 본격 운영된 채널이다. 38명의 팀원이 참여하여 하루 평균 8.4건의 질문 스레드가 생성되었으며, 총 520개의 독립적인 QA 스레드가 이루어졌다. 회사 내부 정보, 서비스 아키텍처, 담당자 확인, 인프라 구성 등 다양한 주제에 걸쳐 AI 봇이 자동으로 답변을 제공하는 내부 지식 허브 역할을 하였다.
