summary: |
  뤼튼(Wrtn) AI 프로필 프로젝트의 핵심 활동 분기.
  채널이 개설되어(1월 3일) hhhssw(석원)의 PM 온보딩과 함께 뤼튼 측 AI 프로필 프로젝트가 본격 가동되었다.
  주요 활동: Jira 태스크 관리, 뤼튼 대면 미팅 제안, API_KEY 접근제어 적용, invoice 정산 처리.
  SDXL 모델의 VRAM 최적화(23GB, 4배치 목표) 작업이 진행되었으며, 그라디언트 체크포인팅 없이 효율적 처리를 위한 기술 논의가 활발했다(43건 스레드).
  핏펫(Fitpet) AI 사진 서비스와의 미팅도 준비하여, 반려동물 AI 프로필 시장 진출을 검토했다.
  뤼튼 작업물을 정리하여 강남언니/화해 등 뷰티 B2C 서비스에 제안하는 영업 활동도 기획했다.
  카카오 칼로 AI프로필, 에이블리 AI프로필 등 경쟁사 동향도 모니터링했다.
  STORM Platform/Core/PaaS 등 범용 플랫폼 명칭 논의도 이루어졌다.
