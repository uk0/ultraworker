summary: |
  2025-Q3 alarm-dev-critical-drone 채널은 Drone 서비스의 결제 시스템 관련 크리티컬 알람 채널로, 해당 분기에 채널이 생성되고 notification-bot이 연동되었다. 주요 알람 내용은 TossPayments 연동 결제의 정합성 불일치 문제로, DB와 API 간 결제 상태 불일치로 인한 자동 취소 실패 및 RuntimeException 오류가 반복적으로 발생하였다. 모든 알람은 수동 처리가 필요한 긴급 상황으로 분류되었으며, 테스트 환경(team_test_*)에서 발생한 이벤트가 대부분이었다.
