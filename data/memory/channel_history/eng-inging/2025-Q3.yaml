summary: |
  2025년 3분기 eng-inging 채널은 Claude Code(Opus)가 팀 전체에 도입되어 하루 50~60달러에 달하는 사용 비용이 논의될 만큼 AI 코딩 도구 활용이 폭발적으로 증가한 분기였다. Toss(토스)와의 결제 통합 작업, OTEL(OpenTelemetry) 기반 관측성 인프라 구축, OCI 클러스터 전환에 따른 다양한 기술적 난관이 실시간으로 공유되었다. TensorRT-LLM VORA 포팅 작업과 carrier-supply 인덱서 성능 개선도 주요 논의 주제였으며, 17명의 팀원이 AI 도구와 함께 생산성을 높이는 방법을 함께 탐구하였다.
