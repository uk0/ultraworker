summary: |
  2025년 2분기 eng-inging 채널은 carrier-supply와 storm-parse 서비스의 집중 개발 과정에서 팀의 기술적 고민과 해결 과정이 가장 활발하게 공유된 분기였다. Apidog 완전 도입 후 API 테스트 문화가 정착되었으며, PR 리뷰 문화 강화에 대한 논의가 이루어졌다. VLM(Vision Language Model) 크래시 이슈, WASM 기술 검토, 다양한 라이브러리 선택 논의 등 기술적 깊이 있는 대화가 이루어졌다. 16명의 팀원이 하루 평균 8.3건의 스레드를 생성하며 활발한 소통을 이어갔다.
