summary: |
  2025년 1분기 eng-inging 채널은 2025년 2월 13일 혜원(Hyewon)이 개설한 엔지니어링 팀의 비공식 소통 채널로, 팀원들의 일상적인 기술적 고충과 논의를 나누는 공간으로 시작되었다. pylon 설정 이슈, Apidog 마이그레이션(Postman 대체), storm-parse-api 디버깅 등이 주요 화제였으며, 19명의 팀원이 초창기부터 활발하게 참여하였다. 채널의 '잉잉'이라는 이름처럼 개발 과정에서의 고민과 해결책을 자유롭게 나누는 문화가 형성된 분기였다.
