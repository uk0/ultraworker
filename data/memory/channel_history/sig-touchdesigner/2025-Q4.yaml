summary: |
  2025년 4분기 sig-touchdesigner 채널이 12월 초에 신규 개설되었으며, TouchDesigner, Ableton, Max/MSP를 결합한 제너레이티브 리얼타임 파티클 시뮬레이션 오디오비주얼 공연을 목표로 하는 SIG 채널이다.
  주로 X(Twitter) 및 Instagram 링크를 통해 국내외 제너레이티브 아트, 파티클 시뮬레이션, 오디오비주얼 작품 레퍼런스가 공유되었다.
  12월 말에 추가 멤버가 합류하며 채널이 활성화되기 시작하였다.
