summary: |
  2025년 4분기 alarm-dev-error-stargate 채널은 Stargate 개발 환경에서 발생한 API 에러 알림이 자동으로 쌓이는 알림 채널로, 하루 평균 약 20건의 에러가 기록되었다.
  주요 에러 유형은 Carrier 통신 오류(ERROR_WHILE_PROCESSING_CARRIER_RESPONSE), 서버 응답 시간 초과, Connection refused, COLLECTION_NOT_FOUND(Qdrant 컬렉션 미존재) 등이었다.
  현대 에이전트, 사이오닉 슬랙 에이전트 등 다양한 에이전트 테스트 과정에서 발생한 에러가 다수 포함되었으며, Excel 내보내기 시 텍스트 길이 초과(32767자) 에러도 발생하였다.
