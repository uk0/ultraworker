summary: |
  2024-Q4 기간 동안 Stargate API의 개발 환경 에러 알림 채널에서 하루 평균 65건의 오류가 관측되었다. 주요 오류 유형으로는 Pylon에서 발생하는 피드백 미존재(FeedbackNotFoundError), 문서 생성 실패(CREATE_DOCUMENT_PROCESS_ERROR), JSON 파싱 오류, Carrier 통신 오류(ERROR_WHILE_PROCESSING_CARRIER_RESPONSE) 등이 있었다. unstructured-io의 PDF 파싱 엔드포인트(/pdf/parse/pymupdf) 404 오류가 집중적으로 발생하였으며, Carrier 측의 미지원 모델(gpt-4o-2024-11-20 등) 오류도 확인되었다.
