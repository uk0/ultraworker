summary: |
  2025년 4분기 research-graph 채널은 Graph RAG 연구와 실용적 구현에 집중하였다.
  HippoRAG를 비롯한 최신 SOTA 그래프 RAG 논문 및 LightRAG 마개조, LogicRAG(sionic-ai) 개발과 배포가 주요 이슈였으며,
  HyperGraph 세미나 및 Spreading Activation 알고리즘의 GraphRAG 통합, 시간 기반 지식 그래프 논문 공유 등 다양한 기술 교류가 이루어졌다.
  삼벤(사회복지 multi-hop 평가셋) 관련 그래프 실험과 RAPTOR 비교 실험도 활발히 진행되었다.
