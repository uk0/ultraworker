summary: |
  2025년 2분기는 research-graph 채널이 처음 개설된 시기로, Graph RAG에 대한 팀 전반의 관심이 집중되었다.
  HiRAG, Microsoft GraphRAG, LightRAG 등 주요 논문과 구현체를 리뷰하였으며, 테크세미나에서 그래프 주제를 다루고
  Graph User Group(GUG) 정이태님과의 협업 및 멘토링을 통해 온톨로지 설계, GraphRAG 쿼리 전략, 다중 팀 스터디가 진행되었다.
  공급망(Supply Chain) + USTR 데이터를 활용한 multi-hop 질의 데이터셋 구축도 기획되었다.
