summary: |
  2024-Q4 deploy-pylon 채널 데이터 수집 완료. 305개 메시지, 15명 참여, 82개 스레드.
  Q4에는 /sionic-deploy 명령어가 지속 사용되었으며 버전 태깅이 v1.5.2, v1.5.4, v1.5.4.post0,
  v1.5.5로 진행되었다. 이재준(Leo)이 GoCD 파이프라인을 활용한 EKS staging 배포 테스트를
  수행하였다. Newrelic APM 로그 중복 제거 테스트가 진행되었다. Sigrid Jin이 openllm 키 로테이션
  작업을 수행하였고, 송명하가 test-song-openllm 서비스를 잘못된 채널에서 배포하여 사과하는
  에피소드가 있었다. 7ea246d 커밋 등 빌드 실패 사례가 발생하였다. 김수원, 박우명, 이강욱 등
  다수의 새로운 멤버가 합류하여 참여자가 15명으로 증가하였다. 스레드 수가 82건으로 크게
  증가한 것은 GoCD 파이프라인 연동으로 자동 스레드 생성이 활발해진 것으로 보인다.
