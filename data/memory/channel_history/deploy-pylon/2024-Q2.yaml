summary: |
  2024-Q2 deploy-pylon 채널 데이터 수집 완료. 2017개 메시지, 13명 참여, 38개 스레드.
  Q2에는 배포 명령어가 /eks-deploy에서 /deploy로 전환되었으며, Sigrid Jin이 주도적으로 dev 환경에
  빈번한 배포를 수행하였다. --skip-build 옵션이 활용되기 시작했으나, 빌드되지 않은 이미지에
  --skip-build를 적용할 경우 "Image not found" 에러가 발생하는 사례가 보고되었다. 명령어 형식
  오류(예: `/deploy pylon dev2b78430`처럼 스페이스 누락)가 간헐적으로 발생하였다. staging 및
  live 환경 배포도 활발히 이루어졌으며, 2017개의 높은 메시지 수는 빈번한 dev 배포 및 빌드/배포
  알림이 대량 생성되었기 때문이다.
topics:
  - /deploy 명령어 전환 (eks-deploy에서 deploy로)
  - 빈번한 dev 환경 배포 (Sigrid Jin 주도)
  - --skip-build 옵션 활용 및 Image not found 에러
  - 명령어 형식 오류 (스페이스 누락)
  - staging/live 환경 배포
