summary: |
  2024-Q1 deploy-pylon 채널 데이터 수집 완료. 258개 메시지, 5명 참여, 1개 스레드.
  2024년 3월 28일에 deploy-pylon 채널이 생성되며 EKS Deploy 앱이 연동되었다. /eks-deploy pylon
  명령어를 사용하여 dev, staging, live 환경에 대한 초기 배포가 같은 날 모두 수행되었다.
