  간 설정 차이(pylon PR#250)와 deploy-bot 레포지토리 마이그레이션에 대해 논의하였다.
  staging 배포 실패 후 재시도하는 사례가 있었으며, GKE에서 EKS로의 전환 과도기에 양쪽
  인프라를 동시에 운영하는 상황이었다.
