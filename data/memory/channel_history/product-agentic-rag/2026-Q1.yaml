terminology:
  - term: "Agentic RAG"
    definition: "Agent-driven Retrieval-Augmented Generation where an LLM autonomously decides search strategy, skill usage, and termination"
    aliases: ["에이전틱 레그", "에이레그", "agent-rag", "Agent RAG"]
    context: "Evolved from Logic RAG, channel renamed to reflect this direction on Jan 28"
  - term: "Logic RAG"
    definition: "Rule-based RAG search optimization, predecessor to Agentic RAG"
    aliases: ["로직래그", "로직레그"]
    context: "Original approach, replaced by Agentic RAG philosophy"
  - term: "Main Brain"
    definition: "The primary LLM that decides which skills to use, when to stop, and orchestrates the overall search process"
    aliases: ["메인뇌", "메인 뇌"]
    context: "Uses a higher-quality model (e.g., Gemini 3 Flash Preview)"
  - term: "Sub Brain"
    definition: "Secondary LLMs used for individual skill execution like fact extraction and search"
    aliases: ["서브뇌", "서브 뇌"]
    context: "Uses lighter/cheaper models for cost optimization"
  - term: "Fact Extraction"
    definition: "Process of extracting discrete factual statements from retrieved chunks for the main brain to reason over"
    aliases: ["팩트추출", "팩트 추출"]
    context: "Major quality bottleneck - issues with duplication, hallucination, and information loss"
  - term: "Chunk Expansion"
    definition: "Skill that reads surrounding context (adjacent chunks/pages) around a found chunk for more complete information"
    aliases: ["청크 확장", "expand_context"]
    context: "Key skill for preventing information loss in narrow chunk retrieval"
  - term: "Implicit Knowledge"
    definition: "User-provided hints or domain knowledge injected into the agent to guide search behavior"
    aliases: ["암묵지"]
    context: "Added to frontend in Feb, allows customizing agent behavior per query"
  - term: "STORM"
    definition: "Sionic AI's main product platform where Agentic RAG will be integrated"
    aliases: ["스톰"]
    context: "Dev instance at sionicstorm-dev.vercel.app"
  - term: "Carrier"
    definition: "Infrastructure component that routes requests to Agentic RAG backend"
    aliases: ["캐리어", "캐리에어"]
    context: "Handles chunk format compatibility and node deployment"
  - term: "Query Expansion"
    definition: "Technique of generating multiple reformulated search queries from the original user query"
    aliases: ["쿼리 익스펜션"]
    context: "Used in early rounds to broaden search coverage"
  - term: "Planner"
    definition: "Planning component that analyzes query difficulty and determines search strategy before skill execution"
    aliases: ["플래너"]
    context: "Proposed to analyze query intent and form search hypotheses"
  - term: "Round"
    definition: "One cycle of skill execution and evaluation by the main brain"
    aliases: ["라운드"]
    context: "Debate on what constitutes a round - single skill call vs batch of N searches"
  - term: "Synthesize"
    definition: "Final answer generation skill, with built-in forced double-check before allowing completion"
    aliases: []
    context: "First call is rejected to force agent to verify completeness"
  - term: "Queensguard"
    definition: "Internal system or environment referenced during STORM integration"
    aliases: ["퀸즈가드"]
    context: "Mentioned in context of deploying Agentic RAG components"
  - term: "Arbiter"
    definition: "Internal project by Juwoon with similar patterns to Agentic RAG"
    aliases: ["아비터"]
    context: "Referenced as potential architectural inspiration"
  - term: "OCI"
    definition: "Oracle Cloud Infrastructure, target deployment environment"
    aliases: []
    context: "Dev URL migrated from on-prem to OCI at dev-agent-rag.sionic.im"
  - term: "Text2SQL"
    definition: "Converting natural language to SQL queries for structured data retrieval"
    aliases: []
    context: "Proposed as a skill for Agentic RAG to handle DB-type Excel/SQL searches"
