summary: |
  2026-Q1 product-agentic-rag channel covers the development and iteration of Sionic AI's
  Agentic RAG system (previously called Logic RAG). The team transitioned from rule-based
  RAG search logic to an agent-driven approach where an LLM autonomously decides search
  strategy, skill usage, and termination. Key activities include: multi-round agent
  architecture design (5-stage pipeline), fact extraction and deduplication improvements,
  chunk expansion skill development, debug web UI creation, STORM product integration
  preparation, and extensive QA testing with financial documents (loan/mortgage queries).
  The channel was renamed from "product-logic-rag" to "product-agentic-rag" on Jan 28.
  The team targets a March beta release. Active participants: Kim Hyewon (PM/testing lead),
  Kang Seongwoo (core backend dev), Jeong Seokhyun (research/architecture), Kim Suwon
  (infra/carrier), Kim Bugyo (QA/testing), with contributions from Sigrid Jin, Yang Hojin,
  and others.
topics:
  - name: "Agentic RAG Architecture"
    description: >
      Multi-stage pipeline design: (1) File discovery via lexical+semantic metadata search,
      (2) Automatic semantic chunk search across discovered files, (3) Agent-driven deep
      investigation with skill selection (lexical search, semantic search, chunk expansion),
      (4) Termination verification with forced double-check, (5) Sub-agent final formatting.
      Discussed hierarchical agent patterns (top-tier planner, mid-level, worker) and
      adaptive RAG routing based on query complexity.
    participants:
      - "Kang Seongwoo (U08GLL0SK2S)"
      - "Jeong Seokhyun (U095HKJPKTK)"
      - "Kim Hyewon (U05T2RW7PE2)"
    first_mentioned: '2026-01-05'
  - name: "Skill Development"
    description: >
      Skills being developed and iterated: chunk search, chunk expansion (expand_context),
      query expansion, web search, keyword search metadata, search metadata, synthesize.
      Discussion on new skills needed: read specific page of document, search within
      specific document, get document page count, get document table of contents.
      Added stop button, implicit knowledge (ammuji) frontend, skill feedback visibility.
    participants:
      - "Kang Seongwoo (U08GLL0SK2S)"
      - "Jeong Seokhyun (U095HKJPKTK)"
      - "Kim Hyewon (U05T2RW7PE2)"
    first_mentioned: '2026-01-06'
  - name: "Fact Extraction & Quality"
    description: >
      Major issues addressed: duplicate fact extraction (91 facts by turn 6), fact extractor
      hallucinating non-existent information, conflicting facts causing agent confusion,
      information loss during extraction preventing main brain from getting complete data.
      Solutions: brute-force fact extraction + deduplication + improved fact resolution,
      per-chunk fact/summary extraction, tighter prompts to prevent fabrication, page-level
      fact extraction from found chunks' source pages.
    participants:
      - "Kang Seongwoo (U08GLL0SK2S)"
      - "Kim Hyewon (U05T2RW7PE2)"
      - "Jeong Seokhyun (U095HKJPKTK)"
    first_mentioned: '2026-01-22'
  - name: "Performance & Speed"
    description: >
      Agent running too many rounds, being "overly cautious" (not stopping when enough
      info gathered), duplicate skill execution bug discovered (same parameters repeated),
      LLM model optimization (main brain and final answer planning use better model,
      sub-tasks use lighter model). Speed improvements achieved by mid-February.
    participants:
      - "Jeong Seokhyun (U095HKJPKTK)"
      - "Kim Hyewon (U05T2RW7PE2)"
      - "Kang Seongwoo (U08GLL0SK2S)"
    first_mentioned: '2026-02-05'
  - name: "STORM Integration"
    description: >
      Preparation to integrate Agentic RAG into STORM product. Tasks: SSE implementation,
      chunk carrier format compatibility, UI design especially for detailed log view.
      Carrier node setup for dev deployment, dev URL migration from on-prem to OCI.
      React port to Vercel completed.
    participants:
      - "Kim Hyewon (U05T2RW7PE2)"
      - "Kang Seongwoo (U08GLL0SK2S)"
      - "Kim Suwon (U07RASZTPFA)"
      - "Kim Bugyo (U08TPBS7FHR)"
    first_mentioned: '2026-02-05'
  - name: "Testing & QA"
    description: >
      Extensive testing with financial documents (loan/mortgage info). Test queries include
      apartment loan rates, financial statement data extraction (revenue, COGS, gross profit,
      total assets), contact info lookup. Test targets: Green Optics securities filing,
      Paju Unjung A2 Hoban Summit mortgage, Geumho Eoulim apartment, Dunchon Jugong
      apartment. Ground truth comparison for accuracy validation. Aaron Judge baseball
      stats used as non-financial test case.
    participants:
      - "Kim Hyewon (U05T2RW7PE2)"
      - "Kim Bugyo (U08TPBS7FHR)"
      - "Jeong Seokhyun (U095HKJPKTK)"
    first_mentioned: '2026-01-06'
  - name: "Debug Web UI"
    description: >
      Debug viewer built at dev-agent-rag.sionic.tech/debug and dev-agent-rag.sionic.im/debug.
      Shows agent rounds, skill usage, search results. Issues found: event streaming timing
      lag, query being sent multiple times. Web search skill added to debug UI. React port
      deployed to Vercel (agent-rag.vercel.app).
    participants:
      - "Kang Seongwoo (U08GLL0SK2S)"
      - "Kim Hyewon (U05T2RW7PE2)"
    first_mentioned: '2026-01-12'
