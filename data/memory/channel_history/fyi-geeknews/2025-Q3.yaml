summary: |
  2025년 3분기에는 AI 모델 발전이 지속되면서 동시에 AI에 대한 비판적 시각도 강화되었다.
  Claude Sonnet 4.5, Claude Code 2.0, Sora 2, DeepSeek-V3.2, Qwen3-VL, Qwen3-Omni 등
  다수의 AI 모델이 출시되었다. "이해 부채(Understanding Debt)" 개념이 등장하여 LLM이 생성한 코드의
  유지보수 문제가 주요 화두로 떠올랐고, "바이브 코딩 청소 서비스"라는 새로운 비즈니스까지 등장했다.
  보안 분야에서는 PyPI 피싱 공격, Rust crates.io 악성 패키지 등 공급망 보안 이슈가 지속되었다.
  Sigrid Jin님의 일본 진출 가이드(한일 비즈니스 차이점 11가지), PayPay Java->Rust 전환 사례,
  Candle(Rust ML 프레임워크) 소개 등이 주목을 받았다. 로컬-퍼스트 앱, 소프트웨어 엔지니어링의
  "좋은 취향" 등 개발 철학에 대한 깊은 논의도 이루어졌다.
topics:
