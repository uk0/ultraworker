summary: |
  2024년 3분기에는 OpenAI o1 모델(Strawberry) 출시가 최대 화제였으며, chain-of-thought 추론 방식에 대한
  심층 논의가 이루어졌다. 최병현(Hyune-c)님의 활발한 기술 공유가 두드러졌는데, RESTful API 가이드라인(Zalando 사례),
  백엔드 아키텍처(MSA vs Modular Monoliths), Jest 테스트 강의 등 백엔드 개발 관련 양질의 자료가 공유되었다.
  Apple 생태계(iOS 18, macOS Sequoia, iPhone 16, JPEG XL 채택)와 프로그래밍 언어 업데이트(Python 3.13 JIT/GIL,
  Swift 6, PostgreSQL 17)도 주요 토픽이었다. WordPress-WP Engine 분쟁, Agile/Jira 비판 등
  소프트웨어 산업 이슈에 대한 관심도 높았다.
