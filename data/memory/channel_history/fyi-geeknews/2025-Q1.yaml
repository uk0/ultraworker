summary: |
  2025년 1분기에는 MCP(Model Context Protocol)가 업계 최대 화제로 부상했다. Google 공식 MCP 서버,
  Playwright MCP, OpenAI Agents SDK MCP 지원 등 MCP 생태계가 급속히 확장되었다.
  AI 모델 측면에서는 Gemini 2.5 Pro(코딩 SOTA), OpenAI 4o 이미지 생성, DeepSeek v3(MIT 라이선스 변경),
  Qwen2.5-VL-32B, Kimi K2.5 등이 출시되었다. "Vibe Coding" 개념이 등장하여 AI 코딩의 미래에 대한
  활발한 토론이 이루어졌다. 보안 측면에서는 GitHub Actions 공급망 공격(tj-actions/changed-files),
  Next.js CVE, Kubernetes NGINX ingress 취약점 등 심각한 이슈들이 공유되었다.
  팀원 참여가 매우 활발했으며, 최병현님의 DDD 독후감, Playwright MCP 소개, Next.js 보안 이슈 공유,
  권혜선님의 styled-components 메인터넌스 모드 전환, Toss RN Bedrock 소개,
  이강욱님의 K8s NGINX ingress 취약점 분석, GPU 모니터링 도구 등이 돋보였다.
