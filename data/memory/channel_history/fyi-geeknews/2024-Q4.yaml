summary: |
  2024년 4분기에는 AI 모델 발전이 급격히 가속화되었다. OpenAI의 "12 Days of OpenAI" 행사, O3 모델의
  ARC-AGI 벤치마크 고득점(추론비용 30억원 이상), GPT-5 Orion 개발 지연 소식 등이 주요 화제였다.
  Gemini COT(Chain of Thought) 모드 공개, ModernBERT, QvQ 등 다양한 AI 모델이 출시되었다.
  개발 도구 측면에서는 Ghostty 1.0(터미널 에뮬레이터), Fish 4.0, MCP(Model Context Protocol) 서버 등이 주목받았다.
  팀원들의 기술 공유가 매우 활발했는데, 특히 최병현님의 JPA/QueryDSL 보안 이슈, 백오피스 아키텍처 분석,
  이강욱님의 SSH reverse proxy(sshpiper), CLI 유틸리티(pueue), 포트스캔 무력화 도구 공유,
  정세민님의 O3 추론 비용 분석, gradio-webRTC 소개 등이 돋보였다.
  NeurIPS 2024에서 AI PhD 시장 변화에 대한 조경현 교수 글 공유도 화제가 되었다.
topics:
