summary: |
  2025년 2분기에는 AI CLI 도구 경쟁이 본격화되었다. Google Gemini CLI 공개가 최대 화제였고,
  Claude Code for VSCode, Claude 앱 빌드 기능(무료 LLM+호스팅) 등 AI 개발 도구가 급속히 진화했다.
  ECMAScript 2025가 공식 표준으로 승인되었고, Spring Boot 4.0 프리뷰(API 버전 관리, GraalVM 지원 강화),
  Kotlin Multiplatform(KMP) 성숙화 등 주요 프레임워크 업데이트가 있었다.
  "Context Engineering" 개념이 Karpathy에 의해 제시되며 AI 시대 개발 패러다임 논의가 활발했다.
  최병현님의 Spring Boot 4.0 분석, KMP 전망, 올리브영 기술블로그 리뷰, Redis 캐시 전략,
  정세민님의 RAGflow 리서치, Gemini CLI 속보, Claude Artifacts 분석,
  Sigrid Jin님의 LangConnect MCP, uv/PEP 723 활용법 등 팀원들의 기술 공유가 역대급으로 활발했다.
topics:
