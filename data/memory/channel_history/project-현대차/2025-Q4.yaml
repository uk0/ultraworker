summary: |
  2025-Q4 project-현대차 채널은 현대자동차와의 산업안전 AI 에이전트 PoC 프로젝트 협업 채널로, 분기 전반에 걸쳐 활발한 논의가 이루어졌다.
  주요 활동으로는 10월 중간보고 준비 및 의왕연구소 현장 방문, 성능 지표(위험 추출 정확도 80% 이상, 질문 기여도 0.5 이상) 달성을 위한 에이전트 워크플로우 설계 및 프롬프트 개선, 11월 스톰 플랫폼 및 안전작업 허가서 작성 에이전트 교육, 12월 600개 평가셋 기반 테스트 및 최종보고서 작성 준비가 진행되었다.
  데스커 오피스 체인지 대상 팀으로 선정되어 가구 후원을 받는 소식도 공유되었다.
