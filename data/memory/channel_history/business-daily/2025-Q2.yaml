summary: |
  사업팀 일일 업무 공유 채널. IBK 코드파일럿 프로젝트가 본격 운영 단계에 진입하여 영업점 직원 대상 테스트, 답변 오류 정리, 프롬프트 수정이 일상 업무가 됨.
  오승희는 IR Deck 업데이트, 두산 데모 제작, 산학협력(GMT), NVIDIA Inception, Korea Promising AI Startups 지원 등 전략/IR 업무를 집중 수행.
  한시형은 현대차 PoC 승인, 일본 사업(Japan IT Week, IMM 재팬 미팅), 중국 마케팅, 대흥에코/유진투자증권/네클 파트너 관리 등 영업 확장.
  최윤정은 코드파일럿 오더시트 수정, 일본어 검수, 유즈케이스 정리 등 담당.
  김수진은 IBK 프로젝트의 단위/통합 테스트, QA셋 생성, 성능 평가 방안 수립 등 QA 중심 업무 수행.
  DP(Document Parsing) 버전별 성능 테스트, 서플라이 모델 도입, Qwen/Solar Pro 등 LLM 모델 비교 테스트 진행.
