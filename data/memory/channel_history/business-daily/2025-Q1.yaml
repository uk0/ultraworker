summary: |
  사업팀 일일 업무 기록 채널로, 주요 참여자(한시형, 김수진, 최윤정, 오승희)가 매일 업무 진행사항을 공유.
  IBK 사이드 프로젝트(코드파일럿) 기획 및 테스트가 핵심 업무였으며, 미니코파(미니 코드파일럿) 에이전트 변환 및 프롬프트 수정 작업이 진행됨.
  한시형은 아이티센엔텍, 대흥에코, 유진투자증권 등 다수 고객사 계약/견적 업무를 담당.
  오승희가 3월 입사하여 IR 덱 작성, 킥더허들 정부지원사업, Japan IT Week 준비 등을 수행.
  삼성 C-lab, 준컨설팅, 한국이디에스(강원랜드) 등 신규 사업 기회도 병행 추진.
