summary: |
  사업팀 일일 업무 채널로, 일본 사업 본격 확대 및 신규 프로젝트 수주 활동이 주요 흐름.
  오승희는 일본 출장 준비 및 실행(미팅 어레인지, IR Deck 영문/일문본, 브로셔, JD 작성), aiESG/라이오니스/SSP/DATT 에이전트 PoC 관리,
  CEATEC/L-Camp/KOSA 일본진출 프로그램 지원, SaaS Pricing Plan 설계, 파트너키트 R&R 문서 작성 등 전략/해외사업 총괄.
  한시형은 시암(SIAM) 프로젝트 네클과의 계약/설계서/평가지표, 삼성 E&A, 경향신문, 한림건축, 다날 제안서 등 국내 영업 집중.
  김수진은 시암 progress log, 현대차 PoC 주간보고, 파트너키트 교육자료 작성, 에어테이블 기반 프로젝트 관리.
  최윤정은 SSP 에이전트 구축, 리쿠르트 PoC, 일본어 번역 검수 담당.
  태국 출장(시암 관련), 일본 출장(CEATEC, K-AI 클라우드 얼라이언스) 등 해외 활동이 크게 증가.
