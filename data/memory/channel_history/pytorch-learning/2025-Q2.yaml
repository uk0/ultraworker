summary: |
  2025년 2분기에 채널이 잠시 재활성화되었다. Sigrid Jin님이 "취미 공부"로 채널을 살려보자고 제안하였고,
  고석현(Noah)님이 ML 모델을 직접 구현해보는 학습법(linear regression -> CNN -> LSTM -> BERT/GPT 순서)을
  추천하였다. 최병현(Hyune-c)님, 김수원님 등 새 멤버가 합류하였다. 채널명 변경 논의도 있었으나 실제 변경은 없었다.
  송명하님이 TensorFlow layers 관련 언급을 하는 등 프레임워크 간 비교 화제도 있었다.
