summary: |
  2024년 2분기에 Sigrid Jin(진형)님 주도로 PyTorch/ML 학습 채널이 개설되었다. 채널명은 learn-pytorch에서
  pytorch-learning으로 변경되었다. 선형대수학 기초(행렬, orthogonal matrix, 내적 등)에 대한 활발한 토론이
  이루어졌으며, CS231n(Stanford), LLMs-from-scratch, GenAI Handbook 등 학습 자료가 공유되었다.
  kozistr833님이 ML/DL 학습 로드맵을 상세히 안내하였고(CS231n, Deep Learning 교재, Kaggle 추천),
  Jeonghwan Park님이 행렬 연산과 선형대수 개념에 대한 깊은 질문과 토론을 이끌었다.
