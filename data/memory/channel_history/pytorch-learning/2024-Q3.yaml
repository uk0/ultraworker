summary: |
  2024년 3분기에는 논문 리뷰와 심화 학습 자료 공유가 주를 이루었다. COIL(Contextualized Inverted List) 논문 리뷰,
  Dense Retrieval 논문 모음 공유, Unsloth의 Gemma 버그 분석을 통한 PyTorch 스터디 제안 등이 있었다.
  Transformer Circuits 자료, AI Compiler 스터디 자료(시모님/태훈님 등 AI 스타분들의 자료) 등이 공유되었으며,
  KAIST 수리과학과의 데이터 사이언스용 선형대수학 강의 영상도 공유되었다.
  행렬 곱셈을 선형결합으로 이해하는 관점이 논의되었다.
