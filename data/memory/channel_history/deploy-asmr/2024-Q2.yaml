summary: |
  2024년 2분기에 deploy-openllm(현 deploy-asmr) 채널이 활발히 운영되었다. OpenLLM API 서비스의 dev/live 환경
  배포가 /deploy 슬래시 커맨드를 통해 빈번하게 이루어졌다. 주로 jinu님, Sigrid Jin님, 송명하님이 배포를 수행하였다.
  GoCD 기반 배포 파이프라인이 사용되었으며, 빌드 후 배포(build + deploy) 또는 빌드 스킵 배포(--skip-build)가
  지원되었다. 배포 실패 시 재시도 패턴이 자주 관찰되었으며, GoCD 409 에러(파이프라인 진행 중 충돌) 등의 이슈도 있었다.
  NestJS 기반 애플리케이션으로 AuthModule, LlmModule, DashboardModule 등이 포함되어 있었다.
topics:
