summary: |
  2025년 1분기에 중요한 인프라 전환이 이루어졌다. 채널명이 deploy-openllm에서 deploy-asmr로 변경되었으며,
  배포 시스템이 /deploy에서 /sionic-deploy로 전환되었다. OpenLLM에서 ASMR로 서비스 이관이 진행되었고,
  이재준(Leo)님이 트래픽 이관 작업을 수행하였다(dev-openllm.sionic.tech -> dev-asmr.sionic.tech,
  live-openllm.sionic.im -> live-asmr.sionic.im). 배포 환경도 onprem(dev)과 eks/oci(live)로 분리되었다.
  asmr-dev/asmr-live 이중 네이밍 이슈가 논의되었고, 최병현님은 별도 채널 필요성에 대해 의문을 제기하였다(14개 답글).
  조하담님이 asmr로의 완전 이관 여부를 확인하였고, Newrelic 모니터링도 asmr로 전환하였다.
topics:
  - OpenLLM -> ASMR 서비스 이관
