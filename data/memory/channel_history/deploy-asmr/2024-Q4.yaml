summary: |
  2024년 4분기에 배포 담당이 조하담(Joy)님으로 전환되었다. OpenLLM의 release 관리 방식에 대한 질문이 있었고,
  이재준(Leo)님이 Newrelic 로그 중복 제거 작업(IOPS-259 티켓)을 위해 K8s Deployment에 fluentbit.io/exclude
  어노테이션 추가 작업을 수행하였다. replicaset 적용 테스트를 위한 dev 재배포도 진행되었다.
  배포 메시지 형식이 체크마크/X 이모지로 개선되었으며, 빌드 실패(0d08c86) 케이스도 발생하였다.
  이강욱님, 조하담님이 새로 합류하였다.
