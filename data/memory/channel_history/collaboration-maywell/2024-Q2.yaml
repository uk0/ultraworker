summary: |
  활발한 기술 교류 분기. Llama 3 출시와 함께 한국어 모델 파인튜닝(Bllossom 기반) 및 LogicKor 평가 서버 시범 개발이 진행됨. Mixtral 8x22B, Command-R+ 등 신규 모델 벤치마크 및 데이터셋 채굴 논의. GPU 자원 활용하여 풀 파인튜닝, DPO 실험 등 수행. Maywell이 사이오닉 기숙사에 2주간 체류하며 오프라인 협업. LogicKor 페이퍼 킥오프 미팅 계획 수립. EXAONE 3.0 라마화, 캐릭터 채팅 서비스 클로즈 베타 시작 등 다양한 프로젝트 진행.
