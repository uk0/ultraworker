summary: |
  2024-Q2는 business-contact 채널이 본격 운영되기 시작한 시기이다. 채널명이 "contact-typeform"에서
  "business-contact"로 변경(4월 17일)되었고, Typeform 및 Zapier를 통한 문의 자동 수집 체계가
  구축되었다. 총 50건의 메시지가 접수되었으며 14명이 참여하였다.

  주요 문의 유형은 크게 4가지로 분류된다:
  1) STORM Answer 대기자 신청 및 데모 요청 (NAVER, 서울데이케어센터, 디윅스 등)
  2) STORM Platform 도입 문의 (핑거, 로지스나, KTDS, 질링스 등)
  3) 일본 기업의 전시회/이벤트 초대 (日本経済新聞社 GenAI/SUM, RUTILEA GPU 서비스, 오픈이노베이션EXPO)
  4) 투자 논의 (알바트로스인베스트먼트)

  주목할 만한 문의로는 진평회계법인의 세무 상담 자동화 챗봇 문의, 한길씨앤씨의 군 폐쇄망 적용
  문의, 홈앤쇼핑의 오픈이노베이션 프로그램 제안, xionic-ko-llama-3-70b 모델 사용 관련 학생
  문의가 있었다. 김덕현(Dekay)이 채널을 세팅하고, 김혜원이 문의 대응 프로세스(스프레드시트 연동,
  이모티콘 표시 규칙)를 정립하였다.
