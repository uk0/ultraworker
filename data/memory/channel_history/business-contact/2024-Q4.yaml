summary: |
  2024-Q4에는 STORM Platform에 대한 문의가 집중되었으며, 다양한 업종에서의 도입 검토가 활발했다.
  총 15건의 메시지가 접수되었고 4명의 내부 인원이 참여하였다.

  주요 문의 유형:
  1) STORM Platform 도입 문의: 케이뱅크(전체 솔루션 설명자료), 오티톤메디컬(기술력 자료),
     GS네오텍(서비스 소개서), 대우건설(브로셔/매뉴얼/도입비용), 개인(서비스 소개서)
  2) STORM Answer 관련: 아사달(OCR 텍스트 출력/API 및 온프레미스 견적), 스피링크(제품 테스트),
     동의대학교(대기자 신청)
  3) 기타 업무 자동화: 한국펀드평가(Document AI 사내 업무 자동화)
  4) 일본 비즈니스: Marcus Evans(CIO Japan Summit 출전 안내, 리톤테크놀로지스와의 MOU 관련),
     타나카기획(영업대행 재제안)
  5) 파이콘 행사: 김덕현(Dekay)이 파이콘에서 직접 수집한 상담 요청

  특히 금융권(케이뱅크), 건설(대우건설), 의료기기(오티톤메디컬), SI(GS네오텍) 등 다양한
  업종에서 STORM Platform에 대한 관심이 높아졌으며, xFusion International에서의 AI 인프라
  협업 제안도 있었다. 아사달의 문의는 OCR/텍스트 출력 기능에 대한 구체적인 가격(API/온프레미스)
  문의로 9개 답글이 달렸다.
