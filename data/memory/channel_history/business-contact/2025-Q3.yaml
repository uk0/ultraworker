summary: |
  2025-Q3 business-contact 채널은 봇을 통한 인바운드 문의가 지속적으로 유입된 분기로, 한국과 일본 양쪽에서 다양한 협업·파트너십 요청이 접수되었다.
  일본 시장 관련 문의로는 일본 경제 신문사 주최 생성 AI 서밋 스타트업 피치 참가 권유, 전시회 출전 제안(ブティックス), 인도 시장 파트너십 제안(PRK Technologies) 등이 있었다.
  국내에서는 백패커의 STORM Platform PDF 학습 실패 이슈, 노무법인의 문서 검색 에이전트 RAG 문제, Microsoft 파트너 제안, 서울대 RAG 구축 문의, 이데일리 언론 취재 요청 등이 주요 문의였다.
