summary: |
  2025-Q2 business-contact 채널은 사이오닉에이아이의 공식 문의 채널로, STORM Platform·Parse·Answer 관련 인바운드 문의가 봇을 통해 자동으로 공유되었다.
  주요 문의 내용으로는 온프레미스·설치형 구성 가능 여부, 롯데이노베이트의 Agent Builder GA 일정 및 커스터마이징 가능 범위, SK하이닉스의 OCR VLM 파인튜닝 및 폐쇄망 사용 가능 여부, 현대자동차 제로원인큐베이션팀의 산업안전 AI 에이전트 협업 요청 등이 있었다.
  한국 및 일본 양쪽에서 협업·파트너십 요청, 데모 요청, 제품 소개 문의가 골고루 접수되었으며, 일부 스팸성 비트코인 관련 문의도 유입되었다.
