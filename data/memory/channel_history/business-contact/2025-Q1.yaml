summary: |
  2025년 Q1 business-contact 채널은 웹사이트 문의 폼(OpenGateway/Zapier 자동화)을 통해 유입된 비즈니스 컨택을 팀이 분류하고 대응하는 허브 역할을 했다.
  주요 인바운드 문의는 STORM Platform/Answer에 대한 제품 소개 및 데모 요청이 대부분이었으며, 올리브텍(보안 데이터스토리지, RPA), 한국산업은행(RAG 시스템), 리얼타임웨이브(국방 시뮬레이션), 한국오라클(Oracle Cloud/벡터DB 호환), 두산베어스(AI 모델) 등 다양한 산업군에서 문의가 들어왔다.
  일본발 전시회/광고 스팸 문의(ブティックス, アドップ 등)도 다수 유입되었고, SG Holdings(투자 제안) 등 노이즈성 문의도 있었다.
  몽트래블 고객의 카카오톡 연동 기술지원 건이 가장 긴 스레드를 형성했으며, 신희수/김혜원이 원격으로 문제를 해결했다.
  한국오라클 컨택은 Oracle DB 23ai 벡터DB 호환 가능성에 대한 기술 리서치와 전략적 파트너십(OCI 번들링) 논의로 확대되었다.
  유비씨(준컨설팅) 고객의 검색 품질 이슈는 프롬프트 롤백과 고급 검색 기능의 필요성을 드러냈다.
  클루커스(클라우드 MSP)에서 파트너 제안이 왔고, 토스랩(잔디)에서 메시징 협업 문의가 유입되어 팀 내 기대감이 높았다.
  팀원 김수진, 김혜원, 한시형, Noah(고석현), 원성준이 주로 대응했으며, 인바운드 대응 메일 템플릿(Relate 활용)도 공유되었다.
