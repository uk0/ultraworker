summary: |
  2024-Q3는 한국 대기업 및 일본 기업으로부터의 문의가 두드러진 시기이다. 총 13건의 메시지가
  접수되었으며, 문의의 질이 높아진 것이 특징이다.

  주요 문의 유형:
  1) 대기업 솔루션 도입 문의: 카카오(문서 분석 기술), KB국민카드(솔루션 소개), 로앤굿(법률 RAG 챗봇)
  2) LLM 모델 직접 구매/사용 문의: 원프레딕트(한국어 LLM 모델 구매), 인스웨이브시스템즈(llama3.1 API 상태)
  3) 일본 전시회/이벤트 초대: 日本経済新聞社 GenAI/SUM 피치 콘테스트(2회 연속), DXPO 전시회,
     타나카기획 영업대행 제안
  4) STORM Answer/Platform 대기자: KT, 카카오, IBK시스템, 액세스나인

  특히 카카오에서 2건의 문의(문서 분석 기술, STORM Answer)가 있었고, 로앤굿 임진주 변호사의
  법률 챗봇 RAG 문의는 40개의 답글이 달릴 만큼 활발한 논의가 이루어졌다. 또한 원프레딕트에서
  한국어 pretrained LLM 모델 단독 구매 가능 여부를 문의하여 14개 답글이 달렸다.
  일본 닛케이 신문사의 GenAI/SUM 피치 콘테스트 참가 안내가 반복적으로 접수되었다.
