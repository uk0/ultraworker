summary: |
  2025-Q4 business-contact 채널은 사이오닉에이아이 250억 시리즈 A 투자 유치 이후 STORM Platform에 대한 다양한 기업 문의가 급증한 분기이다.
  롯데이노베이트, 한양디지텍, 씨지인사이드, 현대카드 등 국내 대기업 및 중견기업으로부터 온프레미스 구성, Agent Builder, STORM Parse 송장 정보 추출, RAG 워크플로우 등에 대한 구체적인 기술 문의가 다수 접수되었다.
  일본 기업들로부터는 AI 컨퍼런스 협찬, CIO Japan Summit 미팅, 도쿄 CES 시찰 등의 파트너십 및 이벤트 제안이 잇달아 들어왔으며, SBS Biz 방송 출연 요청도 접수되었다.
