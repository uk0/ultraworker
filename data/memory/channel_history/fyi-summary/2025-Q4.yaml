summary: |
  2025-Q4에는 요약봇이 다수 채널의 일일 요약을 게시하며 연구 및 사업 채널의 주요 논의를 정리했다. 주요 내용으로는 CVPR 2025 논문 제출 논의(초록 마감 11월 6일), KDD 2026 제주 개최 소식, Jina Reranker V3 기술 논의, Dense Retriever 편향성 연구(DIVER v2), MoE SVD 기반 지식 증류 논문, BM25 검색 성능 향상 실험(WANDS/ESCI 데이터셋), 임베딩 모델 위치 편향 감소 실험 설계(ACL 워크숍), 스톰 에이전트 템플릿 설정 변경, Teams 연동 UI 개선 등이 있었다. 추석 연휴로 인한 위클리 취소 공지도 포함되었다.
