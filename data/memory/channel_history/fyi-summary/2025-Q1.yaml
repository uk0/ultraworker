  2025-Q1에는 요약봇이 business-common 및 engineering 채널 요약을 게시하며, IBK 프로젝트 본격 진행, 일본 사업 준비(일본 현지 채용, KOTRA 나고야 담당자 미팅, 미즈호 은행 계좌 개설), 유진투자증권 POC 연장 및 세미나(2월 20일), 현대차 세미나 준비, LG전자 미팅 조율, 스톰 플랫폼 제품소개서 업데이트(국문/영문/일문), 파트너십 확대(데이터브릭스, 크림슨앰버, 아이티센) 등의 내용이 포함되었다. 2월 말에 요약봇 Slack 토큰 오류(not_allowed_token_type) 발생으로 일시 중단되었다.
