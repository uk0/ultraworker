summary: |
  2025-Q3는 요약봇이 business-common, engineering, research-common 채널을 지속적으로 요약하며 303개 메시지를 게시한 분기다. 주요 내용으로는 결제 시스템(토스페이먼츠/Stripe) 도입 논의, NIA 사업 예산 조정, 제품소개서 일본어 번역 완료, 스톰파스 API 상품화 기획, 파일론 검색 성능 10배 개선 작업, Qdrant 배치사이즈 이슈, IBK 성능 이슈 및 OpenTelemetry 반입 완료, SLM 논문 토론(NVIDIA), Vespa.ai 계층적 랭킹, SBERT v5.0.0 릴리즈(SparseEncoder 지원) 등이 있었다.
