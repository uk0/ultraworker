summary: |
  2024-Q2는 fyi-summary 채널이 처음 개설된 분기로, Zapier 기반 요약봇이 여러 채널(product-storm-answer, business-common, research-common 등)의 일일 대화 내용을 주제별로 정리하여 게시하기 시작했다. 주요 내용으로는 AI Expo 참가 준비(부스 설치, 브로셔 제작, 출장 항공권), 일본 출장 및 팜플렛 제작, 과금 정책 논의, 수협 데모 적용, 모델 이름 선정(Storm), 새로운 임베딩 모델 적용, Qdrant 운영 이슈 등이 있었다. Claude 3 Haiku로 요약봇 모델 업그레이드도 이루어졌다.
