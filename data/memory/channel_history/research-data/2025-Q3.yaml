  2025-Q3는 research-data 채널이 처음 개설된 분기로, 사이오닉AI 데이터 작업 진행 공유 공간으로 설정되었다. 9월 1일 파트타임 작업자 4명(재현, 재욱, 현준, 석기)이 참여하여 증권(NH증권, 외부 증권) 및 보험(미래에셋생명, 외부 보험) 데이터 정제 작업을 시작했다. 주요 작업으로는 상품 데이터 정제 및 중복 제거, QA 데이터셋 검수, hallucination 여부 확인, AI 윤리 온라인 교육 이수 등이 있었으며, 스프레드시트 기반 협업으로 진행되었다.
