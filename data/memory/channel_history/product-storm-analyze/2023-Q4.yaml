summary: >
  2023년 4분기는 Storm Analyze 프로덕트의 태동기였다. 채널 개설(9/27) 후 진형, 시형, 석현의 초기
  아이디에이션 미팅을 통해 CS 상담 데이터 분석 제품 개발이 시작되었다. 진형이 하이퍼클로바 기반 간단한
  POC를 Golang으로 제작하여 Google Cloud Run에 배포했고, /sentiments, /summarize, /keywords,
  /categories 엔드포인트를 /analyze로 통합하는 구조를 설계했다. 김혜원이 Figma에 Analyze 기획 초안을
  작성하고 요약 기술 리서치를 주도했는데, 43페이지 논문 요약 테스트에서 의미 유사 단락별 split + 순서대로
  입력 방식이 효과적임을 확인했다 (GPT-4 비용: 43페이지 기준 약 3,450원, 11회 호출). CS 상담 스크립트
  요약 테스트도 진행되었다. 한시형이 과금 모델 초안과 상품 패키징(진형, 박우명과 논의)을 주도했으며,
  네이버클라우드 AI 컨택센터 조직장과의 미팅을 통해 BrightPattern 콜센터 솔루션에 분석 기능 연동 가능성이
  제안되었다. Analyze는 개별 기능마다 에이전트를 따로 띄우고 조합하는 형태로 개발하기로 결정되었다.
