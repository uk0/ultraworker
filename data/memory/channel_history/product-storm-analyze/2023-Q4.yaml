  - name: "기획 및 상품 패키징"
    count: 8
    summary: "김혜원 Figma 기획 초안 작성. 한시형 과금안 초안 작성 및 상품 패키징 논의(진형, 박우명 참여). 요약에 비즈니스 로직 넣는 방법 고민."
  - name: "네이버클라우드 연동"
    count: 3
    summary: "한시형이 네이버클라우드 AI 컨택센터 조직장 미팅. BrightPattern(외산 콜센터 솔루션)에 분석 기능(요약/카테고리/키워드/감정분석) 연동 제안."
  - name: "현대 캐피탈 테스트"
    count: 2
    summary: "진형이 현대 캐피탈 raw 데이터로 분석 테스트 진행."
