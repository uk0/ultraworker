summary: >
  2024년 2분기는 고객 대응과 외부 시연이 주요 활동이었다. 김혜원이 고오급 카테고라이징 테스트를 형찬에게
  요청했고, 진형이 뉴스타파 사례를 참고하여 Google Document AI를 테스트했다. 한시형이 STROM 이슈를
  공유했으며, 카테고리 분류 데이터 제작이 최윤정에게 요청되었다. 가장 큰 이벤트는 고객사 시연으로,
  analyze 아웃풋 변경 버전으로 최종 시연시나리오 및 제안서가 제출 완료되었고 박우명, 최윤정이 시연에
  참석했다.
