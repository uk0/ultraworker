summary: >
  2024년 1분기는 CS Analyze 올인원 스킬 개발 및 본격 테스트가 이루어진 시기였다. 김혜원이 요약용 테스트
  데이터셋을 수작업으로 제작하고(카테고리 31개, 스크립트 66건), 임베딩 기반 카테고리 분류를 위해 Qdrant에
  데이터를 저장했다. CS Analyze 올인원 스킬이 개발되어 요약+키워드 추출+카테고리 분류+감정분석을 하나의
  API로 통합했으며, HyperCLOVA 기반 요약으로 스타일 컨트롤, GPT를 리랭커 역할로 카테고리 분류(호출당 약
  2원)하는 구조가 확립되었다. 분석 품질 평가 결과 요약은 "대체로 완벽", 키워드는 "꽤 잘 뽑음", 감정분석은
  "틀려보이는 건 없음"으로 평가되었다. CS 쉐어링 고객사 STT 스크립트 기반 테스트가 진행되었고,
  stargate-web.vercel.app/analyze에 데모가 배포되었다. 김덕현이 Analyze 데모 제작을 담당했으며,
  경쟁사 Allganize(올거나이즈) 분석도 이루어졌다. 3월 말 GCP에서 AWS로 Qdrant 이관이 시작되었다.
topics:
  - name: "CS Analyze 올인원 스킬 개발"
    count: 15
    summary: "요약+키워드+카테고리+감정분석 올인원 API 개발. HyperCLOVA 요약, GPT 리랭커 카테고리 분류(호출당 2원). few-shot 예시 데이터로 요약 스타일 일관성 확보. 키워드 추출은 요약 기반으로 비용 절감+품질 향상."
  - name: "테스트 데이터 제작 및 품질 평가"
    count: 12
    summary: "김혜원이 카테고리 31개, 스크립트 66건 수작업 제작. 요약 '대체로 완벽', 키워드 '꽤 잘 뽑음, 간혹 불필요한 것 포함', 감정분석 '틀려보이는 건 없음'. CS 쉐어링 STT 스크립트 기반 테스트."
  - name: "임베딩 기반 카테고리 분류"
    count: 8
    summary: "Qdrant에 임베딩 데이터 저장하여 유사도 기반 분류. 고오급 카테고리 분류 및 키워드 추출 기능. Analyze 전용 Qdrant 별도 운영."
  - name: "데모 사이트 제작"
    count: 5
    summary: "stargate-web.vercel.app/analyze에 데모 배포. 김덕현이 데모 제작 진행. 외부 데모 가이드 Notion 문서 작성."
  - name: "Qdrant 이관 (GCP -> AWS)"
    count: 3
    summary: "3월 말 GCP에서 AWS로 이관 시작. Analyze 전용 Qdrant 폐지, 기존 Qdrant와 통합 사용 예정. 이관 중 고오급 요약/카테고리 기능 일시 중단."
  - name: "경쟁사 분석"
    count: 2
    summary: "Allganize(올거나이즈)를 answer/analyze 레벨 경쟁사로 인식. coxwave 리서치 진행(김혜원)."
