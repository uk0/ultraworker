summary: |
  2024-Q2에는 MetisX와의 공동 국가연구개발사업(R&D 과제) 신청 작업이 주요 활동이었다. song이 과제 계획서 작성을 주도하며
  첨부서류 제출, 과제번호 변경(RS-2024-00442648), 연구개발 실적 정리 등을 조율했다. MetisX가 핵심 키워드로 '벡터 시멘틱 검색',
  '벡터 데이터베이스', '검색 증강 생성'을 제시했고, '검색 증강 생성(RAG)'은 Sionic AI가 담당하는 것으로 확인되었다.
  4월에는 MetisX 정기 미팅이 계속되었으며, Sigrid Jin이 준비사항을 메모하고 미팅을 진행했다.
