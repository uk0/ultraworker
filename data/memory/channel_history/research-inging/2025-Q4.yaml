summary: |
  2025-Q4 research-inging 채널에서는 Dense Retrieval 위치 편향(position bias) 해결을 위한 연구와 한국어 Retrieval 데이터셋 구축이 핵심 활동이었다. BGE-m3, Qwen3 Reranker 등 리랭커 증류(distillation), AutoML 임베딩 실험, ColBERT 증류 등 다양한 모델 최적화 실험이 진행되었다. 허깅페이스에 한국어 retrieval 데이터셋과 NanoBEIR-ko 평가 셋을 공개하였으며, ACL 논문 제출을 위한 실험도 병행되었다.
