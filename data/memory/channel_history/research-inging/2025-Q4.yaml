terminology:
  - term: "Dense Retrieval"
    definition: "벡터 임베딩 기반 문서 검색 방식, 키워드 검색 대비 의미적 유사성 활용"
  - term: "위치 편향 (Position Bias)"
    definition: "문서 내 정보의 위치(앞/뒤)에 따라 검색 성능이 달라지는 현상"
  - term: "NanoBEIR-ko"
    definition: "BEIR 벤치마크의 한국어 소형 버전, 사이오닉AI가 품질 개선하여 공개"
  - term: "BGE-m3"
    definition: "BAAI에서 개발한 다국어 임베딩 모델, 리랭킹과 임베딩 모두 활용"
  - term: "ColBERT"
    definition: "Late Interaction 방식의 다중 벡터 검색 모델"
  - term: "ACL"
    definition: "Association for Computational Linguistics, 자연어처리 최상위 학회"
  - term: "GISTEmbedLoss"
    definition: "배치 내 false negative를 필터링하는 임베딩 손실 함수"
