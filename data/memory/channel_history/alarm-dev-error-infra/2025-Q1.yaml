summary: |
  개발 환경(dev namespace) 인프라 에러 알림 채널. New Relic InfraAlert(dev) 정책 기반으로 Pod 재시작, Pending 상태 등의 알림이 자동 발송됨.
  주요 알림 대상 Pod: overmind(최다 빈도), carrier-supply, auto-order-sheet, hello-kang-test, carrier-storm-parse.
  대부분 "Pod has restarted" 유형이며, 일부 "Pod is in a Pending state" 알림 포함.
  sionicai-onprem-cluster의 dev 네임스페이스에서 발생하는 인프라 이슈를 모니터링하는 채널.
  일평균 32.8건의 알림이 발생하여 비교적 높은 빈도의 Pod 불안정성이 관찰됨.
