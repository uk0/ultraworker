summary: |
  2025년 8월 제주도 워크샵 배낚시 활동 채널. 정세민(Sem)이 주도하여 제주 세화포구 동부2호 선상 배낚시를 기획함.
  원래 동부2호 선장님 건강 이슈로 스텔라 2호(차로 10분 거리)로 변경됨. 1시 출항 5시 입항, 인당 대여비 포함 8만원. 참여자 모집 및 멀미약(아네론) 추천 등 준비 사항 공유.
  당일(8/26) 점심으로 이여도산아(도민 맛집) 방문 후 항구로 택시 이동. 최병현, 권혜선, 정석현 등이 참여. Noah(고석현)가 바리깡을 가져온 에피소드도 있었음.
