summary: |
  2025-Q4 dcamp-operation 채널은 사이오닉에이아이의 디캠프 입주 공간 운영 관련 소통 채널로, 다양한 행정 및 시설 관련 논의가 이루어졌다.
  주요 이벤트로는 사이오닉에이아이가 데스커 오피스 체인지 최종 선정 팀으로 선발되어 책상과 책장 가구 후원을 받게 된 소식, 12월 1일 디캠프 타운홀 행사 준비(주차 안내, 출입증 관리), CCTV 설치 안내 등이 있었다.
  멤버들 간 공용카드 위치, 상비약, 택배 확인 등 일상적인 사무 공간 운영 소통도 활발히 이루어졌다.
