summary: |
  2024-Q2 noah-thinks 채널에서 Noah는 AI와 경영 전략에 대한 심층적인 사유를 공유했다. LLM과 AGI의 관계를 SF소설
  '삼체(Three-Body Problem)'와 콘웨이의 생명 게임에 비유하여 설명하고, AI 스타트업 벨류에이션의 특수성을 분석했다.
  린스타트업(Lean Startup) 방법론의 적용 가능성, 무제한 휴가 제도의 진정한 의미, 건설적 피드백의 철학, SaaS 제품
  전략 등 다양한 주제를 다루었다. 참여자가 5명으로 줄었으나 각 글의 깊이와 토론의 질이 높았다.
