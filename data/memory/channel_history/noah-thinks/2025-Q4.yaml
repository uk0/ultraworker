summary: |
  Q4에는 사이오닉의 비전 재정의에 대한 깊이 있는 논의가 이루어짐.
  김혜원이 사이오닉 비전을 "모든 기업이 AI를 활용해서 인간만으론 도달할 수 없는 수준의 가치를
