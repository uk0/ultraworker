summary: |
  2024년 2분기는 corp-culture 채널의 가장 활발한 시기로, 컬쳐덱 작성과 배포, '함께 자라기' 도서 스터디, 커피챗 실험 등 조직문화 체계화가 본격적으로 진행되었다.
  김혜원, 김덕현(Dekay), Sigrid Jin이 중심이 되어 culture 킥오프부터 3회차 미팅까지 이어지는 정기 컬쳐 미팅을 운영했으며, 컬쳐핏 인터뷰 기준과 구성에 대한 논의도 활발했다.
  병특 업체 신청을 위한 경영혁신보고서 작성 등 실무적 컬쳐 문서화 요구도 있었으며, 피드백 문화와 커피챗을 통한 팀 학습 가속화 실험이 진행되었다.
