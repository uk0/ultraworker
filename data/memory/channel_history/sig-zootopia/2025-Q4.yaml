summary: |
  핵심 멤버 중심으로 반려동물 일상이 꾸준히 공유된 분기. 김혜원이 깽이 미타(사무실) 출근 여부를 정세민에게 물어보는 스레드가 12개 답변을 받았다. 김수원은 몽자앨범 10월호/11월호를 연재하며 벽지 뜯기(7개 답변) 에피소드도 공유했다. 권혜선은 아루의 재택 풍경(테크스펙 리뷰해주는 고양이, 팔꿈치에 머리 박고 자기, 배꼽 사진)을 지속적으로 공유했다. 이강욱은 meow.camera(길고양이 급식소 실시간 카메라 사이트)를 공유했다. 정세민의 깽이 장난감 후기, 오승희의 깽이 애교 자랑 등 깽이가 여전히 채널의 인기 스타였다.
