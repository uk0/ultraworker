summary: |
  꾸준한 반려동물 일상 공유가 이어진 분기. 김혜원이 깽이를 보고싶어하며 흔적 사진을 올려 24개 답변을 받았다. 최윤정의 깽이-삘리 접묘(15개 답변)가 화제였고, 깽이 생존신고를 정세민에게 전했다. 권혜선은 아루의 일상(붙박이장에서 자기, 비싼 의자 선호, 털갈이 시즌)을 공유하고, 깽이 패션쇼(강성우)도 있었다. 김수원은 몽자앨범 월간 시리즈를 시작하고, 캐나다 야생동물(8개 답변)도 공유했다. 김덕현은 광고모델 몽자(6개 답변)를 올렸다. 정세민이 깽이의 석현님 신발 사랑 에피소드를 공유하기도 했다. 세계 고양이의 날(8월 8일)도 기념되었다.
