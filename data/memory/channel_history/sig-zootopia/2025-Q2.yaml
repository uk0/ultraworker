summary: |
  채널 역대 최대 활동량(111개 메시지, 17명 참여)을 기록한 분기. 오승희가 임시집사로 깽이를 돌보며 대량의 깽이 콘텐츠를 생산했다(꾹꾹이로 3시반 기상, 바보 깽이, 손 주는 깽이, 프롬프팅 꿈 등). 권혜선은 아루의 넥카라(상처 관리), 병원 방문, 고양이와의 절교 에피소드 등 건강 관련 이야기를 공유했다. 김수원의 몽자는 "개 키우지마.."(30개 답변), 벽지 뜯기, 장마철 실외배변 등 반려견 일상의 고충을 보여줬다. 김혜원의 산도는 "저희집 너구리"(23개 답변)로 화제가 되었고, 고양이 소쿠리를 추천하여 권혜선도 구매했다. 정세민은 당근마켓에서 깽이 돌봄 구인 글을 올리기도 했다. 고양이 티셔츠용 사진 모집(24개 답변), still3028의 강아지 나무 소개 등 다양한 반려동물 콘텐츠가 풍성했다.
