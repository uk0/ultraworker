  sig-zootopia(반려동물) 채널이 2024년 12월에 개설된 분기. 김수원이 채널을 만들며 "개설기념 오늘 몽자"라고 반려견 몽자를 소개했다. Noah(고석현)는 자신의 고양이들 사진을, 김혜원은 "야무진 산도"(고양이)를, 정세민은 고양이 사진을 공유하며 반려동물 자랑 채널로 시작되었다. 크리스마스 시즌에 반려동물 사진 교환도 있었다.
