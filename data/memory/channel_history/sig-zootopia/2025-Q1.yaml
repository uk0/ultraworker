summary: |
  채널이 폭발적으로 성장한 분기(14명 참여). 권혜선(Jada Gwon)이 합류하며 고양이 아루(아롱구리)의 사진/영상을 적극 공유했다. Noah는 오드아이 고양이("항상 노여움"), 켈베로스, 캣타워 사진을 공유하고 댕댕이를 데리고 출근하기도 했다. 김수원은 몽자(반려견) 사진을 꾸준히 올리며 15개 답변의 인기 스레드를 만들었다. 김혜원은 고양이 테라스 설치, 이불 덮기, 모빌 보고 흥분해서 넘어지는 산도를 공유했다. 정세민은 고양이 민이와 깽이를, ye는 후추(강아지)와 카페 멍멍이를 공유했다. 권혜선은 고양이 건강검진 후 다이어트를 위해 조공 소피 캣 캔 나눔을 제안했다. 김수진의 벌레사냥꾼 고양이, Sigrid Jin의 오사카 고양이 등 다양한 동물 사진이 공유되었다.
