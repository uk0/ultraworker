terminology:
  - term: SIAM(시암)
    definition: 태국 대상 AI 에이전트 프로젝트. 호텔/항공/여행 도메인의 AI 어시스턴트 개발
  - term: LangGraph
    definition: LangChain의 그래프 기반 멀티에이전트 오케스트레이션 프레임워크
  - term: OpenWebUI
    definition: 오픈소스 웹 UI 프레임워크. Pipelines 기능으로 커스텀 AI 파이프라인 연동 가능
  - term: MCP
    definition: Model Context Protocol. AI 모델과 외부 도구를 연결하는 프로토콜
  - term: SerpAPI
    definition: 검색 엔진 결과 페이지(SERP) API. 웹 검색 결과를 프로그래밍으로 가져오는 서비스
  - term: Qwen3
    definition: 알리바바의 대규모 언어 모델. 시암 프로젝트에서 대안 모델로 배포 테스트
  - term: 시암GPT
    definition: 시암 프로젝트의 GPT 기반 AI 에이전트 서비스명
