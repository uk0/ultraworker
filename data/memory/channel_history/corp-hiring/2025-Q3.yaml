summary: |
  2025년 3분기는 corp-hiring 채널이 처음 개설되어 본격적인 채용 활동이 시작된 분기이다.
  8월 초 채널 개설 후 FE, 디자이너, TPM(Technical Project Manager) 등 다양한 포지션 채용 논의가 진행되었으며, 22명의 팀원이 채용 프로세스에 참여하였다.
  그리팅(Greetinghr) 플랫폼 도입을 통해 기존 플렉스+원티드 체계에서 채용 관리 일원화를 추진하였으며, 면접 일정 조율, 과제 전형 프로세스 개선, 내부 추천 활성화 등 채용 프로세스 전반의 체계화가 이루어졌다.
  9월에는 원티드-그리팅 연동 재설정, 캔디드를 통한 추천 활성화, 레퍼런스 체크 정책 안내 등이 진행되었다.
