summary: |
  2025-Q1에 lab-feedback-fine-tuning 채널이 개설되었으며, 고객 피드백 데이터를 활용해 임베딩 모델을 직접 개선하는 방법을 연구하는 채널이다. 주요 논의는 Stargate RAG 노드에 커스텀 임베딩 URL을 추가하는 개발 작업과, 피드백 데이터 399개를 증강하여 파인튜닝 성능 효과를 측정하는 실험이다. 파인튜닝 후 약 0.5% 정확도 향상이 확인되었으나, 통계적 유의성 검증 및 추가 실험(하이퍼파라미터 조정, 클래스별 지표 분석)의 필요성이 제기되었다.
