summary: |
  2025년 2분기 CES 컨택 데모 채널이 보관 해제되면서 일본계 기업들을 대상으로 한 AI 솔루션 제안 활동이 재개되었다.
  IKO日本トムソン, 日本ソフト開発株式会社, JAPAN AI株式会社, pluszero 등 일본 기업들을 대상으로 Sionic AI의 STORM Platform 기반 맞춤형 AI 솔루션을 제안하는 자동화 뉴스레터가 생성되었다.
  7개의 스레드에서 각 기업별 AI 솔루션 상세 내용이 공유되었으며, Slack 채널 보관 관련 에러 해결 및 멤버 재초대가 이루어졌다.
