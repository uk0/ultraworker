summary: |
  2025년 1분기는 인프라 현대화와 OCI 마이그레이션이 본격적으로 추진된 시기였다. 이강욱이 합류하면서 배포 시스템 프로포절, corsair(커세어) 설계, ArgoCD 관리 체계화, istio ingress gateway 정비 등 플랫폼 엔지니어링 개선이 집중적으로 이루어졌다. 온프렘 클러스터 인증서 갱신, 노드 백업, velero 백업 솔루션 재설정 등 안정성 확보 작업이 진행되었다. OCI에 istio ingress gateway 설치, VCN 정리, Terraform 기반 인프라 관리가 추진되었다. Keycloak 배포 및 Casdoor에서 Keycloak으로 회귀가 결정되었다. IBK 대응을 위한 EFK 도입, Docker 이미지 레이어 최적화, 모델 파일 빌드 통합이 논의되었다. RabbitMQ 배포 방식 결정, Argo Workflow 도입 검토, 뉴렐릭 비용 관리, harbor 내부 이미지 풀 경로 최적화 등 운영 효율화가 다방면으로 이루어졌다. dev/live RDB를 OCI로 전환 완료하고, 스톰 플랫폼 인프라 스펙 산정이 진행되었다.
topics:
  - 배포 시스템 현대화 (ArgoCD, corsair, shuttle)
  - OCI 마이그레이션 (istio, VCN, Terraform)
  - 온프렘 클러스터 정비 (인증서, 백업, 포트포워딩 정리)
  - IdP 전환 (Casdoor -> Keycloak)
  - IBK 온프레미스 대응 (EFK, 이미지 최적화)
  - 뉴렐릭 모니터링 운영
  - RDB OCI 전환
