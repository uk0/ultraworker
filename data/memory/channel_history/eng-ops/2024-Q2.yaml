summary: |
  2024년 2분기는 온프레미스 인프라 본격 구축기였다. UPS 설치, 서버실 전기공사, 통신실 랙 정리 등 물리 인프라 작업이 집중적으로 진행되었다. 사내 Kubernetes 클러스터 셋업이 시작되어 on-prem DNS 설정, istio gateway 구성, self-sign 인증서 발급이 이루어졌다. L40s GPU 서버 도입 과정에서 NVMe 호환성 이슈(마이크론 nvme 7300 인식 불가)가 발견되었고, 네트워크 구조가 ALB에서 NLB->ALB->Istio로 변경되었다. AWS 마이그레이션 프로그램 펀딩 승인, 한국오라클/OCI 미팅 및 계약 추진, Google Startup Program 크레딧(1.38억원) 확보, 알리바바 A100 GPU 임대 등 다양한 클라우드 벤더 활동이 있었다. 플랫폼 엔지니어 채용 공고 작성 및 veccl 신규 장비 도입도 진행되었다.
topics:
  - 온프레미스 K8s 클러스터 구축 (istio, ArgoCD)
  - 서버실/통신실 물리 인프라 (UPS, 전기공사, 랙)
  - L40s GPU 서버 도입 및 트러블슈팅
  - 네트워크 구조 변경 (NLB->ALB->Istio)
  - 멀티 클라우드 계약 (AWS, OCI, GCP, 알리바바)
  - 플랫폼 엔지니어 채용
