summary: |
  2025년 2분기는 채널 활동이 크게 증가(342개 메시지)한 시기로, IBK 부하테스트, OCI 인프라 운영 고도화, 서비스 안정화가 핵심 주제였다. IBK 현장 대응이 빈번했으며 loadtest 환경 구축, storm-parse 부하테스트가 집중적으로 진행되었다. Zitadel IdP 도입(Google Workspace 연동), OpenTelemetry+NewRelic PoC 성공, pgbouncer DB 커넥션 풀링 세팅이 이루어졌다. 커세어 컨트롤러 안정화, 리랭커 재시작 이슈 대응, 마스터4/5 노드 장애 복구 등 운영 이슈가 다수 발생했다. 뉴렐릭 기본 사용량 증대(1500->2500GB), 불필요한 로그 필터링(분당 1.3k->110개)으로 비용 최적화가 진행되었다. Helm 차트 관리 체계화, 서비스 차트 분리, QA존 구성, 네임스페이스 정리 등 배포 인프라가 정비되었다. 멀티모달 학습 파이프라인 자동화 논의, dragoon(드라군) 파서 배포, SMTP 서버 셋업 등 새로운 서비스 인프라 구축도 이루어졌다.
