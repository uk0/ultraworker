summary: |
  2025년 4분기는 채널 역대 최다 활동(348개 메시지, 22명 참여)을 기록하며 커세어 대규모 마이그레이션, 배포 파이프라인 고도화, 일본/파트너 대응이 집중된 시기였다. 커세어 qdrant 마이그레이션이 770개 답글의 대규모 작업으로 진행되어 테넌시 합치기, 리저브 관리, CSI 드라이버 이슈 등을 해결했다. shuttle 배포 시스템이 안정화되면서 live 자동배포 제어, Apidog CLI 연동 최소 시나리오 검증, 컨테이너 이미지 캐시 적용이 이루어졌다. DGX Spark(worker301) 도입, 일본 리전 서빙 준비, 삼성E&A/이디에스/국세청 등 파트너사 대응이 활발했다. cybros(사이브로스) 데이터 파이프라인 개발이 진행되어 connector/processor 인터페이스가 구현되었다. NewRelic instrumentation 인증서 만료, harbor 장애, istio HPA 정리, OOM 이슈 등 운영 안정성 대응이 계속되었다. Grafana alert rule 추가, 배포 시 최소 시나리오 통과 의무화 논의, live 배포 승인 게이트 도입, GitHub 보안 점검(미사용 앱 suspend) 등 운영 프로세스가 강화되었다. OCI blockstorage 비용 절감(일 930k->367k), AWS 100k 쿠폰 활성화, Vault secret operator 도입 논의도 이루어졌다. MLOps 팀 구성 논의 및 ML DevOps 채용 활동이 지속되었다.
