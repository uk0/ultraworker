summary: |
  2025년 3분기는 배포 시스템 대전환, 국세청 PoC 대응, OCI 재계약이 핵심이었다. 새로운 배포 시스템(shuttle+ArgoCD+service 레포)이 도입되어 GoCD 기반에서 전환이 진행되었고, 슬랙봇(/sionic-deploy) 연동이 완료되었다. 국세청 PoC 준비로 파일 반입, 베슬 GPU k3s 설치, storm-toolkit 도커 이미지 등이 마련되었다. OCI 재계약(연100K 달러, 월별 분할납부)이 완료되고 협력사가 지티플러스에서 위즈베이스로 교체되었다. GreptimeDB PoC, Grafana 스택 설치, 옵저빌리티 개선이 추진되었다. istio 설정 정리(migurdia 프록시 마이그레이션), 파트너사 한국이디에스 설치 교육 준비, ML DevOps 엔지니어 JD 작성, 서비스 차트 분리(temp2 레포) 등이 진행되었다. 마스터4/5 노드 반복 장애, TLS 에러, OOM 이슈 등 운영 안정성 대응이 계속되었다. AWS 선급금 소진 알림이 오면서 OCI 마이그레이션 가속화 필요성이 확인되었다. dev 환경 온프렘 IDC 코로케이션 이전 준비도 시작되었다.
topics:
  - 배포 시스템 전환 (shuttle + ArgoCD + service 레포)
  - 국세청 PoC 대응 (파일 반입, k3s, toolkit)
  - OCI 재계약 및 위즈베이스 MSP 교체
  - GreptimeDB PoC 및 옵저빌리티 개선
  - istio/migurdia 프록시 마이그레이션
  - 파트너사 설치 교육 (한국이디에스)
  - ML DevOps 엔지니어 채용
  - 마스터 노드 장애 대응
  - AWS 비용 절감 및 OCI 전환 가속
