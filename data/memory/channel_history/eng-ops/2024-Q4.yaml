summary: |
  2024년 4분기는 OCI 본격 도입과 인프라 현대화가 핵심 주제였다. OCI Terraform 작업이 시작되어 AWS 형상과 동일한 인프라 구성을 목표로 진행되었고, 오라클과의 계약 및 Provisioning 논의가 지속되었다. IdP 솔루션 검토(Ory Kratos, Casdoor, Kanidm)와 distributed message queue 구현 고민 등 플랫폼 기술 스택 선정 논의가 활발했다. 뉴렐릭 PoC 라이센스 확보, istio 버전 업데이트(1.19.7->1.20.8), Docker 이미지 무결성 보장 방안(IBK 대응), EKS 업그레이드 티켓 생성 등 운영 안정화 작업이 진행되었다. 알리바바 GPU 종료, RunPod 데이터센터 이전, 사내 네트워크망 가이드 작성, AWS 메가존 Managed SP 계약 등 인프라 비용 및 운영 효율화 노력이 계속되었다. worker100 장애 대응, parsr CPU 리소스 증설(2->48코어) 등 서비스 안정성 관련 이슈도 다수 발생했다.
topics:
  - OCI Terraform 기반 인프라 구축
  - IdP 솔루션 검토 (Ory Kratos, Casdoor, Keycloak)
  - 뉴렐릭 모니터링 도입
  - istio 업그레이드
