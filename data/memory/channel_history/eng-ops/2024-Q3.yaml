summary: |
  2024년 3분기는 인프라 확장 및 안정화 시기였다. GPU 서버(worker15, worker101) 세팅 및 랙 장착, k8s 마스터 노드 2대 추가 구매 등 온프레미스 인프라가 확대되었다. 통신실 전력 구성 정비, 에어컨 추가 설치(냉방 이중화), 온습도계 설치 및 Grafana 모니터링 연동이 이루어졌다. WAF rate limit 이슈 해결(5분간 2,000->10,000), Elasticsearch 볼륨 증설(50Gi->500Gi), ECR refresh 파이프라인 추가, Cilium rate limit 설정 등 서비스 운영 안정화 작업이 진행되었다. 뤼튼 협업 POC를 위한 모델 배포, GCP 프로젝트 정리, OCI 테스트 계정 공유, PaaS 견적 비용 산출, Datadog 비용 체크 등 비용 및 서비스 최적화 논의가 활발했다. 보안 관련으로 외부 노출 SSH 포트 삭제 및 VPN 접근 체계 개선이 이루어졌다.
topics:
  - GPU 서버 확장 (worker15, worker101)
  - 통신실 전력/냉방 인프라 이중화
  - 서비스 안정화 (WAF rate limit, ES 볼륨, ECR)
  - 모니터링 (온습도계, Grafana, Datadog)
  - 뤼튼 협업 POC
  - 보안 강화 (SSH 포트 정리, VPN)
  - 비용 최적화 (GPU 가격, PaaS 견적)
