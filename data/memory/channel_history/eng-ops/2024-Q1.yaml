summary: |
  2024년 1분기 eng-ops 채널이 신설되어 초기 인프라 운영 논의가 시작되었다. 김덕현(Dekay)이 채널을 개설하고 AWS/Azure/GCP/알리바바 등 멀티 클라우드 계정 현황을 정리하였다. AWS 비용 분리, Azure 스폰서십 적용, GCP 미팅 등 클라우드 벤더별 크레딧 및 계약 관련 논의가 주로 이루어졌다. 온프레미스 인프라 구축을 위한 통신실 랙 세팅 일정과 CPU 노드 사양 검토(56코어, 768GB~1.5TB 메모리)가 진행되었으며, minio 클러스터 및 qdrant shard 온메모리 배포를 위한 장비 구성이 논의되었다.
