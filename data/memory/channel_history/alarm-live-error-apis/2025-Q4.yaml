summary: |
  2025년 4분기 alarm-live-error-apis 채널은 라이브 API 환경(apis-manager, apis-parse-router)에서 발생한 에러 알람을 수신하는 채널로, 496개의 메시지와 38개의 스레드가 발생하였다. NewRelic을 통한 Critical 우선순위 이슈 알람이 주를 이루었으며, 주요 에러는 CLIENT_KEY_ACCOUNT_NOT_LINKED(계좌 미연결), 400 Bad Request 등 API 오류였다. APIS-PARSE-ROUTER-DEV 및 라이브 환경의 에러로그 알람 정책이 활발히 동작하였으며 13명이 모니터링에 참여하였다.
