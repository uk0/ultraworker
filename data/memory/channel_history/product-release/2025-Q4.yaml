summary: |
  2025-Q4에는 Stargate API가 v0.42.5에서 v0.43.3까지, WEB이 v2.75.2에서 v2.92.1까지
  111개 메시지로 가장 활발한 분기였다. WEB 버전이 v2.92까지 급속 증가하며 거의 매일 배포가 이루어졌다.
  GitHub 알림이 채널에 연결되어(sionic-ai/storm-apis releases 구독) 자동 릴리즈 알림이 추가되었다.
  Pylon v1.13.0에서는 MUVERA(vllm-muvera, bge-m3) 임베딩 앙상블을 도입하여
  4000토큰 이상 청크에 대해 구간별 임베딩 모델을 앙상블하는 혁신적 기능이 추가되었다.
  WEB에서는 실행 로그 기능 구현 및 QA 반영, 플레이그라운드 암호 PDF 검증 로직,
  스톰 파스 교체 기능(한글/엑셀 뷰어) 롤백 후 원복 작업이 계속되었고,
  콘솔 버튼 경로 변경, 팀 선택기에 회사명 표시 등 세밀한 UX 개선이 이루어졌다.
  Carrier는 v1.5.0에서 v1.5.3까지 업데이트되며, 에러 상세 정보 개선, Boolean 비교 수정,
  RAG 노드 rag_context 제어, 좀비 연결 정리 등이 적용되었다.
  Stargate API에서는 v0.43.2 긴급 핫픽스(API 호출 불가 이슈)가 발생하여
  빠르게 대응되었다. storm-apis 리포지토리의 GitHub 릴리즈 알림도 채널에 연결되었다.
