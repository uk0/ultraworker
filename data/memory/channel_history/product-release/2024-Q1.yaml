summary: |
  2024-Q1은 product-release 채널이 신설(1월 12일)되어 본격적으로 릴리즈 노트를 공유하기 시작한 시기이다.
  Stargate(Storm Answer 콘솔)는 v0.4.5에서 v0.8.3까지 빠르게 진화하며, 에이전트 Advice/Feedback, Chat 스트리밍,
  HWP 파일 지원, Datadog RUM 연결, 매경 Write 데모 페이지, SSE 정상화 등 핵심 기능을 잇달아 출시했다.
  Pylon(RAG 엔진)은 v0.6.0~v0.8.1로 업그레이드되며 문서 학습 속도 2배 개선, 메모리 최적화, Claude LLM 지원,
  Cohere v5 마이그레이션, Storm Analyze 5개 API, Storm Write API 등을 추가했다.
  Probe Service(이미지 생성)는 뤼튼 V2 남성/여성/Pet Studio 모델을 도입하고 ComfyUI 기반 인퍼런스를 적용했다.
  인프라 측면에서는 GKE에서 EKS/ECS로의 이관 준비, 임베딩 서버 Runpod 이전, CI 파이프라인 속도 개선이 이루어졌다.
  주 2회(화/목) 정기 배포 체계가 운영되었고, 16명의 참여자가 활발히 릴리즈 현황을 공유했다.
topics:
  - Stargate API/WEB 릴리즈 (v0.4.5~v0.8.3)
  - Pylon RAG 엔진 업그레이드 (v0.6.0~v0.8.1)
  - Probe Service 이미지 생성 (뤼튼 V2)
  - Storm Analyze/Write API 개발
  - 문서 학습 속도 및 메모리 최적화
  - HWP/HWPX 한글 파일 지원
  - Chat 스트리밍 기능
  - EKS/ECS 인프라 이관
  - Datadog 모니터링 도입
