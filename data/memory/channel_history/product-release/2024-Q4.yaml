summary: |
  2024-Q4에는 Stargate API가 v0.29.1에서 v0.33.5까지, WEB이 v1.13.4에서 v1.15.5까지 발전했다.
  핵심 기능으로는 팀 관리 시스템(Admin/Manager/Worker 초대, 권한 설정, 삭제),
  트라이얼(Trial) 기능, 콘솔 대시보드, 사이드바 shadcn 컴포넌트 리뉴얼, 에이전트 사용량 집계,
  문서 뷰어(chat table style), 원터치 제보 슬랙 알람이 출시되었다.
  Pylon은 v1.5.0에서 v1.5.5로 업데이트되며, Cohere API의 AWS Bedrock(일본 리전) 전환,
  Qdrant 검색 batch operation 개선, HNSW 근사 검색, 청크 머징 로직 개선,
  Organize V2(Document AI), 뉴렐릭 상세 에러 리포트, DI 적용 등이 이루어졌다.
  GitHub Actions 릴리즈 봇의 버그로 "No changes" 빈 릴리즈가 반복 발생하는 이슈가 있었다.
  WEB에서는 디자인 시스템 고도화(shadcn 도입), JSON 로그 뷰어, 마크다운/LaTeX 뷰어,
  파일 업로드 용량 제한 완화(50MB) 등이 적용되었다.
topics:
