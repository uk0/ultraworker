summary: |
  2024-Q3에는 Stargate API가 v0.19.1에서 v0.28.1까지, WEB이 v1.6.0에서 v1.13.3까지 성장했다.
  채널명이 "deploy-release"에서 "product-release"로 변경(9월 9일)되었다.
  주요 기능으로는 RAG On/Off 토글, LLM 모델 설정(커스텀 모델 지원), 프롬프트 커스터마이징,
  권한 설정 UI, 채널 연동 강화, Admin 회원가입 플로우, 대시보드 기능, 다국어(i18n) 확장이 출시되었다.
  Pylon은 v1.2.0에서 v1.4.2로 업그레이드되며, Chunk Padding 도입, 암호화 PDF 핸들링,
  Azure OpenLLM 지원, 대용량 문서 처리(USIO split), HWP 이슈 해결, Qdrant Topology 재설계,
  on-prem k8s 이관, Cohere Bedrock 전환이 이루어졌다.
  WEB에서는 Prisma DB 이관이 완료(7월 31일)되어 ORM이 전면 교체되었고,
  마크다운/LaTeX 뷰어, 디자인 시스템 컴포넌트 대량 개발, Storybook 환경이 구축되었다.
  참여 인원이 7명으로 줄었으나, 배포 빈도는 높게 유지되며 91개 메시지가 작성되었다.
topics:
  - Stargate API/WEB 대규모 업그레이드 (v0.19~v0.28 / v1.6~v1.13)
  - RAG On/Off 기능
  - LLM 모델 설정 및 커스텀 모델 지원
  - Prisma DB ORM 이관 완료
  - Pylon Qdrant Topology 재설계 및 on-prem 이관
  - 대용량 문서 처리 개선 (USIO split)
  - 암호화 PDF 핸들링
  - Admin 회원가입 플로우
  - 채널명 변경 (deploy-release -> product-release)
  - 다국어 지원 확장
