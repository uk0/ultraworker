summary: |
  2025-Q2에는 Stargate API가 v0.37.5에서 v0.38.6까지, WEB이 v2.9.0에서 v2.28.1까지 메이저 버전 2.x로
  전환되며 빠른 배포 주기를 보였다. 배포 봇이 자동화되어 릴리즈 노트가 봇 형태로 채널에 공유되기 시작했다.
  워크플로우(Workflow) 기능이 대규모로 출시되어 그래프 기반 에이전트 편집, 노드 관리,
  엣지 삭제 UI, 피쳐 토글링이 구현되었다. 피드백 시스템이 청크 레벨로 세분화되어
  테스트/로그 페이지에서 피드백 조회/수정이 가능해졌고, FSD(Feature Sliced Design) 파일 구조로
  전면 리팩토링이 이루어졌다.
  Pylon은 v1.8.5에서 v1.9.1로 업그레이드되며, Sparse Vector(BGE-M3-Splade) 검색 로직,
  GraphRAG 엔진 연결(LightRAG Graph), 머징 파이프라인 전면 개편, 아이센텍 고객 대응이 진행되었다.
  Carrier는 v1.2.3에서 v1.4.1로 성장하며, S3 기능 추가, if/else 노드 elseif 지원,
  오더시트 연동이 완성되었다.
  다국어 지원이 일본어 가이드, 윤정님 일어 번역 검수 등으로 강화되었다.
topics:
  - Stargate WEB v2.x 메이저 전환
  - 워크플로우(Workflow) 그래프 기반 에이전트 편집
  - 피드백 시스템 청크 레벨 세분화
  - FSD(Feature Sliced Design) 파일 구조 리팩토링
  - Pylon Sparse Vector (BGE-M3-Splade) 검색
  - GraphRAG 엔진 연결 (LightRAG)
  - 머징 파이프라인 전면 개편
  - Carrier S3 기능 및 오더시트 연동
  - 배포 봇 자동화
  - 아이센텍 고객 대응
