summary: |
  2024-Q2에는 Stargate API가 v0.9.0에서 v0.19.0까지, WEB이 v0.9.0에서 v1.5.1까지 대폭 진화했다.
  핵심 기능으로는 피드백(Advice) 등록/수정/삭제, Chat 스트리밍 중지, 배포(Deploy) 기능 v1.0.0,
  모니터링 UI 전면 개편, 굿/배드(chat-advice) 기능, Write 기사 작성 기능, 디자인 시스템 컴포넌트 개발이 있다.
  Pylon은 v0.9.0에서 v1.1.0으로 메이저 업그레이드를 달성하며, 새로운 임베딩/리랭커 모델 도입,
  Cohere reranker fadeout(비용 절감), Storm Organize v1, 커스텀 프롬프트 지원, LLM 스트리밍,
  Vault 도입(secret 관리), GPT-4-Turbo 전환(비용 3~4배 절감) 등을 구현했다.
  인프라에서는 Qdrant GKE 재이관, on-prem k8s 이전, Dockerfile 빌드 최적화가 진행되었다.
  배포 자동화로 GitHub Actions 기반 Release Drafter가 안정화되어 자동 릴리즈 노트가 생성되기 시작했다.
