summary: |
  2024년 1분기에 Organize 제품의 초기 컨셉과 형상을 구체화하는 논의가 활발히 이루어졌다. Organize는 Answer에 넣기 어려운 문서(표, 이미지, 대용량 데이터 등)를 AI ETL로 정제하여 Answer가 이해할 수 있는 형태로 가공해주는 솔루션으로 정의되었다.
  김혜원, 한시형을 중심으로 ETL/ELT 리서치, Watson Explorer 등 경쟁 제품 분석, data lake 참고 자료 조사가 진행되었으며, 부산교통공사 고장이력 엑셀 데이터 인식 테스트 요청이 첫 실제 사용 사례로 등장했다. 표(마크다운 변환), 도표, 이미지 등의 전처리 스코프가 정의되었고, 표와 이미지를 임베딩 모델이 이해할 수 있는 형태로 변환하는 방향이 결정되었다.
topics:
  - Organize 제품 컨셉 정의
  - AI ETL 솔루션 형상 구체화
  - 표/이미지/도표 전처리 스코프
  - 경쟁 제품 분석 (Watson Explorer, Scale AI 등)
  - ETL vs ELT 리서치
  - 부산교통공사 엑셀 데이터 테스트
