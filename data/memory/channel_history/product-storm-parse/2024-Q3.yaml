summary: |
  2024년 3분기에 Organize의 Vision 모델 기반 변환 파이프라인이 집중적으로 테스트되었다. Gemini Flash, Claude Sonnet, Gemini Flash Pro 등 여러 모델을 비교 테스트한 결과, 비용 대비 성능 차이가 크지 않아 SaaS 모델은 Flash로 확정되었다.
  세민님의 Streamlit 기반 Organize 데모가 제작되었고, 프롬프트 튜닝을 통한 표 인식 개선이 시도되었다. 워크샵을 통해 표를 자연어로 풀어내는 방향이 최종 결정되었으며, export 형식을 md에서 pdf로 변경하기로 했다. Qwen2 VL 72B 모델 배포 테스트도 진행되었고, unstructured.io의 이미지/테이블 추출 기능 활용 가능성도 검토되었다.
topics:
  - Gemini Flash vs Sonnet vs Flash Pro 성능/비용 비교
  - 표 → 자연어 변환 프롬프트 테스트
  - Organize 워크샵 (변환 방식 확정)
  - Streamlit 데모 제작 및 테스트
  - Qwen2 VL 72B 배포 테스트
  - unstructured.io 이미지/테이블 추출 검토
  - 파일 확장자 지원 범위 논의
