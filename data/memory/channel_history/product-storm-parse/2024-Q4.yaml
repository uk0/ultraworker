summary: |
  2024년 4분기에 Organize가 'Document AI'를 거쳐 최종적으로 'Storm Parse'로 브랜딩이 확정되었다. Document AI 데모 웹사이트가 제작/배포되었고(현우 프론트엔드 개발, 세민 서버 개발), load test를 통해 안정성이 검증되었다. 50건 동시 요청 시 100% 성공률을 달성했다.
  Figma 기반 UI 디자인이 진행되었고, unstructured.io와의 비교 기능, 일본어/영어 다국어 지원, Vercel Web Analytics 적용이 논의되었다. Storm Parse API가 dev 환경에 배포되었고, 캐리어(Carrier) 기반 아키텍처로의 이관이 시작되었다. Vertex AI 쿼타를 분당 1200개에서 400만개로 대폭 증량받았으며, LlamaParse 호환 API 구성 아이디어도 제안되었다.
topics:
  - Document AI → Storm Parse 브랜딩 확정
  - 데모 웹사이트 제작 및 배포
  - Load Test (50건 100% 성공)
  - Storm Parse API dev 배포
  - 캐리어 이관 논의
  - Vertex AI 쿼타 증량 (분당 400만건)
  - 다국어 지원 (일본어/영어)
  - 마켓팅 및 외부 공개 전략
  - LlamaParse 호환 API 아이디어
