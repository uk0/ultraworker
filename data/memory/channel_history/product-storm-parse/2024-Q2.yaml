summary: |
  2024년 2분기에 Organize v1의 구체적인 형상이 피그마 기획으로 정리되었고, Vision LLM을 활용한 표/이미지 변환 테스트가 본격화되었다. 표를 마크다운으로 변환한 뒤 자연어로 재변환하는 2단계 파이프라인이 수립되었으며, 라마 파서를 활용한 버전 개발이 결정되었다.
  정세민(Sem)이 VisionLLM 기반 Organize 테스트를 수행하여 그래프/표 재구성 가능성을 확인했으나, GPT-4V/Claude 수준에서는 안정적 사용이 어려운 것으로 평가되었다. ClovaOCR의 높은 성능도 확인되었다. Organize v1 토글을 Answer 내부 계정에 넣는 개발이 결정되었고, 스타게이트 연동이 필수적인 것으로 파악되었다.
topics:
  - Organize v1 화면 기획 (피그마)
  - VisionLLM 기반 표/이미지 변환 테스트
  - 마크다운 표 → 자연어 변환 프롬프트
  - 라마 파서 활용 개발 결정
  - Answer 연동 토글 개발
  - 비용 분석 (장당 비용)
