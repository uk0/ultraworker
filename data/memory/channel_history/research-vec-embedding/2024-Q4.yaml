summary: |
  2024-Q4 research-vec-embedding 채널에서는 한국어 임베딩 모델 성능 개선을 위한 Hard Negative Mining(HNM) 실험이 집중적으로 진행되었다. BM25+Dense Retrieval 결합 HNM, kowiki-tq 데이터셋 활용, EXAONE 기반 LLM2Vec 실험이 주요 활동이었으며, NV-Retriever·Jina Embeddings V3·Qwen2 등 최신 임베딩 모델 리뷰도 병행되었다. 연말에는 percpos-hnm 방식이 bge-m3 베이스 대비 NDCG 기준 약 3% 향상을 달성하였다.
