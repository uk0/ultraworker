terminology:
  - term: "HNM(Hard Negative Mining)"
    definition: "임베딩 학습 시 모델이 구분하기 어려운 유사 문서를 네거티브 샘플로 선택하는 데이터 구성 기법"
  - term: "percpos-hnm"
    definition: "Positive 샘플의 유사도 점수 분포를 기반으로 Hard Negative를 선택하는 HNM 변형 방식"
  - term: "kowiki-tq"
    definition: "한국어 위키피디아 기반 질의응답 데이터셋(sionic-ai/kowiki-tq). 임베딩 HNM 실험에 활용"
  - term: "LLM2Vec"
    definition: "사전학습된 LLM을 양방향 attention 구조로 변환하여 임베딩 모델로 활용하는 방법론"
  - term: "bge-m3"
    definition: "BAAI에서 공개한 다국어 다기능 임베딩 모델. 한국어 임베딩 실험의 기준 모델로 활용"
