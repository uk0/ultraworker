terminology:
  - term: "Hard Negative Mining(HNM)"
    definition: "임베딩 학습 시 모델이 구분하기 어려운 고품질 네거티브 샘플을 선별하는 데이터 구성 기법"
  - term: "ColBERT / Late Interaction"
    definition: "문서의 모든 토큰 벡터를 저장하고 MaxSim 연산으로 정밀 매칭하는 다중 벡터 검색 방식"
  - term: "Matryoshka Embedding"
    definition: "고정 차원 대신 다양한 축소 차원에서 동일하게 동작하는 임베딩 학습 기법으로 저장 비용 절감"
  - term: "ViDoRE"
    definition: "시각적 문서 임베딩 성능을 평가하는 멀티모달 벤치마크 데이터셋"
  - term: "SERVAL"
    definition: "VLM으로 문서 이미지를 설명 텍스트로 변환 후 텍스트 임베딩으로 검색하는 Zero-shot 방식 (Storm Parse 논문)"
