summary: |
  2025-Q4 research-vec-embedding 채널에서는 최신 임베딩 논문 리뷰와 멀티모달·ColBERT 계열 모델 실험이 활발히 논의되었다. Hard Negative Mining 개선(SyNeg, SimANS), 위치 편향 해결(position bias), 평균 편향 보정(mean bias), Late Interaction(ColBERT/ColQwen), 멀티모달 임베딩과 Storm Parse 비교 실험 등이 주요 주제였다. KaKao Kanana, Voyage 3, Google EmbeddingGemma, LiquidAI LFM2-ColBERT 등 신규 모델 공유도 이루어졌다.
