terminology:
  - term: "percpos-hnm"
    definition: "Positive 샘플의 유사도 점수 분포 기반 Hard Negative 선택 방식. bge-m3 대비 NDCG 약 3% 향상"
  - term: "LENS 8000"
    definition: "SPLADE 계열 어휘 임베딩 모델로 k=8000 어휘 차원에서 MTEB 3위를 기록한 모델"
  - term: "Late CLS Chunking"
    definition: "문서를 모델 레이어 중간에서 청킹하여 앞선 레이어의 컨텍스트를 청크에 반영하는 임베딩 기법"
  - term: "Kanana"
    definition: "카카오코퍼레이션이 공개한 한국어 특화 임베딩 모델(kanana-nano-2.1b-embedding)"
  - term: "LLM2Vec"
    definition: "사전학습된 LLM을 양방향 attention 구조로 변환하여 임베딩 모델로 활용하는 방법론"
