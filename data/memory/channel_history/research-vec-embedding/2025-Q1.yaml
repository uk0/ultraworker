summary: |
  2025-Q1 research-vec-embedding 채널에서는 percpos-hnm 방식의 HNM 실험 성과를 이어 받아 한국어 금융 임베딩, 평가 데이터셋 구축, 청킹 전략 평가, LLM 리랭킹 등 폭넓은 연구가 진행되었다. 1월에는 EXAONE 기반 LLM2Vec 시도와 LENS 8000(Splade 계열 어휘 임베딩), Nomic MoE 임베딩 모델이 공유되었고, 2~3월에는 내부 평가 데이터셋 제작, Late CLS Chunking 실험, Kanana 임베딩 공개 등이 이루어졌다.
