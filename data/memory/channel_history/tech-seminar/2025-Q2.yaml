summary: |
  2025년 2분기 tech-seminar 채널은 AI 에이전트 및 도구 생태계에 대한 관심이 집중된 분기였다. OpenManus, MCP(Model Context Protocol), Claude Code 등 에이전틱 AI 프레임워크 소개가 주요 주제로 다루어졌으며, LightRAG와 hiRAG 등 고급 RAG 기법도 발표되었다. 일본 출장 후 기술 트렌드 공유, pylon 청킹 알고리즘 개선 소개, supply 인덱서 아키텍처 발표도 이루어졌다. 11명의 팀원이 활발하게 참여하여 최신 AI 기술 트렌드를 내재화하였다.
