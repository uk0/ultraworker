summary: |
  2025년 3분기 product-bug-report 채널은 STORM 플랫폼의 워크플로우, RAG 노드, 에이전트 관리 등 다양한 기능 이슈가 지속적으로 제보되었다. 주요 이슈로는 오더시트 저장 불가, if/else 노드 오동작, 피드백 삭제 불가, 워크플로우 삭제 시 흰화면 전환, 리랭커 top-k 설정 오동작 등이 있었다. 특히 PoC 고객사 계정에서 에이전트 JSON 저장 불가 이슈가 장기간 이슈로 다루어졌으며, 13명이 활발하게 버그를 제보하고 논의하였다.
