summary: |
  2026-Q1 product-bug-report channel recorded 77 bug reports with 1,315 replies across 76 threads,
  involving 30 active participants. The dominant bug categories were workflow designer UI issues
  (node editing, canvas zoom, connection drawing, save button activation), API node defects
  (header persistence, JSON editor save failures), search/retrieval failures, revision/version
  management problems, and token usage dashboard display bugs. Notable high-impact incidents
  included a 222-reply thread on search functionality being completely broken (Jan 26), a 59-reply
  thread on token usage dashboard not displaying (Feb 9), and a 53-reply thread on Japan team
  partner invitation links not working (Jan 21). Bug reporters were primarily from product/QA
  (Kim Hyewon, Kim Bugyo/Bekay, Park Sangwook) with contributions from Japan team (Kataoka,
  Watanabe Masashi) and field engineers (s.baek, Won Sungjun). The quarter saw recurring themes
  around workflow designer stability after a major refactoring, and several regressions introduced
  by the checklist feature development.
