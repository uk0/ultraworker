summary: |
  2025년 4분기 product-bug-report 채널은 STORM 플랫폼의 워크플로우, 에이전트, RAG 노드 등 다양한 기능에 걸친 버그 제보가 활발히 이루어졌다. 주요 이슈로는 워크플로우 저장 불가, if/else 노드 오동작, 오더시트 관련 버그, 출처 청크 미표시, 라이브 환경 전체 워크플로우 오류 등 심각도 높은 장애들이 포함되었다. HWP 파일 파싱 실패, 스톰파스 변환 오류, API 노드 POST 요청 불가 등 다양한 기능 영역에서 이슈가 확인되었으며, 21명의 팀원이 적극적으로 버그를 제보하고 대응하였다.
