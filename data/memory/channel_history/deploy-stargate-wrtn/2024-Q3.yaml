summary: |
  자동화된 배포 채널. 2024-Q3에 채널이 처음 개설되어 stargate-wrtn 서비스의 dev 및 live 환경 배포가 집중적으로 이루어졌다. /sionic-deploy 및 /deploy 슬래시 커맨드를 통해 onprem과 EKS 클러스터에 대한 빌드·배포 작업이 반복 실행되었으며, 8월에는 EKS Deploy 자동화 통합이 추가되었다.
  live 환경 배포 실패(DEPLOY Failed) 이력도 기록되었으며, GoCD 파이프라인을 통한 CI/CD 체계가 구축되었다.
