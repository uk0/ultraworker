summary: |
  2025-Q1에는 OCI(Oracle Cloud) 이관이 최대 화제로, EKS에서 OCI로의 인프라 마이그레이션이 성공적으로 완료되었다.
  IBK 프로젝트 납품/테스트가 집중적으로 진행되었으며, 코드 프리징, 반입 버전 관리, 온프렘 배포 등 엔터프라이즈 딜리버리 프로세스가 체계화되었다.
  Vercel 리전 서울 추가 최적화, ApiDog 환경변수 변경, 난독화 처리, 온보딩 문서 정비 등 개발 환경 개선이 이루어졌다.
  n8n 워크플로우 도구 발견, 깃헙 빌링 정리, 스톰 아키텍처 v2503 갱신 등 인프라/도구 고도화도 진행되었다.
