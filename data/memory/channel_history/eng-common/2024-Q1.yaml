summary: >
  2024년 1분기는 사이오닉 엔지니어링팀의 인프라 대전환기였다. GKE에서 EKS로의 인프라 이관이 본격적으로
  추진되었으며, Terraform 기반 IaC 도입이 시작되었다. 프로덕트 스펙/테크 스펙 작성 문화가 도입되어
  개발 프로세스가 체계화되기 시작했고, 프로덕트 위클리 미팅이 정기적으로 운영되기 시작했다.
  Linear로의 프로젝트 관리 도구 이전, PR 리뷰 컨벤션 수립, 배포 프로세스 정비 등 개발 문화
  전반에 걸친 개선이 이루어졌다. 알리바바 클라우드, Azure, MS Founders Hub 등
  멀티 클라우드 전략이 활발히 논의되었으며, GPU 인프라 관리와 사내 네트워크 고도화(100G 포설)도
  진행되었다. Storm Enterprise 아키텍처 초안이 논의되었고, 스프린트 체제로의 전환이 시작되었다.
topics:
  - name: "인프라 이관 (GKE -> EKS)"
    count: 35
    summary: "GKE에서 EKS로의 대규모 인프라 이관 작업. Terraform 기반 EKS 구축, Stargate/Pylon staging 및 live 이관, Qdrant 스냅샷 테스트, ECR 이미지 풀 테스트 등이 진행됨."
  - name: "개발 프로세스 정비"
    count: 30
    summary: "프로덕트 스펙/테크 스펙 도입, PR 리뷰 컨벤션 수립(3인 리뷰/2인 승인), 배포 체크리스트 작성, 스프린트 체제 전환, Linear 이관 등 개발 문화 체계화."
  - name: "프로덕트 위클리 운영"
    count: 15
    summary: "매주 월요일 프로덕트 위클리 미팅이 정기적으로 운영되기 시작. 기획/개발 태스크 분배, 배포 일정 싱크 등을 논의."
  - name: "클라우드 비용 및 멀티클라우드"
    count: 12
    summary: "알리바바 클라우드 네트워크 비용 최적화(Pay-By-Traffic 전환), MS Founders Hub 스타트업 프로그램 승인, OpenAI 한도 500->1000$ 증설, Runpod 팀 관리."
  - name: "GPU/하드웨어 인프라"
    count: 10
    summary: "A100 GPU 드라이버 이슈, NVIDIA 클린설치 스크립트 공유, 100G 사내 네트워크 포설 완료, 서버실 장비 정리, MinIO/Harbor NAS 세팅."
  - name: "장애 대응 및 회고"
    count: 8
    summary: "작심 라이브 URL 변경 후 카카오톡 대화 불가 장애. DB migration 히스토리 관리 필요성 인식, API/DB 하위호환성 유지 원칙 수립."
