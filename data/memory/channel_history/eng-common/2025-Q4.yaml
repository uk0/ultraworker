summary: |
  2025-Q4에는 신 배포 시스템(/sionic-deploy-new)이 공식 도입되어 Slack 기반 빌드/배포/모니터링 워크플로우가 완성되었다.
  OpenTelemetry 트레이싱이 본격 적용되어 Grafana(Tempo/Loki) 기반 분산 추적 체계가 구축되었으며, NewRelic 탈출이 추진되었다.
  12월에 라이브 DB UPDATE 쿼리 사고로 전 계정 이메일 일괄 변경 장애가 발생해 수동 복구가 이루어졌고, Carrier 버전 착각으로 인한 라이브 장애도 발생하여 장애 리포트 체계가 강화되었다.
  일본 리전(jp-oci) 서비스 배포 준비, Qdrant 버전업/VDB 마이그레이션, Stripe 결제 연동, Vercel 장애 대응, 린커피(Lean Coffee) 도입 등 인프라/문화 양면에서 큰 변화가 있었다.
topics:
  - 신 배포 시스템 (sionic-deploy-new)
