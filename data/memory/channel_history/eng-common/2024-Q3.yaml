summary: |
  2024-Q3에는 NewRelic 모니터링 강화와 서비스 status check 자동화가 핵심 과제였다.
  GoCD 배포 파이프라인의 이미지 태깅 개선, sglang/vllm 기반 LLM 서빙 비교, istio 레벨 task-id 발급 등 인프라 고도화가 진행되었다.
  USIO 문서 파서 개선, 웹훅 retry 이슈 해결, Stargate 엔티티/레포지토리 리팩토링 등 제품 안정성 향상 작업이 활발했다.
  Claude Enterprise 도입 검토, 인프런 강의 구매, 헬스체크봇 구상 등 개발 생산성과 팀 역량 강화 논의도 이루어졌다.
