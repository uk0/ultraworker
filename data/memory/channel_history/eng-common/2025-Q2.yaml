summary: |
  2025-Q2에는 IBK 부하테스트와 QA존 구축이 핵심 과제였으며, 분산 추적(OpenTelemetry) 도입이 본격화되었다.
  Zitadel(ID Provider) 셋업, 모니터링 채널 재편(status-→alarm-), Dragoon 문서 파서 테스트, Supply 개선 등 인프라와 제품 양면에서 대규모 작업이 진행되었다.
  브랜치 네이밍 컨벤션, API Key 관리 체계화, Carrier 413 에러 해결 등 개발 프로세스 표준화도 이루어졌다.
  주차별 열차(배포 사이클) 운영이 정착되어 체계적인 릴리스 관리가 진행되고 있다.
