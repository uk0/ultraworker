summary: |
  2024-Q2에는 LLM MSP/라우팅 제품 구상, on-prem Qdrant DB 클러스터 구축, Vault(KMS) EKS 이전 등 인프라 고도화가 주요 화제였다.
  Deploy Bot 개선으로 이미지 배포 시간을 최대 97% 단축하였고, OpenGateway 랜딩페이지를 런칭하였다.
  개발 문화 킥오프, 문서화 도입, TypeORM→Prisma 마이그레이션 등 엔지니어링 프로세스 개선 논의가 활발했다.
  OpenAI API Key를 Project Key 방식으로 전환하고, Copilot 구매, AWS RDS 성능 개선 도우미 도입 등 개발 생산성 향상 작업도 진행되었다.
