summary: |
  2025-Q2 random 채널은 분기 중 가장 활발한 활동(1116개 메시지)을 보였다.
  만우절 슬랙 프로필 장난(심슨 캐릭터 변경), 헌법재판소 탄핵 선고 속보 공유 등 사회적 이벤트가 화제였다.
  AI 업계에서는 Llama 4 출시, GPT-4.1/o3/o4-mini 발표, Claude 4 발표 등 굵직한 모델 릴리스가 연이어 있었다.
  일본 IT Week 출장(진형/우명/승희), Nvidia 해커톤 참가, Sprint Camp 컨퍼런스 참석 등 대외 활동이 활발했다.
  회사 성장 관련으로는 창립 2주년 기념, 블로그 트래픽 10만 돌파, 투자자 미팅 증가 등이 공유되었고,
  SKT 해킹 사건 관련 보안 논의, NewRelic 파트너십 영상 촬영도 있었다.
  신규 입사자(성우/부교/효주/기연/승현) 온보딩이 다수 진행되었으며, 병현의 치앙마이 워케이션 후기,
  제주 워크샵 기획 논의, 병특(병역특례) 실사 등 구성원 관련 이벤트도 풍성했다.
