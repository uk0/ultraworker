summary: |
  2024년 3분기 random 채널은 회사의 대외 활동과 언론 노출이 크게 늘어난 시기였다.
  사이오닉에이아이 관련 기사가 네이버 메인에 노출되었고, 뤼튼과의 MOU 체결, 디캠프 협력 등이 진행되었다.
  OpenAI o1 모델 출시, Meta Llama 3.2 출시 등 AI 업계 주요 뉴스가 활발히 공유되었다.
  토스 SlashDay 24 컨퍼런스 참석(온프렘 인프라 유사점 발견), Upstage 글로벌 AI 해커톤 멘토 참여,
  알리바바 APSARA 2024 컨퍼런스 출장, 발표 데이 등 대외 활동이 활발했다.
  팀원 1주년 기념(진형 입사 1년: 1623회 배포, 하루 평균 5회 / 영숙님 1주년),
  해솔이 100일 축하, 시형님 생일 등 팀 마일스톤이 다수 있었다.
  폴 그레이엄의 'Founder Mode' 글 공유로 창업자 리더십에 대한 논의가 있었고,
  고객 정적 데이터(엑셀/CSV) SQL 변환 POC, 디노티시아 벡터 DB 국책과제 수주 등 기술 트렌드도 공유되었다.
  추석 선물 배송, 오라클 와인 선물, 알리바바 기념품 나눔 등 시즌 이벤트가 있었다.
