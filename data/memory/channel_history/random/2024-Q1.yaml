summary: |
  2024년 1분기 random 채널은 회사의 중요한 이정표인 시드 라운드 투자 유치(55억 원, 한국투자파트너스·IMM·삼성벤처투자·힐스프링 참여)가 핵심 이슈였다.
  사무실 인프라 정비(WiFi AP 추가, 유선전화 설치, 제빙기·정수기 관리), 사원증 케이스 배포 등 오피스 환경 개선이 진행되었다.
  기술 트렌드로는 RAG 2.0(Contextual AI), GPT Vision, Claude, Sora(OpenAI 영상 생성), GDDR7, 뤼튼 Studio 등이 공유되었고,
  데이터 구축 전략과 홈페이지 데이터 페이지 기획에 대한 심도 있는 논의가 있었다.
  팀 문화로는 번개 곱창 모임, 플레이샵 수요 조사, 생일 축하, 간식 나눔 등 활발한 소통이 이루어졌다.
  외부 활동으로는 글로벌 SaaS 육성 프로젝트(GSIP) 지원 검토, 일본 IT 전시회 정보, AI HUB 데이터 관련 이슈 등이 공유되었다.
