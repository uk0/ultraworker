summary: |
  2025-Q3 random 채널은 여름 시즌 특유의 활발한 오프라인 활동이 두드러졌다.
  최대 이벤트는 제주 플레이샵(워크샵, 8/22~8/27)으로, 해커톤, 타운홀, 스노클링, 한라산 등반 등 다양한 프로그램이 진행되었다.
  AI 업계에서는 GPT-5 출시(8/7), GPT-5 Pro 등장, OpenAI 오픈웨이트 모델(gpt-oss-120b) 공개,
  Claude Haiku 4.5 발표, Claude Sonnet 4.5 발표 등 대형 모델 릴리스가 집중되었다.
  사이오닉AI 모델 명명 투표(storm-{단어}-{크기}-{modality} 형식 1안 채택, 예: storm-pepper-32B-vl)가 진행되었고,
  storm-cookbook GitHub 레포 공개, GMT 산학협력 최종보고, Sionic AI 유럽 상표 등록, Open Gateway 미국 상표 등록 등
  비즈니스 마일스톤이 달성되었다. 미타 빌딩 매각(518억) 소식, IBK 프로젝트 관련 논의,
  Claude Code 도입 및 활용 논의, 팔란티어 Dev Tier 웨비나 참석, 진형의 입사 2주년 등도 공유되었다.
  성우 훈련소 입소(3주), 호진 송별회, 달파(Dalfa) AI 경쟁사 분석, Cohere 투자 소식 등도 화제였다.
