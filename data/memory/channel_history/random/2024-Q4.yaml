summary: |
  2024년 4분기 random 채널은 연말 분위기와 함께 AI 업계 굵직한 뉴스가 집중된 시기였다.
  Google Gemini 2.0 출시, ChatGPT Apple Intelligence 통합, CES 2025 준비 등 주요 기술 이벤트가 있었다.
  Claude 3.5 Sonnet 성능 저하 이슈가 논의되었고(GPT4→Turbo3.5 수준으로 떨어졌다는 체감),
  새 팀원(이강욱 등) 합류, 프로덕트팀 연말 회고(Figma 보드 활용), 크리스마스 파티가 진행되었다.
  뤼튼 Studio Pro 액션 에이전트, vessel AI dify builder 등 경쟁사/파트너 동향이 공유되었고,
  Storm Parse 개발 관련 나비효과 스토리(AXA parsr→llamaparse→진형 레시피→세민 storm parse)가 화제였다.
  사무실 생활로는 난방 이슈, 캐롤 BGM, 붕어빵 탐방, 슈톨렌 나눔, 산타 입간판 등 연말 분위기가 가득했다.
  24년 연간 요약이 공유되었고, 새해 인사·수학적 2025 표현 등으로 한 해를 마무리했다.
  고향사랑 기부제 세액공제 정보, Deel(글로벌 급여 서비스), JetBrains 오프라인 AI 플러그인 등 실용 정보도 공유되었다.
