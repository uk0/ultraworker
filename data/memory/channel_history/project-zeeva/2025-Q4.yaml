summary: |
  2025년 4분기 project-zeeva 채널은 ZeeVaa(일본 기업 OKI/ZVC) PoC 프로젝트를 위한 협업 채널로 운영되었다.
  10월에 채널이 개설되었으며, Sionic AI의 voiceRAG-go 기반 음성 AI 에이전트를 Genesys Cloud 콜센터 시스템에 연동하는 PoC를 11월 12일 CC CRM 이벤트(CIC Tokyo)에서 시연하는 것을 목표로 하였다.
  STT-RAG-TTS 파이프라인의 지연 시간 개선, WebSocket 연결 프로토콜, 항공권 예약 조회 시나리오 설계 등이 논의되었으며, 일본어 지원 및 현장 시연이 성공적으로 진행되었다.
  12월에는 OKI와 ZVC로부터 2026년 2월~12월 엔지니어링 비용 견적 요청이 접수되어 본격적인 사업화 논의가 시작되었다.
