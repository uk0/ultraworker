summary: |
  2024년 CES 참가를 위한 Storm 데모 개발이 집중적으로 진행된 분기이다. 정세민(Sem)이 CES 데모 기획을 주도하고, Dalpha 레퍼런스를 활용하여 회사 홈페이지 URL을 입력하면 해당 기업에 맞는 사이오닉 AI 솔루션을 추천하는 데모를 제작하기로 결정하였다. hyunwoo가 프론트엔드 마크업 및 Figma 디자인을 담당하고, 정세민이 CES-DEMO-API 백엔드를 구축하였다. 김혜원과 최윤정이 유즈케이스 맵핑 작업을 수행하였으며, ces.sionic.ai 도메인으로 배포를 완료하였다. 주요 이슈로 co.kr 도메인 URL의 솔루션 로딩 실패와 Vercel 프리뷰에서의 502 에러가 있었다.
