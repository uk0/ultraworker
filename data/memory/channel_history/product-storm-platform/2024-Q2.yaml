summary: |
  플랫폼 설계 본격화 단계. VESSL AI 참고, 클라우드 환경 설정값 리스팅, Figma 기획 시작 등 구체적 설계 진행.
  핵심 결정으로 "올인원 플랫폼 포기, Answer 내에서 자유도 제공" 방향 확정. 김혜원이 전체 기능 리스팅 및 우선순위 매기기 완료.
  이미지 생성/변환 도구 초벌 디자인. Flowise 리서치 공유 후 Storm + Flowise(알맹이) 결합 방안 논의.
  Langflow는 운영안정성 문제로 탈락, Flowise 채택. dify.ai도 리서치하여 라이트한 플랫폼 방향 참고.
  Pylon 분리 계획 수립(Open LLM 교체 -> 프롬프팅 분리 -> RAG만 남김 -> 오케스트레이션 개발).
  Carrier 모듈 별도 분리 결정(명하님 선장).
