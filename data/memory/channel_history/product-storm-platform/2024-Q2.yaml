terminology:
  - term: Flowise
    definition: 오픈소스 LLM 워크플로우 빌더. Storm Platform의 알맹이(워크플로우 엔진)로 채택됨.
  - term: Langflow
    definition: 오픈소스 LLM 파이프라인 빌더. 운영안정성 문제로 채택 안됨.
  - term: dify.ai
    definition: 경량 LLM 앱 빌더 플랫폼. 라이트한 버전의 플랫폼 방향 참고 자료로 리서치됨.
  - term: VESSL AI
    definition: MLOps 플랫폼. 플랫폼 설계 시 참고 자료로 공유됨.
  - term: Pylon (파일론)
    definition: RAG 엔진 서버. LLM 호출, 프롬프팅, RAG, 파싱 기능을 모두 담고 있어 단계적 분리 계획 수립.
    aliases:
      - 파일론
  - term: Carrier (캐리어)
    definition: 주문서 기반 워크플로우 실행 엔진. Stargate와 별도로 분리하기로 결정.
    aliases:
      - 캐리어
  - term: 마크스폰
    definition: 고객사. Flowise 검증 케이스로 활용.
  - term: 한국자산평가
    definition: 고객사. Flowise 검증 케이스로 활용.
