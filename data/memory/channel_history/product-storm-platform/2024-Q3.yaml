terminology:
  - term: Stargate (스게)
    definition: Storm의 웹 프론트엔드/API 서버. 계정/팀/권한, 로깅, 빌링, 주문서 만들기, deploy 담당.
    aliases:
      - 스게
      - 스타게이트
  - term: Carrier (캐리어)
    definition: 주문서 기반 워크플로우 실행 엔진. 코틀린/스프링으로 개발. Stargate에서 주문서를 받아 구동.
    aliases:
      - 캐리어
  - term: Order Sheet (주문서)
    definition: 에이전트 실행 워크플로우를 정의하는 문서. YAML/JSON 포맷. 템플릿 변수는 {{변수명}} 형식.
    aliases:
      - 오더시트
  - term: Open LLM
    definition: LLM 호출 통합 모듈. Pylon이 호출하던 모든 LLM(하클, 클로드 등)을 대응.
  - term: storm/llm
    definition: Carrier 노드 타입 중 하나. LLM 호출을 담당하는 노드.
  - term: storm/rag
    definition: Carrier 노드 타입 중 하나. RAG(검색 증강 생성)를 담당하는 노드.
  - term: import_properties
    definition: 이전 노드의 출력을 현재 노드의 입력으로 가져오는 속성.
  - term: export_properties
    definition: 현재 노드의 출력을 다음 노드로 전달하는 속성.
  - term: sequence_body
    definition: Stargate가 Carrier에 전송하는 실행 요청 본문. 스트림 여부 등 포함.
  - term: ComfyUI
    description: 이미지 생성 AI 워크플로우 도구. Order sheet 제작 가능성 검토됨.
  - term: 띵스플로우
    definition: 고객사. 프롬프트에 API 변수값 삽입 기능을 요청.
    aliases:
      - ThingsFlow
