summary: |
  Carrier MVP 개발 및 연동이 본격 진행된 가장 활발한 분기. 모듈 역할 분담(Stargate: 계정/팀/권한/로깅/빌링/주문서/deploy,
  Carrier: 주문서 받아 구동, 문서 업로드 모듈: 파일론에서 분리)이 확정됨.
  김덕현(Dekay)이 Carrier MVP 테크스펙을 Notion에 작성하고 공유. swkim0512(수원)이 Carrier 개발을 담당하며
  코틀린/스프링 베이스라인으로 구축. 주문서(Order Sheet) 포맷을 YAML/JSON으로 정의하고 여러 차례 수정/개선.
  storm/llm, storm/rag 노드 타입의 import/export properties 설계가 반복적으로 논의됨.
  김혜원이 Carrier QA를 집중적으로 진행하며 다수 이슈 발견: 에러 코드 정의(RAG, Open LLM), 로그 파일 저장/조회,
  Task ID + Node ID 헤더 추가, 간헐적 커넥션 끊김, Stream 처리 이슈(SSE vs callback 방식) 등.
  Carrier-Stargate 연동 시 스트림 응답 타입 문제가 주요 기술 이슈로 부상.
  2024-09-12 스게 라이브 배포 완료. Pylon v2 경로 변경 대응도 진행.
  띵스플로우 비즈 요청으로 프롬프트에 API 변수값 삽입 기능 필요성이 제기되었으나 후순위로 판단.
