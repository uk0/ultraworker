summary: |
  2025년 Q1에는 Stargate의 보안/인증 강화 및 회원 시스템 이관, 전사 공통 에러 체계 설계가
  주요 테마였다. Stargate 측에서는 민감 정보 감지(Phase 1, Phase 2 전수검사), Onprem
  Master Key 인증방식 추가, 출처 하이라이팅, 회원 로직 이관 Phase 1, 에이전트 템플릿,
  프론트엔드 모니터링 도입 PoC 등의 스펙이 공유되었다. 전사 차원에서는 공통 에러 객체 설계
  스펙이 120개 답글로 가장 활발한 논의를 이끌었으며, MSA 환경에서의 장애 전파 관리 방안이
  제안되었다. Pylon에서는 임베딩 모델 에이전트별 훈련/교체 스펙과 IBK On-Prem 환경에서의
  Upstage 모델 지원 방안이 논의되었다. TA(Tenant Administration) 프로젝트에서 회원가입
  성공 슬랙 발송 등 notification 설계도 시작되었다. 리뷰 봇 테스트도 계속 이루어졌다.
