summary: |
  2024-Q3 noti-spec-review 채널은 검색 인프라 고도화와 Pylon 리팩토링이 집중적으로 리뷰된 분기였다. Redis 캐싱
  도입, Reranker Recipe 설계, Hybrid Search(벡터+키워드 결합) 아키텍처, QSPM Proxy/Pool 설계, BM25 Lexical
  Search 도입 등 검색 품질 향상을 위한 다수의 테크스펙이 제출되었다. 에러 코드 체계 정의, Qdrant Collection
  Topology 재설계, Chunk Padding 전략도 리뷰되었다. 특히 Pylon 코드베이스의 DI(Dependency Injection) 패턴
  적용을 포함한 대규모 리팩토링 테크스펙이 여러 건 리뷰되어, 시스템 아키텍처 개선에 대한 팀의 의지가 드러났다.
  9명 참여, 39개 스레드로 분기 중 가장 활발한 리뷰 활동을 보였다.
