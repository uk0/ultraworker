terminology:
  - term: Reranker Recipe
    definition: 검색 결과를 재정렬하는 모델의 설정 및 파이프라인 구성 방법
    aliases: []
    context: 검색 정확도 향상을 위한 Reranker 모델 적용 전략
  - term: Hybrid Search
    definition: 벡터 검색(semantic)과 키워드 검색(lexical)을 결합한 검색 방식
    aliases: []
    context: 단일 검색 방식의 한계를 극복하기 위한 아키텍처 설계
  - term: QSPM
    definition: Qdrant Shard Proxy Manager. Qdrant 벡터DB의 샤드 관리 프록시 시스템
    aliases: []
    context: 대규모 벡터 데이터 처리를 위한 프록시/풀 아키텍처 설계
  - term: BM25
    definition: 정보 검색에서 사용되는 대표적인 키워드 기반(lexical) 랭킹 알고리즘
    aliases:
      - Lexical Search
    context: Hybrid Search의 키워드 검색 컴포넌트로 도입
  - term: Chunk Padding
    definition: 문서를 청크로 분할할 때 인접 청크의 컨텍스트를 겹쳐서 포함하는 전략
    aliases: []
    context: RAG 검색 품질 향상을 위한 청킹 전략 개선
  - term: DI 패턴
    definition: Dependency Injection. 의존성 주입 디자인 패턴으로 코드의 테스트 가능성과 유연성을 높임
    aliases:
      - 의존성 주입
    context: Pylon 코드베이스 리팩토링에서 핵심 아키텍처 패턴으로 적용
