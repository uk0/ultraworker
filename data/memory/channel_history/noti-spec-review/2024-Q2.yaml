summary: |
  2024-Q2 noti-spec-review 채널에서는 배포 인프라, 데이터 이관, 보안 관련 테크스펙이 주로 리뷰되었다. Storm Deploy
  배포 스케줄 설계, Qdrant 데이터 이관 계획, 채널 연동 API 설계가 핵심 주제였다. On-premise Qdrant의 RPS 테스트
  결과가 공유되었고, Trust Score 시스템, HashiCorp Vault를 활용한 시크릿 관리, Stargate Write API, Open LLM
  프로젝트 등 보안과 인프라 확장 관련 스펙이 리뷰되었다. 참여자가 5명으로 줄었으나 리뷰의 전문성은 유지되었다.
