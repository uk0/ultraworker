summary: |
  2025년 Q2에는 Carrier 워크플로우 고도화, Pylon 검색/임베딩 확장, Stargate 운영 개선이
  주요 테마였다. Carrier 측에서는 Carrier Storm Parse 엑셀 파일 처리, E2E 테스트 코드
  작성, Supply 실시간 문서 캐시 업데이트, 오더시트 리팩토링, Carrier LLM 청크 판단 등의
  스펙이 공유되었다. Pylon에서는 Pylon Graph PoC 구현(한국아이센틱 요구사항), 부하테스트,
  Cohere Embed V4 vs V3 비교(결론: V4 이관 보류), IBK 청킹된 data 수신, enlarge size
  재지원, Reranker Supply 예외 처리 등이 다루어졌다. Stargate에서는 PDF 뷰어 성능 개선,
  버킷 삭제 기능 복구, Node Scheduler 기반 문서 등록 check job, stargate-api 설정 정보
  수정, 트렁크 기반 개발을 위한 피쳐 토글링, presigned URL 기반 문서 업로드 API 등이
  논의되었다. 프론트엔드에서 트렁크 기반 개발 전환이 결정된 시기이기도 하다.
