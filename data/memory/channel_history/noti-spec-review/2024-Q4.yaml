summary: |
  2024-Q4 noti-spec-review 채널에서는 서비스 안정화와 제품화 관련 테크스펙이 주로 리뷰되었다. Reranker 추상화 계층
  설계, PyMuPdfClient를 활용한 PDF 파싱, DocumentAI Demo 구축, 트라이얼/구독 과금 시스템 설계가 핵심 주제였다.
  Carrier 프로젝트에서 if/else 분기 노드 설계가 리뷰되었고, Storm Parser의 안정화 및 내재화 작업이 진행되었다.
  '리뷰 빠따' 봇이 도입되어 미리뷰 테크스펙에 대한 자동 리마인더가 시작되었다. 9명 참여, 18개 스레드.
