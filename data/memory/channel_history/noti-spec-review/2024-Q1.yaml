  - SSE 스트리밍 구현
  - 임베딩 서버(TEI) 개발 및 배포
  - Pylon Decomposition (서비스 분리)
  - i18n 다국어 지원
  - Advice 데이터 처리 구조 변경
  - 에러 메시지 스펙 통일
  - 테크스펙 리뷰 프로세스 수립
