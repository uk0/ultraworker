summary: |
  2024년 Q1에 noti-spec-review 채널이 신설되어 테크스펙 리뷰 프로세스가 본격적으로 시작되었다.
  채널 초기 세팅(워크플로 빌더 템플릿, 이모지 컨벤션 등)이 이루어졌으며, 주로 Pylon과 Stargate
  프로젝트의 핵심 아키텍처 변경에 대한 테크스펙이 집중적으로 공유되었다. Pylon 측에서는 RAG v1
  파이프라인 구축, vector DB 교체(Milvus→Qdrant), 파일 파싱 서버 도입, 임베딩 서버 개발,
  Pylon Decomposition(3개 서비스 분리), Streaming Answer API 등 기반 인프라 관련 스펙이
  대거 등록되었다. Stargate 측에서는 GCP Cloud Run에서 AWS ECS로의 인프라 전환(Terraform
  IaC 적용), SSE Connection 구현, i18n 다국어 지원, Advice 등록/수정, 에러 메시지 스펙 정의 등
  서비스 안정화 및 기능 확장 스펙이 공유되었다. 리뷰어 지정 및 리뷰 완료 이모지(:white_check_mark:,
  :loading:) 컨벤션이 확립되었다.
topics:
  - Pylon RAG 파이프라인 구축
