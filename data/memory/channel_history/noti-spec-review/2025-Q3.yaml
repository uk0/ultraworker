summary: |
  2025년 Q3에는 Storm APIs 플랫폼 구축, Carrier 고도화, 결제 시스템 도입이 주요 테마였다.
  Storm APIs 프로젝트에서 Phase 1 초기 개발 및 데모 교체, Storm APIs 연동 스펙이 등록되어
  새로운 API 플랫폼 구축이 시작되었다. Carrier에서는 변수 할당 노드 개발, 디버그 기능(노드별
  실행/에러 정보 구체화) 등 워크플로우 고도화 스펙이 공유되었다. Pylon에서는 Gemini
  Embedding 추가, 공용버킷 검색 로직 분리, 공용버킷 피드백 지원, 파일런 레시피 처리
  리팩토링(YAML 구조 개선) 등이 다루어졌다. 결제 인프라로는 토스페이먼츠 기반 결제 서버
  구축 스펙이 등록되었으며, 드라군 v2 API 명세가 160개 답글로 가장 활발한 논의를 이끌었다.
  이 시기에는 활동 참여자 수가 감소(2명)하였으나 개별 스레드의 토론 깊이는 유지되었다.
