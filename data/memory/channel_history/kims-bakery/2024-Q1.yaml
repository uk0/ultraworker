summary: |
  2024년 1분기에 kozistr833님이 채널을 개설하였다. 채널명이 bon-up-ha-neun-got에서 kims-bakery로 변경되었다.
  채널 설명은 "모델 굽는 곳"으로, 현업에서 모델 학습이 마치 베이킹과 같다는 비유에서 유래하였다.
  이스트 1g, 습도/온도 1도 차이로 결과가 달라지는 것처럼 모델 학습의 민감성과 신비함을 표현하였다.
