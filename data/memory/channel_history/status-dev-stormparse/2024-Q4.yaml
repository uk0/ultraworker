summary: |
  2024년 4분기 StormParse 상태 모니터링 채널이 12월 초 개설되어 Sionic Monitoring 봇이 연동되었으며, 이후 Probe Alert가 대량으로 발생하였다.
  특히 12월 18~19일에 단 시간 내 수백 건의 Probe Alert가 집중 발생하는 이상 현상이 관측되었고, 팀원이 이를 확인하는 이모지 반응을 남겼다.
  하루 평균 94.6건의 메시지가 기록될 정도로 알림 빈도가 높았으며, 이는 StormParse 서비스의 초기 불안정 상태 또는 모니터링 임계값 조정 문제로 추정된다.
