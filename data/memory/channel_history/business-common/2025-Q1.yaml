summary: |
  2025-Q1에는 서부발전 PoC 수주와 현대차 2차 제안서 제출 등 대형 B2B 딜이 본격 추진되었으며, 아이티센 RAG 컨소시엄(NHN/베슬AI/퍼블릭AI/튜닙AI)을 통한 대규모 프로젝트 참여도 진행되었다.
  제품소개서가 v0.3에서 최종 버전까지 수차례 반복 업데이트되었고, 영문 버전까지 제작되어 글로벌 영업 대응력을 강화했다.
  앤트로픽 빌더 서밋 참가, 클루커스 MSP 파트너십 체결, Relate CRM 도입 등 파트너십과 내부 영업 인프라 고도화가 병행되었으며, LG전자 AX, SK네트웍스, 유진투자증권 STT 등 신규 영업 파이프라인도 확대되었다.
