summary: |
  2024-Q1에는 일본 AI Expo와 Gen AI Korea 2024 전시회 준비가 핵심 화두였으며, 브로셔/명함/가상오피스 등 일본 시장 진출을 위한 인프라를 구축했다.
  고객 영업 측면에서는 누리미디어 견적(호출당 200원→140원), KT/하나은행 PoC, 현대차 연구소 대면미팅, SG그룹 RAG 과제 등 다양한 B2B 딜이 진행되었다.
  홈페이지 개편과 상품소개서 작성이 병행되었고, 초창패 서류 합격 및 DST Global 투자사 미팅 등 펀딩/지원사업 활동도 활발했다.
