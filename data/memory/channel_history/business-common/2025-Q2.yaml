summary: |
  2025-Q2에는 Storm Parse 상품화와 SaaS 과금 체계 확립이 핵심 제품 전략이었으며, 산업은행 Parse 도입과 아이티센엔텍 PoC 계약(6천만원) 등 실질적 매출 전환이 이루어졌다.
  CubixAI 파트너십, NVIDIA Inception 프로그램 미팅, 초거대AI NIA 정부사업 등 기술 파트너십과 정부지원사업 대응이 활발했으며, 현대차 PoC 착수와 두산 데모, 키움증권 영업 등 대형 B2B 파이프라인도 지속 확대되었다.
  사이오닉 핵심 기술 장표 제작과 기술강점 Full Loop 정리를 통해 영업 자료를 체계화했고, 스톰플랫폼 상표 출원공고와 디캠프 입주 등 사업 인프라도 강화되었다.
