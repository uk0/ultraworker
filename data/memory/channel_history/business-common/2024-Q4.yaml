summary: |
  2024-Q4에는 CES 2025 참가를 위한 영문 브로셔 제작과 홍보영상 제작이 핵심 마케팅 활동이었으며, QR코드 기반 제품 안내 체계도 구축했다.
  신규 고객으로 킥더허들(AI 영양제 추천), ZWSOFT(중국 시장 CAD 기업), 퓨리오사AI/서울대 반도체 실증사업 등 다양한 산업군으로 영업이 확대되었다.
  마크스폰 호출량 모니터링과 뤼튼 오픈게이트웨이 트래킹 등 기존 고객 운영 관리가 진행되었고, 아이엔지스토리 서비스 중단 경고 및 네이버클라우드 비용 정리 등 운영 효율화도 병행되었다.
