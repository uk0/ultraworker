summary: |
  2025년 4분기 비즈니스 공통 채널에서는 삼성벤처투자, 신세계I&C, 유진투자증권, GS건설, 한국전력기술 등 주요 기업을 대상으로 한 영업·수주 활동이 활발히 진행되었다. 삼성벤처투자 2.17억 원 규모 수주, 신세계I&C 법무 에이전트 PoC, 롯데이노베이트-은행연합회 연계 파서 납품 등이 주요 성과로 기록되었다. OpenAI DevDay 부스 참가, SKAX 온톨로지+에이전트 자문, 국과수 POC 등 다양한 파트너십·사업 추진도 병행되었으며, 스톰 플랫폼의 과금 정책, 워크플로우 리비전 기능 배포, 스톰파스 엑셀 지원 완료 등 제품 업데이트도 공유되었다.
