summary: |
  2025년 3분기 deploy-gpu 채널에서는 GPU 서버 용량 관리, RunPod 자동 모니터링 봇 도입, CUDA 버전 업그레이드 논의 등이 주요 이슈였다.
  7월에 베슬1 루트 파티션이 95% 도달하여 긴급 정리 작업이 진행되었으며, RunPod 사용 알림을 채널에 공유하는 규칙이 만들어졌다. 8월에는 RunPod 일일 현황 알림 봇(incoming-webhook)이 채널에 통합되어 Pod 생성/종료 현황을 자동으로 보고하기 시작하였다.
  9월에는 베슬1번의 CUDA 12.1 버전을 12.8로 업그레이드하는 논의가 있었으며, Qwen3 Next 테스트 런, GRPO 실험, RunPod RTX 5090 8-way 실험 등 다양한 ML 실험이 진행되었다. VESSL AI IDC 하이퍼바이저 시스템 업그레이드 점검 일정도 안내되었다.
