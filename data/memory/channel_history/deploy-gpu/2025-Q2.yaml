summary: |
  2025년 2분기 deploy-gpu 채널에서는 VESSL GPU 서버 사용 조율과 RunPod H100 임시 사용이 주요 활동이었다.
  4월에 Gemma 3 멀티모달 파이프라인 디버깅 및 학습을 위해 베슬1(8장), 베슬2(4장) GPU를 주말에 집중 사용하였으며, 좀비 프로세스 문제 및 멀티노드 설정 논의가 이루어졌다.
  5월에는 IBK 관련 H100 RunPod 임시 사용이 있었으며, 6월에는 베슬2 Docker 재설정, vLLM 부하 테스트를 위한 H100 사용, Qwen 임베딩/리랭커 GPU 사용량 확인 등이 진행되었다. Docker 데몬 설정 변경 후 재시작 이슈도 발생하였다.
