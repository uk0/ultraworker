summary: |
  2024-Q3 deploy-gpu 채널 데이터 수집 완료. 49개 메시지, 8명 참여, 37개 스레드.
  Q3에는 VESSL A100 서버 2대(sxm-01, sxm-02)가 운영되었으며, 도균/진형 등 연구원들이 활용하였다.
  Alibaba에서 xionic 모델 시리즈(xionic-ko-llama-3-70b, xionic-1-72b-20240610)가 GPU 0-3 및
  4-7에 분산 배포되었다. L40s GPU가 worker100, worker101에 장착되어 llama3.1-xionic-1-72b
  모델이 배포되었다. VESSL을 통해 100TB NAS가 /mnt/nas에 마운트되어 대용량 스토리지가
  확보되었다. worker14에서 NVIDIA 드라이버 NVML 이슈가 지속되었으며, apt 자동 업데이트로 인한
  드라이버 불일치가 원인으로 확인되었다. WireGuard VPN 프로필 관리가 이루어졌으며, PoC 장비
  변경으로 worker6 구성이 변경되었다. baeksw98, 최병현(Hyune-c), song이 새로 합류하였다.
