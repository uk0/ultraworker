terminology:
  - term: "Creep Colony"
    definition: "사이오닉 자체 개발 GPU 컨테이너 스케줄링 플랫폼. 사용자별 GPU 컨테이너 생성/종료를 슬랙으로 실시간 알림하며, 웹 VSCode 등 개발 편의 기능 제공"
  - term: "베슬 (VESSL AI)"
    definition: "사이오닉이 사용하는 AI 인프라 플랫폼. A100 GPU x8 서버 2대 (vessl-a100-sxm-01, vessl-a100-sxm-02) 운영"
  - term: "RunPod"
    definition: "GPU 클라우드 서비스. 온프렘 자원 부족 시 H100, RTX A4000 등을 시간 단위로 임대"
  - term: "Dense Retriever"
    definition: "밀집 벡터 기반 문서 검색 모델. 데이터 라벨링 및 학습 작업 진행"
  - term: "Cross Encoder"
    definition: "검색 재순위화(Re-ranking)를 위한 쌍방향 인코더 모델. 데이터 라벨링 및 학습 작업 진행"
  - term: "nanochat"
    definition: "사이오닉 내부 소형 대화 모델 프로젝트"
  - term: "Deepseek OCR"
    definition: "Deepseek 기반 OCR(광학 문자 인식) 모델 실험"
  - term: "NAS"
    definition: "Network Attached Storage. 팀 공유 스토리지로 데이터셋, 체크포인트, 캐시 등 저장"
  - term: "vLLM"
    definition: "대규모 언어 모델 고성능 추론 라이브러리"
