summary: |
  2025년 4분기 deploy-gpu 채널은 GPU 스케줄링 시스템 "Creep Colony" 도입과 함께 역대 가장 높은 활동량을 보였다.
  10월 말부터 자체 개발 GPU 컨테이너 스케줄링 플랫폼(Creep Colony)의 베타 테스트가 시작되었으며, 컨테이너 생성/종료 알림 봇(B09CJ0NGFME)이 실시간으로 모든 GPU 사용 이벤트를 기록하였다. GPU 번호 표기 방식(0-7 vs 1-8)을 0-7로 통일하는 합의도 이루어졌다.
  11월에는 Creep Colony에 웹 기반 VSCode 지원, NAS 캐시 마운트, 컨테이너 레이블 검색 등 신기능이 추가되었으며, Dense Retriever 학습, Cross Encoder 데이터 라벨링, nanochat 훈련 등 다양한 ML 실험이 진행되었다. GPU 사용 충돌 및 조율 이슈도 빈번하게 발생하였다.
  12월에는 Creep Colony 인프라가 VESSL AI(vessl-a100-sxm-01/02 노드)로 마이그레이션되었으며, 신규 입사자(sangho) 환경 셋업, 커스텀 Dockerfile 관리 등 AI 연구 환경 표준화가 진행되었다.
