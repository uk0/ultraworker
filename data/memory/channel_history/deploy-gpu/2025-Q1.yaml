summary: |
  2025년 1분기 deploy-gpu 채널은 VESSL AI 온프레미스 GPU 서버(베슬1, 베슬2) 사용 조율과 인프라 개선이 주요 주제였다.
  1월 초 베슬1번의 Docker 데이터 디렉토리를 /data/docker로 이전하여 디스크 용량 문제를 해결하였으며, GPU 메트릭 모니터링을 위한 DCGM 컨테이너를 배포하고 Grafana 대시보드를 구축하였다.
  2월에는 Qwen 2.5 1M 컨텍스트 윈도우 모델 배포, 온프렘 k8s 환경에서의 L40s GPU 할당 이슈 논의 등이 있었으며, 3월에는 멀티모달 모델 학습 목적의 GPU 사용 요청이 진행되었다.
