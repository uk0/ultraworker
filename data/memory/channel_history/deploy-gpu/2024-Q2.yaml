summary: |
  2024-Q2 deploy-gpu 채널 데이터 수집 완료. 50개 메시지, 9명 참여, 31개 스레드.
  Q2에는 온프레미스 Kubernetes 통합이 본격화되어 worker1, worker2, worker10-14가 K8s 클러스터에
  추가되었다. VESSL에 H100 서버가 새로 도입되었고, Alibaba A100에서 xionic-ko-llama-3-70b
  모델이 배포되었다. L40s GPU 구매 계획 및 조달이 진행되었다. 데이터센터 이전으로 A100 서버의
  IP가 221.147.100.200에서 61.73.27.196으로 변경되었다. worker6에서 bge-m3 임베딩/리랭커
  모델이 운영되었다. worker5/6에서 NVIDIA 드라이버 NVML 버전 불일치 이슈가 발생하여
  kozistr833이 상세 디버깅을 수행하였다. Pylon 임베딩이 Kubernetes로 이전되어 kubectl get pods로
  ko-embedding-v2, ja-embedding, ko-reranker Pod가 확인되었다. dkyoon, taeeunk1208,
  Jeonghwan Park이 새로 합류하였다.
