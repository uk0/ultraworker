summary: |
  2024-Q1 deploy-gpu 채널 데이터 수집 완료. 63개 메시지, 9명 참여, 29개 스레드.
  Q1에는 GPU 사용 현황을 대시보드 형태로 정리한 상태 게시물이 정기적으로 공유되었다.
  FDC(Fastfive Data Center)에서 worker5(3090x4)와 worker6(4090x2, wrtn 추론용)을 운영하였고,
  NDC(Nonce Data Center)에서 mango(Pylon 임베딩), worker1(Flasma/MetisX), worker3(임베딩 테스트)를
  운영하였다. VESSL AI A100x8(maywell/임베딩 트레이닝)과 Alibaba A100x8(리랭커 개발, fitpet
  트레이닝)을 클라우드 GPU로 활용하였다. 1월에 Nonce에서 Midtown으로의 데이터센터 이전이
  시작되어 worker1/3/mango가 이전을 위해 셧다운되었다. 1월 23일 채널명이 gpu-deploy에서
  deploy-gpu로 변경되었다. 주요 참여자는 Sigrid Jin, kozistr833, 송명하, Noah(고석현),
  김덕현(Dekay), riley, 정세민(Sem)이다.
