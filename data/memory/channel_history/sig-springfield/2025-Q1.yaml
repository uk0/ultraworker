summary: |
  심슨 캐릭터 스타일 프로필 사진을 만들기 위해 개설된 재미있는 채널. Noah(고석현)가 채널을 만들고
  팀원들의 심슨 캐릭터 버전을 생성함. 권혜선, 김혜원, 오승희, 양호진, 김수원, 한시형 등이 참여.
  '가족사진' 컨셉으로 심슨 스타일 캐릭터를 합성하는 프로젝트가 진행됨. 양호진의 심슨 프사가 웃겨서
  반복적으로 웃참하는 대화가 이어짐. 홍성아는 'blob파' 소속이라며 아웃사이더를 자처.
  정세민이 생성한 심슨 캐릭터 위에 이상한 것이 앉아있는 에피소드도 있음.
