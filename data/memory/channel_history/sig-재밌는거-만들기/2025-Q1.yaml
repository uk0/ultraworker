  Storm Fooding 프로젝트 후속 작업과 새로운 아이디어 공유가 있었던 분기. 김혜원이 리마인드 및 팔로업을 지속하며 에이전트 셋팅, 주차장 안내 AI(모두의 주차장 연동) 아이디어를 제안했다. 정세민은 Creatie(AI UI 생성 도구)를 소개하며 높은 평가를 받았고, Soltux의 Goover(Perplexity 유사 서비스)의 KG(Knowledge Graph) 시각화도 공유했다. Noah는 AI Times 기사(20% 매출 증대)를 공유했고, Sigrid Jin은 exa-labs의 company-researcher를 공유했다. 새 멤버(김수원, 대신 해주는 새, 신희수, 박우명)가 합류했다.
