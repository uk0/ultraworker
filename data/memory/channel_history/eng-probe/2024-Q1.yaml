summary: |
  2024-Q1은 Probe(AI 이미지 생성 서비스) 프로젝트의 핵심 개발 및 운영 분기. 뤼튼(Wrtn)과의 AI 프로필 서비스 협업이 주요 활동이었음. (1) V2 모델 개발: 정세민이 얼굴 모델 V2를 리서치하고 inswapper_128 + LoRA 학습 기반 파이프라인 구축. Noah가 모델 파일 용량 92% 감소(2000MB→150MB) 달성. (2) ComfyUI 기반 워크플로우: Sigrid Jin과 정세민이 ComfyUI를 활용한 인퍼런스 파이프라인을 구축하고, 워크플로우별 리소스 모니터링과 JSON 규격화 작업 진행. (3) 인프라 최적화: RunPod GPU 서버 비용 관리(시간당 $11.44), Cloud Run 인스턴스 스케일링, PostgreSQL 커넥션 풀 최적화(100→10) 등. (4) 뤼튼 협업: AI 프로필 시즌2 정식 출시 준비, 펫 모델 API 개발, Stability AI Japan 협업 검토. (5) 운영: 트레이닝 큐 적체(40개), Cloud Storage 비용 100% 상승, 라이브 이슈 대응 등 다양한 운영 이슈 처리.
