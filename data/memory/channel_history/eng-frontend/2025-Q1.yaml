summary: |
  2025-Q1에 eng-frontend 채널이 신설되었다(권혜선(Jada)이 채널 개설).
  Stargate-web 프론트엔드 프로젝트의 기술 논의가 본격화되었다.
  주요 활동: IBK 온프렘 환경 UI 개발 방식 논의, Vercel/New Relic 연동,
  env vault 이전, Next.js 보안 이슈(CVE) 대응, 코드리뷰 정책 논의(approve 후
  변경 시 재리뷰 강제 해제 제안), Dockerfile 최적화(corepack 활용), Linear 프로젝트
  및 버그 레이블 정리, 패키지 구조 개선 테크스펙 작성, 하이라이팅 구현 방법 논의 등.
  권혜선(Jada)과 백은주가 주요 기여자였으며, 김덕현(Dekay)이 온프렘/ECR 관련 이슈를 공유했다.
