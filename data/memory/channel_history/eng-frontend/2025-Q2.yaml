summary: |
  2025-Q2 eng-frontend 채널은 매우 활발했다. 주요 활동:
  1) 워크플로우 GUI 도구 개발 - react-flow 라이브러리 도입, 노드/엣지 스타일링, 드래그앤드롭 구현,
     오더시트 v2 작업, if-else 노드 겹침 이슈 수정.
  2) 프로젝트 구조 개선 - FSD(Feature-Sliced Design) 구조 도입, 상태관리 zustand 전환,
     피처토글 활용 강화, 릴리즈 노트 정리.
  3) PDF 뷰어 개선 - psi-lense 레포, 확대/축소 렌더링 개선, @sionic-ai/pdf-viewer v3.0.0 퍼블리시.
  4) 인프라/도구 - Sentry 도입, pnpm 패키지 매니저 전환 논의, CI 수정, 프로덕션 빌드 실패 대응.
  5) 온프렘(IBK) - tailwind 설정 불일치 이슈 대응, 아비케(IBK) 테스트 프로세스 개선 제안.
  6) Next.js/Vercel 벤더 락인 우려 공유, Astro/React Router 대안 검토.
  권혜선(Jada)과 백은주가 핵심 기여자, QA 환경 구축 요청(이재준 Leo) 등 타팀 협업도 활발.
