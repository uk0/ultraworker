summary: |
  2025-Q3 eng-frontend 채널은 워크플로우 리팩토링, 오더시트 노드 개발, 일본 리전 대응이 주요 주제였다.
  1) 워크플로우 리팩토링 - useOrderSheetNode 개선, 렌더링 폭발/클로저 이슈 해결,
     LLM 노드 폼 구현, onBlur vs onChange 시점 논의, 프론트엔드 아키텍처 시각화.
  2) 배포/인프라 - sionicstorm.jp 일본 도메인 연결, QA 환경 구축(온프렘 빌드),
     프로덕션 빌드 실패 다수 대응, SSE 이벤트 필드 변경 대응.
  3) 조직/프로세스 - 프론트 채용 논의, 프론트-스게 일정 싱크 방안 제안,
     주간 일감 정리/코드리뷰 리뷰, SIAM 환경 프론트 이슈 대응.
  4) 기술 공유 - TC39 총회 정리, 웹 애니메이션 성능, PostCSS 관리 경험,
     lokalise 다국어 PoC 준비, LangDiff 라이브러리 공개.
  권혜선(Jada), 백은주 중심 운영. 김주원 신규 합류(11월부터 활동).
