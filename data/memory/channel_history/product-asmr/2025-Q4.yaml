summary: |
  2025년 Q4는 ASMR-V2 개발 본격화, 임베딩/리랭커 통합 논의, 외부 서비스(OpenGateway) 셀링 추진,
  그리고 다수의 신규 모델 지원이 핵심이었던 분기이다.
  Anthropic extended thinking의 budget_tokens 필수 파라미터 처리 방안이 정리되었고,
  Upstage solar-pro2 모델 지원 중단 및 claude-3-5-sonnet 지원 종료에 대응했다.
  임베딩/리랭커 모델을 ASMR에 통합하여 API로 서비스하는 방안이 논의되었고,
  OpenGateway를 외부 서비스로 셀링하기 위한 운영 측면 정비가 결정되었다.
  메이웰(Maywell/Elyn)에 ASMR을 통한 Vertex 모델 사용 지원이 시작되었다.
  ASMR-V2에서 Vertex Gemini VLM(이미지 입력) 지원이 개발되었으며, Gemini 3, GPT-5-2, Claude Opus 4.5,
  Claude Sonnet 4.5 등 신규 모델 지원이 빠르게 추가되었다.
  OpenAI Response API 리서치 및 이점 분석이 공유되었고, APIS-Parse에서의 VertexAI 호출 ASMR-V2 전환 작업이 진행되었다.
  non-stream 요청의 10분 제한 이슈, max_tokens 허용 범위 초과 요청, 이상한 body 형식 요청 등 운영 이슈도 다수 발생했다.
topics:
  - ASMR-V2 개발 및 VLM(Vision Language Model) 지원
  - 임베딩/리랭커 모델 ASMR 통합 논의
  - OpenGateway 외부 서비스 셀링 추진
  - 메이웰(Maywell) Vertex 모델 사용 지원
  - 신규 모델 지원 (Gemini 3, GPT-5-2, Claude Opus 4.5, Claude Sonnet 4.5)
  - OpenAI Response API 리서치
  - Anthropic extended thinking budget_tokens 처리
  - 모델 지원 중단 대응 (solar-pro2, claude-3-5-sonnet, llama-3.1-405b)
  - 운영 이슈 대응 (non-stream 10분 제한, max_tokens 초과)
  - APIS-Parse VertexAI 호출 ASMR-V2 전환
