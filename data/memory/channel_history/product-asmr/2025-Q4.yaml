terminology:
  - term: ASMR-V2
    definition: ASMR의 차세대 버전. VLM 지원 등 확장된 기능 제공
    aliases:
      - asmr-v2
  - term: VLM
    definition: Vision Language Model. 이미지 입력을 지원하는 LLM
  - term: OpenGateway
    definition: ASMR의 외부 서비스 브랜드명. 외부 고객 대상 LLM API 통합 서비스
  - term: Response API
    definition: OpenAI의 새로운 API 규격. Chat Completions API 대비 에이전트형 흐름, 멀티턴, 캐시 활용 등 이점
  - term: Maywell
    definition: 외부 협력사(Elyn). ASMR을 통해 Vertex 모델 사용
    aliases:
      - 메이웰
      - Elyn
  - term: APIS-Parse
    definition: Storm의 문서 파싱 서비스. VertexAI를 통해 Gemini 모델 호출
  - term: Gemini 3
    definition: Google의 차세대 AI 모델 (gemini-3-pro 등)
    aliases:
      - 젬삼
  - term: budget_tokens
    definition: Anthropic extended thinking에서 추론 깊이를 제어하는 필수 파라미터 (1024 이상)
