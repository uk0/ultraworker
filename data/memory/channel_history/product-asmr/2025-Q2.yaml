summary: |
  2025년 Q2는 ASMR 리팩토링 중간 공유 및 O 시리즈 모델 지원이 핵심 주제였던 분기이다.
  ASMR 리팩토링 계획 이행 중간 공유 세션(4/15)이 진행되었으며, Phase 4까지 실행 현황을 공유했다.
  O 시리즈(o1, o3-mini, o4-mini) 모델에 대한 상세 리서치가 이루어졌으며, 기존 하이퍼파라미터와의 호환성 문제
  (temperature, top_p, stop 등 미지원, max_tokens 대신 max_completion_tokens 사용)를 해결하기 위한 작업이 진행되었다.
  Azure deprecated 모델(gpt-4o-2024-05-13) 제거, Claude Opus 4 쿼타 이슈 해결,
  Naver HyperClova OpenAI 호환 API 공유, context caching 기능 요청, newrelic 관리 논의 등이 있었다.
  Claude Opus 4에서 특정 단어에 빈 응답 반환하는 이슈도 발견되었다.
topics:
  - ASMR 리팩토링 중간 공유 (Phase 4까지 실행 현황)
  - OpenAI O 시리즈 모델 지원 (o1, o3-mini, o4-mini)
  - O 시리즈 파라미터 호환성 처리 (max_completion_tokens, reasoning_effort)
  - Azure deprecated 모델 제거
  - Claude Opus 4 쿼타 이슈 및 빈 응답 이슈
  - Naver HyperClova OpenAI 호환 API
  - context caching 기능 요청
