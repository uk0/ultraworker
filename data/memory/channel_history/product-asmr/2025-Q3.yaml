terminology:
  - term: GPT-5
    definition: OpenAI의 차세대 LLM 모델. gpt-5, gpt-5-mini, gpt-5-nano 버전 존재
  - term: extended thinking
    definition: Anthropic Claude의 확장 추론 기능. thinking.type으로 on/off, budget_tokens로 추론 깊이 제어
