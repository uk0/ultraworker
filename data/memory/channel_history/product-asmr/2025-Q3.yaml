summary: |
  2025년 Q3는 ASMR의 GPT-5 시리즈 지원, Anthropic 추론 기능 통합, 그리고 vLLM 엔진 안정화가 핵심이었던 분기이다.
  GPT-5, GPT-5-mini, GPT-5-nano 모델 지원이 추가되었으며(OpenAI/Azure), stream 요청 시 organization verification 필요 이슈가 있었다.
  OpenAI 모델별 파라미터 변화(stop 미지원, max_tokens deprecation)에 대한 대응 방식을 공유하고,
  Anthropic의 extended thinking(추론 기능)을 OpenAI reasoning_effort 규격과 어떻게 매핑할지에 대한 심도 깊은 논의가 있었다.
  Gemini 2.0 지원 요청, Vertex에서 llama3-405b 및 claude-3-sonnet 지원 중단, Upstage solar-pro 지원 중단,
  HyperClova HCX-005/007 추가 지원, 부하테스트용 LLM 목서버 논의, SIAM에서의 OpenRouter 활용 등도 다뤄졌다.
  ASMR의 역할을 "OpenAI 규격으로 표준화된 인터페이스 제공"으로 재정의하는 중요한 논의도 있었다.
topics:
