  - OpenAI 파라미터 변화 대응 (stop 미지원, max_tokens deprecation)
  - vLLM 엔진 OpenAI 라이브러리 전환 계획
  - 모델 지원 중단 대응 (Vertex llama3-405b, claude-3-sonnet, Upstage solar-pro)
