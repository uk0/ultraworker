summary: |
  2024년 Q3는 product-asmr(당시 product-openllm) 채널 생성 초기로, OpenLLM 서비스의 기능 확장과 안정화에 집중한 분기이다.
  주요 활동으로는 Claude 모델 지원 확인, vLLM을 통한 Xionic 모델 호출 이슈 해결, 토큰 사용량 로깅 기능 완성(모든 chat_engine 대상),
  CORS 정책 논의, Anthropic Prompt Caching 소개, GCP Vertex 쿼타 상향 요청, Function Call 지원 검토 등이 있었다.
  Anthropic API 불안정으로 인해 Vertex API 쪽 사용 권고가 있었으며, Vertex 지원 모델 리스트 및 벤더별 모델명 치환 관련 논의가 진행되었다.
  팀별 토큰 사용량 추출 요청도 발생하여 데이터 분석 니즈가 확인되었다.
topics:
  - OpenLLM 모델 지원 확대 (Claude, Xionic, Vertex 등)
  - 토큰 usage 로깅 완성 (모든 chat_engine 대상)
  - Anthropic Prompt Caching 소개
  - GCP Vertex 쿼타 상향 요청
  - Function Call 지원 검토
  - CORS 정책 논의
  - Anthropic API 불안정 및 Vertex 대안 논의
