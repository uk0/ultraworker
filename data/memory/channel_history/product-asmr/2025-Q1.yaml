summary: |
  2025년 Q1은 ASMR 서비스의 본격적인 리팩토링 계획 수립 및 기능 강화가 이루어진 분기이다.
  "ASMR 이대로 괜찮은가"라는 주제로 현 상황과 향후 방향성 공유 세션이 계획되었다.
  주요 활동으로는 Azure 리전 접근 권한 추가, health check 엔드포인트 정리(/_health만 남기기),
  Vertex AI에서 claude-3-5-sonnet-20241022 모델 추가 지원, ASMR 지원 모델 관리 체계 정비,
  Apidog 활용 전체 모델 일괄 테스트 체계 구축, Upstage 엔진 추가(solar-pro, solar-mini),
  vLLM + Upstage Function Call 지원, Spring AI vs LangChain 도입 비교 세미나,
  o3-mini 모델 출시 공유, OpenAI 사용량 쿼타 초과 이슈, ASMR 버그 리포트 및 우선순위 상향 등이 있었다.
topics:
  - ASMR 리팩토링 계획 및 방향성 공유
  - Apidog 기반 전체 모델 일괄 테스트 구축
  - Upstage 엔진 추가 (solar-pro, solar-mini)
  - Function Call 지원 (vLLM + Upstage)
  - Spring AI vs LangChain 도입 비교
  - health check 엔드포인트 정리
  - Azure o1 시리즈 배포 대기 등록
  - OpenAI 사용량 쿼타 초과 이슈
