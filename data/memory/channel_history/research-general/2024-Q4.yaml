summary: >
  2024 Q4는 리서치팀의 KPI 수립과 체계적 성과 관리가 시작된 시기이다. 박우명이 Q4 리서치 KPI를 공유하여
  Document AI 기술 내재화, 도메인별 reranker 파인튜닝, 한국어/일본어 임베딩 모델 개발, 특허 출원 7건 및
  Top-tier 학회 논문 1건 게재를 목표로 설정하였다. ModernBERT 출시와 함께 ColBERT 학습 데이터셋 구축,
  NLI 한국어 데이터셋 1.12M row 공개 등 임베딩 연구가 활발했다. IBK 프로젝트를 위한 VLM(Qwen2-VL-7B)
  튜닝이 시작되었고, parse 데이터 정제 작업이 본격화되었다. CVPR 논문 제출이 진행되었으며, Llama 3.3 토큰
  분석을 통한 코드 믹싱 감소 연구, 리랭커 학습 자동화, AICA GPU 자원 신청 등이 이루어졌다. 연말 전사 회고와
  함께 2025년 리서치 방향에 대한 자유 논의가 진행되었다.
