terminology:
  - term: "ModernBERT"
    definition: "MosaicBERT 기반 개량 BERT 모델. 최신 학습 기법(unpadding, flash_attention2, global/local attention)을 적용."
    aliases: []
    context: "2024년 12월 출시. ColBERT 학습 및 리랭커 백본으로 활용."
  - term: "DBSF"
    definition: "Distribution-Based Score Fusion. 다양한 검색 점수를 앙상블하는 기법."
    aliases: []
    context: "하이브리드 검색 실험에서 BM25 + 벡터 검색 앙상블에 활용."
  - term: "KURE"
    definition: "한국어 임베딩 모델. nlpai-lab에서 bge-m3 기반으로 개발."
    aliases: ["KURE-v1"]
    context: "bge-m3를 튜닝해도 성능 개선이 미미하다는 결론 도출."
  - term: "Super Weight"
    definition: "LLM에서 특정 레이어의 단 하나의 weight가 전체 모델 동작에 큰 영향을 미치는 현상."
    aliases: []
    context: "모델 경량화(Quantization, Pruning)와의 연관성 분석."
