summary: >
  2025 Q3는 메시지 수가 적어 상대적으로 조용한 분기였으나, Gemini Embedding 테스트, VLM 관련 특허 작업,
  LLM-as-a-judge 평가 체계, 벡터 검색 threshold 조정 등의 논의가 이어졌다. 진형님이 Gemini Embedding
  테스트 결과를 공유하며 "무조건 써야함"이라는 강력한 의견을 제시하였고, 테크스펙 작성도 진행되었다.
  정석현님이 합류하여 LLM-as-a-judge 기반 평가 활용 여부를 문의하고, InternVL 논문의 instruction
  tuning prompt template을 분석하였다. 특허 출원 아이디어 모집과 데이터 인수인계 작업이 진행되었으며,
  리서치 미팅은 서면 대체가 잦았다. 허깅페이스 조직 관리(시트 정리), Qwen3-VL-32B 출시 분석도 이루어졌다.
