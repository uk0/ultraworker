terminology:
  - term: "HuRef"
    definition: "Human Readable Fingerprint. LLM 가중치를 SVD 등으로 분석하여 모델 고유 지문을 생성하는 기법."
    aliases: []
    context: "NeurIPS 2024 poster. LLM Forensics 연구에 활용."
  - term: "REEF"
    definition: "모델 계보 추적 기법. ICLR 2025."
    aliases: []
    context: "LLM Forensics Phase 1에서 HuRef와 함께 활용 계획."
  - term: "LLM Forensics"
    definition: "LLM 모델의 체계적 분석. Fingerprinting, 계보 추적, 토큰 임베딩 분석, 레이어별 표현 분석 등을 포함."
    aliases: []
    context: "2026년 GPU 지원 과제의 핵심 연구 주제."
  - term: "dragoon"
    definition: "사이오닉의 document 처리 모듈. 딥러닝 모델 미포함."
    aliases: []
    context: "STORM Parse 파이프라인의 일부."
  - term: "pepper"
    definition: "Qwen2.5/3 VL 기반으로 학습 중인 VLM 모델. Gemini 등 상용 VLM 대체 목적."
    aliases: []
    context: "STORM Parse에서 VLM 대체를 위해 개발 중."
