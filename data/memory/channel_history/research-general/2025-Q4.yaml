summary: >
  2025 Q4는 리서치팀에 새로운 멤버(이상호)가 합류하고, 2026년 연구 계획 수립이 핵심 활동이었다. 이상호가
  리서치팀 리드로 합류하여 팀 구조 파악, wandb/overleaf 공용 계정 세팅, 모델링 노하우 템플릿 구축 등
  인프라를 정비하였다. "2026년 우린 무엇을 리서치 할 것인가"를 주제로 커피챗과 위클리 논의가 진행되었으며,
  Foundation Model 연구 방향, VLM/LLM 개발 전략이 구체화되었다. 정석현이 ML/CV/NLP 학회 팔로업
  체계를 정리하여 ICLR/ICML/NeurIPS/CVPR/ACL 등 주요 학회 추적 방법을 공유하였다. VQA 데이터셋
  구축과 STORM Parse 성능 평가(LLM-as-a-judge), 과제 계획서 리뷰, LLM Forensics(HuRef/REEF
  기반 모델 Fingerprinting) 연구 방향이 제시되었다. 연말 회고와 함께 2025년을 마무리하고 2026년 연구
  방향을 수립하는 시기였다.
