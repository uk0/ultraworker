summary: >
  2024 Q3는 리서치팀의 연구 체계화와 방향 정립이 이루어진 시기이다. Research Weekly 미팅 운영 방식에 대한
  깊이 있는 회고가 진행되어, 맥락 공유의 중요성과 연구 과제별 체계적인 공유 문화가 강조되었다. 주요 연구
  주제로는 ColPali(비전 기반 문서 검색), GraphRAG, 하이브리드 검색, 리랭커 연구가 활발히 진행되었다.
  알리바바 Qwen팀과의 기술 교류 미팅이 성사되었고, HCLT 학회 논문 제출이 완료되었다. AICA GPU 지원 사업
  신청, NIPA 사업 참여, 데이콘 IR 대회 참가 등 외부 활동도 활발했다. Qwen2.5-72B 모델 출시와 함께
  사내 서버에 xionic-mini 모델을 배포하여 테스트를 시작했다. 리서치 인턴 모집을 위한 과제 구체화 논의도
  진행되었다.
topics:
  - name: "Research Weekly 운영 회고 및 개선"
    count: 15
    summary: "연구 공유 방식에 대한 깊이 있는 회고 진행. 맥락 공유 부재 문제 지적, 결론 통보가 아닌 판단 과정과 근거를 함께 공유하는 문화 필요성 강조. 노션 기반 현황판 운영 시작."
  - name: "ColPali 및 비전 기반 문서 검색"
    count: 8
    summary: "ColPali 논문 분석, 비전 언어 모델 기반 문서 검색 연구. 멀티모달+LLM 방향의 중요성 논의."
  - name: "GraphRAG"
    count: 6
    summary: "Microsoft GraphRAG 실험, Azure 원클릭 배포 테스트, 지식 그래프 기반 RAG 아키텍처 연구."
  - name: "알리바바 Qwen팀 교류"
    count: 5
    summary: "Qwen팀과의 기술 미팅 성사. Qwen2.5-72B 출시 및 사내 인프라 세팅. 한국어 튜닝 관련 기술 교류."
  - name: "리서치 인턴 과제 구체화"
    count: 4
    summary: "Retriever/Reranker, VLM for Document AI, Multi-modal DPO, Automatic Prompt Generation, LLM-as-a-judge 등 인턴 과제 후보 논의."
  - name: "RAG 연구 방향"
    count: 8
    summary: "문서별 청킹 전략, 하이브리드 검색(BM25+벡터), CoT RAG, reranker fine-tuning 등 RAG 고도화 방향 논의."
  - name: "GPU/외부 사업"
    count: 5
    summary: "AICA GPU 지원 사업 신청(미선정 후 재신청), NIPA 사업 참여, 고성능 컴퓨팅 추가 모집 선정."
  - name: "HCLT 논문 및 기술 블로그"
    count: 3
    summary: "HCLT 학회 논문 제출 완료. LLM 머징 기법 블로그 초안 작성 및 검토."
