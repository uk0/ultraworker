summary: >
  2026 Q1(2월 26일까지)는 대규모 GPU 인프라 투자와 Foundation Model 전략이 핵심 흐름이었다. B300 GPU
  64장(vram 18TB) 도입이 결정되었고, RTX 6000 Pro 96GB 16장도 이미 발주되었다. 이에 따라 모델 학습
  계획 시 데이터셋, 모델 구조, fp8 트레이닝 등 선행 조사가 필요해졌다. 퍼듀대학교 MINDS Lab과의 글로벌
  협력형 R&D 공동연구 협업이 시작되었으며, 아이디어 제출이 완료되었다. GPU 지원 과제로 LLM Forensics
  (한국어 Foundation Model 5종 분석 + Post-training)가 제출되었다. 모티프와의 독파모 컨소시엄 가능성이
  검토되었고, 리서처 JD(MultiModal FM, RAG Engine, 인턴)가 작성되었다. Qwen3.5-122B-A10B 등
  최신 모델의 한국어 능력 조정 및 강원랜드 프로젝트 테스트가 진행되었다. LLM 유사도 분석(트릴리온 랩스),
  딥리서치 세미나, 초격차/디딤돌 과제 제안서 리뷰 등 활발한 연구 활동이 이어졌다.
