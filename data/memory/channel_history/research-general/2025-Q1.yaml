summary: >
  2025 Q1는 리서치팀의 연구 방향이 다각화되고 외부 성과가 본격적으로 나타난 시기이다. DeepSeek R1 출시로
  오픈소스 추론 모델에 대한 관심이 폭발적으로 증가했으며, R1 distill 버전의 성능이 o1 mini를 뛰어넘는다는
  분석이 공유되었다. 청킹 전략에 대한 깊이 있는 논의가 진행되어 BERT 기반 의미적 청킹 모델 개발이 제안되었고,
  Late CLS Chunking 연구가 시작되었다. CVPR 논문의 Borderline 리뷰 결과를 받고 리부탈을 성공적으로
  진행하여 최종 억셉을 받았다. IBK RAG 프로젝트에서 리랭커 튜닝, 피드백 시스템 개선, LLM-as-reranker
  활용 등 성능 고도화가 활발히 진행되었다. 리서치 슬랙 채널 용도를 재정립하여 research-common(업무),
  random-research(자유 공유), request-for-research(요청), research-daily(업무일지) 등으로
  체계화하였다. ModernBERT-GTE 모델 컨버터 개발, QwQ-32B 출시 분석, 하이브리드 검색 가중치 연구 등
  기술적 성과도 풍부했다. song님의 국내 저널 출간, Langcon2025 발표 참여 등 대외 활동도 이어졌다.
topics:
  - name: "DeepSeek R1 및 추론 모델"
    count: 12
    summary: "DeepSeek R1/R1-Zero 출시 분석. R1 distill 14B가 o1 mini 성능 초과. L40s 서버에서 R1 테스트. DNA-R1 한국어 추론 모델 공개. LLM 증류 기법 아티클 작성 논의."
  - name: "청킹 전략 연구"
    count: 15
    summary: "BERT 기반 의미적 청킹 모델 제안(sionic-ai/bert-chunker). 청킹 토큰 최적화 필요성 분석. Jina 실험 기반 고정길이 청킹의 효과. Late Chunking과 의미적 청킹 병행 방안."
  - name: "임베딩 생성 고도화"
    count: 10
    summary: "Late CLS Chunking 연구. bge-m3 광역 인코딩(Concat Is All You Need). 레이어 복제 + Residual 학습 구조 제안. 임베딩 모델 구조 혁신 논의."
  - name: "CVPR 논문 리부탈 및 억셉"
    count: 8
    summary: "CVPR 리뷰 결과 Borderline 2개, Weakly Reject 1개. 연휴 중 리부탈 진행. 최종 CVPR 억셉 확정. 기사 작성 논의."
  - name: "IBK RAG 성능 고도화"
    count: 18
    summary: "IBK RAG에서 O1만 정답 가능한 계산 문제 발견. 리랭커 튜닝(레거시 챗봇 1만개 QA). LLM-as-reranker 활용 검토. Late CLS Chunking 적용. 피드백 시스템 개선."
  - name: "리서치 채널 재정비"
    count: 3
    summary: "research-common(업무), random-research(자유), request-for-research(요청), research-daily(업무일지) 등으로 슬랙 채널 용도 재정립."
  - name: "하이브리드 검색 가중치"
    count: 5
    summary: "BM25와 벡터 검색 가중치 최적화 연구. BM25 0.6/의미 0.4 비율에서 큰 성능 향상 관찰. Pinecone sparse vector 검색 벤치마크."
  - name: "ModernBERT-GTE 컨버터"
    count: 4
    summary: "ModernBERT MLP 기반 구현. Alibaba-NLP gte-modernbert-base 타겟. MosaicML 구현체 분석. 블로그 아티클 작성 예정."
  - name: "QwQ-32B 및 모델 분석"
    count: 5
    summary: "Qwen QwQ-32B 추론 모델 출시. DeepSeek-R1과 비교 분석. 32B 파라미터로 경쟁력 있는 성능."
