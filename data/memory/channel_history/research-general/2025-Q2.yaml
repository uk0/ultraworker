summary: >
  2025 Q2는 CVPR 발표 준비와 GraphRAG 연구, 검색 기술 심화가 주요 흐름이었다. CVPR 억셉 이후 발표
  준비가 진행되었으며, 내슈빌 출장 일정 조정과 네트워킹 대상 리스트업이 이루어졌다. GraphRAG/LightRAG가
  재부상하여 아이티센엔틱 연동 작업이 시작되었고, 도균님이 기술 메인을 맡게 되었다. IBK 프로젝트에서
  검색 성능 고도화가 지속되었으며, 숫자 검색 문제, 문서명/고유 단어 매칭 이슈 등이 발견되었다. Sparse
  retrieval 연구가 본격화되어 Efficient Inverted Indexes, miniCOIL, sentence-transformers sparse
  encoder 등이 분석되었다. VLM 모델 전략으로 STORM 파서용 자체 VLM 개발 방향이 논의되었고, Gemma 3n
  Matryoshka Transformer가 주목받았다. 리서치 미팅이 금요일로 변경되었다가 집중도/참석률 저하로 다시
  월요일로 복귀를 검토하게 되었다. Embed 4(Cohere) 출시, SentenceTransformers v4.1.0 ONNX 백엔드
  등 외부 동향도 활발히 공유되었다.
