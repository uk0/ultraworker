  - name: "GraphRAG/LightRAG"
    count: 8
    summary: "GraphRAG 키워드 우선순위 상승. LightRAG 분석. 아이티센엔틱 연동 작업 시작. 도균님 기술 메인 담당."
  - name: "IBK 검색 성능 고도화"
    count: 7
    summary: "숫자 검색 문제, 문서명 매칭 이슈 발견. 두산 보고서 생성 데모에서 토크나이징/렉시컬 검색 문제. 한자/한글 매칭(電文/전문) 이슈."
  - name: "Sparse Retrieval 연구"
    count: 6
    summary: "Efficient Inverted Indexes for Sparse Representations 논문 분석. miniCOIL 분석. sentence-transformers sparse encoder 준비. Dense retriever 편향 분석."
  - name: "VLM 전략 및 모델"
    count: 5
    summary: "STORM 파서용 VLM 개발 방향(온프렘 탑재). Gemma 3n Matryoshka Transformer. Embed 4 멀티모달 검색. xi-vl 네이밍 변경 논의."
  - name: "리서치 미팅 운영"
    count: 5
    summary: "금요일 오후로 미팅 시간 변경. 2달 운영 후 집중도/참석률 저하 확인. 월요일 복귀 검토."
  - name: "GRPO 데이터 및 학습"
    count: 3
    summary: "fnguide PDF GRPO 데이터셋 HuggingFace 공개. VL 모델 RL 학습 진행. Late CLS Chunking 특허 명세서 검토."
