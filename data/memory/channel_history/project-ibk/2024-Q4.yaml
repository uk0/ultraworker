summary: |
  IBK PoC 종료 보고 및 본사업 제안/계약 단계. PoC 결과를 기반으로 제안서 작성(기술/성능 장표),
  제안발표회(10/31) 진행. 경쟁사(얼거나이즈, 코난) 참전 첩보에 따른 차별화 전략 수립.
  기술협상 3차까지 진행되며 4대 과제 중 상품추천 과제 제거, 책시(책임자시험) RAG 구성 협의.
  가격협상은 비교적 유리하게 진행. Document AI API 구축(parsr+sglang+vllm 패키징),
  IBK 인프라 구성(SAN/GDS 스토리지, A-A/A-S 이중화), 온프렘 환경변수 등록 작업 수행.
  투입인력 계획 수립(12/1 투입 예정), 외주 SI 파트너(대훈님) 화면개발 협의, WBS 1차 드래프트
  작성. 양자화 모델(72B 4bit, 7B 튜닝) 테스트, 민감정보 감지/필터링 기능 요건 확인.
  유지보수 항목 작성 및 프로젝트룸 자리 확보를 위한 프로필 정보 수집 등 계약 준비 진행.
