summary: |
  IBK(기업은행) 생성형 AI PoC 프로젝트 초기 세팅 및 현장 설치 기간. 2024년 9월 초 채널이 개설되어
  을지로 IBK 본점 데이터센터에 서버 반입 및 설치를 진행함. 폐쇄망 환경에서 Docker Compose 기반
  패키징, SSD/USB를 통한 이미지 전달, Solar LLM(업스테이지) 연동, Pylon/Stargate/USIO 등
  스톰 솔루션 컴포넌트 조립 작업 수행. PoC용 문서(956개) 업로드 후 Libreoffice 이슈(188개),
  파싱 실패, 암호화 파일 등으로 약 203개 실패 확인. IBK 측에서 문서 2만개 업로드 및 멀티턴
  지원 요청이 있었으며, 문서 수 제한 협의 필요성 대두. 데이터센터 출입증 발급, 개인정보 동의서
  작성 등 행정 절차도 병행됨.
topics:
