summary: |
  IBK 본사업 운영 안정화 및 종료 단계 진입. 캐리어/서플라이/스톰파스/파일런 등 솔루션 컴포넌트의
  지속적 버전 업그레이드 및 반입 작업이 핵심. 쿼리 익스펜션 프롬프트 최적화('당행'을 'IBK기업은행'
  으로 변환하는 프롬프트 추가), 엑셀 파싱 개선, PDF 뷰어 CJK 글자 미출력 이슈 해결(psi-lense
  4.3.0 배포). 서플라이 인덱서 파켓파일 스토리지 용량 초과(300GB->64GB 정리) 문제 해결,
  Helm Chart 형상 정리 및 최신화, 불필요한 PVC 제거(720Gi 확보). 운영 메뉴얼 작성(노션),
  검수용 에이전트 생성, 부하테스트(VUS 스크립트), 서플라이 쿼드란트 연동 기능 추가.
  9월 말 종료보고 예정으로 인수인계 준비 시작. 이재준(Leo)이 현장 주요 담당자로 활동하며
  박상학 과장님/박재현 대리님과 직접 소통. 커스텀 프롬프트 유출 방지 조치, 배치 서비스
  서플라이 인덱서 직접 운영 이관, 출입증 반납 등 프로젝트 마무리 작업 진행.
