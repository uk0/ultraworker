summary: |
  IBK 본사업 본격 착수 단계. 1월 킥오프 이후 을지로 아비케(IBK 데이터센터) 현장 작업 시작.
  주요 작업으로 DP(업스테이지 Document Processing) 연동, Solar Pro/Mini 엔드포인트 설정,
  캐리어 서플라이 연동 테스트, 쿼리 익스펜션 파일런 적용 개발 등 수행. 코드파일럿 에이전트
  테스트(영업점 직원 피드백 수집), 행원도우미 에이전트 구성 진행. HWP 파일 폴라리스 API 변환,
  엑셀 파싱 이슈 대응, 키워드 부스팅 준비 등 RAG 성능 개선 작업 집중. IBK 담당자(박재현 대리,
  박성화 차장) 피드백 반영: 멀티턴 이슈, 할루시네이션, 청크 유사도 순서 재배열 요청, 피드백 기능
  간소화 등. 사이오닉 임베딩 vs 업스테이지 임베딩 비교 논의(사이오닉 1024차원 vs 업스 4096차원).
  Qwen 72B/32B 모델 테스트 및 활용 전략 수립. 리니어(Linear)에서 IBK 이슈 트래킹 시작.
  3월 말 기준 2,300여 문서 대상 RAG 성능 테스트 40건 수행.
