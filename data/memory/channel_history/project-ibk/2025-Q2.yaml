summary: |
  IBK 본사업 핵심 개발 및 운영 안정화 기간. 가장 활발한 분기(510개 메시지, 20명 참여).
  운영계/개발계 동시 관리하며 대규모 문서 학습(1차 3만개, 2차 5만개) 진행. 서플라이 인덱서
  코어덤프, vLLM 부하 테스트, SSE 통신 이슈 등 인프라 안정성 문제 집중 대응. Qwen 72B/32B
  VLM 기반 문서 파싱, xionic-vl 모델 반입, pepper-vl 기동 등 VLM 활용 확대. 하이라이팅
  기능 개선(형광펜 스타일, 띄어쓰기 무시), 출처 문서 검토 기능, PDF 뷰어 CJK 폰트 이슈 대응.
  부하테스트(RPS 2에서 성능 저하 확인, 35-40초부터 SSE 지연), 워크플로우 구간별 평균 수행속도
  측정. 서플라이 인덱서 파켓파일 스토리지 관리(300GB 초과 문제), aux bucket 참조 이슈,
  문서 삭제/재학습 시 qdrant 벡터 잔존 문제 등 운영 이슈 다수 발생. 코드파일럿 아이콘 디자인,
  피드백 삭제 버그 수정, FAQ 100개 골든청크 평가 등 품질 관리 작업 수행. 페이스메이커(DB 이중화)
  테스트 일정 조율, 그라파나 대시보드 GPU 사용량 지표 추가 요청 등 인프라 운영 고도화.
