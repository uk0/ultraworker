summary: |
  2025년 2분기 status-app 채널은 New Relic의 "status-app" 워크플로우를 통해 애플리케이션 오류(Application Error)를 실시간으로 알림하는 채널로, 5월 말부터 6월에 걸쳐 활발한 알람이 발생하였다.
  주요 모니터링 대상 서비스는 stargate-api(dev/live), carrier-storm-parse(dev/live), carrier-supply-dev, carrier-dev, storm-parse-api-dev 등이며, New Relic의 "Application Error" 조건 위반 시 Critical 우선순위 알람이 발송되었다.
  5월 31일에 dev 환경 메모리 사용률 초과(90% 이상)로 stargate-rallypoint Pod 재시작 알람도 발생하였다.
