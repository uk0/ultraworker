  - title: "LLM-as-a-Judge 언어별 편향 발견"
    date: "2025-01-15~16"
    participants: ["박우명", "dasolchoi", "song"]
    summary: "동일 답변을 한국어/일본어로 평가 시 점수 역전 현상 발견. 언어에 따른 LLM Judge 평가 편향 확인. 논문화 추진(ACL/NAACL)."
  - title: "리더보드 공개 계획 논의"
    date: "2025-02-25"
