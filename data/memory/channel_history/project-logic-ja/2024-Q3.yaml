summary: |
  2024-Q3에는 LogicJa 프로젝트의 구체적인 추진 방향에 대한 논의가 이루어졌다. Sigrid Jin이 일본어 LLM 관련 Nejumi 리더보드 자료를
  공유했고, 9월에 Noah(고석현)가 프로젝트 추가 진행 여부를 문의하면서 본격적인 논의가 재개되었다. 데이터 번역이 완료되어 주요 모델
  평가를 시작할 수 있는 상태가 되었으며, 리더보드 공개 시기를 일본 법인 설립이나 일본 외부 고객 유치 시점 1달 전으로 설정하는 전략이
  논의되었다. 프론트엔드 화면 개발에 대한 실습생 활용 방안도 검토되었다.
