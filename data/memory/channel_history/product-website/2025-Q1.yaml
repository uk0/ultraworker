summary: |
  채용 사이트 통합과 홈페이지 콘텐츠 업데이트 필요성이 제기된 분기(7건 메시지).
  1월에 김덕현(Dekay)이 career.sionic.ai 도메인을 Oopy(노션) 기반에서 Flex 채용 사이트로 리다이렉션하는 작업을 배포했다. Oopy 구독료 절약과 채용 사이트 단일화가 목적이었다.
  3월에는 박우명이 홈페이지 솔루션 페이지(STORM Answer, Analyze, Organize 등)의 정보가 구식이며 TBD 상태로 남아있어 업데이트가 필요하다는 제안을 했고, 20개의 답글로 활발한 논의가 이루어졌다.
  STORM Console의 일본 버전 존재 여부, 홈페이지 한국어 페이지에서 영어 시연 영상 노출 등 다국어 관련 이슈도 논의되었다.
