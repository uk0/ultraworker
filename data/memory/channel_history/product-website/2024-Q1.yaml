summary: |
  Sionic AI 공식 홈페이지 리뉴얼 프로젝트가 본격적으로 시작된 분기. 2024년 3월 중순에 채널이 개설되어 디자이너(hyerim9098), 기획자(김혜원), 프론트엔드 개발자(박나희), 콘텐츠 담당(최윤정) 등이 참여했다.
  주요 작업으로 Figma 기반 디자인 시스템 구축(컬러, 폰트, 탭, 푸터), Answer/Platform/Company/Contact 등 각 페이지 레이아웃 초안 제작, 다국어(한국어/일본어) 지원 설계가 진행되었다.
  메뉴 구조 논의(플랫폼과 프로덕트 분리 여부), 투자사 로고 정리, 멤버 프로필 사진 누끼 작업, Collaborative Research 페이지 디자인 등 세부 작업이 활발히 이루어졌다.
  About Us는 노션+우피(Oopy) 방식으로 결정되었고, 블로그는 아웃링크 대신 내부 컨텐츠로 운영하기로 했다.
