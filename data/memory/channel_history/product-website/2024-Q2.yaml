summary: |
  홈페이지 리뉴얼의 핵심 개발 및 QA 단계가 진행된 분기. 4월 초 디자인 완성본 리뷰 후 프론트엔드 개발(박나희, eun.juuu0)이 본격 시작되었다.
  4월 첫째 주에 홈, 플랫폼, 앤서, 컴퍼니, 리서치(벡터/한국어데이터), 뉴스룸, 문의하기 등 전 페이지에 대한 집중 QA가 이루어졌다.
  도메인 전환(sionic.jp -> sionic.ai) 작업이 4월 10일에 진행되었고, 메타데이터/SEO 이미지 추가, 404 페이지 디자인, Contact 페이지 슬랙봇 연동, 모바일 반응형 QA가 순차적으로 진행되었다.
  5월에는 일본어 번역 적용이 주요 작업이었으며, 번역 QA 및 이미지 내 텍스트 번역 누락 수정이 이어졌다. 웹사이트 콜드스타트 성능 이슈도 발견되어 논의되었다.
  6월에는 일본어 버전 모바일 대응 미비 및 테크블로그 언어 설정 버그가 제보되었다.
