summary: |
  홈페이지 대규모 개편 프로젝트의 기획 및 준비 단계가 시작된 분기(6건 메시지).
  6월 초 김혜원이 김부교(Bekay)에게 홈페이지 개편 작업을 요청하면서, 먼저 경쟁사 홈페이지 리서치를 진행하도록 업무를 배정했다(27개 답글로 활발히 논의).
  STORM Parse 제품 페이지 기획 시 LlamaIndex의 LlamaParse를 참고 레퍼런스로 공유했다.
  일본 오피스 주소가 변경되어(虎ノ門ヒルズビジネスタワー15階) 홈페이지 반영이 요청되었다.
