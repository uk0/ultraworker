summary: |
  홈페이지 대규모 개편 프로젝트가 본격 진행된 분기(62건 메시지, 가장 활발한 활동).
  7월에 외주 디자이너(hyerim9098/혜림) 채용 및 킥오프가 이루어졌고, Figma 기반으로 메인/플랫폼/솔루션 페이지 디자인이 진행되었다. 프론트엔드 개발은 백은주가 담당하여 Vercel 기반 개발 환경에서 작업했다.
  7월 말 헤더/푸터 디자인 어셋이 완성되어 개발 시작, 8월 초 메인 페이지 이미지 어셋 완성, 8월 중순까지 STORM Platform, Parse, Retrieval 솔루션 페이지 디자인 및 개발이 순차적으로 완료되었다.
  주요 논의 사항: 스크롤 인터랙션 구현 방식, 캐러셀 끊김 동작 수정, 다국어 번역 파일 처리 방식, 문의하기 폼 셀렉트 박스 추가, Contact Us 페이지 수정, 채널톡 도입 검토, 일본어 약관 추가 등.
  일본 비즈니스 측(s.baek)에서 일본어 워딩 자연스러움(知識探索 -> ナレッジリサーチ), 언어 설정 유지 문제 등을 제보했다. 셔터스톡 이미지 구매, STORM 로고 화이트 버전 사용 등 에셋 관련 논의도 있었다.
