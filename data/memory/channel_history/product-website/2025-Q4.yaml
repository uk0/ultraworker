summary: |
  홈페이지 개편 마무리 및 유지보수, NEWS 업데이트가 주요 활동이었던 분기(14건 메시지).
  10월 중순에 홈페이지 개편 프로젝트의 마지막 이슈가 해결되어 공식 완료되었다. Stripe 결제 심사를 위해 일본법 상 필요한 '특정 상거래법에 근거한 표기' 페이지가 추가되었으며, 일본어(ja) 설정 시에만 메뉴가 노출되도록 설정했다.
  11월~12월에는 NEWS 업데이트 작업이 집중적으로 이루어졌다(투자 유치 성공, 기업가치 4배 성장 등 언론기사 반영). 홈페이지 버튼 오류 제보, 배경 이미지 활용 요청(PPT 디자인) 등 내부 이용 관련 논의도 있었다.
  12월 말에는 언어별 시연 영상 교체 작업이 요청되었고, 일본어 설정에서 Contact Us 클릭 시 한국어로 전환되는 버그가 제보되었다. Parse 페이지의 일본어 버튼 링크 오류(/ja/contact 대신 /ko/contact로 이동)도 발견되어 기획 확인이 필요했다.
