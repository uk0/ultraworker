summary: |
  Pylon 운영 에러 알림 채널. 807개 메시지, 참여자 7명으로 대응 인력이 적었던 분기.
  주요 이벤트는 11월 Pylon 서버 장애로, 배포 파이프라인 오류로 인한 live 서비스 404 에러가 약 20분간 지속되었다.
  EKS에서 이관된 후 기존 모니터링 엔드포인트(/api/v1/health)가 유효하지 않게 되어 v2로 변경이 필요했다.
  암호화된 PDF 파일(EncryptedFileError) 처리 에러, Qdrant 컬렉션 중복 생성 에러(ALREADY_EXISTS)도 발생.
  NewRelic 알림이 본격 활용되기 시작하여 DocumentAlreadyExistsError, TypeError 등이 감지되었다.
  모니터링 봇의 NewRelic 완전 이관 논의가 진행되었다.
topics:
  - Pylon 배포 파이프라인 오류 (live 404 장애)
  - EKS 이관 후 헬스체크 엔드포인트 변경 필요
  - 암호화 PDF 파일 처리 에러 (EncryptedFileError)
