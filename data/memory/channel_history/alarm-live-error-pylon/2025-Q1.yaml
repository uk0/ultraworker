summary: |
  Pylon 운영 에러 알림 채널. 186개 메시지로 에러가 크게 감소한 분기.
  주요 에러는 unstructured-io 문서 파싱 실패가 지속되었으며, 빈 응답과 예상치 못한 에러 두 유형이 발생했다.
  HTTPError 형태의 에러(TaskStatus.ERROR)도 등장하여 에러 형식이 변경된 것이 확인되었다.
  NewRelic에서 DocumentAlreadyExistsError, FileParserAPIError 등의 예외가 자동 감지 및 알림되었다.
  전반적으로 안정적인 분기로, 에러 빈도와 스레드 수 모두 이전 분기 대비 대폭 감소했다.
