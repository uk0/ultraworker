summary: |
  Pylon 운영 에러 알림 채널. 1264개 메시지로 에러가 급증한 분기.
  GET_ANSWER_CONTEXT_ERROR가 주요 에러로, Gemini 임베딩 모델 설정 에러('gemini_embedding_001' 모델 미지원)가 핵심 원인이었다.
  CREATE_DOCUMENT_PROCESS_ERROR도 지속 발생하여 400 Bad Request 에러(Unexpected Response)가 다수 확인되었다.
  NewRelic에서 ValueError, HTTPException, DocumentAlreadyExistsError 등 다양한 예외가 감지되었다.
  12월 말에 에러가 집중 발생하여 분기 후반 안정성이 저하되었으며,
  임베딩 모델 설정 관련 Configuration Error가 새로운 에러 패턴으로 등장했다.
topics:
  - Gemini 임베딩 모델 설정 에러 (gemini_embedding_001)
  - GET_ANSWER_CONTEXT_ERROR 급증
