summary: |
  Pylon 운영 에러 알림 채널. 875개 메시지로 전 분기 대비 감소한 분기.
  주요 에러는 CREATE_DOCUMENT_PROCESS_ERROR로, unstructured-io 문서 파싱 실패(빈 응답)가 지속적으로 발생했다.
  document enrichment 에러(point_id 관련)도 새로 등장하여 벡터 포인트 처리 문제가 확인되었다.
  Live Qdrant 헬스체크 503 에러도 간헐적으로 발생했으며, 에러 알림 수신자에 @U07CAKMF57F가 추가되었다.
  에러 코드 체계가 이전 분기보다 구조화되어 CREATE_DOCUMENT_PROCESS_ERROR, GET_ANSWER_CONTEXT_ERROR 등
  명확한 에러 코드가 사용되기 시작했다.
