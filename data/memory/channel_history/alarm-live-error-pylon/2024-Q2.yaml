summary: |
  Pylon 운영 에러 알림 채널. 1827개 메시지로 에러 급증한 분기.
  Qdrant 벡터DB 장애가 핵심 이슈로, Dev/Staging Qdrant 503 에러와 collection not found 에러가 다수 발생했다.
  6월 말에는 Qdrant 컬렉션 미존재 에러(gRPC NOT_FOUND)가 집중 발생하여 검색 서비스에 영향을 미쳤다.
  Pylon 서버 헬스체크 실패(Live/Staging 모두 503, connection reset)도 빈번했으며,
  Korean Reranker 서비스 503 장애, Anthropic API 에러(빈 메시지 content, at least one message required)도 발생.
  Sigrid Jin이 Qdrant 재시작 및 Korean Reranker 복구 등 장애 대응을 주도했다.
