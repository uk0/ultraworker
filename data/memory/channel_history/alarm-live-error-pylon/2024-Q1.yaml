summary: |
  Pylon 운영 에러 알림 채널. 1029개 메시지로 주로 staging 환경의 문서 파싱 에러가 집중 발생했다.
  대부분 Pylon Staging Error 형태로, 문서 파싱 실패(한화생명 보험약관 PDF 등)가 반복적으로 알림되었다.
