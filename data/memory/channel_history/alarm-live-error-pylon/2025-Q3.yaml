summary: |
  Pylon 운영 에러 알림 채널. 53개 메시지로 역대 최소 에러 발생 분기.
  10월 1일에 Qdrant gRPC 연결 거부 에러(StatusCode.UNAVAILABLE)가 집중 발생하여 검색 서비스에 영향을 미쳤다.
  GET_ANSWER_CONTEXT_ERROR가 주요 에러 코드로, Qdrant 서버(10.96.10.36:6334) 연결 실패가 원인이었다.
  NewRelic에서 grpc._channel:_InactiveRpcError가 자동 감지되었다.
  전반적으로 매우 안정적인 분기였으며, 분기 초 Qdrant 연결 이슈를 제외하면 에러가 거의 없었다.
