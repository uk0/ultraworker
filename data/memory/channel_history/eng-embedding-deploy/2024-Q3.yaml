summary: |
  2024-Q3에 eng-embedding-deploy 채널이 생성되었다. Sigrid Jin(진형)이 채널을 만들고
  임베딩 모델 배포 관련 작업을 주도했다. 주요 작업으로 sionic-ai 계정으로 기존 모델들을
  옮기고, 차트 수정 및 시크릿 업데이트 후 온프렘 test namespace에 배포했다.
  배포 후 테스트 스크립트로 라이브 모델과 동일성을 검증했으며, NAS로 모델 파일 백업을
  완료했다. Noah(고석현), 송명하에게 컨펌 후 rolling update로 교체 예정이었다.
