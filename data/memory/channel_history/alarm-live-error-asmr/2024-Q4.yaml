summary: |
  2024년 4분기 alarm-live-error-asmr 채널에서는 OpenLLM 라이브 API 오류 알림과 함께 Azure 엔진 관련 모델 호환성 이슈가 주요하게 다루어졌다. Azure 엔진 선택 시 gpt-4-turbo-2024-04-09 외의 모델에서 응답이 오지 않는 문제가 확인되었으며, 11월에는 다수의 OpenLLM API 오류가 집중적으로 발생하였다. 또한 OpenLLM의 AI 프로바이더(req/res)에 대한 DB 기록 제거 작업이 진행되었고, 뉴렐릭 traceId 연동 요청이 있었다. 채널 초기에는 팀원들의 참여와 테스트 알림 설정이 이루어졌다.
