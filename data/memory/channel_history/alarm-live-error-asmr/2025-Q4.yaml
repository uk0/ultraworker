  - name: "OpenLLM API 오류"
    mention_count: 200
    description: "라이브 환경 OpenLLM에서 발생한 API 오류 알림. max_tokens 누락, temperature/top_p 동시 설정, 모델 불일치 등"
  - name: "Gemini 모델 미존재 오류"
    mention_count: 30
    description: "gemini-3-pro-preview8, gemini-3-pro-preview 등 존재하지 않는 Gemini 모델 호출로 인한 503/400 오류"
  - name: "Claude API 파라미터 오류"
    mention_count: 20
    description: "Claude 모델 사용 시 max_tokens 미설정, temperature와 top_p 동시 설정으로 인한 400 오류"
  - name: "정적 리소스 404/500 오류"
    mention_count: 15
    description: "favicon.ico, 루트 경로 등 정적 리소스 요청에 대한 NoResourceFoundException"
