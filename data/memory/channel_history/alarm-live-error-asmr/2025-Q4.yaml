summary: |
  2025년 4분기 alarm-live-error-asmr 채널에서는 ASMR-V2(AI Search & Match Results) 라이브 환경의 API 오류 알림이 대량으로 수신되었다. OpenLLM API 오류가 가장 빈번하게 발생하였으며, 주요 원인으로는 Claude API의 max_tokens 누락, temperature/top_p 동시 설정 오류, 존재하지 않는 Gemini 모델 호출(gemini-3-pro-preview8, gemini-3-pro-preview), favicon.ico 등 정적 리소스 미발견(500) 등이 확인되었다. 11월 말부터 ASMR-V2 포맷의 상세 오류 알림이 추가되었으며, 개별 오류에 대한 담당자 코멘트와 원인 분석이 스레드로 이루어졌다.
