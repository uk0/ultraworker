summary: |
  2025년 1분기 alarm-live-error-asmr 채널에서는 OpenLLM API 오류가 지속적으로 발생하였으며, 주요 이슈로는 o1-mini 모델의 미지원(carrier 연동 관련), 슬랙 알림 속도 제한 초과, 채널명 변경(status-openllm -> status-asmr) 등이 있었다. 1월에는 개발 환경 오류 알림이 라이브 채널로 잘못 전달되는 설정 오류가 있었으며, 담당자(하담/귤진우)가 원인 분석 후 수정하였다. 2월에는 인간 스케줄러(수동 API 테스트)를 통한 테스트 완료 결과 공유와 Upstage 라이브 배포 전 fail 발생이 기록되었다. 3월에는 슬랙 알림 템플릿 개선 테스트가 진행되었다.
