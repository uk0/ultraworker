summary: |
  2025년 2분기 alarm-live-error-asmr 채널에서는 OpenLLM API 오류가 산발적으로 발생하였다. 주요 이슈로는 Upstage의 solar-pro-241126 모델이 무효화되어 400 오류가 발생하고, 준컨설팅 관련 메시지 content가 공백인 400 오류, Upstage 크레딧 부족으로 인한 엔진 실패 등이 있었다. 4월 말부터 5월까지 solar 모델 이슈가 집중 논의되었으며, 6월에는 채널명이 status-asmr에서 alarm-live-error-asmr로 변경되었다. 담당자(하담, 귤진우)들이 원인을 즉시 분석하고 코멘트를 달아 빠른 대응이 이루어졌다.
