summary: |
  Pylon 개발 환경 에러 알림 채널. 9155개 메시지(일평균 118.9건)로 역대 최다 에러 발생 분기.
  429 Too Many Requests 에러(Rate Limiting)가 대량 발생하여 외부 서비스 호출 제한이 핵심 이슈였다.
  CREATE_DOCUMENT_PROCESS_ERROR 지속 발생: unstructured-io 파싱 실패, S3 서버 연결 실패,
  BGE-M3 임베딩 서버(bge-m3-embedding.sionic.tech) 연결 제한 초과 등 다양한 원인이 확인되었다.
  Qdrant NOT_FOUND 에러도 간헐적으로 발생했다.
