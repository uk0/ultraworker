summary: |
  Pylon 개발 환경 에러 알림 채널. 3724개 메시지(일평균 81건)로 이전 분기 대비 에러 감소.
  EmbeddingServiceAPIError가 새로 등장하여 임베딩 서버 연결 실패 및 빈 결과 반환이 주요 이슈였다.
  ENRICH_DOCUMENT_PROCESS_ERROR에서 RESOURCE_EXHAUSTED(gRPC 리소스 소진) 에러가 빈번하게 발생했다.
  404 Not Found 에러와 DocumentAlreadyExistsError도 12월에 집중 발생했으며,
  NewRelic에서 다양한 예외 유형이 자동 감지되었다.
