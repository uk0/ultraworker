  2025년 1분기 thanks-sionic 채널은 3월 7일 덕현님이 IBK 프로젝트에서 옵스 팀원들의 도움에 감사를 표하며 채널을 개설하였다.
  채널 설명에는 "항상 도움받는 분들께 감사함을 표하고 싶어서 만들었습니다"라고 명시되어 있다.
  3월에 IBK 배포 및 운영 관련 수고한 팀원들(명하님, 재준님, 욱님 등)에 대한 감사 메시지와, 신입 팀원의 첫 주 감사 인사, 제품소개서 작업을 도와준 팀원들에 대한 감사 메시지가 공유되었다.
