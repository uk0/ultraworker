summary: |
  2025년 3분기 thanks-sionic 채널은 시암(SIAM) 프로젝트, 제주도 워크샵, 파이콘 튜토리얼 등 굵직한 이벤트들 사이에서 팀원 간 감사가 활발하게 이루어진 분기였다.
  7월에는 IBK 현장 전사들(덕현, 재준, 윤정)에 대한 감사와 강욱님의 러버덕 세션 감사, IR 자료 제작 감사 등이 공유되었다.
  8월에는 시암 중간보고 성공 기념으로 기여자들(강욱님, 시형님, 혜원님 등)에 대한 감사가 이루어졌고, 제주도 플레이샵 인솔 담당자들에 대한 감사도 기록되었다.
  9월에는 병무청 연구소 세팅 작업, 면접 진행, 그리팅 채용 도입에 대한 감사 메시지가 공유되었으며, 팀의 이타적 문화에 대한 감동적인 소회도 기록되었다.
