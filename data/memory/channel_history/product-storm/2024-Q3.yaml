summary: |
  2024년 3분기 product-storm 채널에서는 캐리어(Carrier) 연동 개발, 권한 관리 시스템 설계, 대시보드 고도화가 핵심 주제였다.
  1 bucket 1 collection 구조 재검토, 청크 사이즈 조정 기능 추가, 문서 버킷 이동 로직 개선 등 RAG 파이프라인의 구조적 고도화가 진행되었다.
  권한 관리 테크스펙 리뷰(admin/manager/worker 체계), 이용약관 법률검토, 플랜 구독 기능 논의 등 엔터프라이즈 기능이 본격적으로 기획되었다.
  파일 업로드 확장자 허용 변경, 디자인 시스템 적용, API key 재발급 기능 등 플랫폼 성숙도를 높이는 작업이 다수 수행되었다.
