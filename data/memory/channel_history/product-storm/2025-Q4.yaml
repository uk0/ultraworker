summary: |
  2025-Q4에는 실행로그(상세로그) Phase 1-2 개발, 워크플로우 리비전(버전 관리) 기능, 체크리스트(소프트 블록 정책) 기능이 주요 개발 항목이었다.
  로직레그(LogicLeg) 도입으로 다단계 추론 검색이 시작되었고, 루프 노드/텍스트 노드 등 새로운 워크플로우 노드 기획이 진행되었다.
  디자인 시스템 Foundation 보충 작업이 시작되었으며, 예상 비용 계산기 기능, 개인 이메일 가입 차단 정책, 챗 파일 업로드 기능 개발이 추진되었다.
  asmr-v2 엔진 교체, Gemini 3 Pro Preview 모델 추가, AI 기본법 대응 검토 등도 이루어졌다.
