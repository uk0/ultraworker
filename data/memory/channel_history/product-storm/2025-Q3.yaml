summary: |
  2025-Q3에는 워크플로우 캔버스 고도화(API 노드, if-else 노드, 변수 할당 노드, 커스텀 변수 관리 기능)가 집중적으로 개발되었다.
  팀즈(Teams) 연동 개발이 본격 진행되어 기능 가시화 및 화면 싱크 작업이 이루어졌고, DFT(검색 모델 파인튜닝) 화면 기획이 완료되었다.
  에이전트 템플릿에서 LLM 파라미터 제거(Claude 4.5 호환성 대응), 쉐도우 계정 기능 준비, 디버그 기능 개발 배포, 답변 생성 시간 단축 논의 등 제품 운영 효율화 작업도 진행되었다.
  deprecated Gemini 모델 제거, HyperCLOVA HCX-005/007 모델 추가, max_tokens 기본값 증가 등 LLM 모델 관리 작업이 이루어졌다.
