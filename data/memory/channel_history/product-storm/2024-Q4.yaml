summary: |
  2024년 4분기 product-storm 채널에서는 IBK 기업은행 온프레미스 요건 대응, 민감정보 감지/마스킹 기능 기획, 캐리어 노드 고도화가 핵심 주제였다.
  캐리어의 API 호출 노드, 후처리 노드 개발이 진행되었고 GUI 도구 기획과 오더시트 화면 설계가 이루어졌다.
  OpenAI 장애 대응을 위한 fallback 전략 강화, LLM 모델 리스트 정비(벤더/모델/리전 조합 검증), 업스테이지 Document Parse 테스트 등 LLM 인프라 안정성이 강조되었다.
  다국어 지원 확대(태국어, 영어, 프랑스어, 베트남어), 이용약관 웹사이트 게시, 마크스폰/띵플 등 신규 고객사 온보딩 대응도 활발하게 진행되었다.
