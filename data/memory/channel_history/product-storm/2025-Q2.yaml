summary: |
  2025-Q2에는 오더시트 리팩토링(V0->V1 스키마 전환)과 워크플로우 캔버스 GUI 도구 개발(Phase 1~2)이 핵심 작업이었다.
  PDF 뷰어 하이라이팅 개선, LLM 청크 식별(출처 검증) 기능 기획, 팀즈(Teams) 연동 1차 기획이 시작되었으며, storm-parse v2 분리 작업도 착수되었다.
  IBK 5만건 문서 검색 성능 저하 이슈, 오더시트 스키마 버전 불일치로 인한 에이전트 먹통 장애, 파일론 대규모 동시 학습 시 콜백 유실 등 운영 이슈가 발생하여 긴급 대응이 이루어졌다.
  에이전트 템플릿 다국어(ko/en/ja/th) 시스템 프롬프트 분리, Apidog 최소 시나리오 자동 테스트 도입, 추론 모델 응답 처리 방식 논의도 진행되었다.
