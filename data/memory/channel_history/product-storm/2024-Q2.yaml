summary: |
  2024년 2분기 product-storm 채널에서는 Storm Answer 제품의 기능 고도화와 안정화 작업이 집중적으로 진행되었다.
  RAG on/off 기능 추가, LLM 모델 설정 및 프롬프트 커스텀 기능 기획, KT 믿음(MiDM) 스트리밍 지원, 대시보드 화면 기획 등 주요 신규 기능이 개발되었다.
  Pylon API v2 마이그레이션, SSE 스트리밍 안정화, 피드백 학습 상태 이슈 등 기술적 개선과 함께 카카오톡 봇 연동, 암호화 기반 인증 기능 등 채널 연동 작업이 추진되었다.
  Qdrant 장애 대응, OpenAI 모델 상태 불안정 이슈 등 운영 안정성 관련 논의도 다수 이루어졌다.
