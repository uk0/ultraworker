summary: |
  2024년 1분기 product-storm 채널에서는 Storm Answer 제품의 0.8.0 라이브 배포를 중심으로 활발한 개발 및 QA 활동이 진행되었다.
  Pylon 임베딩 서버 이관(논스 -> GPU worker 6), Qdrant 1.8.1 버전 업그레이드, Stargate EKS 이관 등 인프라 고도화 작업이 주요 이슈였다.
  프론트엔드에서는 권한 관리 페이지 기획, 피드백 등록 기능, 일본어 지원, 스트리밍/중지 기능 등이 개발되었고 다수의 버그 수정 및 QA가 이루어졌다.
  고객사 수협(KT) 데모 대응, HyperCLOVA X RPM 상향, Stargate 어드민 페이지(Retool) 구축 등 비즈니스 관련 논의도 활발했다.
