summary: |
  2025-Q1에는 IBK 프로젝트 배포 및 온보딩이 주요 화두였으며, 서플라이(Supply) 검색 로직 개선(탐색 2차 결과 분석, 공용/임시 버킷 연동)과 파일론(Pylon) 청크 중복 제거 논의가 활발했다.
  스톰 콘솔 무한로딩 이슈, 브라우저 커넥션 풀 부족 문제(HTTP/2 전환 필요성), hwpx 확장자 지원 등 안정성 개선 작업이 집중적으로 이루어졌다.
  민감정보 처리 Phase 2(전수검사 API), 오더시트 다국어 대응, 문서 출처 하이라이팅 정확도 개선 등 제품 고도화 논의가 진행되었으며, sonnet 3.7/GPT-4.5 모델 추가 계획도 논의되었다.
