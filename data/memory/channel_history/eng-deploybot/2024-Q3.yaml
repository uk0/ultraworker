summary: |
  2024-Q3은 배포봇 고도화 및 이슈 해결이 집중된 분기. 채널 이름이 "etc-deploybot"에서 "eng-deploybot"으로 변경됨. 주요 이슈로 deploy bot이 2개 앱(sionic-deploy: 공통 템플릿 지원 / deploy: 기존 Pylon/Stargate 배포 지원)으로 혼재된 문제가 발견되어, Sigrid Jin이 통합 수정 작업을 진행. GoCD 스크립트에서 latest 태그 누락으로 ECR 이미지 풀 실패(ErrImagePull) 이슈도 발생. 신희수에게 GoCD EnvironmentVariables 관련 이슈 해결을 위한 good first issue가 제안됨. Noah가 워크플로우 봇 기반 배포봇 자동화를 제안.
