summary: |
  누리미디어(Nurimedia) 고객사 테스트 채널 1. 2024년 2월에 채널이 생성되어 김혜원, kozistr833,
  Sigrid Jin, 송명하, 박나희, jinu 등이 참여함. 누리미디어 담당자들의 Storm Answer 테스트를 위한
  채널로 설명됨. 주요 테스트 내용: (1) 논문 기반 QA - MZ세대 조직원 연구 논문의 Q-Statements,
  Factor 분석, 인터뷰 답변 비교 등 심층 질의, (2) 의과학 논문 QA - 미토콘드리아 기능 이상과 암/당뇨
  관계 질의, (3) 다양한 페르소나 테스트(신문방송학과 교수 vs 3살 아이 요약 비교),
  (4) Levenshtein distance 계산 등 정량 분석 질의, (5) Rust ownership 등 도메인 외 질문 테스트,
  (6) 프롬프트 인젝션 방지 테스트. 김혜원이 test2/3은 외부 공유용이므로 테스트하지 말 것을
  당부하는 메시지도 있음. kozistr833과 Sigrid Jin이 가장 활발하게 테스트 수행.
