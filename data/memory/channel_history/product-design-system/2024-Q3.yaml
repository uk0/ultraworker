    aliases: ["스켈레톤"]
  - term: "filter chip"
    definition: "필터링 UI에서 사용되는 선택/해제 가능한 칩 컴포넌트"
    aliases: ["필터 칩"]
  - term: "radio card"
    definition: "채널 연동 화면 등에서 사용되는 카드형 라디오 선택 컴포넌트"
    aliases: ["라디오 카드"]
  - term: "퍼블리시 (Publish)"
    definition: "Figma에서 디자인 시스템 컴포넌트를 다른 파일에서도 사용할 수 있도록 배포하는 기능"
