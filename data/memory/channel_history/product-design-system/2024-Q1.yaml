summary: |
  2024년 3월 19일 채널 개설과 함께 디자인 시스템 프로젝트가 시작됨. 외주 디자이너(minnimalism/민효)가 합류하여
  Storm Answer 제품의 UI 정리 및 디자인 시스템 구축 킥오프 진행. shadcn/ui 기반 컴포넌트 라이브러리를 채택하고,
  Figma에서 컴포넌트 정리 및 디자인 토큰 환경 세팅 논의가 이루어짐. 1차 목표로 color, text, margin 토큰 정리가
  설정되었으며, 12 grid 레이아웃 정리, side panel 사이즈 조정, dark mode 대비 컬러 정리 등 UI 개선 방향이 수립됨.
  Tailwind CSS 컬러 팔레트 및 텍스트 스타일 기준으로 가이드 정리 방침이 결정됨.
topics:
