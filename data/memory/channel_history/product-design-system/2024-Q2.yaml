summary: |
  디자인 시스템 본격 구축 단계. 외주 디자이너(minnimalism)와 프론트엔드 개발자(eun.juuu0/은주)가 긴밀히 협업하여
  디자인 토큰 정의, 컴포넌트 가이드 제작, Storybook 연동을 집중적으로 진행함. 2차 계약이 범위 단위(기간 아닌)로
  설정되었으며, 스프린트 기반 테스크 관리 도입. 토큰 네이밍 컨벤션은 Amazon Style Dictionary 기준으로 결정됨.
  color, typography(fontSize, lineHeight, fontWeight, fontFamily), spacing/margin, boxShadow, borderRadius 등
  핵심 토큰 정리 완료 후 GitHub PR로 전달. 컴포넌트별 가이드를 Figma에서 props 정리(states, boolean, default값 등)하여
  ready-to-dev 상태로 제공. button, badge, accordion, input, textarea, select, date picker, toast, menubar 등
  다수 컴포넌트 정리 완료. Storybook(Vercel 배포)으로 디자인-개발 싱크 확인 체계 구축. 6월부터 디자인 시스템
  순차 적용 시작 합의. 데이터 시각화(대시보드) 관련 Material Design, Carbon, Microsoft 디자인 참고 자료 공유.
topics:
