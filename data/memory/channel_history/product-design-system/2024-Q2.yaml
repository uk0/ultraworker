  - Storybook 연동 및 Vercel 배포
  - 2차 계약 범위 설정
  - 스프린트 기반 테스크 관리
  - Figma props 정리 (states, boolean)
  - 데이터 시각화 라이브러리 리서치
  - 토큰 PR 리뷰 및 수정
