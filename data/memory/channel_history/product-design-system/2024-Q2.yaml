terminology:
  - term: "디자인 토큰 (Design Token)"
    definition: "색상, 타이포그래피, 간격 등 디자인 속성값을 코드로 관리하는 변수. GitHub PR로 개발팀에 전달"
    aliases: ["token", "토큰"]
  - term: "ready-to-dev"
    definition: "디자인 가이드 정리가 완료되어 개발 착수 가능한 상태를 나타내는 Figma 내 상태 표기"
    aliases: []
  - term: "Storybook"
    definition: "UI 컴포넌트를 독립적으로 개발하고 문서화하는 도구. Vercel에 배포하여 디자인 QA 진행"
    aliases: ["스토리북"]
  - term: "tokens studio for figma"
    definition: "Figma 디자인 토큰을 GitHub에 연동하는 플러그인. JSON 형태로 토큰을 내보내고 PR 생성"
    aliases: ["tokens studio"]
  - term: "Amazon Style Dictionary"
    definition: "토큰 네이밍 컨벤션 참고 기준. Category-Type-Item 구조"
    aliases: ["style-dictionary"]
  - term: "Carbon Design System"
    definition: "IBM의 디자인 시스템. 글로벌 토큰 구조 및 데이터 시각화 참고용으로 활용"
    aliases: ["Carbon"]
  - term: "Radix UI"
    definition: "접근성 중심 React 컴포넌트 라이브러리. shadcn/ui의 기반이며, props 정리 시 참고"
    aliases: ["radix"]
  - term: "Linear"
    definition: "프로젝트 관리 도구. 디자인 시스템 테스크를 티켓으로 관리"
    aliases: ["리니어"]
