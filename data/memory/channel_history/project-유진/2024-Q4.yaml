summary: |
  2024년 4분기 project-유진 채널은 유진투자증권과의 협업 프로젝트를 위해 12월 개설되었다.
  회의록 자동 요약 및 분석 에이전트 설계가 핵심 과제였으며, 클로바노트 녹취 데이터를 활용한 회의록 품질 개선, 키워드 레이블링, 액션아이템 추출 등을 아이디에이션하고 초기 테스트가 진행되었다.
  DT전략팀 자료를 활용한 테스트 결과 공유 및 피드백 루프도 시작되었다.
