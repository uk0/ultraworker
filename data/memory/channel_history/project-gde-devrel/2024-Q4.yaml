summary: |
  GDE(Google Developer Expert) 지원 프로젝트 채널이 개설된 분기.
  Sigrid Jin이 Google Korea 커뮤니티 담당 지인을 통해 fast track으로 GDE 지원했으나 탈락.
  탈락 사유는 Google product에 focus된 콘텐츠가 부족하다는 피드백이었다.
  내년도 Google Korea의 핵심 목표가 Generative AI(Vertex) 계열 GDE 선발 확대라는 정보를 공유하며,
  대외 활동을 전략적으로 준비해야 한다는 방향을 설정했다.
  채널명을 "project-gde"에서 "project-gde-devrel"로 변경하여 DevRel(개발자 관계) 활동까지 포함하는 범위로 확장.
