  2025년 4분기 storm-guide 채널은 STORM 제품의 가이드라인 개편 및 다국어(한국어, 영어, 일본어) 번역 검수를 중심으로 활발히 운영되었다.
  10월에 STORM 가이드라인 전체 개편이 완료되어 Apidog 기반으로 공개 배포되었으며, 과금 페이지, 채널 연동, 노드 설명, 변수 선언 등 주요 섹션의 보완 작업이 진행되었다.
  11월과 12월에는 Teams 채널 연동 가이드, 보고서 작성 템플릿 등 신규 콘텐츠의 영어 및 일본어 번역 기계번역 후 검수 작업이 반복적으로 진행되었다.
