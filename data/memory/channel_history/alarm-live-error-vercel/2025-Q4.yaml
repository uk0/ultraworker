summary: |
  2025-Q4 기간 동안 Vercel 서비스 상태 알림 채널이 새로 개설되어 Vercel Statuspage 통합이 연동되었다. 채널 개설 당일인 2025년 10월 20일에 Vercel IAD1 리전의 대규모 장애가 발생하여 라우팅 미들웨어, Vercel 함수, 대시보드, Edge Config, 빌드 서비스 등 전반에 걸친 장애가 수 시간에 걸쳐 진행되었다. 이후 빌드 큐 멈춤(11월 11일, 16일), Edge Config 오류(11월 4일), 도메인 등록 오류(12월 2일), Speed Insights 오류(12월 7일) 등 주기적인 서비스 장애 알림이 자동으로 수집되었다.
