summary: |
  2024년 1분기 etc-deploybot-gocd 채널이 신규 생성되었으며, GoCD 기반 배포봇 개발의 초기 기획 내용이 공유되었다.
  EKS 이관 완료 후 Go 언어 기반 기존 봇을 deprecate하고 Python 기반 신규 봇으로 전환하는 계획이 수립되었으며, GoCD 히스토리 조회, 배포 상태 확인, Slack 알림 등의 핵심 기능 목록이 정의되었다.
  채널 개설 직후 두 명의 팀원이 참여하여 초기 요구사항을 정리한 분기이다.
