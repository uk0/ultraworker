summary: |
  2024년 2분기 etc-deploybot-gocd 채널에서는 GoCD 기반 배포봇의 신규 설계 및 구현 논의가 활발하게 이루어졌다.
  Rust로 작성된 기존 배포봇을 대체하기 위한 Python/FastAPI 기반 신규 봇 개발이 시작되었으며, TICK 스택(Telegraf, InfluxDB, Chronograf, Kapacitor) 기반 모니터링 도입 방안도 함께 논의되었다.
  4월에 신규 채널이 생성된 이후 5월에 추가 팀원이 합류하였으며, MLOps Now 컨퍼런스 발표 준비 등 팀 외부 활동도 공유되었다.
