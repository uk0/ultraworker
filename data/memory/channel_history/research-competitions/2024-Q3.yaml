summary: |
  2024-Q3 research-competitions 채널은 Sionic AI 리서치팀이 외부 AI/ML 대회에 참가하면서 진행 상황을 공유하고 기술적 토론을 나누는 채널로 이 분기에 본격적으로 활성화되었다. 주요 참가 대회로는 Hugging Face 주관의 LLM Merging Competition과 국어원 주관의 HCLT 한국어 이미지 캡셔닝 대회가 있었다. LLM Merging 대회에서는 SLERP, TIES, DARE 등 다양한 모델 병합 기법을 연구하였고, HCLT 대회에서는 VisionEncoderDecoder 기반 VLM 파인튜닝을 시도하여 Qwen-VL-Chat 모델로 42.4점을 달성하였다. 또한 Bigcontest 등 추가 대회 참가 여부도 논의되었다.
