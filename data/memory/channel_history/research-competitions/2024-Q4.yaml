summary: |
  2024-Q4 research-competitions 채널에서는 금융 도메인 RAG 대회인 ICAIF FinanceRAG에 팀이 집중적으로 참가하였다. 초기에는 stella + GTE reranker 조합으로 3위를 달성하였고, 이후 document chunking 전략 개선, encoder 모델 교체(FinLang finance-embeddings 등), reranker 앙상블, query expansion 등의 기법을 적용하여 validation score 0.5를 초과하는 성과를 거두었다. 최종 5위로 마무리되었으며, 팀은 상위권 제출물의 query expansion 기법 분석 및 파인튜닝 전략 등을 리캡 미팅에서 공유하였다. 연말에 신규 팀원 2명이 채널에 합류하였다.
