terminology:
  - term: "FinanceRAG"
    definition: "금융 도메인 Retrieval-Augmented Generation 벤치마크 대회"
  - term: "reranker"
    definition: "초기 검색 결과를 재순위화하는 모델. GTE reranker, bge-m3 reranker 등이 사용됨"
  - term: "query expansion"
    definition: "원본 쿼리를 확장하여 검색 성능을 높이는 기법. 상위권 제출물에서 주로 활용됨"
  - term: "Contextual Retrieval"
    definition: "Anthropic이 제안한 검색 품질 향상 기법으로 문서 청크에 컨텍스트를 추가하는 방식"
  - term: "late chunking"
    definition: "문서를 나중에 청킹하여 전체 문서 임베딩 정보를 활용하는 검색 기법"
