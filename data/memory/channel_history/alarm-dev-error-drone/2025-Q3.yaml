summary: |
  2025년 3분기 alarm-dev-error-drone 채널은 개발 환경의 payment-service와 drone 서비스에서 발생한 오류를 자동으로 알림하는 채널로, 하루 평균 17.5건의 높은 빈도로 오류 알람이 발생하였다.
  주요 오류 유형은 TossPayments 결제 승인 실패, 결제 정합성 불일치(DB와 API 상태 불일치), TossPayments 5xx 서버 오류, Spring 서비스의 NoResourceFoundException 등이었다.
  9월에 결제 서비스(payment-service)와 drone 서비스 모두에서 집중적인 오류가 발생하였으며, 특히 결제 정합성 불일치 및 헬스체크 엔드포인트 오류가 반복되었다.
