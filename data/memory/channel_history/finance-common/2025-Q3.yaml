summary: |
  2025-Q3 finance-common 채널은 이전 분기 대비 스레드 수가 크게 증가하여, 각 주제에 대한 실질적인 논의가 활발해졌다. 주요 이슈로는 뉴렐릭(NewRelic) 모니터링 서비스 비용 과다 청구 문제(기존 150~200만원 대비 500만원 이상 청구)와 계약서 직인 처리, SaaS 법인카드 용도 논의, 태국 시암AI 출장 비용 등 실무적인 재무 행정 업무가 주를 이루었다. 외부 정보로는 국내 스타트업 투자 동향(2025년 상반기 AI 투자 44% 감소), 스타트업 M&A 사례, 오픈소스 커뮤니티와 투자유치 상관관계 등이 공유되었다.
