summary: |
  2024-Q3에 project-marcspon 채널이 개설되었다. 마크스폰(Marcspon) 고객 대응을 위해 김혜원이 채널을 만들고, 정세민(Sem),
  한시형, 최윤정, Sigrid Jin, Noah(고석현) 등이 참여했다. ESG/지속가능경영 보고서 관련 RAG(검색증강생성) 프롬프팅 작업이
  시작되었다. SK하이닉스 2023년 보고서를 기반으로 거버넌스, 이사회, 경영진 파트별 에이전트를 설정하고 프롬프트 테스트가
  진행되었다. chatreport GitHub 코드의 프롬프트를 참고하였다. 9월 말에는 use case 도출, 검토, 필요 기능 개발(문서 삭제, 로그 조회)
  등의 작업이 김혜원 주도로 논의되었다.
topics:
  - 마크스폰 고객 대응 채널 개설
  - ESG/지속가능경영 보고서 RAG
  - SK하이닉스 보고서 분석
  - TCFD 보고서 프롬프팅
  - use case 도출
