summary: |
  2025-Q3 research-parse 채널은 xionic-vl 개발이 진행되는 가운데 새로운 오픈소스 VLM 모델들을 지속적으로 모니터링하고 평가한 분기이다.
  GLM-4.1V-9B(9B로 Qwen2.5-VL-72B 수준 성능), dots.ocr(3B OCR 특화 모델), InternVL3.5, Qwen3-VL 출시 기대 등 다양한 오픈소스 모델 동향이 공유되었다.
  Marker, docstrange 등 오픈소스 파서 도구 공개 소식과 함께, PDF 파싱의 구조적 어려움에 대한 논문 및 커뮤니티 논의도 활발히 이루어졌다.
