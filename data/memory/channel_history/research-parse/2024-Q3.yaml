summary: |
  2024-Q3 research-parse 채널은 Storm Organize(현 Storm Parse) 상품화를 목표로 VLM 기반 문서 파싱 기술 연구가 시작된 분기이다.
  채널 초기에 상품화를 위한 문제 정의(속도·비용 이슈)와 역할 분담이 이루어졌고, Qwen2-VL-7B 공개 이후 이를 활용한 튜닝 실험이 집중적으로 진행되었다.
  대규모 데이터셋(700k~1M 목표) 생성과 함께 Pretrain → SFT 학습 전략, 프롬프트 가이드 개선 등이 논의되었으며, 기술 PR(블로그, Hugging Face, GitHub) 전략도 수립되었다.
