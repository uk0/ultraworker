    definition: "Qwen에서 공개한 멀티모달 VLM 모델 시리즈, 7B 및 72B 버전 존재"
  - term: "Parsr"
    definition: "PDF 파싱 라이브러리, llamaparse와 함께 Storm Parse 파이프라인에서 활용됨"
  - term: "llamaparse"
    definition: "PDF 전처리에 사용된 외부 파싱 도구, 장당 약 3원 비용 발생"
  - term: "드라군"
    definition: "OCR 정확도 향상을 위해 Storm Parse 파이프라인에서 활용하는 내부 OCR 컴포넌트"
