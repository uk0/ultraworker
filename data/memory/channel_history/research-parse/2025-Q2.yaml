summary: |
  2025-Q2 research-parse 채널은 xionic-vl이라는 자체 문서 파싱 전용 VLM 개발 계획이 수립되고, Gemma·VoRA 등 다양한 모델 실험과 PyMuPDF4LLM 파서 도입 검토가 이루어진 분기이다.
  Gemma 모델은 표 및 이미지 처리 능력 부족으로 한계가 확인되었고, VoRA(Vision OCR Research Architecture) 프로젝트로 TPU를 활용한 대규모 데이터 사전학습이 진행되었다.
  Storm Parse 데이터 제작 및 정제, IBK xionic-vl 작업 계획, Gemini 파인튜닝 실험 등이 병렬로 진행되었으며, 1차 한국어(8월 말), 2차 일본어(9월 말) 출시 목표가 설정되었다.
