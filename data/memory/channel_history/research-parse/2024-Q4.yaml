summary: |
  2024-Q4 research-parse 채널은 Storm Parse(구 Storm Organize)의 IBK 파인튜닝, 대용량 데이터셋 구축, 멀티모달 RAG 발전 방향에 집중한 분기이다.
  Gemini 2.0 Flash 모델의 뛰어난 마크다운 변환 성능이 확인되었고, 국가기록원 PDF 데이터 정제 과정에서 너무 쉬운 페이지 필터링 및 긴 표 생략 이슈가 발견되었다.
  IBK 금융 문서 파인튜닝 작업, OmniDocBench 등 파싱 벤치마크 분석, Qwen2.5-VL 학습 소식 등이 공유되었으며 다양한 파싱 모델(OmniParser, DocLayout-YOLO 등) 동향이 논의되었다.
