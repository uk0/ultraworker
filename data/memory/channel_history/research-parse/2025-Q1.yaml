summary: |
  2025-Q1 research-parse 채널은 채널 이름이 research-organize에서 research-parse로 변경되고, 팀의 파싱 기술 방향이 재정립된 분기이다.
  Gemini 2.0을 기준 성능으로 삼고 Qwen2.5-VL 7B 모델로 온몸 비틀기식 최적화를 우선 진행하기로 결정하였으며, Storm Parse 파이프라인에 Qwen 모델을 통합하는 작업이 추진되었다.
  나라장터 크롤링 파이프라인은 현실적 어려움으로 폐기하고 기존 보유 PDF 1.2TB 기반 전처리 파이프라인으로 전환하였으며, Qwen2.5-VL 32B 출시 및 GRPO 학습 실험 결과도 공유되었다.
