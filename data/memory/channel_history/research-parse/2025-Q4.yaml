terminology:
  - term: "Pepper"
    definition: "Qwen2.5-VL 기반 Sionic AI 자체 파인튜닝 파싱 모델, 32B(중형)와 소형 두 버전 관리 예정"
  - term: "Pepper2"
    definition: "Pepper의 후속 목표 모델, Qwen3-VL 기반 경량화 + 성능 개선 목표"
  - term: "드라군"
    definition: "Storm Parse 파이프라인의 OCR 컴포넌트, Gemini와 결합하여 chosen 데이터 생성에 활용"
  - term: "Edit Distance"
    definition: "Levenshtein Distance 기반 문자열 유사도 측정, DPO 데이터 품질 필터링에 활용(0: 동일, 1: 완전 상이)"
  - term: "DPO"
    definition: "Direct Preference Optimization, chosen(Gemini+드라군) vs rejected(Qwen3-VL) 쌍으로 학습하는 방법론"
  - term: "ORPO"
    definition: "Odds Ratio Preference Optimization, DPO를 보완하는 손실 함수 방법론"
  - term: "AI Hub"
    definition: "한국 AI 허브, VQA 한국어 데이터셋 등 공공 AI 학습 데이터를 제공하는 플랫폼"
  - term: "HunyuanOCR"
    definition: "Tencent에서 공개한 1B OCR 모델, 2025년 11월 출시 시점에 SOTA 성능"
  - term: "EDS"
    definition: "고난도 파싱 문서를 제공한 파트너사, 복잡한 레이아웃 문서 파싱 기술 검증에 활용"
  - term: "curriculum learning"
    definition: "난이도를 점진적으로 높이며 학습하는 방식, 파싱 데이터셋 설계 실험 중 하나로 검토됨"
