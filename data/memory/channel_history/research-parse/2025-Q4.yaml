summary: |
  2025-Q4 research-parse 채널은 Qwen3-VL 기반 파싱 모델 학습 실험과 평가셋 체계 고도화가 집중적으로 이루어진 분기이다.
  Pepper(Qwen2.5-VL 파인튜닝 모델)의 후속인 Pepper2 목표 하에 Qwen3-VL 4B/8B SFT 실험이 진행되었으며, 학습 데이터 품질 필터링(Edit Distance 기반)과 새로운 한국어 파싱 평가셋(225문제, 3타입) 구축이 핵심 성과였다.
  NVIDIA Nemotron Parse, AI Hub 한국어 VQA 데이터셋 변환, DPO/ORPO 등 학습 방법론 탐색도 병행되었으며, 취소선 인식, 다단 구조 판단 등 실제 문서 파싱 난제도 심도 있게 논의되었다.
