summary: |
  2025년 2분기 corp-vacation 채널은 118건의 메시지로 1분기 대비 휴가 사용이 증가했다.
  5월 초 어린이날 연휴(5/2~5/9)에 휴가가 집중되었으며, 박진형, 최병현, 이강욱, 김수진,
  신희수, 임예원, 강성우 등이 연휴 전후로 휴가를 사용했다. 6월에는 정기연이 5/30~6/5
  장기 휴가를, 양호진이 6/2~6/4 휴가를 신청했다. 권혜선(Jada)은 반차 변경 사유를
  직접 메시지로 공유하며 "오전 기차로 바꾸면서 오후 반차에서 오전 반차로 변경, 14시~15시
  즈음부터 재택 예정"이라 알렸다. 휴가 취소·재등록이 빈번했으며(양호진, 권혜선, 최병현,
  김수원, 김수진 등), 여름 휴가 사전 신청도 시작되었다(홍성아 8월, 박진형 8월, 신희수 7월).
