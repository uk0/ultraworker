summary: |
  2025년 3분기 corp-vacation 채널은 147건의 메시지로 연중 가장 활발한 휴가 사용 시기였다.
  8월 여름 휴가 시즌에 메시지가 집중되었으며, 강성우(8/28~9/18 장기 휴가), 최병현
  (9/22~10/14 장기 휴가, 8/25~8/29), 김수원(9/29~10/13 장기 휴가) 등 2주 이상
  장기 휴가 신청이 다수 있었다. 추석 연휴(10/3~10/6) 전후로 10월 10일 임시공휴일에
  맞춰 홍성아, 김혜원, 박진형, 양호진, 박우명, 최윤정, 원성준, 김부교, 조하담 등
  다수가 휴가를 신청했다. 고석현(Noah)이 "사우디에 쇼핑할 회사 M&A 리스트업 하러
  가셨다는게 사실인지"라는 유머러스한 코멘트를 남기기도 했다. 신규 멤버인 김부교,
  백승현, 박정환, 안진혁, 김덕현 등이 휴가 채널에 처음 등장했다.
