summary: |
  2025년 1분기 corp-vacation 채널은 flex 봇을 통한 자동 휴가 알림이 주를 이뤘다.
  총 95건의 메시지가 발생했으며, 주요 휴가 사용자로는 이강욱, 박진형, 신희수, 홍성아,
  송명하, 김수원, 김수진, 양호진, 최병현, 백은주, 조하담, 임예원, 박우명(Max) 등이 있었다.
  1월 말~2월 초 설 연휴 전후로 휴가 신청이 집중되었으며, 박진형은 1월 15일~2월 14일
  장기 휴가를 신청했다가 2월 3일까지로 변경하였다. 휴가 취소 및 재등록 건도 다수
  발생하였다(홍성아, 송명하, 고석현, 박우명 등). 권혜선(Jada)은 flex 봇 외에
  직접 메시지로 "효도이슈(아부지 병원 동행)으로 급반차 사용" 사유를 공유하기도 했다.
