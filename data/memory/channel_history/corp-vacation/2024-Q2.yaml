summary: |
  2024-Q2는 corp-vacation 채널이 처음 개설된 분기로, 기존 "vacation" 채널에서 "corp-vacation"으로 이름이 변경되었으며 Flex 연동 휴가 관리 정책이 도입되었다. 21명의 팀원이 참여하여 활동이 가장 활발했으며, 5월에는 호진님과 세민님의 SF 원격 근무 계획(6/3~6/24)이 공유되었고, 이후 세민님의 캘리포니아 재택 근무(6/17~7/4)로 이어졌다. 6월 7일 현충일에는 다수 팀원의 휴가 등록 및 취소가 반복되는 패턴이 관찰되었다.
