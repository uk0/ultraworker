summary: |
  2025년 4분기 corp-vacation 채널은 130건의 메시지로 연말 휴가 시즌의 활발한 사용을 보였다.
  12월 크리스마스 전후(12/22~12/26)에 휴가가 집중되었으며, 홍성아(12/22~24), 오승희
  (12/8~19, 12/22~24), 강성우(12/26~1/2), 송명하(12/23~24) 등이 연말 휴가를 사용했다.
  양호진은 11/10~11/21 장기 휴가를 신청했다가 취소하기도 했다. 신규 멤버로 이상호,
  홍혁준, 윤여준, 최소영, 오승희, 윤주운, 박상욱 등이 새로 등장했다. 고석현(Noah)이
  박진형 휴가에 "<@U06CLS6E694> 또 어디감.."이라는 유머러스한 코멘트를 남겼다.
  김혜원은 2026년 2월 6일 휴가를 미리 신청하기도 했으며, 김덕현도 1월 2일~6일
  연초 휴가를 미리 등록했다. 휴가 취소·변경이 빈번하게 발생했다.
