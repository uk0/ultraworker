  2024-Q3 corp-vacation 채널은 Flex 연동 휴가 알림을 기반으로 팀원들의 여름 휴가 일정이 활발하게 공유된 분기이다. 7~8월 여름 휴가 시즌에 집중적인 휴가 등록이 이루어졌으며, 김태은(호진님)과 세민님의 CUDA 여름학교 참가(8/26~8/29), 호진님과 세민님의 미국 샌프란시스코 원격 근무(6월), 세민님의 캘리포니아 재택 근무(6/17~7/4) 등 해외 원격 근무 사례도 포함된다. 또한 8월 1일에 Vacation 캘린더 추가 안내가 공지되었다.
