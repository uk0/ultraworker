summary: |
  Stargate API 운영 에러 알림 채널. 2887개 메시지로 에러 빈도가 높았던 분기.
  INTERNAL_SERVER_ERROR(34건)가 가장 많았고, ERROR_WHILE_PROCESSING_CARRIER_RESPONSE(21건),
  ERROR_WHILE_PROCESSING_POST_PROCESS(13건), FROM_PYLON(7건), SEND_TO_PYLON(3건) 순이었다.
  live 환경(78건) 에러가 대부분이었으며, unstructured-io 문서 파싱 실패가 지속적으로 발생했다.
  NewRelic Critical 알림이 3월 말에 집중적으로 발생하여 주말 포함 연속 장애 패턴이 나타났다.
  SSE 이벤트 매니저 브로드캐스트 관련 에러도 새로 등장했다.
