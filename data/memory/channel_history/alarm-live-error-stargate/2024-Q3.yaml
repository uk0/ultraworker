summary: |
  Stargate API 운영 에러 알림 채널. 이 분기는 4860개 메시지로 역대 최다 에러 발생 분기였다.
  live 환경 에러가 91건으로 대부분이었고, FROM_PYLON(29건), SEND_TO_PYLON(17건), ERROR_WHILE_SENDING_SSE_STREAM(15건),
  INTERNAL_SERVER_ERROR(14건), ERROR_WHILE_PROCESSING_CARRIER_RESPONSE(10건) 등 다양한 에러 유형이 고르게 분포했다.
  문서 파싱 실패(/callback/documents)와 검색 컨텍스트 에러(/answer/contexts)가 주요 경로였다.
  9월에는 NewRelic 알림 시스템 전환 논의가 있었으며, 반복 에러 알림의 실효성 문제가 제기되었다.
  카카오톡 채널 연동 테스트 중 에러도 확인되었다.
topics:
  - SSE 스트림 전송 에러 (ERROR_WHILE_SENDING_SSE_STREAM)
  - Carrier 응답 처리 에러 증가
  - NewRelic 알림 전환 논의
  - unstructured-io 문서 파싱 실패
