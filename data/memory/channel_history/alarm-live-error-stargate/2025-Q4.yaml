summary: |
  Stargate API 운영 에러 알림 채널. 1057개 메시지, 89개 스레드로 에러 빈도가 증가한 분기.
  ERROR_WHILE_PROCESSING_CARRIER_RESPONSE(56건)가 주요 에러로, 빈 메시지 content 관련 에러
  ("all messages must have non-empty content")가 반복적으로 발생했다.
  INTERNAL_SERVER_ERROR(24건), POST_PROCESS(7건), FROM_PYLON(6건), SEND_TO_PYLON(5건) 순이었다.
  live 환경(98%) 에러가 대부분이었고, /callback/documents, /callback/agents, /buckets 등 다양한 경로에서 에러 발생.
  12월에 NewRelic Critical 알림이 집중 발생했으며, 에러 패턴이 다양화되는 추세를 보였다.
topics:
  - Carrier 응답 에러 - 빈 메시지 content 문제
  - 다양한 API 경로에서 에러 분산 발생
  - NewRelic Critical 알림 (12월 집중)
  - INTERNAL_SERVER_ERROR 지속
  - 에러 패턴 다양화 추세
