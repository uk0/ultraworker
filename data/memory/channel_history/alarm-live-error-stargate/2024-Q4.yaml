summary: |
  Stargate API 운영 에러 알림 채널. 이 분기에는 ERROR_WHILE_PROCESSING_CARRIER_RESPONSE(39건)가 주요 에러 유형으로 급증했다.
  Azure OpenAI 모델 호환성 문제가 핵심 원인으로, gpt-4-0314, gpt-4, gpt-4-turbo, gpt-4o-mini 등의 모델이 Azure 지원 목록에 없어 에러 발생.
  INTERNAL_SERVER_ERROR(21건), ERROR_WHILE_PROCESSING_POST_PROCESS(15건)도 높았고, live 환경(81건) 에러가 대부분이었다.
  12월에는 Azure 엔진에서 gpt-4-turbo-2024-04-09 외 모델 선택 시 답변 미응답 이슈가 확인되었고, 에러 추적 가시성 강화 요청이 있었다.
  NewRelic Critical 알림도 지속적으로 발생했다.
topics:
