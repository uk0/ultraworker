summary: |
  Stargate API 운영 환경 에러 알림 채널. 이 분기에는 주로 staging 환경(91%)에서 Pylon 연동 관련 에러가 집중 발생했다.
  FROM_PYLON 에러가 61건으로 가장 많았으며, 대부분 /callback/documents 경로에서 문서 파싱 실패(한화생명 보험약관 PDF 등)가 원인이었다.
  INTERNAL_SERVER_ERROR가 37건으로 두 번째로 많았고, SEND_TO_PYLON 에러도 소수 발생했다.
  live 환경 에러는 8건으로 상대적으로 적었으며, 사람의 개입 메시지는 거의 없는 자동 알림 위주 채널이었다.
topics:
