summary: |
  Stargate API 운영 에러 알림 채널. 이 분기에는 live 환경(64건) 에러가 staging(3건)보다 크게 증가했다.
  FROM_PYLON 에러(30건)와 INTERNAL_SERVER_ERROR(16건)가 주요 유형이었고, FAILED_TO_HANDLE_CHAT_STREAM(14건)과 SEND_TO_PYLON(7건)도 빈번했다.
  /callback/write 경로 에러가 24건으로 가장 많아 문서 저장 관련 이슈가 두드러졌고, /answer 경로에서 LLM 응답 실패도 발생했다.
  6월 24일에는 Stargate 파드 재시작으로 인한 503 헬스체크 실패와 서비스 일시 중단이 있었으며, 팀원들이 직접 대응했다.
