summary: |
  Stargate API 운영 에러 알림 채널. 424개 메시지로 에러가 감소한 분기.
  ERROR_WHILE_PROCESSING_CARRIER_RESPONSE(39건)와 ERROR_WHILE_PROCESSING_POST_PROCESS(36건)가 주요 에러로,
  두 유형이 전체의 75%를 차지했다. FROM_PYLON(7건), INTERNAL_SERVER_ERROR(16건)도 발생.
  live 환경(100%) 에러만 발생했으며, unstructured-io 문서 파싱 실패가 지속적인 패턴으로 확인되었다.
  사람의 개입 메시지가 없어 자동 알림만 발생한 안정적 분기였다.
