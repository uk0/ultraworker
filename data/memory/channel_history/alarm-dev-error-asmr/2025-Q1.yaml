summary: |
  2025년 1분기 alarm-dev-error-asmr 채널은 ASMR 서비스의 OpenLLM API 오류 알림과 함께 팀의 능동적인 대응 논의가 이루어졌다.
  1월 7일과 1월 20일에는 New Relic 알림 시스템을 통해 Critical/High Priority 이슈가 발생하였으며, 모든 failover가 실패하는 케이스도 감지되었다.
  1월 20일 밤에는 팀원이 502 Bad Gateway 오류를 직접 분석하고 HTTP 클라이언트 테스트 결과를 채널에 공유하였다.
  2월에는 지원되는 모델 자동화 테스트 방법(JetBrains HTTP Client, Apidog)을 탐색하는 논의가 활발히 진행되었으며, Upstage solar-mini 모델의 API 버그도 발견하여 공유하였다.
