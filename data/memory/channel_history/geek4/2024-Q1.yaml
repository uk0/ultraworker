summary: |
  2024-Q1 geek4(긱사) 채널은 회사 기숙사의 첫 입주와 운영에 관한 소통이 활발했다. 동원스위트 102동 202호에 첫 긱사가
  마련되었으며, 비밀번호 공유, 침대/위생용품/생활용품 구매 조율이 주요 활동이었다. 입주자 간 방 배정, 공용공간 사용 규칙
  설정, 인터넷/공과금 분담 등 초기 셋업 관련 논의가 집중적으로 이루어졌다. 8명이 참여하여 53개 메시지를 주고받으며
  기숙사 생활의 기반을 잡았다.
