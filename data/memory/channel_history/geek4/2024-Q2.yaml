summary: |
  2024-Q2 geek4 채널에서는 긱사 이전이 핵심 이슈였다. 기존 동원스위트에서 HR빌딩 501호로 새로운 긱사를 이전하였으며,
  계약/입주/퇴실 정산 과정이 진행되었다. 새 긱사에 침대 3개를 설치하고, '해커하우스' 형태로 활용하는 방안이 논의되었다.
  런드리고(Laundrygo) 세탁 서비스를 도입하여 생활 편의성을 개선하였다. 참여자가 3명으로 줄었으나 이전 관련 실무적
  소통이 집중적으로 이루어졌다.
