summary: |
  2025년 8월 제주도 워크샵 카페투어 활동 채널. 이강욱이 팀장으로 커피/차 관련 활동을 기획함.
  주요 계획: (1) 숙소에서 이강욱이 직접 내리는 핸드드립 커피 테이스팅 세션 (그라인더, 드리퍼, 서버 등 장비 직접 챙김), (2) 다소담에서 티클래스/티코스 체험.
  다소담 티코스를 화요일 오후 4시 5명으로 예약 (티클래스는 불가). 숙소 세화 지역에서 차로 30분 거리. 카페공작소(당근주스 맛집)도 후보로 논의.
  당일 점심으로 미풍해장국, 고기국수 등 제주 로컬 음식 탐색. 홍성아가 급 합류하여 다소담 티코스 조인. 스노클링 바다 구경도 병행.
