summary: |
  2025년 2분기 noti-interview 채널은 사이오닉AI의 채용 인터뷰 일정을 매일 자동으로 알림하는 봇 채널로 운영되었다.
  백엔드 개발자(Kotlin+Spring), AI/ML 리서치 엔지니어, 프로덕트 매니저, AI/ML 리서치 인턴 등 다양한 직군의 실무 인터뷰 및 컬쳐핏 인터뷰가 진행되었으며, 대면(미드타운 역삼 3층)과 비대면(Google Meet) 형식이 혼용되었다.
  주요 면접관으로는 hyewon, dan, suwon.kim, dkyoon, max 등이 참여하였고, 4월과 6월에 인터뷰가 집중 배치되었다.
