summary: |
  2025년 3분기 noti-interview 채널은 사이오닉AI의 채용 인터뷰 일정 알림 채널로, 7월부터 9월까지 백엔드 인턴(Kotlin+Spring, Node.js), AI/ML 리서치 엔지니어, ML 백엔드 엔지니어, 프론트엔드 개발자, B2B 세일즈 등 다양한 직군의 인터뷰가 집중적으로 진행되었다.
  9월에는 하루 최대 6건의 인터뷰가 동시에 진행되는 등 채용 활동이 크게 활발해졌으며, 코파운더 커피챗 형식의 최종 면접도 다수 포함되었다.
  프론트엔드 개발자, RAG 엔진 리서치 엔지니어, 멀티모달 파운데이션 모델 엔지니어 등 폭넓은 기술 직군의 채용이 진행되었다.
