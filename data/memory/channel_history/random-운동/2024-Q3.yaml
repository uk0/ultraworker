summary: |
  2024년 3분기는 여름철 야외 운동이 활발했다. Noah가 자전거(광교 한바퀴 20km, 퇴근 자전거),
  수영, 로라(롤러) 등 다양한 운동을 이어갔고, 올림픽공원 잠수풀 모임을 다시 기획했다(11개 답글).
  김덕현은 주 2회 요가를 지속하면서 생존 요가라 표현할 정도로 힘들어했고, 프렌젤 연습 영상도 공유했다.
  신희수가 크로스핏 WOD(핸드스탠드 워크)와 러닝으로 활동을 시작했고, hstereo는 EMS 운동,
  데드리프트, 보수볼 운동 등을 다양하게 시도했다. 송명하는 러닝 기록을 공유했고,
  김덕현이 강릉 스노클링 포인트를 발견하여 14개 답글의 큰 관심을 받았다.
  Noah가 남산 러닝과 야간 자전거도 다녀왔다(13개 답글 스레드).
