summary: |
  2024년 4분기는 새로운 멤버 유입(dasolchoi, 이강욱, 김수원, 최병현 등)과 함께
  수영과 헬스 활동이 이어졌다. 김덕현이 처음으로 25m 자유영을 쉬지 않고 완주하는 성과를 거뒀고(11개 답글),
  Noah는 재활운동 중 50m 대시 29초/26초를 기록했다(24개 답글의 대형 스레드).
  정세민(Sem)은 4일간 70km 도보 여행을 다녀왔고, 이후 압구정까지 걸어가 10km를 뛰었다.
  최병현(Hyune-c)이 집 앞 24시간 헬스장을 등록하고 닭가슴살 10kg을 구입하며 운동을 시작했다.
  김혜원은 운동 전 보충제 섭취와 체지방 감량 팁을 공유했고, 헬스장/수영장 연말정산 포함 소식도 전했다.
  dasolchoi가 회사 근처 헬스장 추천을 요청하며 채널에 합류했다.
  신희수는 크로스핏과 러닝을 이어가며 운동 사진을 공유했다.
