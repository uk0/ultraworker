summary: |
  2024년 1분기 운동 채널은 수영, 헬스, 클라이밍 등 다양한 운동 인증과 동기부여가 주를 이뤘다.
  Noah(고석현)가 수영 기록을 꾸준히 공유하며 채널을 이끌었고, 올림픽공원 잠수풀 벙개를 기획하여
  프리다이빙/스노클링 모임으로 발전시켰다(55개 답글의 대형 스레드). 김혜원이 수영을 새로 시작하여
  자유형 25m 첫 성공을 달성했고, 김덕현(Dekay)은 운동/음주 로직을 만들어 자기관리를 시도했다.
  한시형이 엑스퍼티짐과 사이오닉 제휴(10% 할인, 운동복/락커 무료)를 추진했으며,
  정세민(Sem)이 동영 수영장 4개월 강습을 등록했다. 프리다이빙 체험(용인 딥스테이션) 모임도 기획되었다.
topics:
