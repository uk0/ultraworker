summary: |
  2025년 3분기에는 자전거 라이딩과 한강 수영이 주요 활동이었다. Noah가 자전거 타실 분을
  모집하여 94개 답글의 대형 스레드가 생성되었고, 정환님과 함께 남산 자전거 라이딩을 다녀왔다.
  Noah는 춘천 그란폰도(80~120km 자전거 대회) 참가를 제안했고(17개 답글), 안진혁이 춘천 준비를 시작했다.
  클라이밍 모임도 활발해져 백은주가 진짜들을 모집하여 93개 답글의 큰 호응을 얻었다.
  한강 수영 모임이 이어져 Noah가 매주 한강 세션을 기획했고(17개 답글), 권혜선은 배영 호흡을
  4개월간 거꾸로 해왔다는 충격적 사실을 공유했다(8개 답글). 이강욱이 PT 받다가
  PT쌤과 원동기 면허를 같이 따러 가기로 한 에피소드가 화제(27개 답글).
  정세민이 인프런의 좋은 운동 문화를 공유했고(17개 답글), 홍성아가 디즈니런 대회 링크를 공유했다(9개 답글).
  Noah는 위고비 9개월차 12kg 감량 결과를 보고했다.
