summary: |
  2025년 2분기는 채널 역대 최고 활성기(67개 메시지)였다. 한강 횡단 수영 준비가 핵심 화제로,
  Noah가 올림픽공원 잠수풀 파티(98개 답글)와 한강 횡단 대비 수트 착용 모임을 기획했다.
  턱걸이 대결이 화제가 되어 송명하 vs 오승희의 '세기의 대결'(88개 답글)이 벌어졌고,
  김수진이 한 달 -6kg 챌린지(65개 답글)를 선언했다. 정세민과 오승희, 김부교가 야간 러닝 팟을
  형성했고(31개 답글), 신희수는 발목 염좌로 인해 걷기만 해야 하는 상황이 되었다(56개 답글).
  권혜선(Jada)은 탁구 레슨과 백핸드 탑스핀 드라이브 연습을 공유했고, 김수진도 탁구 초보 레슨을 시작했다.
  김혜원이 수영 1레일 승급을 달성했고, Noah는 수영 1km + 자전거 10km, 데드리프트 200kg 등
  다양한 운동을 이어갔다. 이강욱이 HEMA(중세 유럽 펜싱) 함께 할 사람을 모집하여 10개 답글을 받았다.
  신희수는 LSD/템포러닝 기록을 꾸준히 공유했다.
