summary: |
  2024년 2분기에는 채널 활동이 한동안 침체되었다가('운동 채널이 많이 죽었네요' 반성 메시지)
  6월부터 다시 활기를 되찾았다. 채널 이름이 sig-운동에서 random-운동으로 변경되었다.
  hhhssw(한성수)가 다이어트를 본격 시작하여 88.2kg에서 85.3kg으로 감량 중이라고 선언했으며,
  16:8 간헐적 단식, 저탄고지 식단, F45 체험, 따릉이 출퇴근 등 적극적으로 운동했다.
  김덕현과 조하담이 요가 원데이 클래스를 다녀오고, 김혜원은 수영에서 돌핀킥을 배웠다.
  Noah는 수영 페이스를 50m 29~31초로 기록하며 꾸준히 수영을 이어갔고,
  Sigrid Jin은 뉴욕 Chelsea Pier에서 3km 러닝을 공유했다. 송명하의 러닝 기록도 이어졌다.
