summary: |
  2025년 1분기에는 수영이 채널의 핵심 주제였다. Noah가 전국 수영장 지도(jasumap.netlify.app)를
  공유하고 평택 시립수영장 원정, 수원 월드컵 수영장 설날 핀수영 일정 등을 알렸다.
  김덕현이 수영을 새로 등록하여 본격적으로 시작했고(11개 답글), 김혜원은 수영 레일 승급과
  수영 스타트 기술을 배웠다. Sigrid Jin의 메시지에 19개 답글이 달리며 활발한 교류가 있었다.
  한시형은 미타(사무실) 올 때마다 어시스티드 풀업을 하기로 선언했고,
  dasolchoi가 헬스를 재시작하며 올해 목표 -6kg을 설정했다(6개 답글).
  김혜원은 매일 밤 하는 플랭크 루틴 유튜브 영상을 공유하고, 운동 후 기분이 좋아진다는 소감을 남겼다(13개 답글).
  신희수와 권혜선(Jada)이 새로 채널에 합류했으며, 권혜선은 수영 초보('수린이')로 참여를 시작했다.
  Noah가 서울시 자전거 대회 등록 링크를 공유하여 63개 답글의 역대 최대 스레드가 생성되었다.
