summary: |
  2025년 4분기에는 클라이밍과 마라톤/러닝이 새로운 핵심 활동으로 부상했다.
  김혜원이 클라이밍 모임을 주도하여 101개 답글의 대형 스레드를 생성했고, 더클라임 강남점에서
  모임을 진행했다(82개 답글). 마라톤 팟이 새로 형성되어 원성준이 동계국제마라톤대회를 제안했고(23개 답글),
  정석현이 서울하프마라톤 신청 정보를 공유했다. 정석현은 하이록스 대회 신청을 완료하고(8개 답글),
  Zone 6 워드 훈련(7개 답글)도 공유했다. 안진혁이 춘천 그란폰도 메디오폰도 4시간 17분 완주를 달성했다(13개 답글).
  신희수는 수영 상급반으로 올라가 매운맛을 경험했고(7개 답글), 러닝을 꾸준히 이어갔다.
  권혜선은 탁구 실력 향상에 집중하며 부수 올리기에 전념했고, 애인과의 탁구 승률 그래프도 공유했다.
  Noah는 생존재활수영을 이어갔다.
