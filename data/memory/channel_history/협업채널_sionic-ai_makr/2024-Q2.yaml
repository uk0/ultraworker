summary: |
  Sionic AI와 마커 AI(Marker AI, AutoRAG 개발팀) 간 협업 채널. 2024년 4월에 김덕현(Dekay)이
  공개 채널로 재생성하여 양 팀 멤버를 초대함. 주요 활동:
  (1) AutoRAG PoC(Proof of Concept) 프로젝트 - 수협(Sh수협) 데이터 기반 RAG 평가 및 최적화,
  vkehfdl1(김동규, 마커 AI)이 PoC 제안서 및 결과 보고서 공유(21개, 23개 답변 대형 스레드),
  (2) Storm API 연동 - 버킷 문서 파싱 결과 텍스트 반환 및 채팅 API contexts 응답 기능 요청,
  김덕현이 webhookUrl을 통한 contexts 응답 패치 완료 공유,
  (3) 평가 데이터 생성 - GPT-4-turbo로 질문-응답 세트 생성(380개, unanswerable 포함), 100개 검수,
  (4) LLM 모델 비교 - CohereForAI/c4ai-command-r-plus 104B, 72B, gpt-4-turbo 벤치마크,
  (5) LlamaIndex가 AutoRAG 팀을 공식 소개한 것을 축하,
  (6) 마커 AI 사무실 방문 - Sigrid Jin이 수협 데이터로 AutoRAG 테스트 및 후기 공유,
  (7) Storm Answer OCR 미지원 안내.
  정세민(Sem)도 채널에 참여하여 디자인 관련 기여.
topics:
