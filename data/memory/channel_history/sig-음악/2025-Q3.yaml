summary: |
  가장 활발한 분기. 이강욱이 압도적으로 많은 음악을 공유하며 채널을 이끔. J-Pop 보컬로이드(미나미, 카후,
  스이세이, 하쿠비, 테토) 중심의 음악을 집중적으로 공유. 새로운 멤버 윤주운, 안진혁, Jeonghwan Park이
  합류하며 참여자가 12명으로 증가. 오디오 장비(이어폰, 에어팟3, HD600 헤드폰) 관련 대화도 활발히 이루어짐.
  정세민이 이강욱 추천 이어폰의 음질을 극찬하는 등 하이파이 오디오 관심 공유.
  '근데왜나만올리지'라는 이강욱의 자문이 인상적.
