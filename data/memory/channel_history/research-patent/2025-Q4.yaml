summary: |
  2025년 4분기 research-patent 채널은 특허 아이디어를 공유하고 변리사 미팅 전 피드백을 나누기 위해 신설된 채널로, 12월에 채널이 처음 개설되어 14명의 멤버가 참여하였다.
  주요 활동으로는 모델 머징 관련 특허 아이디어 공유, 딥리서치를 활용한 특허 발굴 보고서 검토, 그리고 opendataXai 챌린지 과제와 연계한 특허화 논의가 이루어졌다.
  TRIZ 및 SAO 방식을 통한 기술적 난제의 특허화 전략, 개발/리서치 과정에서의 특허 아이디어 발굴 방법론에 대한 논의가 활발히 진행되었다.
