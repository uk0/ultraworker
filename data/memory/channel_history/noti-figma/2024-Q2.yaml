summary: |
  Figma 디자인 파일 변경 알림 채널. 이 분기에는 주로 'Storm Answer_기획' 파일과 'Sionic Homepage' 파일의 업데이트 알림이 대량으로 발생했다.
  Storm Answer 기획 파일이 4월~6월 내내 지속적으로 수정되었으며, 5월에는 Sionic Homepage 파일도 활발히 작업되었다.
  여러 팀원(조하담, 박나희, 최윤정, jinu, song, Noah)이 채널에 참여하여 디자인 작업 현황을 모니터링했다.
