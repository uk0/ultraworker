summary: |
  부산교통공사(Humetro) Storm Answer HyperCLOVA 모델 테스트 채널. 2024년 3월에 채널이 생성되어
  김혜원 등 내부 인원과 NAVER FRANCE & European Business, Nemosys 등 외부 조직이 참여함.
  Storm Dev 봇을 통해 문서를 등록한 후, GPT-4 테스트 채널(test1)과 동일한 질문들(PBS, RAMS,
  교정시스템 가용도, 운행 가용도, 구매 단가, 고장원인 코드 등)을 HyperCLOVA 모델로 테스트하여
  모델 간 성능을 비교함. cllee 사용자가 "HBS의 의미" 질문으로 19개 답변이 달린 가장 활발한
  스레드를 생성함. NAVER 측 인원(jiho.hong, minkim, jho.choi, yongjun.park, jykwon, cllee)도
  참여하여 HyperCLOVA 모델의 도메인 적용 가능성을 함께 검증함.
