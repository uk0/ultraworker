summary: |
  2025-Q4 번역-번역검수 채널에서는 STORM 제품의 다양한 기능에 대한 번역 검수가 활발하게 진행되었다.
  백은주가 주로 검수 요청을 발행하고, 양호진(영어), s.baek(일본어), 최소영(신규 참여, 일본어)이
  검수를 담당했다. 김주원도 번역 검수 요청자로 새로 참여했다.

  주요 검수 항목은 다음과 같다:
  - 모델 파인튜닝(モデルチューニング) 관련 UI 문구 (10월)
  - 크레딧 충전 관련 번역 (10월, 19개 답변으로 활발한 논의)
  - 팀즈 채널 추가 기능 번역 (11월, 24개 답변으로 가장 활발)
  - 지식 페이지 파일 업로드 다이얼로그 및 PDF 뷰어 안내 문구 (11월)
  - STORM APIs 크레딧 페이지 할인 혜택 문구 변경 (12월, 기한 날짜 관련)
  - 실행 로그 관련 번역 (12월)

  s.baek이 템플릿 번역 반영 오류(CS 챗봇과 보고서 작성 템플릿 문구가 뒤바뀜)를 발견하여
  프론트엔드팀에 수정을 요청하는 등 품질 관리도 이루어졌다. STORM Parser, VisionLLM 등
  기술 용어의 번역 처리 방침도 논의되었다.
