terminology:
  - term: "product-data-platform"
    definition: "Sionic AI의 데이터 플랫폼 신제품 개발을 위한 채널. Text2SQL, DB 연동, 파싱 등의 기능을 포함한 엔터프라이즈 데이터 플랫폼 개발"
  - term: "Text2SQL"
    definition: "자연어 질의를 SQL 쿼리로 변환하는 AI 기능. STORM에 먼저 적용 후 데이터 플랫폼으로 확장 예정"
  - term: "Control Plane"
    definition: "데이터 플랫폼의 관리/제어 컴포넌트. 데이터 파이프라인 및 에이전트 오케스트레이션을 담당"
  - term: "MVP"
    definition: "Minimum Viable Product. 핵심 기능만을 포함한 최소 기능 제품"
  - term: "파싱"
    definition: "문서를 구조화된 데이터로 변환하는 처리. Pylon 서비스와 연계"
