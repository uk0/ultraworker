summary: |
  2025-Q2에 eng-apidog 채널이 신설되었다(기존 product-api-support에서 채널명 변경).
  파트너사에게 제공되는 Storm OpenAPI 문서(ko/en/ja) 관리가 주요 활동이었다.
  최병현(Hyune-c)이 apidog 알림 연동(main 브랜치 변경 시 채널 알림), 캔버스 추가,
  internal API 문서 갱신(폴더 구조 개선, deprecated 엔드포인트 정리) 등을 주도했다.
  김부교(Bekay)가 ja/en 번역 문서 갱신 DRI를 맡았으며, 조하담(Joy)이 문서 학습 요청 API
  description 수정을 기여했다. apidog 신규 기능 공유, 멤버 초대 권한 논의,
  webhookUrl 필수값 여부 확인 등 API 문서 품질 개선 활동이 활발했다.
