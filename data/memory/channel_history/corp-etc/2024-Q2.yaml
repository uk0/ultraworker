summary: |
  2024년 2분기 corp-etc 채널에서는 회사 KPI 설정, 채용 개선, 채용 바이럴 아티클 작성 등 다양한 회사 운영 관련 논의가 이루어졌다.
  투자 목표, 일본 사업 목표, 국내 사업 목표를 포함한 KPI 초안이 공유되었으며, 커피챗 채용 실패 사례 분석 및 복지 개선을 통한 채용 활성화 방안이 논의되었다.
  분기 말에는 채용 바이럴을 위한 아티클 작성 스레드가 생성되었고, 신규 멤버 3명이 채널에 합류하였다.
