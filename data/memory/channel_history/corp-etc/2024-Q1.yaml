summary: |
  2024년 1분기 corp-etc 채널에서는 PoC 크레딧 신청, 서울 AI Hub 관련 공지, 회사 이름 유래 문의, 이메일 서명 표준화, 노트북 자산 관리 라벨링, 명함 제작, 홈페이지 및 브로셔용 자기소개 작성 등 다양한 회사 운영 업무가 논의되었다.
  특히 sionic, stargate, storm 등 주요 서비스명의 유래에 대한 질문과 답변이 이루어졌으며, 전 직원 대상 이메일 서명 통일 및 브로셔 컨텐츠 정리 작업이 진행되었다.
  분기 내 13명이 활발하게 참여하였으며, 신규 입사자들의 채널 합류와 함께 명함 제작 및 소개서 작성 등 온보딩 관련 업무가 처리되었다.
