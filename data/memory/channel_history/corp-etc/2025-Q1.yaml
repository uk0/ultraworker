summary: |
  2025년 1분기 corp-etc 채널에서 다양한 회사 운영 관련 논의가 있었다. 김덕현이
  Microsoft for Startups Founders Hub 현황을 공유하며 "크레딧 부자가 되었다"고
  발표했다(1/2). 오라클 관련 PR 기사 초안이 전달되었고(1/14), 러너스 채용 페이지가
  내려간 것도 언급되었다. 김혜원이 "고객의 대외비 정보에 대한 커뮤니케이션 방법"
  논의를 시작하여 13개 답글이 달렸다(2/11). 조하담이 sionic.ai/ko/answer 링크가
  노션에서 멘션 시 다른 사람 이름이 붙는 이슈를 발견하여 보고했다(2/18). 김덕현이
  OpenAI API Key를 정리하며, 기본 프로젝트에 존재하는 키들을 용도별 프로젝트로
  분리하고 마지막 사용일자가 24년도인 키들을 삭제하는 작업을 공유했다(3/22).
