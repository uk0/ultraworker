summary: |
  2025년 3분기 corp-etc 채널에서 채용, 서비스 권한 관리, 법카 분실 등 다양한 주제가
  논의되었다. 오승희가 디캠프 인재채용 job posting 기회를 공유했고(7/2), 원성준이
  디캠프 주최 개발자 채용 및 스톰플랫폼 홍보 행사 정보를 공유했다(7/24). 김혜원이
  신규 입사자(안진혁)에게 피그마, 슬랙, 노션, 리니어 등 인터널 서비스 권한 부여를
  제안했다(7/24). 법카(2번 세민푸딩) 분실 사건이 2건 발생했는데, 조하담이 바지
  주머니에 넣고 귀가(8/19)하고 이강욱도 같은 실수를 반복(8/22)하여 활발한 스레드가
  달렸다. 원성준이 디캠프 인턴 채용 지원 프로그램도 공유했다(8/28).
