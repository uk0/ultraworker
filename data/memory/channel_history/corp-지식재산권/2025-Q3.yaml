summary: |
  2025년 3분기 corp-지식재산권 채널은 특허 활동이 가장 활발했던 분기였다. 7월 24일
  박우명이 "2호 등록 특허 탄생!"을 발표했으며, 강성우, 원성준, 오승희 등이 새로
  채널에 참여했다. 8월 28일에는 "3초 등록 특허"도 확보되었고, 같은 날 MoE Pruning
  관련 특허 명세서 초안이 도착하여 박진형과 정세민에게 꼼꼼한 검토를 요청했다.
  9월에는 고석현(Noah)이 prefix tuning 관련 특허 아이디어를 매우 상세한 명세서
  초안 형태로 공유했다(외부 저장장치에 저장된 고객별 프리픽스 토큰을 이용하는
  상태없는 언어모델 튜닝 방법). 10월 1일에는 김혜원이 엑셀처리 관련 로직의 특허
  가능성을 제안하며 활발한 논의(16개 답글)가 이루어졌다.
