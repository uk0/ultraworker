  2024-Q2에 corp-지식재산권 채널이 개설되어 사내 특허 출원 체계가 구축되었다. 첫 번째 특허로 '모델 inference 시 고객 도메인 문서 데이터에 따른 자동 토큰 레벨 가중치 조절' 기법이 변리사 미팅을 거쳐 출원 준비되었으며, '문서 버킷(multi-document retrieval)' 관련 두 번째 특허 초안도 작성되었다. RAG 관련 다양한 아이디어 목록(청킹 전략, 시맨틱 캐시, 자동 평가, 피드백 시스템 등)을 정리하고 국내 20개/해외 5개 특허 출원을 목표로 설정하였다.
