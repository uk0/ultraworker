summary: |
  YF Agency(도쿄 소재 브랜딩/크리에이티브 에이전시)와의 협업 채널. 2025년 5월에 Sigrid Jin이
  YF Agency의 bb(대표), zfirouz7(Zia, 개발자)를 초대하여 채널 개설. 주요 활동:
  (1) Cake(커스텀 저지 제작 브랜드) 웹사이트에 Storm 기반 AI 챗봇 통합 프로젝트,
  (2) Shopify 플러그인 연동 - Storm API를 Shopify App Bridge로 연결,
  (3) AI 에이전트 개발 진행(80% 완성 상태) - 이미지 생성 기능, 장바구니 연동 구현,
  (4) API 응답 속도 문제 논의 - 스트리밍 미지원으로 인한 지연 이슈(37개 답변의 대형 스레드),
  (5) AIBB 컨퍼런스(6/5) 초대 및 Sigrid Jin의 GDG Tokyo 발표,
  (6) 한시형(Kevin) 도쿄 방문(6/16-19) 시 YF Agency 시부야 사무실 방문 및 비즈니스 미팅,
  (7) 파트너십 계약서 및 NDA 논의. Storm 플랫폼 STORM API/Console 가이드 영문판 공유.
  Cake 웹사이트가 shop.madebycake.ooo에서 madebycake.ooo로 도메인 변경됨.
