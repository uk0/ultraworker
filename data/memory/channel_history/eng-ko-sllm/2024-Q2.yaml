summary: |
  2024-Q2는 eng-ko-sllm 채널의 핵심 활동 분기. 주요 연구 주제는 (1) 한국어 토큰 분포 튜닝을 통한 다국어 모델의 한국어 성능 향상, (2) HyDE(Hypothetical Document Embeddings) 기반 검색 품질 개선, (3) RAFT 데이터셋 기반 sLLM 파인튜닝이었음. Noah(고석현)가 Qwen 32B/72B/110B 모델에 한국어 토큰 부스팅(logit bias)을 적용해 중국어/일본어 토큰 혼입 문제를 해결. 정세민(Sem)이 HyDE+Pylon 실험에서 기존 대비 오답률 2배 이상 감소 달성(7/85 → 2/85). Sigrid Jin이 HyDE를 dark-pylon에 통합하고 수협 데이터로 검증. 중기부 장관 주재 AI 스타트업 링크업 협의회에서 sLLM 시연 발표도 진행.
topics:
  - 한국어 토큰 분포 튜닝 (logit bias)
  - HyDE (Hypothetical Document Embeddings) 검색 품질 개선
  - RAFT 데이터셋 기반 sLLM 파인튜닝
  - Qwen 모델 시리즈 (32B, 72B, 110B) 한국어 최적화
  - Llama 3 한국어 부스팅
  - Command-R Plus 한국어 토큰 튜닝
  - 수협 문서 QA 성능 평가
  - 중기부 AI 스타트업 sLLM 시연
