  - term: 'logit bias'
    definition: '모델 출력 시 특정 토큰의 확률을 조정하여 원하는 언어 토큰 출현을 유도하는 기법'
    aliases: ['토큰 분포 튜닝', '토큰 부스팅']
  - term: 'dark-pylon'
    definition: 'Sionic AI 내부 검색 엔진 Pylon의 개발 버전 레포지토리'
  - term: 'xionic'
    definition: 'Sionic AI에서 개발한 한국어 최적화 LLM 모델 시리즈'
