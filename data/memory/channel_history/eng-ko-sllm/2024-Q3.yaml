summary: |
  2024-Q3는 xionic 모델 고도화 및 리랭커 연구가 진행된 분기. dkyoon이 Qwen2-72B 기반 QLoRA 파인튜닝과 DPO(Direct Preference Optimization) 학습을 수행하며 LogicKor 벤치마크 성능 개선에 집중. Qwen 7B에 토큰 부스팅만 적용한 xionic-original 모델을 HuggingFace에 공개. Gemma 2 9B 모델의 한국어 DPO 학습도 시도. Noah가 리랭커 연구 베이스라인을 제안하고, xionic-1-72b-20240919 신규 모델 평가를 요청. Sigrid Jin이 vLLM에서 Gemma 2B의 sliding window attention 미지원으로 인한 max context window 제한(8192→4096) 이슈를 공유.
topics:
