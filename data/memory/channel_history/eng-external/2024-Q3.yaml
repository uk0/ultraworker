summary: |
  2024-Q3은 eng-external 채널이 외부 엔지니어(천성님/Cheonseong Kang) 업무 배정 용도로 활용된 분기. Sigrid Jin이 Cheonseong Kang에게 Unstructured.IO(USIO) 관련 2개 이슈를 배정: (1) STM-1211: Pylon에서 USIO를 통한 파일 업로드 시 암호화된 PDF의 에러 핸들링 구현, (2) STM-1212: USIO에서 비암호화 파일을 암호화로 잘못 감지하는 버그(USIO 팀 인지 중), (3) STM-1218: 1천 페이지 PDF 복수건 동시 요청 시 stuck/메모리 릭 문제 원인 파악. 온프렘 쿠버네티스에 배포된 USIO API 사용 중.
