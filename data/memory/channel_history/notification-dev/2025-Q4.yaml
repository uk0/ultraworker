summary: |
  2025년 4분기 notification-dev 채널은 Apidog 자동화 알림 봇이 주로 Storm OpenAPI 문서 생성/수정/삭제 이벤트를 실시간으로 알려주는 알림 전용 채널로 운영되었다.
  Storm OpenAPI의 한국어 및 일본어 버전 문서 마이그레이션 작업이 집중적으로 이루어졌으며, 특히 10월 초에 노션에서 Apidog으로 대규모 문서 이관이 완료되었다.
  STORM Platform, Introduction, 에이전트 생성하기, 워크플로우 구성 등 핵심 문서들이 한국어/일본어로 작성·수정되었으며, 일부 불필요한 문서는 삭제 처리되었다.
