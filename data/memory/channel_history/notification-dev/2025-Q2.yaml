summary: |
  2025년 2분기 notification-dev 채널은 Apidog 자동화 알림 봇을 통해 Storm OpenAPI 문서 변경 이벤트와 자동화 테스트 결과가 기록된 알림 전용 채널로 운영되었다.
  5월 말부터 Storm 내부 API의 자동화 스케줄 테스트(STORM 최소 시나리오)가 매분 실행되어 결과가 채널에 쌓이기 시작했으며, 26개 테스트 중 25개 통과(96.15% 통과율)가 안정적으로 유지되었다.
  일본어 버전 API 문서 작업, 문서 학습 요청 API 명세 업데이트 등이 병행되었다.
