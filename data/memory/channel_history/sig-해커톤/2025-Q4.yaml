  2025년 4분기 sig-해커톤 채널은 12월 20일 개최된 InstructKR x Sionic AI 해커톤 준비와 실행을 위해 생성된 채널로, 22명이 참여하였다.
  약 300명 규모의 행사로 요즘IT가 미디어 파트너로 참여하였으며, OpenAI solution architect 팀이 심사위원으로 합류하였다.
  해커톤 당일에는 STORM 플랫폼 접속 폭주로 인한 장애 대응, 멘토링 신청 및 결과물 제출 폼 운영, 만족도 조사 등이 이루어졌으며, 이후 행사 인사이트 및 개선점이 공유되었다.
