summary: |
  2024-Q4는 Supply 검색 품질 평가 체계 구축과 모델 성능 비교가 본격적으로 시작된 분기이다.
  ye(연구원)가 합류하여 BGE-M3 임베딩 + GTE 리랭커 기반 베이스라인 평가를 진행했으며,
  1:N query-context pair를 반영하도록 evaluation 코드가 수정되었다. Recall 계산 방식이 개선되었고,
  corpus embedding을 cache dir에 저장하는 방식으로 변경되었다(Qdrant에서 가져오는 문제 회피).
  Sigrid Jin(진형)이 ye에게 TensorFlow Metal 플러그인을 공유하는 등 ML 인프라 관련 논의도 있었다.
  또한 update된 eval set 기준 베이스라인 결과가 공유되었다.
topics:
  - BGE-M3 + GTE 리랭커 기반 검색 품질 평가 (베이스라인)
  - 1:N query-context pair 반영 evaluation 코드 수정
  - corpus embedding 캐시 저장 방식 도입
  - TensorFlow Metal 플러그인 공유
