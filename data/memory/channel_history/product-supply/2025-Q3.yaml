    definition: Sionic AI의 실험 프로젝트. 대규모 벡터 연산 최적화 테스트
  - term: delta lake
    definition: 데이터 레이크 위의 트랜잭션 레이어. Qdrant 증분 처리에 활용 검토
  - term: agentIds
    definition: Supply에서 관리하는 에이전트 식별자. indexer→runner 전달 시 사용
