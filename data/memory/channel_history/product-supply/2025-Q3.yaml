summary: |
  2025-Q3는 Supply 서비스의 안정화, OTEL 적용, 대규모 벡터 테스트 지속, 그리고 검색 기능 고도화가 진행된 분기이다.
  IBK 기준 12만 문서/130만 벡터 규모에서의 성능 최적화가 계속되었으며, 20만 문서/220만 벡터 규모 테스트도 계획되었다.
  OTEL(OpenTelemetry) 적용이 Supply에 시작되어 HTTP 요청 기록 및 외부 연동(ASMR) 추적이 가능해졌으나,
  코루틴/비동기 환경에서 span 전파 문제가 발견되었다. indexer 완료 후 runner 기동 시 agentIds 전달 개선이 완료되었다.
  파일 삭제 크론잡 운영, 멀티턴 검색 테스트, 새 에이전트 생성 시 Pylon/Supply 자동 반영 논의,
  Supply에 쿼리 추가 검색 로직 진행 상황 확인, Qdrant point 증분 처리를 위한 delta lake 방식 검토,
  MUVERA(Multi-Vector Retrieval) 실험 및 Flasma 프로젝트에서 40GB 벡터 단일 텐서 테스트 등이 있었다.
  부하테스트를 통한 carrier PR 기반 성능 검증도 진행되었다.
