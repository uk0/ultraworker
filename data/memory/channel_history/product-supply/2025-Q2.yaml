summary: |
  2025-Q2는 Supply 파일시스템 적용 프로젝트가 본격 추진되고, IBK(기업은행) 온프레미스 환경 대응이 핵심이었던 분기이다.
  Supply가 LEGACY 모드에서 INDEXER/RUNNER 모드로 전환되었으며, indexer-runner 자동화 파이프라인이 구축되었다.
  최병현(Hyune-c)이 Supply 운영 개선을 주도하며, indexer 성능을 대폭 개선했다(30만 벡터 10분→2분20초,
  710만 벡터 24분 컷). runner 모드의 부트타임 개선과 대규모 벡터(710만) 지원을 위한 유사도 계산 로직 개선이 진행되었다.
  IBK 현장 지원이 다수 이루어졌으며(6/12, 6/18, 6/25), 8코어에서 실패하여 16코어로 상향 운영했다.
  Supply 부하테스트, 렉시컬(BM25) 모델 후보군 미반환 이슈 해결, Qdrant 로딩 개선,
  carrier-supply 재기동 시 청크 사라짐 현상 해결, deploy(dhashes 필터링) 기능 QA,
  runtime 중 agent 추가/parquet 갱신 방안 논의 등이 진행되었다.
  Supply 운영 역할이 최병현과 조하담(Joy)에게 이관되는 논의도 있었다.
topics:
  - Supply LEGACY→INDEXER/RUNNER 모드 전환
  - indexer 성능 대폭 개선 (병렬 처리, 세마포어 최적화)
  - IBK 온프레미스 환경 대규모 벡터 지원 (710만 벡터)
  - runner 부트타임 및 유사도 계산 로직 개선
  - Supply 파일시스템 적용 프로젝트 (3개 마일스톤)
  - 렉시컬(BM25) 후보군 미반환 이슈 해결
  - deploy(dhashes 필터링) 기능 QA
  - carrier-supply 재기동 시 청크 사라짐 현상 해결
  - Supply 운영 역할 이관 논의 (최병현, 조하담)
  - runtime 중 agent 추가/parquet 갱신 방안 논의
  - k8sMaster 호출 실패 및 SSL disable 처리
  - OTEL(OpenTelemetry) 적용 시작
