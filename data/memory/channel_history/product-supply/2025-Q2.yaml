terminology:
  - term: Indexer
    definition: Supply의 배치 모드. Qdrant에서 벡터를 읽어 parquet 파일로 변환하는 인덱싱 프로세스
    aliases:
      - supply-indexer
      - indexer 모드
  - term: Runner
    definition: Supply의 서빙 모드. indexer가 생성한 파일을 로드하여 실시간 검색을 처리
    aliases:
      - supply-runner
      - runner 모드
  - term: IBK
    definition: 기업은행(Industrial Bank of Korea). Supply의 온프레미스 배포 대상 고객
    aliases:
      - 짭bk
      - 짭비케이
  - term: Qdrant
    definition: 벡터 데이터베이스. Supply에서 임베딩 벡터 저장 및 조회에 활용
  - term: k8sMaster
    definition: Kubernetes 마스터 API. indexer 완료 후 runner 재기동 트리거에 활용
  - term: dhashes
    definition: 문서 해시값. Supply deploy 시 변경된 문서만 필터링하는 데 활용
  - term: Corsair
    definition: Sionic AI 내부 서비스. Qdrant와 연동되며 Supply indexer의 메시지 크기 제한에 영향
    aliases:
      - 커세어
  - term: Carrier
    definition: Sionic AI의 서비스 프레임워크. Supply, Pylon 등의 상위 프로젝트
    aliases:
      - 캐리어
