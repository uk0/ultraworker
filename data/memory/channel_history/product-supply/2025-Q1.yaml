summary: |
  2025-Q1은 Supply 검색 성능 고도화와 모델 변환 이슈 해결에 집중한 분기이다.
  BGE-M3 + GTE 리랭커 기준으로 ColBERT가 베이스라인 대비 11%p 이상 성능 향상을 보였으며,
  query expansion 결과도 평가에 추가되었다. GTE 리랭커 TensorFlow 변환 모델에서 패딩 입력 시
  정확도가 불안정해지는 심각한 이슈가 발견되어 해결 작업이 진행되었고, BGE-M3 TF 변환 코드에서도
  attention masking 미적용 오류가 발견되어 수정되었다. health check 엔드포인트 정비(/_health만 유지),
  Kotlin 기반 Supply 서버 기동 성공, 쿼리 익스펜션(query expansion) 적용 및 테스트,
  컨텍스츄얼 리트리벌(contextual retrieval) 논의 및 역할 분배,
  Supply가 문서명을 기반으로 검색하는 로직 구현 등이 진행되었다.
topics:
  - ColBERT 적용으로 검색 성능 11%p 향상
  - GTE 리랭커 TF 변환 시 패딩 정확도 이슈 해결
  - BGE-M3 TF 변환 코드 attention masking 오류 수정
  - Kotlin 기반 Supply 서버 기동
  - 쿼리 익스펜션(Query Expansion) 적용 및 테스트
  - 컨텍스츄얼 리트리벌(Contextual Retrieval) 논의
  - 문서명 기반 검색 로직 구현
  - health check 엔드포인트 정비
