terminology:
  - term: rust-supply
    definition: Rust로 재작성된 Supply 서비스. 기존 Scala/JVM 기반 대비 메모리 효율 및 ensemble 속도 개선 목표
  - term: Candle
    definition: Hugging Face의 Rust 기반 ML 프레임워크. GPU 연산(cosine similarity 등)에 활용
  - term: FDE
    definition: Fixed Dimensional Encoding. MUVERA에서 멀티벡터를 고정 차원 단일 벡터로 변환하는 기법
  - term: SimHash
    definition: Locality-Sensitive Hashing 기법. MUVERA에서 토큰을 버킷에 할당하는 데 활용
  - term: Flasma
    definition: Sionic AI의 Supply 원본 코드 프로젝트. 대규모 벡터 연산 테스트 용도
  - term: ensemble
    definition: BM25 + 벡터 검색 결과를 결합하는 하이브리드 검색 단계. Rust에서 특히 빠른 성능을 보임
