summary: |
  2025-Q4는 Rust 기반 Supply 재작성(rust-supply) 프로젝트가 본격 시작되고 성능 벤치마크가 진행된 분기이다.
  기존 Scala(JVM) 기반 Supply와 Rust 기반 Supply의 성능 비교가 상세히 이루어졌으며,
  vector search 부분에서는 GPU를 활용하는 Scala가 가장 빠르고, Rust GPU(Candle)가 그 다음, Rust CPU도 쓸만한 수준이었다.
  BM25에서는 Scala가 우세했으나(20개 멀티스레드 최적화), Rust의 ensemble 속도는 매우 빠른 것으로 확인되었다.
  Sigrid Jin이 Gemini 3가 생성한 MUVERA 가속 코드(SimHash 모드 FDE)를 PR로 올렸으며,
  cosine 연산을 Candle로 GPU 가속하는 작업과 캐시 로딩 병렬화(세마포어 8) 작업이 진행되었다.
  Rust-GPU/rust-cuda 등 Rust 기반 GPU 컴퓨팅 생태계도 조사되었다.
  또한 Noah(고석현)가 BM25 인덱싱을 파일로 캐시화하여 10~100만개 기준 10초 내 기동을 달성했다.
