summary: |
  2025년 1분기 status-live-stormparse 채널에서는 StormParse 서비스 장애 알림과 대응이 활발히 이루어졌다.
  1월 10일에 이미지 파싱 오류(page_num 누락)와 Gemini API 503 GOAWAY 오류가 발생하여 담당자가 retry 로직을 추가하고 핫픽스를 배포하였다.
  1월 20일에도 다수의 알림이 연속으로 발생하였으며, 3월 23일에 추가 알림이 1건 발생하였다. 채널 활동은 주로 자동화 봇 알림과 엔지니어들의 실시간 장애 대응 스레드로 구성되었다.
