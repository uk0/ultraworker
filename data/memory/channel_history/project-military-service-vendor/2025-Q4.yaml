summary: |
  전문연 1차 미선정 이후 재도전 전략을 수립한 분기.
  10월에 전문연 1차 미선정 통보를 받았으며(커트라인 63점에 맞췄으나 올해 소폭 상승), 2026년 6월 선정 목표로 재전략을 수립했다.
  콘탁 담당자 김수현팀장 퇴사로 이예빈 대표와 직접 컨택으로 전환했다.
  이노비즈/메인비즈 인증 검토, R&D 과제 수주 전략, 기업부설연구소 인력 충원(학사 이상 12~16명) 등을 논의했다.
  12월까지 현재 연구소 인원(2명)을 유지하고, 1월 이후 인력 충원 예정.
  연구개발비 사용 총액 5억 이상 여부 확인도 진행 중.
