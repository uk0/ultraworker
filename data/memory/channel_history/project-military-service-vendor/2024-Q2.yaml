summary: |
  병역특례(산업기능요원/전문연구요원) 지정업체 신청을 위한 본격적인 준비가 진행된 분기.
  병특 컨설팅 업체와 계약을 체결하고(약 500만원), 산기능/전문연 동시 신청 방향을 결정했다.
  지방 오피스(익산) 확보를 위해 월드비즈타운 등 공유오피스를 검토하고, 실사 지원이 가능한 업체를 선정했다.
  부설연구소 설립이 인정되었으며, 위험성평가 우수사업장 인정도 획득했다.
  광주소마고/대덕마이스터고 산학협력 면접을 진행하여 FE/BE 인력 채용을 검토했다.
  내일채움 공제 관련 논의와 병특 관련 외부 기관 대응 체계도 정비했다.
