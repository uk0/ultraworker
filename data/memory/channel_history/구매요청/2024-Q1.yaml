summary: |
  2024-Q1은 사이오닉AI의 새 사무실 이전 및 초기 세팅 기간으로, 사무실 비품(휴지통, 철제스툴, 화이트보드, 전자렌지, 냉장고 등)과
  인프라 장비(DELL 4K 모니터, 워크스테이션 5대, 멀티탭, 서버용 고전력 멀티탭, 100G 광케이블, 네트워크 테스터기) 구매가 집중되었다.
  SaaS 구독으로는 Azure, OpenRouter, JIRA, oopy(블로그), Linear가 등록되었고, Claude3 공용 계정 추가와 DeepL API 구독이 시작되었다.
  도메인(sionic.im, sionic.jp, psionicstorm.dev 등) 대량 구매가 이루어졌다. 회사 단체티 제작(136벌, 260만원)과 전시회용 스티커/현수막
  제작도 진행되었다. 기숙사(긱사) 생활용품 및 공과금 납부 체계가 처음 수립되었으며, 월간 간식 담기 프로세스(쿠팡 장바구니)가 운영되기 시작했다.
  애플비전프로 구매 요청(28개 댓글로 활발한 논의)도 있었다.
