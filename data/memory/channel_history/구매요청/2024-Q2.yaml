summary: |
  2024-Q2는 전시회 준비와 사무실 안정화 기간이었다. 전시회용 스티커(1000장), 종이백(500개, 62만원), 달고나(1000개), 반팔티(105벌)
  등 대규모 홍보물 제작이 이루어졌다. 신규 SaaS로 Claude Team 플랜(월 $30), Zapier(채널별 daily 요약봇), ngrok, Shutterstock,
  deepinfra, Vrew(영상 편집) 구독이 시작되었다. 서버실 UPS-분전함 고전력선 공사(93.5만원)와 에어컨 구매가 진행되었다.
  기숙사 신규 입주(보증금/월세, 중계수수료, 입주청소비, 생활용품)가 완료되었고, 런드리고 세탁 서비스 카드 자동이체가 등록되었다.
  한국일보 대상 선정 비용(440만원), 홍보용 브로셔(115.5만원) 등 마케팅 비용도 집행되었다. 표준 장비 목록이 공식 발표되어
  맥북프로(M3 Max), 씽크패드, 그램, 로지텍 MX Master 3S, DELL 울트라샤프 모니터가 기준으로 정해졌다.
