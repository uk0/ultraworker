  2025-Q3에는 디캠프 이전 준비에 따른 대규모 구매가 집중되었다. 디캠프용 모니터 7대(6,428,380원), 노트북거치대, 멀티탭, 사무용품 등이 한꺼번에 구매되었다. 제주 워케이션 숙소 및 업무공간 비용(약 512만원), Claude Code Max 구독 여러 건($200~$220) 등 AI 도구 구독도 급증하였으며, GoLand, Sentry Team Plan, JetBrains All Products Pack 등 개발 도구 구독도 다수 처리되었다.
