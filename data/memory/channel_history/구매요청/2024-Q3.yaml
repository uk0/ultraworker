summary: |
  2024-Q3 구매요청 채널에서는 사무용품 및 인프라 장비 구매가 활발하였다. USB C타입 허브 21개 대량 구매(312,900원), 통신실 에어컨 설치(121만원+설치비 38.5만원), 오피스 방화벽 라우터용 미니 UPS 해외 직구, AI 가속기 프로그래밍 수강권 2인분(180만원) 등 규모 있는 지출이 있었다. 사이오닉 종이봉투 500매, 주주총회용 스탠다드 키트, 한글/영어 브로셔 제작 등 회사 홍보물 관련 구매도 다수 이루어졌다.
