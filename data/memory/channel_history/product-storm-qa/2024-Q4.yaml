summary: |
  2024-Q4는 권한관리 시스템, 트라이얼 플랜, 캐리어 if/else 노드, 후처리 노드, Document AI 등
  다수의 신규 기능이 QA를 통과한 분기이다. 10월에는 admin 회원가입(이메일 인증), 권한설정(초대링크, 작업자/관리자 역할),
  팀 간 이동 등의 복잡한 인증/권한 체계 QA가 집중적으로 수행되었다. 무한로딩, 인증 링크 오류, 권한 삭제 미반영 등
  다수의 메이저 이슈가 발견 및 수정되었다. 11월에는 트라이얼 플랜 기능(에이전트/문서/호출수 제한, 이용연장 신청),
  토큰수 대시보드, 캐리어 if/else 조건 분기 노드 QA가 진행되었다. 12월에는 사이드바 UI 개선, 후처리 노드(텍스트 필터, 정규식),
  LLM 모델 전수 테스트(Azure/Vertex/Anthropic), 대시보드 토큰수 API 구조 변경이 이루어졌다.
  주요 참여자는 김혜원, 백은주, 신희수, 조하담, 최병현, hyunwoo, 정세민 등이다.
topics:
  - 권한관리 (admin 가입, 초대링크, 작업자/관리자 역할)
  - 트라이얼 플랜 (에이전트/문서/호출수 제한)
  - 캐리어 if/else 분기 노드
  - 후처리 노드 (텍스트 필터, 정규식)
  - Document AI (PDF 마크다운 변환)
  - 대시보드 토큰수 차트
  - 마크다운/LaTeX 렌더링
  - 상세로그 JSON 뷰어
  - 사이드바 UI 개선
  - LLM 모델 전수 테스트
