    participants: [김혜원]
terminology:
  - term: Document AI
    definition: Vision LLM 기술을 이용한 PDF -> 마크다운 변환 서비스
    aliases: [Unstured]
    context: 복잡한 PDF 문서를 구조화된 마크다운으로 변환하여 RAG에 활용
  - term: 트라이얼 플랜
    definition: 신규 가입 팀에 적용되는 무료 체험 요금제. 에이전트/문서/호출수에 제한 있음
    context: 에이전트 3개, 문서 30개 등 제한이 있으며 초과 시 생성 차단
  - term: if/else 노드
    definition: 캐리어 워크플로우에서 조건 분기를 처리하는 노드. and/or 조건, 비교연산 지원
    context: 오더시트 내에서 LLM 결과에 따라 다른 처리 경로로 분기
  - term: 후처리 노드
    definition: LLM 응답 후 텍스트 필터링이나 정규식 치환을 수행하는 캐리어 노드
    context: 민감정보 마스킹, 특정 텍스트 제거 등에 활용
  - term: 원터치
    definition: 사용자가 한 번의 클릭으로 문의/작업을 수행할 수 있는 UI 기능
    context: 에러 발생 시 원터치 제보 버튼을 통해 쉽게 문제를 리포트
