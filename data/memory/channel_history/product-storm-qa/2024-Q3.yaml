    participants: [김혜원, 백은주, Sigrid Jin]
  - date: '2024-09-10'
    topic: 캐리어 연동 테스트
    summary: RAG on/off, 프로모드, 배포, 피드백, 일본어 다국어 등 캐리어 연동 종합 테스트. 오더시트 리비전 미적용, 디폴트 프롬프트 언어 오류 등 발견
