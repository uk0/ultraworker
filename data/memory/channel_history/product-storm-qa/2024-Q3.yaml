summary: |
  2024-Q3는 product-storm-qa 채널이 신설된 분기로, 7월 24일 김혜원이 QA 전용 채널로 개설하였다.
  주요 QA 활동은 에이전트 빌더 UI(프롬프트 설정, 파라미터 조정, 모드 전환), LLM 모델 설정 기능(Azure/OpenAI 전환, JSON 파라미터 입력),
  프리즈마 이관 검증, 대시보드(호출수/토큰수 차트, 다운로드 기능), 답변출처(trust score) 노출,
  pre-retrieval recipe 테스트, 캐리어 연동(오더시트, 배포, 다국어 지원), 에이전트 생성 UI 개선,
  권한설정 UI 등 광범위한 STORM 제품 기능 검증이 진행되었다.
  주요 참여자는 김혜원(QA 리드), 백은주(FE 개발), 신희수(BE 개발), 조하담(BE 개발),
  eun.juuu0(FE 개발), Sigrid Jin(BE/검색엔진), 김덕현(버그 리포팅) 등이다.
topics:
  - 에이전트 빌더 QA
  - LLM 모델 설정 (Azure, OpenAI, Gemini, Xionic)
  - 프리즈마 이관 검증
  - 대시보드 (호출수, 토큰수 차트)
  - pre-retrieval recipe
  - 캐리어 연동 및 오더시트
  - 답변출처 및 trust score
  - 에이전트 생성 UI 개선
  - 권한설정 UI
  - 파일 업로드 확장자 체크
