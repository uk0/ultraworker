    summary: trust score 노출 확인, STM-1605(다른 엔드포인트 Carrier 연동), 카카오 연동, 젬미니 호출 에러 테스트
    participants: [김혜원, 신희수]
terminology:
  - term: 오더시트 (Order Sheet)
    definition: 캐리어 엔진의 실행 설정을 정의하는 JSON 구조. 노드(RAG, LLM, Response 등)와 링크로 구성
    context: 에이전트의 RAG/LLM 파이프라인 실행 순서와 설정을 관리
  - term: 캐리어 (Carrier)
    definition: STORM의 워크플로우 실행 엔진. 오더시트에 따라 RAG, LLM, 후처리 등 노드를 순차/병렬 실행
    context: 에이전트의 질의응답 파이프라인을 처리하는 백엔드 서비스
  - term: 파일론 (Pylon)
    definition: 문서 관리 및 RAG용 벡터 저장을 담당하는 서비스
    context: 문서 업로드, 폴더 관리, 청크 검색 등을 처리
  - term: trust score
    definition: LLM 답변의 신뢰도 점수. 레이블링된 청크의 리랭크 스코어 기반으로 계산
    context: 답변출처에서 신뢰도를 수치로 표시하여 사용자에게 제공
  - term: pre-retrieval recipe
    definition: RAG 검색 전에 수행되는 전처리 레시피. BM25 등의 모델로 사전 검색 수행
    context: 기존 retrieval recipe 전에 별도 검색 파이프라인을 추가하는 기능
