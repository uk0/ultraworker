summary: |
  Noah, 신희수, 송명하 세 명의 아빠가 육아 일상을 꾸준히 공유한 분기. Noah의 아이는 곧 9kg, 이어서 10kg(체중 상위 3%)을 달성하며 먹방 재능을 보였고, 고양이/강아지와 함께 자라며 특유의 행동을 보이기 시작했다. 갸웃 스킬이 생기고, "착한척" 하는 모습도 공유되었다. 신희수의 해솔이는 핑크퐁 상위리스너가 되었고, 눕기 시작하는 모습이 화제였다. 송명하의 하준이는 버스에서 잠든 모습, 치킨을 사과주스에 찍어먹는 독특한 식습관, 선물 받고 도파민 폭발하는 춤사위를 공유했다.
