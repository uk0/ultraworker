summary: |
  채널이 크게 성장한 분기(12명 참여). 송명하가 합류하며 아들 하준이의 어린이집 알림장, 운동(배 단련) 이야기를 공유하기 시작했다. 신희수는 해솔이 200일 사진, 첫 곤지곤지, 격해지는 활동량을 공유했다. Noah는 나혼랩(나 혼자만 레벨업) 13권까지 사서 책장에 꽂아주는 등 육아 관련 구매도 공유했다. 최윤정, 김혜원, 김수원, 양호진, 이재준(Leo), 백은주, 권혜선 등 많은 새 멤버가 합류하며 "희수님 육아일기"라는 평가를 받았다. 정세민은 "이게 육아다", "sig-해솔 채널"이라며 반응했다.
topics:
  - 아기 성장 (해솔이 200일, 곤지곤지)
  - 어린이집 (하준이 알림장)
  - 운동/체력 (배 단련)
