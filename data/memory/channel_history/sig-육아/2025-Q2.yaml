summary: |
  채널 역대 최대 활동량(52개 메시지, 43개 스레드)을 기록한 분기. Noah(고석현)가 아이의 아빠로서 본격적으로 육아 일상을 공유하기 시작했다. "작네요"(40개 답변), "왜안잠"(반복적 고충), "해뜨고 잠듬", "아 빨리 출근하고싶다", "일하게해주세요" 등 초보 아빠의 고군분투가 생생하게 기록되었다. 아이의 손, 얼굴 변화(매일 달라짐), 고양이와의 공존("아직 때리진 않음"), 체중 증가(평균 1.5배 속도) 등이 화제였다. 신희수의 해솔이는 언어 발달("아빠=엄마+아빠+맘마+기분좋음"), 독박육아 흔적, 몰래 설탕 섭취 등을 공유했다. 송명하의 하준이는 서울랜드, 숨바꼭질 30판, 라면 받침대 뺏기기, 캠핑의자 구매(소중해서 안가져감) 등을 공유했다. 해솔이 생일(6월 11일)도 기록되었다.
