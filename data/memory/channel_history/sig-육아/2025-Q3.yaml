summary: |
  핵심 멤버(Noah, 신희수, 송명하) 중심으로 꾸준히 육아 일상이 공유된 분기. Noah의 아이는 101일차에 갑자기 기어다니기 시작하고, 거울 보기를 좋아하며, 만성수면부족 속에서도 급성장했다. 생후 5개월에 이미 서려고 하는 모습에 "이게 맞나"라는 반응이 있었다. 이가 나면서 뭐든지 물기 시작하고, "빵실한" 체형이 화제였다. 신희수의 해솔이는 현실 육아의 고충, 외출 시 즐거워하는 모습을 공유했다. 송명하의 하준이는 생일에 "달팽이랑 같이 밥먹으면서 놀고 싶어"라는 귀여운 소망(10개 답변), 인생 5년차의 귀차니즘, 최고의 생일 케이크를 공유했다.
