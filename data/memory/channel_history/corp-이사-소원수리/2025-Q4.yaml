summary: |
  2025-Q4에 신사옥 이전을 앞두고 직원들의 희망사항과 건의사항을 수집하기 위해 개설된 채널로, 11월 18일 채널 생성 이후 23명이 참여하여 활발한 의견을 제시했다. 새 사무실에 대한 요청사항으로는 화장실 사용중 표시 문고리, 수면실 남녀 구분, 집중 업무 공간, 폰부스, 1층 자유 출입 대기존, 소파, 습도 조절 설비, 탁구대, 주차 지원, 공기청정기, 탄산수 제조기 등 다양한 의견이 개진되었다. 회의실 구성(층별 개수, 이름 선정), 라운지 공간 가구 배치 등 실질적인 인테리어 논의도 이루어졌다.
