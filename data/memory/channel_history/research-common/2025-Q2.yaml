summary: |
  2025년 2분기 research-common 채널에서는 임베딩 모델 성능 평가, 그래프 기반 RAG 연구, VLM 학습 및 검색 고도화가 주요 주제로 논의되었다.
  STORM 임베딩이 OpenAI 임베딩 대비 Recall@k 기준 75.56% vs 66.36%로 우수한 성능을 보였으며, STORM 리랭커도 86.57% vs 71.81%로 높은 성능을 기록하였다.
  GraphRAG, LightRAG 등 그래프 기반 검색 연구와 함께 SentenceTransformers v4.1.0의 ONNX/OpenVINO 백엔드 도입, Sparse Encoder 지원 등 최신 라이브러리 동향이 공유되었다.
