summary: |
  리서치팀의 본격적인 연구 활동이 시작된 분기. 주요 연구 주제로 Retriever/Reranker, VLM for Document AI, multi-modal DPO, GraphRAG, 한국어 임베딩 모델 등이 논의되었다.
  AICA GPU 지원 사업 신청(미선정), NIPA 서류 작성, Qwen팀과의 기술 미팅(알리바바), 데이콘 IR 대회 참가 논의 등 외부 활동도 활발했다.
  리서치 프로젝트 공유 체계 및 Research Weekly 진행 방식에 대한 회고가 이루어졌으며, 맥락 공유의 중요성이 강조되었다.
  baeksw98(백상원)이 인턴으로 참여하여 Interpretable RAG, LLM 머징 기법 등을 연구하였고, 리서치 인턴 모집 과제도 구체화되었다.
  xionic-mini 모델(10B 미만 최고 성능 공개모델)을 사내 서버에 배포하여 STORM 테스트를 진행하였다.
