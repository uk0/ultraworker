summary: |
  2025년 1분기 research-common 채널은 연구팀 최대 활동 분기로, 청킹 전략 고도화, 임베딩 생성 개선, 피드백 시스템 재설계, DeepSeek-R1 관련 논의 등 다양한 기술 주제가 심도 있게 다루어졌다.
  BGE-M3 기반 ModernBERT GTE 모델 컨버터 개발, BERT 청킹 모델 구현, 검색에서 O1 모델의 필요성, Concat is All You Need 실험 등 연구 성과가 공유되었다.
  CVPR 논문 리뷰 결과 발표, RAG Evaluation 데이터셋 구축, STORM Parse 데이터 제작 등 핵심 프로젝트들이 동시에 진행되었다.
