summary: |
  2024년 Q4 KPI가 설정되어 Document AI 기술 내재화, 도메인별 reranker 파인튜닝, 한국어/일본어 임베딩 모델 개발, 특허 7건 출원 등 구체적 목표가 수립되었다.
  ModernBERT 출시에 대한 관심이 높았으며, ColBERT 학습을 위한 한국어 데이터셋 제작(ko-pylate), NLI 한국어 데이터셋 1.12M row 구축 등 임베딩/리랭커 연구가 활발했다.
  VLM 튜닝(Qwen2-VL-7B 기반 IBK용), 메타 에이전트 전략, 문서 처리 파이프라인 고도화 등 제품 연관 연구도 진행되었다.
  CVPR 논문 제출(dkyoon), Moreh의 Motif-102B 모델 공개, 일본어 인턴(최다솔) 과제 설정 등의 활동이 있었다.
  리서치 미팅이 월요일 오전 11시로 변경되었고, 테크 세미나에서 인코더 논문 읽기 등이 진행되었다.
