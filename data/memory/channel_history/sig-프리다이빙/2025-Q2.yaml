summary: |
  프리다이빙 채널 개설 및 활발한 활동 시작 분기. 김덕현(Dekay)이 채널을 만들고 공연 단체 관람도
  sig채널 활동으로 볼 수 있다고 제안. 김혜원이 일정 조율을 위해 상세한 가능 날짜를 공유.
  프리다이빙 일정 논의와 함께 바다 프리다이빙 계획도 수립. 신희수가 프렌젤(이퀄라이징 기법)
  어려움을 토로하며 물 밖에서는 되는데 물 안에서 안 되는 고민을 공유. 파라다이브 같은
  실내 다이빙 장소도 공유됨. 김혜원의 공연 일정과 프리다이빙 일정을 조율하는 대화가 활발.
