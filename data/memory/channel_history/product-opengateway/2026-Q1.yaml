terminology:
  - term: OG
    definition: OpenGateway의 약어
    aliases:
      - OpenGateway
      - OGW
    context: LLM API 게이트웨이 서비스. OpenAI SDK 호환, 멀티 프로바이더 라우팅 및 Failover 지원.
  - term: ASMR
    definition: Assimilator의 약어. OpenGateway의 Data Plane(DP) 컴포넌트.
    aliases:
      - assimilator
      - assimilator-v2
      - asmr-v2
    context: LLM 프로바이더로의 실제 API 호출을 처리하는 라우팅 엔진.
  - term: CP
    definition: Control Plane. OpenGateway의 관리/인증/과금 서버.
    aliases:
      - control-plane
      - cp-be
      - cp-fe
    context: API Key 관리, 팀/사용자 관리, 과금 처리, 대시보드 제공.
  - term: DP
    definition: Data Plane. OpenGateway의 API 요청 처리 서버.
    aliases:
      - data-plane
      - dp-be
      - ODP
    context: LLM API 호출의 라우팅, 폴백, 스트리밍 처리 담당.
  - term: Carrier
    definition: Storm 플랫폼의 LLM 호출 라우터 (기존 시스템)
    aliases: []
    context: OpenGateway로 트래픽 전환 대상이었던 이전 라우팅 시스템.
  - term: Response API
    definition: OpenAI의 새로운 Response API 호환 구현
    aliases: []
    context: 2월 말 개발 착수, non-stream dev 배포 완료.
  - term: Failover
    definition: 특정 모델/프로바이더 장애 시 자동으로 대체 모델로 우회하는 기능
    aliases:
      - fallback
    context: OpenGateway의 핵심 기능. extra.fallbacks 필드로 제어.
  - term: LlmCallRecord
    definition: LLM API 호출 기록 데이터 스키마
    aliases: []
    context: CP DB에 저장되는 호출 기록. 과금 및 usage 추적에 사용.
  - term: 메이웰
    definition: OpenGateway를 연동한 외부 고객/서비스
    aliases: []
    context: 최초 대규모 연동 고객. 데일리 7-9만원 사용량, $3000 크레딧 지원 논의.
  - term: OpenClaw
    definition: Sionic AI의 서비스 중 하나
    aliases: []
    context: OpenGateway를 활용한 고객별 프로비저닝 데모 진행.
