summary: |
  2026-Q1은 OpenGateway 제품의 알파 오픈 및 본격 운영 시작 분기.
  1월에는 ASMR v2 기반 OpenGateway 알파 오픈 준비(도메인 변경, 과금 연동, 모델 전수 테스트, 랜딩페이지 작업)가 집중적으로 진행됨.
  1월 26일 알파 오픈 후 외부 사용자 유입 시작, 홍보(개발 커뮤니티/링크드인), 디스코드 채널 운영 개시.
  2월에는 ASMR v1 Fade-out(2/23 키 revoke), billing/stripe 결제 live 오픈, 대시보드/logs 기능 배포,
  추론 모델 지원, OpenRouter 호환성 작업, JP(일본) 리전 데이터 반출 정책 대응, Response API 개발 등이 진행됨.
  Claude Opus 4.6 모델 지원, Gemini 3.1 Pro 추가, Anthropic 모델 revoke 대응 등 모델 관리 이슈도 다수 발생.
  Vertex AI 429 에러 급증, OOM 이슈, 스토리지 사용량 증가 등 운영 안정성 이슈에 대한 논의 활발.
topics:
  - name: 알파 오픈 준비 및 런칭
    message_count: 45
    description: |
      OpenGateway 알파 오픈을 위한 준비 작업. 도메인 변경(opengateway.sionic.im -> opengateway.ai),
      랜딩페이지 다듬기, 구글폼 수정, 대고객 이메일 전송, 디스코드 채널 개설,
      알파 테스터 모집($100 무료 크레딧), 개발 커뮤니티 홍보 전략 논의.
      1/26 알파 오픈 후 첫 외부 사용자 유입 확인.
  - name: ASMR v1 Fade-out 및 v2 전환
    message_count: 30
    description: |
      ASMR v1에서 v2(OpenGateway) 전환 작업. v1 Live Key Revoke 일정(2/23) 안내,
      전환 대상 서비스별 호출 현황 조사, API Key 발급 가이드, QnA 스레드 운영.
      Carrier에서 asmr-v2 live로 트래픽 전환(1/28), 전환 후 모니터링.
  - name: 과금 및 결제 시스템
    message_count: 35
    description: |
      Stripe 기반 billing 메뉴 live 오픈(2/4), 크레딧 충전 방식 논의,
      모델별 토큰 가격 정책 논의, 초기 크레딧 지급 기능 dev 배포,
      CP 과금 로직 버그 수정, LlmCallRecord 스키마 변경, usage 데이터 누락 장애 대응.
      Azure 리전별 과금 차이, cached_token 구분 과금 조사.
  - name: 모델 지원 및 호환성
    message_count: 40
    description: |
      Claude Opus 4.6 지원, Gemini 3.1 Pro Preview 추가, GPT-5.1/5.2 Azure 지원,
      Gemini 3 Flash Preview 추가, Anthropic 모델 revoke 대응(claude-3-5-haiku, claude-3-7-sonnet),
      추론 모델 처리(reasoning depth control, thinking content 반환),
      OpenRouter 호환성(temperature/top_p 동시 사용 정책, max_tokens 기본값),
      Provider별 Tools(펑션콜) 지원 완료(OpenAI/Azure/CLOVA/vLLM/Anthropic/VertexAI).
  - name: 대시보드 및 Logs 기능
    message_count: 25
    description: |
      Logs 기능 dev/live 배포(1월 말~2월 초), 대시보드 레이아웃 dev 배포,
      사용성 QA 진행, 그라파나 모니터링 대시보드 대거 개선.
  - name: 인프라 및 운영 안정성
    message_count: 30
    description: |
      Vertex AI 429 에러 급증 대응(사용량 6배 증가), OOM 이슈 조사,
      스토리지 사용량 증가(27GB->36GB/주), 408 에러 대응,
      JP(일본) 리전 환경 구성(데이터 반출 정책, OCI 이관),
      도메인 변경 작업(auth0, stripe 관련), Live 에러 핫픽스.
  - name: 비즈니스 및 파트너십
    message_count: 20
    description: |
      OAI Korea 스타트업 지원팀과의 협업 논의, Azure MSP 클루커스 미팅 준비,
      디캠프 패밀리사/베네핏 제공 논의, 서울대 계약 진행(모델별 토큰 가격 안내),
      경쟁사 분석(agihalo.com), 장기 제품 방향성 논의(가격 외 차별화).
  - name: Response API 개발
    message_count: 10
    description: |
      Response API 구현을 위한 분석 완료(2영업일 예상), non-stream dev 배포.
  - name: 보안 및 권한
    message_count: 8
    description: |
      보안 취약점 제보(teamId로 타인 apiKey 조회 가능, admin API 접근 가능),
      AI 모델 API 사용량 조회 권한 설정, 회원가입 약관 필요성 논의.
