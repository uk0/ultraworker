summary: |
  2025년 3분기 corp-blog-devrel 채널은 활동 팀원이 2명으로 줄어들었으나 DevRel 채널로서의 방향성은 유지되었다.
  7월에 ML 리서치 인턴의 글이 발행되었고, 블로그 페이지뷰 수치 모니터링(65.3K→3.32K 급감)과 인프런 활용 전략 논의가 이루어졌다.
  7월 29~31일 인프런과 공동 퇴근길 밋업 개최가 추진되었으며, 인프런에서 일본 인기 키워드(Power Automate Desktop, Felo AI, Vuetify)를 공유받았다.
  8월에는 파이콘 튜토리얼 자료와 네이버 커넥트재단 AI 무료 강의 정보 공유, 한국스프링개발자모임 팔로업이 이루어졌다.
  9월에는 구글 AI GDE(Google Developer Expert) 지원 관련 상세 가이드가 공유되어 개인 브랜딩 방향에 대한 논의가 이루어졌다.
