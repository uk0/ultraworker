summary: |
  2024년 1분기 corp-blog-devrel(당시 corp-blog) 채널은 Sionic AI의 일본어 블로그(sionic.jp) 런칭과 한국어 데이터셋 공개 작업이 주요 활동이었다.
  1월에 StrategyQA 한국어 번역 데이터셋 공개, 일본어 블로그 멤버 소개 및 문화 페이지 일본어 번역, 일본어 전용 도메인(sionic.jp) 확보 등이 이루어졌다.
  2월에는 sionic.jp 도메인이 정식 공개되었으며, LLM Trustworthiness 논문(TrustLLM) 공유, KoSuperNI 데이터 저장소 구조 논의 등이 진행되었다.
  3월에는 한국어 의료 데이터셋(KorMedMCQA), MTEB 한국어 평가 지원, Gemma MoE 등 AI/ML 연구 트렌드가 활발히 공유되었으며, 채널 설명이 "주로 회사 홈페이지, 홍보물 및 기술 블로그에 관한 내용을 논의합니다"로 공식 설정되었다.
