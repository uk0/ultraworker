summary: |
  2024-Q4는 기술 블로그 활동이 크게 활성화된 분기였다. 박우명이 다수의 아티클 초안을 작성했으며
  (mDPO, Object Hallucination, 데이터 선택, ReSpect 등), song(영숙)이 편집/퍼블리시를 주도했다.
  Document AI 데모 소개 아티클 기획이 시작되어 38개의 스레드 답글이 달리며 활발히 논의되었다.
  조하담(Joy)은 Strategy Pattern, SSE 실시간 전송 등 개발 콘텐츠 아티클을 제안했고, 사내 문화
  콘텐츠(워크샵 후기, 워케이션 후기 등)도 제안했다. 최병현(Hyune-c)은 블로그 댓글 기능 도입을
  제안하여 23개 답글로 활발한 논의가 이루어졌다. 12월에는 FlagEmbedding/BGE-M3 학습 아티클이
  퍼블리시되었고, 한국어 문법 교정기(ko-gec) 아티클도 공개되었다. STORM Fooding 관련 아티클
  작성이 진행되었고, 일본어 번역 확대와 블로그 플랫폼 개선 논의도 이루어졌다. 채널명이
  research-article에서 project-article로 변경되었다.
