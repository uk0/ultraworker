summary: |
  2025년 1분기 corp-blog-devrel 채널에서는 보안·레드팀 블로그 포스팅, BGE-M3 모델 구현 아티클 발행, 딥러닝/RAG 개념 시리즈 작성 등 기술 블로그 콘텐츠 제작이 활발하게 이루어졌다.
  블로그 플랫폼을 우피(Oopy)에서 자체 도메인으로 전환하는 논의와 함께 메인 페이지 리디자인 및 다국어(일본어) 번역 검수 작업도 병행되었다.
  CES 2025 현장 리뷰, AGI 개관, LLM 증류 기법 등 다양한 주제의 아티클이 기획·발행되었으며, 월별 아티클 접속 순위 공유와 콘텐츠 방향성 논의가 정기적으로 이루어졌다.
