summary: |
  2024년 2분기 corp-blog-devrel(당시 corp-blog) 채널은 기술 블로그 아티클 작성과 일본어 번역, AI/ML 연구 동향 공유가 활발히 이루어진 분기였다.
  4월에는 블로그 페이지 리뉴얼(카테고리별 메뉴, 아티클 소스/뷰 분리, YAML 프론트매터 도입), EO 미디어와의 협업 가능성 논의, 블로그 Description 일본어 업데이트 등이 진행되었다.
  5월에는 LLM 사전학습과 인스트럭션 튜닝 간의 할루시네이션 관계에 관한 논문, 도메인 적응형 사전학습 논문, 트랜스포머 산술 능력 향상 논문 등이 공유되었다.
  6월에는 CUDA 토크나이저 관련 아티클 일본어 번역 및 GEC(문법 오류 교정) 아티클 발행이 이루어졌다.
