summary: >
  2023년 3분기(9월)는 product-planning 채널이 개설되어 Storm 제품 초기 기획이 시작된 시기이다.
  채널은 2023-09-08에 생성되었으며, 한시형이 기획자 합류 전 PPT 초안 작성을 시작했다.
  김덕현(Dekay)이 Notion으로 회의록을 정리하여 공유했고, 김혜원이 "사이오닉 앤서가 학습을
  어떻게 시킬지"에 대한 아이디에이션을 시작하며 관련 내용을 Notion에 정리했다.
  아직 본격적인 기획 단계 이전으로, 팀 구성과 초기 방향성 논의가 주된 활동이었다.
