terminology:
  - term: "Storm Answer"
    definition: "사이오닉의 문서 기반 Q&A 챗봇 제품. 업로드된 문서를 학습하여 사용자 질문에 답변."
    aliases: ["사이오닉 앤서", "앤서"]
    context: "이 채널에서 기획된 핵심 제품. 2023-Q4에 기획서 작성 및 FE 개발 착수."
  - term: "Answer Builder"
    definition: "Storm Answer 에이전트를 생성하고 설정하는 도구. Figma로 화면 기획 완료."
    aliases: ["앤서 빌더"]
    context: "Answer 중 instruction, test 화면 먼저 개발 진행."
  - term: "Storm Console"
    definition: "Storm 제품의 관리자 대시보드. Agent 관리, 과금, 설정 등을 담당."
    aliases: ["콘솔"]
    context: "Answer Builder 이후 후순위로 개발 예정."
  - term: "Agent"
    definition: "특정 문서/설정으로 구성된 챗봇 인스턴스. 요금제(trial/standard/enterprise)별로 관리."
    aliases: ["에이전트"]
    context: "Agent별 과금 plan 선택 가능하도록 설계."
  - term: "Instruction"
    definition: "에이전트에 주어지는 동작 지침. 답변 스타일, 제약사항 등을 설정."
    aliases: []
    context: "Answer Builder에서 가장 먼저 개발되는 화면 중 하나."
  - term: "GPTs"
    definition: "OpenAI의 커스텀 GPT 서비스. Storm과 비교 테스트 대상."
    aliases: []
    context: "Storm과 '비슷비슷'한 성능이나 Storm은 멀티청크 조합이 강점."
  - term: "sLLM"
    definition: "Small Language Model. 소형 언어 모델. 클로바X 데이터로 학습 데이터 생성."
    aliases: []
    context: "클로바X 크레딧 활용하여 데이터 생성 진행."
  - term: "피드백 컬렉션"
    definition: "사용자 피드백 데이터 수집 시스템. 이모지 기반 3단계(Perfect/Good/Fail) 피드백."
    aliases: []
    context: "캐싱, 검색모델 학습, few-shot 프롬프트에 반영."
  - term: "Analyze"
    definition: "Storm의 문서 분석 기능. 요약(Summarize)과 키워드 추출을 포함."
    aliases: []
    context: "GPT-3.5 기반으로 리서치 및 테스트 진행."
  - term: "Pylon"
    definition: "사이오닉의 RAG 파이프라인 엔진. 문서 처리, 임베딩, 검색, 답변 생성 담당."
    aliases: ["파일론"]
    context: "엔진 수준 개선(멀티턴, 문서 구분, 할루시네이션 방지) 병행 작업."
