summary: >
  2023년 4분기는 Storm Answer 제품의 핵심 기획이 집중적으로 이루어진 시기이다. 김혜원 주도로
  피드백 시스템 설계(Perfect/Good/Fail 3단계 이모지 기반), Answer Builder Figma 기획서 작성,
  Storm Console 과금 체계 설계(trial/standard/enterprise), 그리고 경쟁사 리서치(text.cortex,
  chatpdf, askyourpdf, GPTs 비교)가 진행되었다. FE 개발 논의가 시작되어 Answer 우선 개발,
  Console 후순위 전략이 확정되었고, 1월 중순 완료를 목표로 일정이 수립되었다. Analyze 기능
  (요약/키워드 추출) 리서치와 GPT 기반 액션 기능 테스트도 수행되었다. 문서 수정 시 전체 교체 +
  재인덱싱이 필요한 기술적 제약이 발견되었고, 다중 문서 학습 시 주제 혼동 문제가 우선순위 높은
  과제로 식별되었다. 채널은 12월 6일에 보관 처리되었다.
topics:
  - name: "피드백 시스템 설계"
    count: 8
    summary: "이모지 기반 3단계 피드백 시스템 설계. Perfect(캐싱+검색모델학습+few-shot), Good(검색모델학습+few-shot), Fail(관리자 대안답변 -> Perfect 처리). 캐싱은 즉시 반영, 검색모델 학습은 지연 반영."
  - name: "Answer Builder / Console 기획"
    count: 12
    summary: "김혜원이 Figma로 Answer Builder 화면 기획 완료. Storm Console 기획서 작성. Answer 우선 개발, Console 후순위 전략 확정. instruction, test 화면 먼저 작업."
  - name: "과금 체계 설계"
    count: 6
    summary: "Agent별 요금제 선택 가능(trial/standard/enterprise). Trial은 계정당 2개, 일정 기간 후 삭제. 상위 플랜은 별도 문의 후 계약 기반. 카드 결제 시스템 없이 계약서 기반 결제."
  - name: "경쟁사/참고 서비스 리서치"
    count: 7
    summary: "text.cortex, chatpdf, askyourpdf 분석. GPTs와 Storm 비교 테스트 결과 '비슷비슷'. Storm 장점: 여러 청크에서 정보 조합하여 답변(주차장 안내 예시)."
  - name: "Analyze 기능 리서치"
    count: 5
    summary: "GPT-3.5 기반 요약/키워드 추출 테스트. 액션 기능(GPT가 {{액션명}} 말하게 하기) 테스트. 액션 구분은 잘하나 지시하지 않은 액션 생성 문제 발견. {{액션넘버}} 사용으로 해결 방안 도출."
  - name: "제품 이슈 및 과제"
    count: 5
    summary: "문서 수정 시 전체 교체+재인덱싱 필요한 제약 발견. 다중 문서 학습 시 주제 혼동 문제 식별. 멀티턴 미지원 케이스 발견. 할루시네이션 방지 필요성 인식."
  - name: "sLLM 데이터 생성"
    count: 2
    summary: "클로바X 크레딧을 활용한 sLLM 학습 데이터 생성 논의."
