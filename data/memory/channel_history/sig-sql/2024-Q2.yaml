summary: |
  2024-Q2 기간에 sig-sql 채널이 개설되어 SQL SIG(Special Interest Group) 스터디 공간으로 운영되기 시작하였다. 채널 개설 초기에 멤버가 작성한 SQL 쿼리의 정확성 검증을 요청하는 토론이 진행되었으며, 실행 결과는 맞게 나오나 실제 데이터와 건수가 다른 문제에 대해 스터디 리더(제멋대로 선생님)를 초대해 함께 리뷰하였다. 소규모 스터디 채널로 2명이 참여하였으며 SQL 쿼리 검증을 위한 Q&A 포맷으로 운영되었다.
