summary: |
  2025년 8월 제주도 워크샵 스노클링 활동 채널. 김혜원이 팀장으로서 스노클링 준비 정보를 상세히 공유함.
  장소는 김녕 세기알 해변(제주시 구좌읍 김녕리), 만조시간 12시 22분 기준 1시 도착 타겟. 스노클, 구명조끼, 오리발, 아쿠아슈즈 등 대여 가능. 수온 27.4도로 슈트 없이 가능.
  당일(8/26) 점심 메뉴 투표 후 스노클링 진행, 2차 스노클링 출발자 모집도 이루어짐. 낚시팀과 합류하여 저녁 식사 조율. 약 9명(김혜원, Noah, 조하담, 신희수, 원성준, 김부교, 백은주, 오승희, Sigrid Jin)이 참여.
