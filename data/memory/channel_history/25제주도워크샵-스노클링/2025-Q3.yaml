key_discussions:
  - title: 스노클링 준비 정보 공유
    summary: 김녕 세기알 해변 위치, 만조시간, 준비물(수영복/선크림), 대여 가능 장비, 수온 정보 등 상세 안내
  - title: 당일 스노클링 진행
    summary: 점심 식사 후 스노클링 진행, 2차 스노클링 출발자 모집, 낚시팀과 합류 조율
