summary: |
  2024년 3분기 qna 채널에서는 스톰 플랫폼 기능 관련 기술적 질문과 사내 인프라/비품 문의가 주를 이루었다.
  stargate-pylon 대규모 문서(1만~10만개) 통신 문제, 중복 파일 처리 로직, 문서 업로드 드래그 UX 이슈, 기업은행
  문서 학습 실패 등 제품 기술 이슈가 다수 논의되었다. xionic 모델 파라미터 문서화 요청, 하이퍼클로바 API 지원,
  openLLM 테스트, GUI 그래프 도구 등 AI/LLM 관련 질문도 활발했다. 사내에서는 4090 서버 구매 거래명세서,
  디자인권 등록, 병특 일정, 법무검토 등 행정/법무 관련 질문이 있었다.
