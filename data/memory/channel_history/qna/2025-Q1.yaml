summary: |
  2025년 1분기 qna 채널은 활동량이 전 분기 대비 3배 가까이 급증했다. IBK 기업은행 프로젝트 관련 질문이 다수 등장하며
  (부하 테스트, 오더시트, Supply 발표 장표), 사이오닉의 주요 고객 프로젝트로 자리 잡았다. 기술적으로는 MCP(Model
  Context Protocol) 연동, BGE-M3 임베딩 모델 TF32/TF64 충돌, Supply 서비스 초기 실행 시간, Pylon Postman 권한,
  dev 환경 403/internal service error 등 인프라 이슈가 활발히 논의되었다. 조직적으로는 copilot vs Claude Code 등
  AI 개발 도구 활용 방식에 대한 조사, Linear 라벨/그룹 체계화, 사이오닉 유튜브 채널 개설 제안, 회사 슬로건 및 BI 관련
  논의가 있었다. SaaS 내부 계정 정리, DB 계정 분리, 그라파나 이중 운영 등 시스템 관리 이슈도 다뤄졌다.
  신규 입사자(양호진, 오승희, 강성우, 권혜선 등) 합류로 온보딩 관련 질문(프린터, wandb, 소득세 감면 등)도 증가했다.
