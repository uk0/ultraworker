summary: |
  2024년 1분기에 qna 채널이 신설되어 운영이 시작되었다. 주로 사내 행정/총무 관련 질문이 다수를 차지했으며,
  연말정산 관련 중소기업 소득세 감면 문의, 재직증명서 발급, 노션 페이지 잠금 방법, 패스트파이브 초대링크 등
  실무적인 질문이 이루어졌다. AI 프로필 서비스 데모용 셀카 수집, 네이버클라우드 PoC 진행 방법, 클라우드 인증 관련
  문의 등 사업 관련 질문도 있었다. 채널 초기답게 참여자 유입(채널 참여) 메시지가 전체의 절반 이상을 차지했다.
