summary: |
  2025년 3분기 qna 채널은 사업 확장과 조직 성장이 뚜렷이 반영되었다. 신규 합류자(안진혁, 원성준, 정석현, 윤주운 등)의
  온보딩 관련 질문이 증가하며 명함 제작, 출입카드, GitHub/HuggingFace 초대, JetBrain/1Password 설정, 사무실 장비
  요청 등이 활발했다. 사업적으로는 IBK 에이전트 관련 질문, 서울대 정보화본부 워크플로우 오류, 두산 데모 에이전트,
  마크스폰 에이전트 설계 자료 요청 등 고객 프로젝트 대응이 주요 화두였다. 제품 관련으로는 SEO 최적화, 웹사이트
  도메인 이슈, 오더시트 v0 지원 중단, 워크플로우 노드 라이브 반영 타임라인, query param list 형태 표준 등 기술 논의가
  깊어졌다. 대외 PR 활동(Claude Seoul 발표 영상, 사이오닉 유튜브 채널, 인터넷대상 신청서, 채용 페이지 개선, 고객
  테스티모니얼 수집)이 강화되었으며, 채용/HR(ATS/TRM 도입, FLEX 플랜, 단기 계약직 관리) 관련 논의도 활발했다.
