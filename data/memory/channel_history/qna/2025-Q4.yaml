summary: |
  2025년 4분기 qna 채널은 고객 프로젝트 확대와 해외 진출 이슈가 두드러졌다. 신세계 I&C 문서 업로드 오류, Parse 구축
  문의, 신세계 지식문서 한도 변경 등 신규 고객 대응이 활발했고, 야놀자클라우드 문의, 코덱스 데모 최신 버전 요청 등도
  있었다. 기술적으로는 RAG 노드 이슈, 워크플로우 검색 노드 출처문서 표시 방식, 후처리 노드 문법, VLLM 서버 연결
  실패, query encoder cross-lingual 학습, otel 서비스 필터링, Templar Archives 일본어 로그 미표시, 일본 회원가입
  번역 오류 의심 등이 논의되었다. 조직 관련으로는 Sionic x InstructKR 해커톤(12/20), 디캠프 행사, maestro MCP
  레포 공개, Claude Code 리밋/Premium 시트 요청, GPT Pro/Business 계정, llama/upstage API 키 발급, 명판날인 분실,
  보일러 고장, 공용밥카 분실 등 다양한 주제가 다뤄졌다. 신규 합류자(이상호, 홍혁준, 박상욱 등) 온보딩과 동남아 진출
  시 중국어 지원 여부 등 해외 확장 관련 질문도 등장했다.
