summary: |
  2024년 4분기 qna 채널은 활동량이 눈에 띄게 증가했다. 스톰 플랫폼 기술 이슈가 주요 화두로, dev 환경 회원가입/로그인
  오류(42건 답글), Stargate API v1/v2 라우터 표기 문제, webhookUrl 미작동, 비밀번호 찾기 기능 부재 등이 집중 논의되었다.
  bucket_id와 dhash 관계, document AI 내부 도메인 노출 문제 등 아키텍처 관련 기술 토론도 활발했다. 최병현(Hyune-c)의
  합류와 함께 chat_engine-vendor 관계 정의, token usage 네이밍(input/output vs prompt/completion), Moderation 필터링
  정책, Python 프레임워크 비교 등 기술적 깊이 있는 질문이 증가했다. 워케이션 교통비/카풀 조율, 당근봇 사용법,
  Anthropic 사용량 급증 원인 파악 등 조직 운영 관련 논의도 있었다.
topics:
  - 스톰 플랫폼 로그인/회원가입 오류
  - Stargate API 가이드 업데이트
  - bucket_id/dhash 아키텍처
  - chat_engine-vendor 관계 정의
