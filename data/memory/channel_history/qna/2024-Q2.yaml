summary: |
  2024년 2분기 qna 채널에서는 사업 관련 문의와 사내 행정/비품 질문이 주를 이루었다. 국가기록원 대상 엔서(Answer) 제품
  테스트 계정 발급 논의, KT 프로젝트 관련 재직증명서/4대보험 서류 준비, 저작권 및 지식재산권 확인, BCG 롯데카드 보안
  팔로업 등 사업적 질문이 활발했다. 마커스 팀과 사이오닉의 관계에 대한 궁금증, 경영지원 부서 영문명, 업종번호 확인 등
  회사 조직 관련 질문도 있었다. 비품 관련으로는 라벨테이프, 일회용컵, SSD, 명함 주문처 등의 문의가 있었다.
