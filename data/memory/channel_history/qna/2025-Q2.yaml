summary: |
  2025년 2분기 qna 채널은 사상 최고 활동량을 기록했다. 기술적으로는 텐서플로우 학습(162건 답글의 대규모 스레드),
  Pylon qdrant gRPC 연결 오류, corsair 로딩 이슈, 리랭커 max-batch-tokens 설정, 청크 사이즈 변경(128/512 -> 1024/512),
  Supply 로컬 Docker 기동 GPU 이슈 등 심층 기술 논의가 활발했다. 제품 관련으로는 스톰파스 PDF 뷰어 글씨 소실,
  bucket과 폴더 용어 혼재, 채널 연동 endpoint 라이브 설정, 카카오톡 활성화 계정 유형 문제 등이 논의되었다.
  사업적으로는 IBK 프로젝트 대외비 여부, 뤼튼 프로젝트 중단 사유, 인프런 강의 업로드, 무신사 발표 자료,
  SaaS LLM 호출 비용 산정 등이 다뤄졌다. 인프라 관련으로는 Azure OpenAI/Cohere Embed v4 세팅, 사내 워커 Wi-Fi SSH,
  세콤 출입카드 조사, SW 저작권 확인 등 다양한 주제가 있었다.
