summary: |
  2024-Q2 deploy-stargate 채널 데이터 수집 완료. 1180개 메시지, 11명 참여, 44개 스레드.
  Q2에는 배포 명령어가 /eks-deploy에서 /deploy로 전환되었으며, dev/staging/live 세 환경에 대한
  본격적인 배포가 활발히 진행되었다. --skip-build 옵션이 도입되어 이미 빌드된 이미지를 재사용하는
  배포가 가능해졌다. 97ff923 커밋 등 live 빌드 실패 사례가 다수 발생했으며, 명령어 형식 오류
  (스페이스 누락 등)도 간헐적으로 보고되었다. 6월 21일 신희수가 채널에 합류하면서 배포 참여자가
  확대되었다. 주요 배포자는 jinu, Joy(조하담), Dekay(김덕현), 송명하이며, staging 이미지 재빌드
  작업도 수행되었다.
topics:
  - /deploy 명령어 전환 (eks-deploy에서 deploy로)
  - dev/staging/live 환경 배포
