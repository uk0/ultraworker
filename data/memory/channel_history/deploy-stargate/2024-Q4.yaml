summary: |
  2024-Q4 deploy-stargate 채널 데이터 수집 완료. 786개 메시지, 16명 참여, 107개 스레드.
  Q4에는 /sionic-deploy 명령어가 도입되면서 onprem과 eks 클러스터를 구분하여 배포하는 체계가
  확립되었다. 이재준(Leo)이 GoCD 파이프라인 테스트를 진행하며 CI/CD 인프라 고도화 작업을 수행했다.
  /demo-deploy 명령어가 새롭게 등장하여 데모 환경 배포가 가능해졌다. Newrelic APM 연동 및
  fluentbit.io/exclude 어노테이션을 통한 로그 중복 제거(dedup) 작업이 진행되었다. staging
  statuscheck 실패 건이 다수 보고되었으며, 스레드를 통한 논의가 107건으로 크게 증가했다.
  이강욱, 백은주 등 새로운 멤버가 합류하였다. 주요 배포자는 신희수, jinu, Joy(조하담),
  이재준(Leo), 송명하이다.
