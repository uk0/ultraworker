summary: |
  2024-Q1 deploy-stargate 채널 데이터 수집 완료. 45개 메시지, 9명 참여, 0개 스레드.
  2024년 3월 28일 Sigrid Jin이 deploy-stargate 채널을 신규 생성하였다. 기존 deploy-stargate-gke 채널과의
  convention 유지를 위해 별도 채널을 만들었으며, EKS Deploy 앱을 연동하였다. GKE와 EKS 배포를 분리
  운영하는 과도기로, Sionic Deploy(GKE)와 EKS Deploy(EKS) 두 개 앱을 동시 운영 후 통합 예정이었다.
  초기 배포 테스트로 /eks-deploy stargate dev/staging 명령어를 사용하여 dev, staging 환경에 배포를 진행하였고,
  빌드 실패(asdfasdf 커밋) 및 성공 케이스를 확인하였다. 주요 참여자는 Sigrid Jin, jinu, 김덕현(Dekay), 송명하 등이다.
