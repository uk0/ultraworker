summary: |
  sig-지름 채널이 2024년 4월에 개설되어 활발하게 운영되기 시작한 분기. Noah(고석현)가 채널을 만들고 가스 커피콩 로스터기, 해먹, 바벨/슬링랙 등 다양한 물건을 공유했다. 정세민(Sem)은 마커스 선물용 현판, 스마트 수영고글 등을 공유하고, 김혜원은 서재페 티켓, 치이카와 캐릭터 굿즈, 다이슨 에어랩을 구매했다. 김덕현(Dekay)은 키보드를 10년 쓸 생각으로 구매하고, 회사용 커피머신(Noah 개인명의 계약), 백팩 추천 논의도 활발했다. 채널명 sig의 의미(Special Interest Group)에 대한 질문도 있었다.
topics:
  - 커피/로스팅 (가스 로스터기, 에어 로스터)
  - 가전/생활용품 (다이슨 에어랩, 해먹, 바벨)
