summary: |
  연말 쇼핑 시즌으로 활발한 분기. 조하담(Joy)이 자이글 프로(무연 그릴) 구매를 고민하며 큰 논의가 이어졌고, Noah가 나눔해주기도 했다. 김혜원은 48만원짜리 거울(크리스마스 선물), 머메이드 라이센스 과정을 구매했다. 백은주는 에어팟4를, 신희수는 식물을, Noah는 위고비(다이어트약)와 웻수트를 구매했다. 정세민(Sem)은 인천-크로아티아 왕복 40만원 항공권과 밤티라미수 등을 공유했다. 김덕현(Dekay)은 프다(프리다이빙) 마스크를 고민하고, Noah는 적립금 털기로 컴퓨존에서 구매했다.
