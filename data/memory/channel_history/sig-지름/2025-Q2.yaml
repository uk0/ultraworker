summary: |
  다양한 취미 제품과 선물 공유가 활발했던 분기. 권혜선(Jada Gwon)은 월급날마다 위스키를 구매하고 탁구화, 에어태그, 해피해킹 키보드 등을 공유하며 채널의 활발한 멤버로 자리잡았다. Noah는 혜원님/명하님 선물을 고민하며 큰 논의를 이끌었다. 김혜원은 쓸데없는 것, 고양이 선물, 간지 아이템, 폴딩카트 등을 구매했다. 이강욱은 "진짜 최종 마지막 키보드(아님)"를 구매하고 한복 브랜드(리슬) 제품을 공유했다. 신희수는 하월시아 모임에서 반려식물을 늘렸고, Sigrid Jin은 역지름(중고 판매)과 책 추천을 했다. 정세민은 5090 그래픽카드 가격(370만원), AI 명함 등을 공유했다. 오승희가 새 멤버로 합류하여 피규어(룩업 리바이) 예판 정보를 공유했다.
