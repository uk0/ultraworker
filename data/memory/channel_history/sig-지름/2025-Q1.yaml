summary: |
  키보드/오디오 장비에 대한 열기가 높았던 분기. 이강욱이 새 멤버로 합류하며 수월우 이어폰(엣지, 골든에이지), Keyball61 분할 키보드, HD600 헤드폰 등 오디오/키보드 장비를 적극 공유했다. 백은주는 rainy75 키보드를, hyunwoo는 쿠팡에서 키보드를 구매했다. Noah는 2000원짜리 1인치 모니터, 도라에몽 모자, 아르타니스 장난감, 혜원님 선물을 구매했고, 정세민은 알리 제품, 이세돌 굿즈, 아이폰 17에어 후면 유출 소식을 공유했다. 김혜원은 수경(수영 고글) 업그레이드, 포켓몬 키캡, 반려동물 용품을 구매했다. 권혜선(Jada Gwon)이 채널에 합류하여 위스키 구매를 공유했고, 송명하는 전투가방(백팩)을 고민하며 27개 답변이 달린 큰 논의가 있었다.
