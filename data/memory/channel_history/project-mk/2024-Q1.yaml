summary: |
  매일경제(매경) 프로젝트 채널이 2024년 1월 24일에 개설되어 STORM Write 기능 개발이 시작된 분기.
  매일경제 기자들의 기사 작성을 지원하는 AI Write 기능을 하이퍼클로바(하클) LLM 기반으로 개발하였다.
  프롬프트 설계, 피그마 UI 기획, Write API 개발, 번역 검수 등이 진행되었으며, 3/22 매경 대면 시연이 성공적으로 이루어졌다.
  하클 토큰 제한(2000자)으로 인한 기사 길이 문제, 교정 작업 품질 미달, RPM 제한 등 기술적 과제가 식별되었다.
  2000자 초과 시 클로드(Claude) LLM을 대안으로 연동하는 방안이 검토되었으며, 하클 파인튜닝을 통한 교정 품질 개선도 시도되었으나 효과가 제한적이었다.
topics:
  - STORM Write 기능 개발
  - 매경 시연 준비 및 실행
  - 하이퍼클로바 프롬프트 최적화
  - 교정 기능 품질 개선
  - 클로드 연동 검토
  - Write UI 개발
  - 하클 토큰 제한 대응
