terminology:
  - term: 하이쿠(Haiku)
    definition: Anthropic의 Claude 3 Haiku 모델. 2000자 초과 시 하클 대신 사용되는 대안 LLM
  - term: 네클
    definition: 네이버클라우드. 하이퍼클로바 API를 제공하는 플랫폼 파트너
  - term: MAI
    definition: 매경 AI. 매일경제에서 STORM Write 기능을 부르는 내부 명칭
  - term: 크레딧
    definition: Write 서비스 사용 단위. 1회 호출 = 1크레딧 소진
  - term: PEFT
    definition: Parameter-Efficient Fine-Tuning. 하클에서 지원하는 효율적 파인튜닝 기법
