summary: |
  매경 Write 기능의 상용화 및 본계약이 이루어진 핵심 분기.
  4/22 매경 실무진 미팅, 5/9 임원진(부회장 포함) 시연이 성공적으로 진행되었으며 긍정적 반응을 얻었다.
  견적 협상이 진행되어 크레딧 구매형(10만건 건당 80원)과 구독형(월 300만~1,000만원) 가격 체계가 확정되었다.
  매경 법무 검토 완료 후 10만건/800만원 규모의 첫 계약이 체결되었다.
  하클 파인튜닝 데이터 생성, 클로드 하이쿠(Haiku) 연동, Write 재생성 프롬프트 수정, 자동 로그인 기능, 스트리밍 출력 등 기술 개선이 다수 진행되었다.
  6/14 매경 사내 기자 대상 내부 강연/시연 이후 기자들의 본격 사용이 시작되었다.
  매경용 화면 분리(Stargate API 연결), Write 로그 DB 구축, 사용량 추적 체계도 마련되었다.
