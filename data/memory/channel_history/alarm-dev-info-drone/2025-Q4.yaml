summary: |
  2025-Q4 alarm-dev-info-drone 채널은 Drone 서비스의 결제 정보 알람 채널로, 이전 분기 대비 메시지 수와 활성 사용자 수가 크게 증가하였다. 채널 초기에는 테스트 및 멤버 합류가 진행되었고, 이후 대량의 결제 승인 성공 알람이 집중적으로 수신되었다. 10월 하순 TossPayments 결제 연동을 통한 다수의 실제 결제 이벤트가 발생하였으며, 이는 Drone 서비스의 결제 기능이 실제 운영 환경으로 전환되었음을 시사한다. 결제 금액은 38,500원부터 770,000원까지 다양하게 분포하였다.
