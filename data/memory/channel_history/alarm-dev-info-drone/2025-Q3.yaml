  2025-Q3 alarm-dev-info-drone 채널은 Drone 서비스의 결제 정보 알람 채널로, 채널 생성 직후 notification-bot이 연동되었다. 해당 분기에는 결제 승인 성공, 결제 거부(만료 카드), 정합성 불일치 결제 자동 취소 완료 등 다양한 INFO 및 WARNING 레벨의 결제 이벤트 알람이 자동으로 수신되었다. 모든 메시지는 TossPayments 결제 시스템과 연동된 자동화 알람이며, 테스트 환경에서 발생한 이벤트가 대부분이었다.
