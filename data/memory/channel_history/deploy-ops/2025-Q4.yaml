summary: |
  2025년 4분기 deploy-ops 채널은 ArgoCD 기반 Kubernetes 애플리케이션 배포 자동화 알림 채널로 운영되었다. shuttle, live-dragoon-server, gocd, parsr, redis, istio, cert-manager 등 다수의 애플리케이션에 대한 sync 성공/실패 알림이 대량 수신되었다. 특히 채널 초기에 대량의 ArgoCD 히스토리 알림이 한꺼번에 유입되었으며, vault-secrets-operator-onprem의 approle 방식 이슈, coredns/redis의 immutable field 오류 등 반복적인 sync 실패도 기록되었다. 6명의 소수 인원이 참여하며 DevOps 인프라 배포 상태를 모니터링하는 채널이다.
