summary: |
  Linear 이슈 트래커 알림 채널. 3448개로 역대 최대 알림 수를 기록하며 매우 활발한 개발 활동이 이루어졌다.
  활동자가 11명으로 증가하였으며, 주요 참여자는 최병현, 백은주, 조하담, 신희수, 박진형, 양호진, 권혜선(Jada), 김수원, 강성우, 송명하 등이다.
  DevRel 팀의 이슈도 등장하여 팀 구조가 확장된 것을 확인할 수 있다.
  주요 프로젝트로는 Supply 부하 테스트 및 성능 개선 프로젝트 종료(710만 벡터 기준 테스트 완료), RDB 접속정보 pgbouncer 변경,
  Storm Parse 메모리 릭 체크, 서플라이 runner 부하테스트(k6 스크립트 작성), 이용약관/개인정보 처리방침 일본어 추가 등이 있었다.
  xionic-vl 모델 관련 이슈(special tokens, 스크린샷 묘사 문제)도 처리되었다.
topics:
  - Supply 부하 테스트 및 성능 개선 (프로젝트 종료)
  - RDB pgbouncer 전환
  - Storm Parse 메모리 관리
  - 서플라이 runner k6 부하테스트
  - 일본어 국제화 지원
  - xionic-vl 모델 이슈
  - DevRel 팀 이슈 관리
key_discussions:
  - title: Supply 부하 테스트 및 성능 개선 프로젝트 종료
    summary: 최병현이 프로젝트 종료를 선언. 710만 벡터 기준 indexer 부트타임(parquet 파일 생성 20분), parquet 부트타임(인메모리 로드 6분) 확인. 이후 마이너 이슈는 단일 티켓으로 관리 예정.
  - title: 서플라이 runner 부하테스트 (STM-3319)
    summary: 조하담, 최병현, 김수원, 송명하가 서플라이 runner 부하테스트에 대해 활발한 논의. k6 스크립트 작성(STM-3442)도 완료.
  - title: CosineSimilarity 초기화 실패 (STM-3433)
    summary: 최병현이 Supply runner에서 CosineSimilarity 초기화 실패 이슈를 코멘트하고 처리함.
