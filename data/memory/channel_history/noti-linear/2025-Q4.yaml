summary: |
  Linear 이슈 트래커 알림 채널. 1548개 알림으로 꾸준한 개발이 이루어졌다.
  새로운 주요 활동자로 홍혁준, 이승규, 김주원, 송명하가 등장하며 팀 구성에 변화가 있었다.
  주요 이슈로는 apis-parse-router 관련 대규모 작업(apidog 테스트 시나리오 추가 STM-4429, 다양한 PDF 렌더링 로직 테스트 STM-4445,
  vertexAI 요청 http2 커넥션풀 변경 STM-4425, ASMR-V2 전환 STM-4390, private sync parse API 추가 STM-4256),
  에이전트 지식탐색 일본어 워딩 변경(STM-3727), 피드백 글자 수 제한(STM-3674),
  로컬 스토리지 접근 시점 이슈(STM-3937) 등이 있었다.
  12월 18일에 최병현과 이승규가 대규모 이슈 정리(Canceled/Done)를 수행했으며, 12월 19일에는 해커톤 준비(STM-4433)가 진행되었다.
  Infra & DevOps 팀에서 송명하가 인프라 관련 이슈를 처리했다.
topics:
  - apis-parse-router 대규모 리팩토링
