  - title: Openllm Anthropic SDK 인터페이스 지원 (STM-1668)
    summary: 노진우가 Openllm에서 Anthropic SDK 인터페이스를 지원하기 위한 개발 작업을 수행. GitHub PR을 통한 리뷰 및 머지 진행.
