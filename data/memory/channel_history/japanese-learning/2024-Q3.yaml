    definition: Japanese Language Proficiency Test, 일본어능력시험. N1(최상)~N5(최하) 5개 레벨
  - term: N4
    definition: JLPT 4급, 기초적인 일본어를 이해할 수 있는 수준
  - term: N5
    definition: JLPT 5급, 기초 일본어를 어느 정도 이해할 수 있는 수준
