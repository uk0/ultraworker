summary: |
  2024년 3분기에는 정기 수업이 중단된 상태에서 자율 학습 분위기가 형성되었다. 7월 초 마지막 수업 안내가 있었고,
  8월에 박우명님이 JLPT 시험 도전을 제안하며 함께 공부할 동료를 모집하였다. N4 레벨 도전을 목표로 하였으며,
  12월 1일 시험 접수(9/1~9/22, 비용 5만원)를 안내하였다. 시험 기반 학습(시험-driven) 방식의 필요성이 공유되었다.
topics:
  - JLPT 시험 준비
  - 자율 학습 전환
  - N4/N5 레벨 도전
