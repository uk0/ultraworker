summary: |
  2024년 1분기에 최윤정님 주도로 사내 일본어 학습 세션이 개설되었다. 2월 초 채널이 생성되어 멤버 모집이 시작되었고,
  매주 월요일 오후 5~6시에 회의실에서 30분간 수업이 진행되었다. 히라가나와 카타카나 문자 학습을 중심으로 진행되었으며,
  시험을 통한 복습 체계도 마련되었다. 3월 말 한국expo 관련 준비로 일시 중단 후 재개 예정이었다.
  수업 교재는 일본어 기초 교재를 사용하였고, 140~141p까지 진도가 나갔다.
