summary: |
  2024년 4분기에는 JLPT 시험 준비와 실제 응시가 이루어졌다. 박우명님과 정세민님이 함께 모의고사 문제를 출력하여
  풀어보는 등 적극적으로 준비하였다. N3 모의고사 문제도 공유되었다. 12월 1일 JLPT 시험을 치렀으며,
  박우명님은 어휘/문법/독해는 잘 진행되었으나 듣기(청해) 파트에서 어려움을 겪었다고 후기를 공유하였다.
