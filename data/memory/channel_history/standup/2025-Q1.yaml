summary: |
  2025-Q1 standup 채널은 팀원 30명이 일일 출퇴근 및 근무 상태를 공유하는 채널로 활발히 운영되었다.
  주요 근무 장소로 미타(본사), 아비케(강남 거점), IBK(기업은행 프로젝트 파견), 지하2층(IBK 프로젝트룸) 등이 사용되었다.
  설 연휴(1/28~1/30) 전후로 다수 휴가가 집중되었으며, 재택/점심미타(점미) 등 유연 근무가 일반적이었다.
  IBK 프로젝트 관련 파견 근무(송명하, 이재준, 김덕현 등)가 본격화되었고, Storm 플랫폼 설치를 위한 도커 이미지 반입 작업이 진행되었다.
  Noah(고석현) 대표가 RAG 청킹 개선 작업(멀티스테이지 청킹)을 집중 수행하며 데모 사이트를 공유하였다.
  현대차 미팅(SaaS 판매 기회), 오라클 APAC VP 미팅, 네이버 검색 대장 미팅, 투자사 방문 등 외부 영업/IR 활동이 활발했다.
  외부 법인 감사 및 실사가 처음으로 진행되었으며(홍성아, 한시형 주도), 오닉사이 부스 발표(정세민, Noah 등)도 있었다.
  한시형은 도쿄 출장, 박우명은 도쿄 거점 마련 출장을 다녀왔다.
