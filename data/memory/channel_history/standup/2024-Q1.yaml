summary: |
  2024년 1분기 standup 채널은 팀원들의 일일 출퇴근 및 업무 현황 공유 채널로 활발히 운영되었다.
  주요 활동으로는 김혜원의 Answer/Analyze 제품 QA 및 프롬프트 정비, 작심(Stargate) 서비스 세션기능 개발 및 배포,
  KT 테스트 환경 구축, 하클(Hackle) A/B 테스트 도구 연동 작업이 진행되었다.
  Noah(고석현)는 메티스(MetisX) xVector-Flasma 연동 개발, 랭콘(LangCon) 발표 준비, 투자(삼성/IMM) 관련 법무 처리,
  신규 사무실 이전(전산실 전용선, 서버랙, 네트워크 공사) 등 경영 전반을 수행했다.
  song은 Privit/xsum 데이터 공개 준비 및 KCI 논문 등재를 완료했다.
  3월에는 서버 엔지니어 노진우(jinu)가 신규 입사했다.
  전체적으로 제품 품질 개선(QA, 프롬프트, 청크 처리)과 인프라 이전이 핵심 테마였다.
topics:
  - Answer QA 및 프롬프트 정비
  - 작심(Stargate) 세션기능 개발 및 라이브 배포
  - Analyze 요약/카테고라이징 기능 개발
  - 임베딩 모델 테스트 및 데이터 제작
  - KT 테스트 환경 구축 및 가이드 작성
  - 하클(Hackle) 연동 버그 수정
  - 메티스(MetisX) xVector + Flasma FPGA 연동 개발
  - 랭콘(LangCon) 발표 자료 준비
  - 삼성/IMM 투자 관련 신주 발행 및 이사회
  - 신규 사무실 이전 (전산실, 네트워크, 서버랙 공사)
  - 워크스테이션 발주 및 인프라 세팅
  - 신규 입사자 온보딩 (노진우, 서버 엔지니어)
