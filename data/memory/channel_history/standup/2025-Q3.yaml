summary: |
  2025-Q3 standup 채널은 37명이 참여하며 일평균 28.3개 메시지가 교환되었다.
  근무 거점이 다양화되어 미타(본사), 디캠프, 아비케, IBK, 의왕 현대차, 세종 아이티센 등 다중 거점 체제로 운영되었다.
  세종 국세청/아이티센 출장(이재준, 송명하, Sigrid Jin)이 빈번했으며, 의왕 현대차 미팅(김혜원, 김부교, 원성준)도 진행되었다.
  대우건설 미팅(양호진, 강성우)이 건설적으로 마무리되며 Storm/파스 제품 소개가 이루어졌다.
  신규 멤버로 안진혁, 윤주운, Jeonghwan Park, 정석현, 유대곤 등이 합류하여 팀 규모가 계속 확대되었다.
  IR(투자 유치) 관련 업무가 증가했으며, Noah(고석현)가 IR 자료 준비에 집중하는 모습이 보였다.
  법률실사 자료 제출(홍성아), 정부 감독 대응(한시형) 등 규제/컴플라이언스 관련 업무가 본격화되었다.
  에이티넘 투자사 팔로우업(한시형), 포브스 행사, 코스맥스 미팅 등 투자/영업 외근이 활발했다.
  클로드 코드 세팅 및 사용법 강의(Sigrid Jin -> 김혜원)가 진행되어 AI 코딩 도구 도입이 확산되었다.
  박우명이 삿포로/도쿄 출장을 다녀왔으며, 팀 전반적으로 운동(복싱, 수영, 헬스) 후 업무 복귀 패턴이 정착되었다.
