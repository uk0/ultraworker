  - 채용 활동 (ML+DATA+Back 엔지니어 커피챗, 파트타임 제안)
  - 회사 기술 플랫폼 목표 정의 작업
  - allganize RAG 파이프라인 평가 (리랭커/임베딩 영향도)
  - 논문 저널 등재 (JDMDH)
