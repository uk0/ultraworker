  - llama3 8B/70B 한국어 모델 튜닝
  - 정부 과제 (RAG 벡터 가속 50억, 데이터 바우처 0.6억, 초창패 1억)
  - 기술보증기금 20억 신용보증 획득
  - 고성능 NAS 장비 도입 (1억, 시장가 ~9억)
