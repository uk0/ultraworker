summary: |
  2024년 2분기는 사이오닉 AI의 비즈니스 확장과 투자 유치가 집중된 분기였다.
  Noah(고석현)가 일본(SBI, 소프트뱅크), KT, LG U+, 현대차, 카카오, 수협, 매경, 국가기록원 등
  다수의 고객사/투자사 미팅을 수행하며 사업 개발에 주력했다.
  정부 과제로는 RAG 벡터 시멘틱 검색 가속 과제(메티스/서울대 협업, 최대 50억/30개월),
  데이터 바우처(0.6억), 초기창업패키지(1억), 포티파이 심리상담 과제 등을 진행했다.
  기술적으로는 수협 RAFT 데이터 증강 + Hyde 방식 RAG 부스팅 실험, llama3 모델 튜닝,
  AWS 베드록 프로그램 검토, 기술보증기금 20억 규모 신용보증 획득 등의 성과가 있었다.
  Sigrid Jin은 미국 출장 중 Databricks/AI Engineer 행사 참석, allganize RAG 평가,
  LanceDB CEO 발표에서 메티스 부사장과 만남 등의 활동을 했다.
  song은 랭체인코리아 밋업 참석, 데이터 바우처 공급기관 계약, 논문 저널 등재(JDMDH) 등을 진행했다.
  고성능 NAS 장비(약 1억, 시장가 9억 상당)를 도입하여 내부 인프라를 강화했다.
