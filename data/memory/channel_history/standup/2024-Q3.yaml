summary: |
  2024년 3분기는 팀 확장, 핵심 고객사 PoC 진행, 제품 고도화가 동시에 이루어진 분기였다.
  채용 측면에서 ML Backend Engineer, ML/DevOps 포지션 채용 공고를 공개하고 적극적인 리크루팅을 진행했다.
  강천성(ML 엔지니어), 김수원(Pylon 초기 개발자) 등이 파트타임으로 합류하고, 인턴 taeeunk1208이 3개월 근무 후 퇴사했다.
  사업 개발에서는 뤼튼과 OpenGateway/LLM 공급 계약을 체결하고, KT와 국외 LLM/AI 프로젝트 협업을 논의했으며,
  IBK(기업은행) 온프레미스 PoC를 위한 솔루션 반입 및 세팅을 시작했다. 한국은행과도 미팅을 진행했다.
  기술적으로는 llama-3.1-xionic-ko-70b 한국어 모델을 공개하고, Storm RAG 성능 부스팅을 위한
  커스텀 검색 엔진(Pylon 연동)을 배포했다. Qwen2 VL 7B 모델 서빙 테스트, Pylon PDF 파서 개선,
  QSPM 로드테스트, 서버 GPU 모니터링 대시보드 구축 등의 작업이 수행되었다.
  카카오 NDA 체결(비전+시멘틱 문서 파서), 부산 DX 포럼 발표(우명님), 일본 법인 설립 논의 등이 진행되었다.
  Sigrid Jin은 미국 출장에서 Databricks/RunPod/AI Engineer 행사 참석 후 귀국하여
  Pylon PDF 파싱 최적화, IBK 문서 파싱 이슈 해결, allganize RAG 평가 등에 주력했다.
