summary: |
  2025-Q2에는 5월 30일과 6월 23일에 "월간 호출 사용량 초과" 알림이 집중 발생하였다. 특히 5월 30일에는 수십 건의 초과 알림이 연속으로 발생하여 최병현이 김혜원에게 한도 증가 여부를 문의하였다. 최병현이 YF(유진투자증권 추정) 고객의 사용량을 분석하며 "Zia's Test" 외에 "Cake"이라는 새 에이전트가 생겨 열심히 사용 중임을 보고하였다. 6월 23일에는 "인센임"이라고 확인하여 특정 고객(인센)의 초과를 식별하였다.
