  - decision: "Build N-bbang Bot as a web application side project"
    date: "2024-10-28"
    context: "Mobile app requires 15 beta testers for app store; web is simpler and faster to ship"
  - decision: "Create tutorial video content using Storm product to drive customer acquisition"
    date: "2024-12-10"
    context: "Product development alone not sufficient for customer growth; need content marketing"
  - decision: "Reuse ideation project outputs as CES demo showcases"
    date: "2024-12-10"
    context: "Efficient use of side project work to also serve CES presentation needs"

