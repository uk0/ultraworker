summary: |
  2025-Q3 법인카드정산 채널이 신규 개설되어 법인카드 경비 정산 업무가 본격적으로 시작되었다.
  채널 개설과 함께 13명의 팀원이 참여하였으며, 홍성아가 '고위드(GoWith)' 경비 입력 가이드를
  Notion 문서로 작성하여 공유했다. Noah(고석현)가 7월 미정산 건수 현황(본인 10건, 덕현 40~50건,
  공용 10건)을 공유하며 정산을 독려했고, 김덕현에게 7번 카드의 카카오택시 등 7월 사용분 정산을
  요청했다. 안진혁이 카카오택시 증빙서류 처리 방법을 문의하는 등 정산 프로세스에 대한 Q&A도
  이루어졌다. 8월에는 미정산 건수 처리를 위한 담당자 모집도 진행되었다.
