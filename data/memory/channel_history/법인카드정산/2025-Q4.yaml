summary: |
  2025-Q4 법인카드정산 채널에서는 월별 법인카드 경비 정산이 정기적으로 진행되었다.
  홍성아가 고위드(GoWith) 입력 가이드를 신규 입문자 대상으로 재정리하여 Notion에 업데이트하고
  공유했다. 9월 미정산자 독촉, 10월 분기결산 마감(10일까지), 11월 정산 요청 등 월별 정산 주기가
  정착되었다. Noah(고석현)가 미정산 건수 처리를 직접 담당하겠다고 공지했으며, 최윤정이 신규로
  채널에 참여했다. 12월에는 홍성아가 11월 카드 정산과 함께 10월 미제출 건도 함께 입력할 것을
  요청했다. ai-crawler 봇도 자동 참여했다.
