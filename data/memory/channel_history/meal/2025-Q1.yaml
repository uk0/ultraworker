summary: |
  사내 점심/저녁 식사 주문 채널. 매일 봇이 자동으로 '샐러드 열차'(11시 10분 마감)와 '일반식 열차'를 운영하며,
  저녁에는 '저녁 수요 조사' 봇이 가동됨. 배달앱(배민) 함께주문 링크를 공유하여 팀원들이 공동 주문하는 방식.
  주요 주문 담당자는 김혜원(샐러드), 정세민(일반식), 양호진(일반식/저녁팟). Storm-Fooding 봇이 오늘의 메뉴 옵션을 자동 추천.
  커피 머신 원두 교체 논의, 간식 열차(쿠팡 공동구매), 나가먹(외식) 팟 등 다양한 식사 관련 소통이 활발히 이루어짐.
