summary: |
  2024-Q1 meal 채널은 사내 식사 및 간식 관련 소통의 중심 채널이었다. 주요 활동으로는 매일 오후 진행되는 저녁 수요 조사 봇 운영,
  주 2~3회 '푸딩(Fooding)' 배송 서비스를 통한 저녁 메뉴 공지 및 주문, 점심 외식 조율(곱창, 양꼬치 등), 과자/음료/커피 캡슐 등
  사무실 비품 주문이 있었다. 네스프레소 캡슐 대량 구매 논의, 회식 장소 선정, 배달 앱(쿠팡이츠, 배민) 활용 등 실용적 소통이
  활발했다. 15명의 구성원이 참여하여 평균 일 1.9건의 메시지가 오갔다.
