summary: |
  2025-Q3는 Storm Parse API(parse-router) 신규 개발 및 라이브 출시가 이루어진 핵심 분기이다. 7월 초 신규 기획 논의를 시작으로 크레딧 시스템 설계, parse-router 테크스펙 작성, 8월 4~5일 라이브 배포 및 테디노트 행사를 통한 첫 외부 공개가 진행되었다. 라이브 직후 실시간 부하 테스트에서 PDF·이미지 처리 성능이 확인되었고, Dragoon 연동 에러 및 LibreOffice 다건 처리 이슈가 발견되어 대응이 이루어졌으며, Phase 2(크레딧 라이프사이클 검증)로 이어졌다.
