summary: |
  2025-Q1에 noah-실험실 채널이 개설되어 석현(노아)의 직관적 아이디어를 팀과 함께 심층 논의하고 실험을 준비하는 공간으로 운영되었다.
  STORM 라이트 버전 기획, 딥리서치 기능(외부 검색 엔진 연동), LLM 프롬프트 가변 분류기, 글로벌 진출 가능성 탐색 등 제품 방향성과 기술적 아이디어가 논의되었다.
  석현의 Sparse 임베딩 선호 이유 논의, Perplexity/OO.ai API 연동 검토, LLM 라우터 설계 등 실험적 주제가 다루어졌다.
