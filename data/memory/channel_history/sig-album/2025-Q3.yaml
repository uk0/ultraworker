summary: |
  여름 시즌 여행/일상 사진 공유 분기. 이강욱이 사무실 일상과 피규어 사진을 다수 공유.
  김덕현이 여수 1박2일 여행 사진을 시리즈로 올리고, Upstage와의 만남(09-10) 사진도 공유.
  정세민이 카이로(이집트) 여행 사진과 다합 도피 사진을 올리며 '생존신고' 시리즈 진행.
  최병현은 치앙마이 오피스 세팅 완료 후 '생존 신고' 사진 공유(17개 답글 대형 스레드).
  이재준이 건물 퀴즈를 내며 5개 답글 유도. 백은주, 김혜원, Sigrid Jin 등도 사진 공유.
  오승희가 '이장님의 카와이한 취향'이라는 캡션으로 이강욱 관련 사진 공유.
