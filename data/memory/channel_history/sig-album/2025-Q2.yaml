summary: |
  가장 활발한 사진 앨범 채널. 최병현(Hyune-c)이 치앙마이/태국 워케이션 사진을 대량으로 공유하며
  채널의 주요 기여자로 활동. 코끼리, 코코넛 감자튀김, 태국 야시장, 사원, 맥주 등 다양한 여행 사진 공유.
  권혜선은 캠핑, 스테이크(포터하우스), 산책 중 발견물 등 일상 사진을 공유.
  Sigrid Jin은 상하이 여행 사진과 Stanford Engineering Carnival 에피소드(스탠포드와 무관한 티셔츠 착용) 공유.
  김덕현은 경주 여행 후기(어린이날+부처님오신날 경주 가지 말 것), 사이오닉 1주년 홍보 공유.
  백은주 검샷 시리즈(대마왕 게임캐릭터), 정세민 상하이 사진, 송명하 호치민 사진 등 해외 출장/여행 사진도 다수.
  오승희 칠가이 사진, 양호진 참여, 김혜원 참여 등 20명의 대규모 참여.
