summary: |
  2025년 1분기 request-for-research 채널은 YC의 RFS(Request for Startups)에서 영감을 받아 팀이 장기적으로 해결하고 싶은 기술 문제들을 기록하기 위해 2월 초 개설되었다.
  RAG 응답 참조 청크 추적, steering embedding, ColBERT m3 학습, LLM 디코더 프루닝(DRAMA), Graph 기반 리랭커 데이터 마이닝 등 다양한 연구 아이디어가 제안되었으며,
  테크세미나 발표 주제 기획 및 Drill(반복 훈련) 방법론 논의도 이루어졌다.
