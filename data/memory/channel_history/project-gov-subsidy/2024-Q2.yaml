summary: |
  2024년 2분기에는 포티파이 심리케어 전문가보조 서비스 과제 신청이 핵심 이슈였으며, 5월 신청 후 6월에 낙방하였다. MetisX 컨소시엄 구성, 범부처통합연구지원시스템(IRIS) 가입, 데이터 바우처 협약 완료가 순차적으로 진행되었다. 국가기록원 비정형 데이터 검색 프로젝트는 차별화 어려움을 이유로 최종 드롭되었으며, 데이터 바우처 수요기업으로 선정된 후 협약 전자서명까지 완료하였다.
