summary: |
  2025년 3분기는 정부지원사업 채널 역대 가장 활발한 분기로, NIA 초거대AI 데이터 구축과제(투이컨설팅 컨소시엄) 착수보고 및 본격 수행이 시작되었다. WBL(AI 스타트업 LLM 챌린지) 서류를 팀 총력으로 7월 21일 제출하였으며, AI 챔피언 대회도 접수 완료하였다. 투이컨설팅과의 데이터 스키마 협의 및 분쟁이 이어졌고, 도메인특화 LLM 사업계획서 작성을 위한 컨소시엄 구성(사이오닉·디노티시아·노타·bhsn·경희대·젠젠에이아이·큐팁·대우건설 등)이 9월 말 시작되었다.
