summary: |
  2025년 2분기에는 엔업(글로벌 기업 협업 프로그램) 최종 선정 및 협약 완료, 현대차 제로원 딥테크 밸류업 협약 완료, 창업성장기술개발사업(디딤돌) 신청이 핵심 성과였다. 기업부설연구소 담당자가 변경되었으며(우명 → 기연), 독자 AI 파운데이션 모델 프로젝트 사업설명회 참여 등 신규 과제 발굴도 활발히 이루어졌다. 디딤돌 과제는 접수 후 미선정 통보를 받았으며, 온라인 보충역 산업기능요원 채용박람회 참가도 병행되었다.
