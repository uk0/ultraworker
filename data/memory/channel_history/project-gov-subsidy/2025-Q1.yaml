summary: |
  2025년 1분기에는 다수의 정부지원사업 공모를 동시에 검토하고 신청한 활발한 시기였다. 초격차 스타트업 1000+와 아기유니콘 육성사업에 신청하였으며, 엔비디아 글로벌 기업 협업 프로그램(엔업) 추천을 수락하여 신청 준비에 돌입하였다. AI반도체 응용실증 지원사업(~3/21)은 팀 전체가 총력을 기울여 최종 제출하였으나, K-클라우드 프로젝트 예산 57% 삭감 소식이 전해졌다. 기업부설연구소 지방 이전 및 부처협업 기반 AI 확산 사업 등 다수의 과제도 병행 검토되었다.
