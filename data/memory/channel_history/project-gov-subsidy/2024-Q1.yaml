summary: |
  2024년 1분기에 정부지원사업 채널이 개설되어 글로벌 SaaS 육성 프로젝트(GSIP) 신청 준비가 집중적으로 이루어졌다. 과제 요건 분석, 발표자료 작성, 사업화 계획 수립, 인건비 산정, 클라우드 적용 계획 등 세부 사항이 광범위하게 논의되었다. 데이터 바우처 사업 적격 판정도 수령하였으며, 국가기록원 비정형 데이터 검색 프로젝트 제안도 검토하였으나 차별화 어려움으로 드롭되었다.
