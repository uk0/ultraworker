summary: |
  2025년 4분기에는 도메인특화 LLM 사업계획서(대우건설·경희대 컨소시엄 포함)를 10월 13일 최종 접수하는 것이 가장 큰 과제였으며, NIA 초거대AI 과제의 2차 현장점검 대응 및 최종보고 준비가 집중적으로 이루어졌다. OpenDataXAI 챌린지(소상공인진흥공단)가 11월 신규 접수 완료되어 Storm 플랫폼 기반 서비스 개발이 시작되었다. 엔업 최종보고가 12월 성과발표로 마무리되었으며, 2026년 창업지원사업 통합공고 및 2026 초격차 스타트업 프로젝트(DIPS) 공모가 연말 공유되었다.
