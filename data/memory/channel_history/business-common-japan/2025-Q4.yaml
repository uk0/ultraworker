summary: |
  2025-Q4 일본 비즈니스 채널에서는 CEATEC(막하리 메쎄) 부스 전시 준비 및 운영, ZeeVaa·Fujita·Logit·Mizuho 등 일본 기업과의 미팅 조율, AIエージェント博(AI 에이전트 박람회) 참가 준비가 활발히 진행되었다.
  STORM의 Microsoft Teams 통합 기능 출시 및 토큰 비용 계산기(cost-per-token estimator) 개발 완료 소식이 공유되었으며, 일본 비즈니스팀용 Notion 데이터베이스(Customer DB·Partner DB·Deal DB)가 신규 구축되었다.
  K-AI Cloud Alliance 일본 시장 진출 프로그램 참여, 채용 관련 JD 관리, JETRO 시장 리포트 수신 등 일본 시장 개발 전반에 걸친 운영 업무가 다수 논의되었다.
