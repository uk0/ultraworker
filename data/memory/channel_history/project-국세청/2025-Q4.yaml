summary: |
  2025-Q4 기간 동안 국세청 PoC 프로젝트가 본격적으로 진행되었다. STORM 플랫폼(Pylon, Stargate 웹, Carrier 연동)이 국세청 내부망에 설치 완료되었으며, NHN 모델 및 Gemma3-27B 등 LLM 연동 이슈가 주요 과제로 부각되었다. 벡터 검색 응답 속도 문제(약 40초), 리랭커 URL 설정 오류, 데이터 유실 및 PVC 재구성, 출처 청크 불일치 이슈 등이 발생하여 팀이 현장을 방문하며 해결하였다. NHN 모델의 OpenAI 스펙 미준수 및 최대 토큰(150) 제한 이슈로 LLM 연동에 어려움을 겪었으며, GraphDB(griffths) 버전업 및 법률 조항 데이터 반입도 완료하였다. 12월에는 국세청 전체 서버 다운 긴급 상황이 발생하기도 하였다.
