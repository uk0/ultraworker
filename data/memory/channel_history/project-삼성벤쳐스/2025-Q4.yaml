summary: |
  2025-Q4에 삼성벤쳐스 VC 투자 분석 플랫폼(온톨로지 기반 스타트업 탐색 서비스) 개발이 본격화되었다. 10월 채널 개설 후 킥오프 미팅과 요구사항 정의가 이루어졌으며, Graph DB 기반 키워드·스타트업·투자자 온톨로지 구축, 크롤링·인덱싱 크론잡, 원페이저 자동 생성 기능 등이 개발되었다. 11월 중간보고 및 주간 데모를 거치며 그래프 DB 교체(graphiti), 스코어링 알고리즘 개선, UI 개선이 반복되었고, 12월에는 딥 리서치 기능과 계정 관리 시스템 추가 요청이 논의되었다.
