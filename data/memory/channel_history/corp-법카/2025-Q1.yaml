summary: |
  2025년 1분기 corp-법카 채널은 43건의 법인카드 사용 내역이 자동 봇을 통해 기록되었다.
  주요 사용 목적은 식사(점심/저녁/야식), 커피챗, 기타(간식/청소용역 등)로 구분된다.
  가장 빈번한 사용자는 U06CLS6E694(세민과 함께하는 식사가 많음)이며, 송명하, 이재준,
  김수진, 조하담, 신희수 등도 자주 사용했다. 고석현(Noah)은 "IBK 출장카드 따로
  처리할테니 남기지말고 쓰세요"라는 안내를 남겼다. 1월 25일에는 instruct.kr 멤버
  (진형, 메웰, 호진, 준영)과의 단체 식사가 있었다. 긱사 청소 용역, 케이크 구매 등
  비식사 사용도 일부 있었다.
