summary: |
  2025년 3분기 corp-법카 채널은 38건의 메시지로 여름 휴가 시즌 영향으로 사용량이
  감소했다. 주요 사용 목적은 식사(미타인원 야식이 빈번), 커피챗, 기타(커피 구매,
  openrouter 크레딧 50$x2회) 등이었다. U06CLS6E694가 미타인원 야식을 자주
  사용했으며(7/14, 9/2, 9/10), 오승희, 박진형, 이강욱, 김혜원, 송명하 등도
  사용했다. 8월 7일에는 "일본 AI 리서쳐 방문 식사"(진형, 승희, 호진)가 있었다.
  openrouter 크레딧 구매가 7/29, 8/4에 각각 50$씩 발생했으며, 8/4에는 자동결제
  등록도 이루어졌다. 이강욱의 "혼밥" 사용도 특이하게 기록되었다.
