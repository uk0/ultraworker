summary: |
  2025년 2분기 corp-법카 채널은 73건의 메시지로 1분기 대비 사용량이 크게 증가했다.
  홍성아가 "공용법카 사용내역이 업데이트가 안되고 있다"며 전체 채널에 사용 내역 등록을
  독려하는 공지를 올렸다(4/21). 주요 사용 목적은 식사, 커피챗, 기타(커피 구매, 주차권,
  약국, 티셔츠 220장 대량 구매 등)였다. U06CLS6E694가 세민과 함께 식사/야식을 가장
  빈번하게 사용했으며, 오승희, 송명하, 양호진, 권혜선, 김혜원 등도 활발히 사용했다.
  특이 사항으로 openrouter 50$ 크레딧 결제, 플라밍고 고객사 주차권, 주차 할인권
  대량 구매 등 비식사 경비 사용이 눈에 띄었다. "지랩" 결제 건에 대해 홍성아가 확인을
  요청하기도 했다.
