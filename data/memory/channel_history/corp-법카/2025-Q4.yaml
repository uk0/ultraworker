summary: |
  2025년 4분기 corp-법카 채널은 62건의 메시지로 커피챗 사용이 크게 증가했다.
  특히 이상호(U09QEFWEQ3W)가 신규 멤버로 합류하여 11~12월에 매우 활발하게
  커피챗을 사용했다(정세민, 강성우, 호진, 대곤, 줄리앙, 메이웰, 기연, 혜선 등과).
  김혜원이 "법카가 어제 입은 바지에 있다"는 빅이슈를 공유하며 커피챗 이용자들에게
  사과하는 에피소드가 있었고(10/14), 안진혁이 "법카 있으니 필요한 분 알려달라"는
  안내도 있었다. 최병현도 12월에 다수의 커피챗을 사용했다(권혜선, 홍혁준, 양호진,
  조하담, 이승규 등). 식사는 미타인원 야식/아침이 주를 이뤘으며, 오승희의 외부미팅
  경비 사용도 있었다.
