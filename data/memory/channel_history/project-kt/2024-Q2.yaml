summary: |
  KT 프로젝트의 가장 활발한 분기. 수협 대면 미팅 및 시연, KT 믿음(midm) 모델 테스트, SG그룹 프로젝트 제안 준비가 핵심 활동이었다.
  수협 에이전트 품질 개선을 위해 다국어 임베딩 모델(v2) 교체, RAG 로직 수정, 프롬프트 최적화, 피드백 기능 개발 등 다각적인 기술 개선이 진행되었다.
  KT 믿음(midm) 모델과 솔라(Solar) 모델의 STORM Answer 연동 테스트가 수행되었으며, chat 모드 호출 방식 확인 및 프롬프트 호환성 검증이 이루어졌다.
  SG그룹 프로젝트 관련 견적 조정(3~3.5억), 인력 증빙, 제안서 작성, 제안 발표 준비 등 사업 관련 업무도 병행되었다.
  6개 에이전트 설정, API 연동 규격 정리, top-k 파라미터 조정 등 기술 지원 요청이 빈번했다.
