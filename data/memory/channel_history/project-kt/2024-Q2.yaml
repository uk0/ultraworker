    aliases: [midm, MIDM]
  - term: 솔라(Solar)
    definition: 업스테이지에서 개발한 LLM 모델. Solar Mini(10.6B), Solar Pro(36B) 등 라인업 보유
    aliases: [Solar, solar_mini]
