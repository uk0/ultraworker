    definition: KT를 통해 STORM Answer RAG 솔루션 도입을 추진한 기업 고객
  - term: top-k
    definition: RAG 검색에서 반환하는 상위 청크 수. 값이 클수록 정확도 향상 가능하나 응답 시간 증가
  - term: 리랭커(Reranker)
    definition: 검색된 청크의 관련성을 재평가하여 순위를 재조정하는 모델
