summary: |
  KT 프로젝트 채널이 2024년 1월 24일에 개설되어 본격적인 활동을 시작한 분기. KT향 STORM Answer 환경 구축 및 수협 서브프로젝트 대응이 주요 활동이었다.
  KT 환경 4벌 세팅, Instruction 등록 가이드 전달, 문서 학습 기능 테스트가 진행되었으며, 업스테이지 모델(믿음) 프롬프팅 호환성에 대한 사전 검토도 이루어졌다.
  수협 계정 분리 요청, 대용량 파일(암보험약관 등) 학습 오류, 한컴소프트 PDF mimetype 이슈 등 기술적 문제 해결에 상당 시간이 투입되었다.
  hwp 문서 처리 기능 반영 요청, 드라이브 URL 업로드 오류 등 고객 요구사항 대응이 활발했다.
topics:
  - KT STORM Answer 환경 구축
  - 수협 테스트 및 시연 준비
  - 대용량 문서 학습 오류
  - hwp 파일 처리
  - mimetype 이슈
  - 업스테이지 모델 호환성
