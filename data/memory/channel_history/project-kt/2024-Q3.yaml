summary: |
  KT SG그룹 프로젝트 제안 발표 및 기술 검증이 핵심이었던 분기. 7/8 SG그룹 제안 발표가 진행되었으며, 시나리오 기반 분석 및 개선 작업이 후속으로 진행되었다.
  KT에서 STORM RAG를 검색기로만 사용하고 제3의 모델로 답변을 생성하는 구조가 확인되었으며, 이에 따른 청크 품질 최적화에 집중하였다.
  솔라 미니(10.6B) 및 솔라 프로(36B) 모델 테스트 환경 구축, 시오닉 라마(xionic-ko-llama-3-70b) 모델 테스트가 진행되었다.
  top-k 파라미터 조정, 리랭커 튜닝, 약관 개정본 비교 기능, 표 내 공백 텍스트 인식 등 구체적인 기술 이슈 해결에 주력하였다.
  API 사양 변경, pageName 오류, 크몽 테스트 결과값 불일치 등 기술 지원 이슈가 빈번했다.
