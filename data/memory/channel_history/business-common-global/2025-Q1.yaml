  2025년 1분기 동안 일본 시장 진출 관련 논의가 주를 이뤘다. 소프트뱅크, 미즈호 은행 등 일본 스타트업 연계 프로그램 대응과 현지 법인 설립 필요성, 라인 웍스 미팅, KSC 도쿄 좌석 확보 등 실질적인 일본 진출 준비 작업이 진행되었다. 팀원들이 일본 현지 네트워크(소프트뱅크/유니플랫폼 김윤경님, KSC 도쿄 김병훈 센터장님 등)를 활용하여 파트너십을 모색하였으며, 3월 말 일본 출장 계획도 조율되었다.
