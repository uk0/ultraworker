summary: |
  2025년 3분기 글로벌 비즈니스 채널에서는 일본 시장 심화 공략과 동남아(태국 Siam AI) 협업이 동시에 진행되었다. 일본 FunDeal 행사 후속 미팅(NEC, 도쿄 일렉트론 디바이스, AVANT Consulting 등), 일본 IT 도입 보조금 제도 리서치, 일본 법인 한국어 공식명 확인, 일본어 제품소개서 7월 최종본 공유 등 일본 현지화가 심화되었다. Siam AI와는 시나리오 설계와 계약 준비가 진행되었으며, 8월에는 일본 밋업(8월 12일) 개최 홍보가 이루어졌다. aiESG 후속 미팅, KSC 도쿄 소개 이벤트 참가 등도 기록되었다.
