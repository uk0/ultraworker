summary: |
  2024년 3분기 글로벌 비즈니스 채널은 일본 진출을 위한 초기 기반 마련에 집중된 분기이다. 소프트뱅크 네트워킹, 캐논마케팅재팬 연계, 일본 법인 설립 준비, 디캠프 일본 멘토링, AI Smiley 박람회 참가 등이 주요 활동이었다. 일본 현지 콜드이메일 발송(상사 기업 리스트 작성), 한국기업연합회 소개, Headwaters/Hakky 등 경쟁사 리서치, ASCII STARTUP 미디어 PR 시도, 레이더랩(일본판 마크스폰)과의 TCFD 에이전트 협업 등 다각적인 시도가 있었다. 8월에는 일본 출장(이사고 오피스 방문, KOSME 도쿄, AIX 미팅)이 진행되었다.
