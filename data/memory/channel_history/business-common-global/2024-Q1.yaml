summary: |
  2024년 1분기 business-common-global 채널은 Sionic AI의 일본 시장 진출 초기 준비에 집중되었다.
  LINE 마켓플레이스 출품 심사 신청, 일본 가상 오피스(긴자) 계약, AI EXPO 부스 출점 검토 등
  일본 사업의 기반을 다지는 활동이 주를 이루었다. 카카오인베스트먼트 투자자 대응을 위한
  일본 사업 진행 현황 정리, NexTech Week 전시회 참가 준비, 일본어 주소 표기 확인,
  통역 서비스 제안 검토 등 실무적인 진출 준비가 진행되었다. Cambridge Innovation Center를 통한
  일본 진출 사례 조사, AISmiley 포털 등재 검토 등 다양한 채널을 통한 시장 접근 방법도 모색하였다.
  일본 AI 시장 관련 참고 자료(NTT tsuzumi, Hitachi, Z Holdings 등)가 공유되었다.
