summary: |
  2024년 2분기는 Sionic AI의 일본 AI EXPO(NexTech Week) 참가가 핵심 활동이었다.
  5월 도쿄 빅사이트 전시회 참가를 위한 전방위적 준비가 이루어졌으며, 일본어 브로셔 제작,
  데모 영상 완성, 입간판/배너 디자인, 현지 단기 알바 채용(2명), 통역 인력 확보,
  화물 운송 준비, 항공편/호텔 예약 등 실무 준비가 집중적으로 진행되었다.
  디캠프 5월 디데이 합격 및 참가, JETRO 서울사무소와의 일본 거점 설립 지원 논의,
  Tokyo Social Innovation Tech Award 2024 소개 등 외부 프로그램 활용도 모색되었다.
  전시회 이후에는 명함 정리, 참가업체 후기 작성, 넘버원솔루션즈/오르쯔 등과의 미팅 진행,
  ABEJA 자료 공유 등 사후 팔로업이 활발히 이루어졌다. 채널명이 business-lead-jp에서
  business-common-jp로 변경되었다.
