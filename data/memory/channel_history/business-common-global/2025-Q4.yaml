summary: |
  2025년 4분기 글로벌 비즈니스 채널에서는 일본 사업의 본격적인 확장과 함께 동남아, 미국, 유럽 등 다방면의 글로벌 진출 논의가 활발히 이루어졌다. 주요 이정표로는 CEATEC 전시회 참가(일본 최대 IT 전시회), K-AI 얼라이언스 출장(11월 17-19일), OpenAI 오픈 이노베이션 최종 선발, SBI 인베스트먼트 투자 문의, Siam AI(태국) 관련 협업 준비, NVIDIA GTC 2026 스타트업 피치 준비 등이 있었다. Dirbato, Recruit, DATT Japan 등 일본 파트너사와의 미팅 결과가 상세하게 공유되었으며, 기업 소개 PR 영상 제작(한국어·영어·일본어)이 완료되었다.
