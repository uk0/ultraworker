summary: |
  2025년 2분기 글로벌 비즈니스 채널에서는 일본 IT Week Spring(4월 22-25일) 출장 준비와 현장 미팅, Beyond Seoul Tokyo IR 행사(5월 7일), Japan IT Week FunDeal 현장 미팅(5월 8-9일) 등 일본 시장 공략이 집중적으로 이루어졌다. IMM Japan 파트너십 논의, AVANT Consulting(YJ Corp 연결), 통역 섭외, 일본 제품소개서 업데이트 등 준비 작업도 체계적으로 진행되었다. 또한 태국 Siam AI와의 협력 논의가 시작되었고, 동남아 시장 진출을 위한 리서치가 병행되었다.
