summary: |
  2025년 2분기 sionicai-relate 채널에서는 Relate/Spread 툴의 본격적인 온보딩과 실제 활용이 시작되었다. 4월 말 승희님이 채널에 참여하면서 연락처 일괄 업로드, Engage(시퀀스) 설정, Meeting scheduler, 이메일 CC 추가 등 다양한 기능에 대한 질의응답이 활발히 이루어졌다. 5월에는 Spread LINC(AI 이메일 마케팅 코파일럿) 출시 안내, Relate/모두싸인 공동 웨비나 안내, 유료 전환 관련 논의 등이 있었으며, 6월에는 서버 점검 공지와 한국어 UI 업데이트, Triggered Campaign 등 신기능 출시가 안내되었다.
