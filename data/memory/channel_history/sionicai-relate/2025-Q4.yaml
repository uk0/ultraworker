summary: |
  2025년 4분기 sionicai-relate 채널은 Relate/Spread CRM 서비스 팀으로부터의 업데이트 공지 위주로 구성되었다. Relate 1.0 버전 지원 종료(10/17 이후 접속 불가) 안내, 11월 Cloudflare 장애로 인한 서비스 접속 불가 및 복구 공지, 12월 Relate/Spread 기능 개선사항(이메일 발송 대시보드, 모바일 뷰, 시퀀스 통계 등) 업데이트 공지가 주요 내용이다. 메시지 수가 6개로 매우 적어 외부 파트너 서비스 공지 수신 채널로 활용된다.
