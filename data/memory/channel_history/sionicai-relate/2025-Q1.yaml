  2025년 1분기 sionicai-relate 채널에서는 Relate 툴 온보딩과 초기 설정 작업이 본격적으로 진행되었다. 1월에는 VoIP 시스템 및 문자 메시지 연동 가능 여부 문의, Engage 기능의 자동 발송 조건 질의가 이루어졌다. 2월에는 수진님이 설정 작업을 진행하였고, 구글 계정 연동 로그인 이슈(비밀번호 재설정으로 해결) 및 이메일 서명 추가 방법 문의, Organization 삭제 불가 이슈 등이 논의되었다. 3월에는 Relate 팀과의 중간 체크인 미팅 제안과 함께 한국어 UI 지원 출시 안내, 이메일 마케팅 웨비나 공지가 있었다.
