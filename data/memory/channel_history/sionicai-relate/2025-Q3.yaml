  2025년 3분기 sionicai-relate 채널은 활동이 매우 저조하였다. 7월 초에 Relate 도큐먼트 기능의 총방문횟수와 고유방문횟수 차이에 대한 문의가 있었고, Relate/Spread 팀에서 Engage 재활용 온보딩을 제안하였다. 7월 중순에는 Spread 2.0 출시(실행 속도 개선, 단계별 오픈/클릭 수 확인, 이메일 템플릿 보관 기능, 커스텀 필드 일괄 수정) 안내가 공유되었다. 8월에는 Campaign 과금 기준 변경(구독자 중심, 예약 시점 발송 대상 확정, 반송률 높으면 자동 중단) 업데이트 공지가 수신되었다.
