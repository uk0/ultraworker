summary: |
  2024-Q1은 eng-model-ensemble 채널이 본격적으로 활성화된 분기. 주요 연구 주제는 (1) BM25+임베딩 앙상블을 통한 검색 성능 향상, (2) 임베딩 모델 파인튜닝 파이프라인 개발, (3) Reranker 활용 전략 검토였음. Riley가 작심(Zaksim) 테스트셋 대상으로 BM25+임베딩 RRF(Reciprocal Rank Fusion) 그리드 서치 실험을 수행하여 bm25:embed = 0.5:0.5 ~ 0.3:0.7 비율이 최적임을 확인. kozistr833(형찬)이 임베딩 모델 파인튜닝 자동화 파이프라인(multi-GPU, deepspeed 지원)을 개발. Cohere reranker를 retriever 목적으로만 사용하는 전략과 그 한계를 분석. Noah가 Supply 프로젝트에 BM25 사용자 전용 사전 기능을 추가. Sigrid Jin이 Rust 기반 렉시컬 검색 라이브러리 Tantivy를 소개하고, Gemma 7B 기반 SFT/DPO 튜닝 실험도 진행. Riley는 최종적으로 모델 앙상블 연구 중단을 결정하고 내용을 정리 공유.
topics:
