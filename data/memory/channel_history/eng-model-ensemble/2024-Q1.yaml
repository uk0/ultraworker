  - term: 'CC'
    definition: 'Convex Combination - RRF 대안으로 검토된 점수 결합 방식'
  - term: 'Supply'
    definition: 'Sionic AI 내부 BM25 기반 렉시컬 검색 프로젝트'
  - term: '작심 (Zaksim)'
