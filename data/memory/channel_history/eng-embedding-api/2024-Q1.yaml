summary: |
  2024-Q1은 Sionic AI Embedding API의 운영 및 기술 지원이 활발했던 분기. 서버 하드웨어 업그레이드를 위한 점검 공지가 있었고, Embedding v2 API의 기술 문의가 다수 발생. 주요 이슈로는 v2 임베딩의 max token 제한, 출력 벡터 사이즈, 특수문자(이중 따옴표) 포함 텍스트에서의 500 에러 등이 있었음. Riley와 Sigrid Jin이 kozistr833(형찬)에게 v2 관련 기술 문의를 활발히 진행. MetisX 파트너와의 v3 임베딩 사양 공유(L2 Norm 포함)도 이루어짐. 256개 이상 문자열 배치 임베딩 시 500 에러가 발생하는 제한 사항도 보고됨.
