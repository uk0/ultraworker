[package]
name = "memory-search"
version = "0.1.0"
edition = "2021"
description = "Hybrid search MCP server for agent long-term memory"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# CLI
clap = { version = "4", features = ["derive"] }

# Async
tokio = { version = "1", features = ["full"] }

# Utilities
anyhow = "1.0"
walkdir = "2"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }

# Ranking
bayesian_bm25 = { path = "vendor/bb25" }

[dev-dependencies]
tempfile = "3"
